body:
  text: 春秋究遺卷三左庶子葉酉撰莊公元年春王正月繼故不書即位説詳桓元年公即位下仍書王正月者與隱公元年同三月夫人孫于齊凡稱夫人必稱某氏者恒詞也専稱夫人者著其為夫人以正其罪也公見殺於齊親莫親於夫人而乃孫於齊乎故特以夫人書葢對公為文以語氣求之而其罪自不可掩若不去姜氏則或習其讀而不之察矣夏單伯逆王姬左氏經文作送杜註以單伯為天子卿張氏洽曰非也築館在秋如單伯果以天子之卿送王姬必俟館成之後方至魯豈得豫書之當從公榖作逆其説似得其實不書如京師者詞以達意為主人止知以多為達而春秋吐詞為經則徃徃以少為達如鄭伯克段於鄢不書段出奔及上文夫人孫于齊不書姜氏之類皆是葢意有所専注即不雜一他詞以亂之此春秋之所以為謹嚴也此經之不書如京師亦猶是已葢聖意専以忘親仇而主齊婚為魯莊罪若書如京師則與逆王姬之詞相亂而習其讀者或且疑其意在於譏單伯之不以聘王而如京師與成十三年書公如京師同一義矣少一詞而義轉達斯固㳺夏所不能贊者與秋築王姬之館于外築館所以舍王姬於外杜註公在諒闇中慮齊侯當親迎不忍便接之於廟也冬十月乙亥陳侯林卒王使榮叔来錫桓公命魯史舊文王本不稱天聖人修之加天於王者謂王當奉若天道也今以簒弑之賊生不加誅死而錫命所謂奉若天道者安在乎王不稱天聖人亦本其惡惡之心不覺形之於筆削之際而已王姬歸于齊大書歸於齊所以著莊公忘不共戴天之仇而為之主婚之罪也齊師遷紀郱鄑郚齊欲滅紀故徙其三邑之民而取其地至是紀之力不足以自守雖欲不亡而不可得矣二年春王二月塟陳莊公夏公子慶父帥師伐於餘丘於餘丘杜註國名也公榖以為邾邑按邑不書伐當以杜註為是慶父稱公子葢已為大夫也秋七月齊王姬卒書王姬之歸而且及其卒葢比内女而為之服故備書之以見公之厚於仇國也冬十有二月夫人姜氏㑹齊侯于禚傳書姦也按禚齊地是姦發夫人乙酉宋公馮卒三年春王正月溺㑹齊師伐衞溺不稱公子未為大夫也榖梁以為貶非夏四月葬宋莊公五月葬桓王崩七年而後塟故公榖皆以為改塟天子之崩魯使人㑹則書塟塟而不書會者其人微也秋紀季以酅入于齊杜註齊欲滅紀故季以酅入齊為附庸按諸侯之兄弟不稱名而以行次書者四許叔也紀季也蔡叔蔡季也紀季為齊附庸許叔處許東偏亦鄭之附庸也附庸之君例稱字其稱行次者古人行次亦謂之字莊二十三年書蕭叔朝公是其例也至蔡叔之以行次書者以封人老而無子叔將繼其兄以有國也蔡季則以其歸之時獻舞初立民志未孚季以兄弟至親素為其國人之所附今見其来歸遂相與倚之以為重故稱其行次因其重而重之也此與閔元年書季子来歸之義正同彼書内事單季字不成文故以子配季此書外事故以季係國也其後獻舞被獲於楚蔡無君者八九年以八九年無君之國而能填撫其民人使不生他變者大都皆季之力也此春秋所以重之歟冬公次于滑傳次于滑將㑹鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次四年春王二月夫人姜氏享齊侯于祝丘三月紀伯姬卒榖梁傳外夫人不卒此其言卒何吾女也適諸侯則尊同以吾為之變故卒之也望溪先生曰内女之卒有變然後書紀二姬之書也以國亡君奔而失其所也夏齊侯陳侯鄭伯遇于垂鄭伯厲公也蘇氏以為子儀非張氏洽曰三國遇垂謀取紀也紀侯大去其國杜註以國與季季奉社稷故不言滅不見迫逐故不言奔大去者不返之詞程子以大為紀侯名罪其不能死社稷也其説恐不確六月乙丑齊侯塟紀伯姬目齊侯者胡氏以為著其迫逐紀侯之罪非也齊侯迫逐紀侯之罪豈待塟紀伯姬而始著乎葢齊侯者紀伯姬之仇人也國為其所滅君為其所逐身死在殯而塟於仇人之手其可憫孰甚焉故目齊侯者愍紀伯姬也若從齊侯起義則塟一亡國之夫人其事至細豈春秋之所宜録者哉秋七月冬公及齊人狩于禚齊人公榖皆以為齊侯謂公不當與仇人通故諱稱人以示譏其説迂迴不可通春秋傳信之書既書齊人則必非齊侯決無譏在公而卑其敵之理公之所以及齊人狩者葢禚齊地與魯接壤而齊人習於田獵之事是時齊與魯親襄又以内亂自慙故欲與公為好特令人導公狩於其境内以娯樂之而公舞選射貫狩適投其所好亦不欲逆其相親之意二十三年如齊觀社即此意故遂及齊人狩于禚其所及者齊人本非齊侯也以仇讎之國從其請而狩於其境内即為忘親釋怨不必及齊侯狩而後為罪也春秋據事直書苐書及齊人狩而其罪自見豈必諱齊侯為齊人而後為譏乎且諱者微其詞使凡事之可譏者皆有以冺其迹故謂之諱既諱矣又何云譏也狩與盟㑹不同故公雖及齊之微者狩不諱公五年春王正月夏夫人姜氏如齊師齊師正義齊侯疆理紀地有師在紀不言地者師之進止無常也不言㑹者㑹必先為之期齊侯在師夫人徃而就之不可以㑹言也秋郳黎来来朝傳名未王命也杜註未受爵命為諸侯傳發附庸稱名例也其後數從齊桓以尊周室王命以為小邾子按附庸之君例稱字黎来恐亦是字而左氏以為名則邾儀父之稱字其義不可通矣抑或郳國尤小舊史但知其名故不得不以名見與冬公㑹齊人宋人陳人蔡人伐衞傳納惠公也齊人宋人皆大夫榖梁傳之説不足信若以諸侯而敢逆王命列其爵其罪不更著乎不書納衞侯者義具成十八年宋魚石復入于彭城下二十四年戎侵曹不書納赤與此同義六年春王正月王人子突救衞王人天子之大夫王謂王國王人猶言晉人齊人也子突大夫名古以子名者見於傳記如陳子亢介子推皆是春秋惟附庸之君書字餘無書字之法杜註非子突必冠以王人者但稱子突救衞則疑於内卿矣又不可云王子突也其不言王使者彼伐而此救敵詞也若救衞而書王使則以天子之尊而下夷於列國非所以正名分矣桓五年伐鄭只據從王者為文即此義然則外大夫伐救何以亦不書君使外大夫伐救毎不止一國若合數國之大夫而皆目其君則無復文理矣故外大夫㑹伐㑹救不書君使而一國之伐救因例焉文當然也外大夫㑹盟不目君義與此同来盟則書君使以接於我故夏六月衞侯朔入于衞諸侯復國例書復歸書入者以國本非其所有也秋公至自伐衞連數國之師自五年冬㑹伐閲三時而後返歸告於廟故書至螟冬齊人来歸衞俘觀此則衞朔之入祗納賂於齊而魯並不得與之分功也審矣衞既祗歸功於齊則納朔之舉齊實主之而魯特惟齊令之是從也又審矣是時魯之國勢去齊猶不甚逺乃惟其令之是從焉莊公雖無志復仇然亦不應孱弱至此必迫於文姜之命無疑惟迫於姜命故来歸衞俘傳稱文姜請之葢無故而使吾君躬擐甲胄疲民費財為此有損無益之舉以瘠魯而肥齊不能無慙於國人也故欲以寳貨之賂解之人者渾舉之詞外諸侯之事若此類皆稱人義不闗乎其爵也来葢使人来不書使某者其人微也知齊人之不以来者稱而謂其為渾舉之詞者以楚人使宜申来獻捷之文知之也書法與鄭人来輸平同七年春夫人姜氏㑹齊侯于防傳齊志也杜註文姜數與齊侯㑹至齊地則姦發夫人至魯地則齊侯之志夏四月辛卯夜恒星不見夜中星隕如雨如雨者公羊傳言其狀如雨也左傳與雨偕也杜註訓如為而正義星隕固異雨乃常事亦言之者雨内見星所以為異主言星之異不言雨之異也按經文明言如雨似當以公羊之説為正秋大水無麥苗冬夫人姜氏㑹齊侯于榖八年春王正月師次于郎以俟陳人蔡人稱師者内大夫將例稱名稱帥師此微者也故稱師公羊傳將卑師衆稱師將卑師寡稱人内則無論師衆師寡凡微者將皆稱師或但書及無稱人之例葢單人字不成文又不可言我人也微者將故下及齊師圍郕書及不書㑹或謂魯君親將以無功而諱之非也乾時敗績且不諱此無功而諱之乎下郕降于齊師傳稱慶父請伐齊師正義在國請耳非是軍中請也春秋凡書次未有著其所為者此獨書以俟陳人蔡人何也葢公本意原欲與陳蔡合兵伐郕其及齊師圍郕者乃後之變計非本謀也若不書俟陳蔡則似魯之本謀原欲與齊合兵而其事之情實無由見矣不書伐郕者師未出境不成乎伐也故不書甲午治兵甲午正月之甲午也古者出而治兵入而振旅葢公原欲與陳蔡聯兵伐郕至是而陳蔡將至故亟為治兵俟其一至即行也稱干比戈士氣勃發似有不可中止之勢乃下忽繼之曰夏師及齊師圍郕比事屬詞而聖人之情可見矣夏師及齊師圍郕郕降于齊師秋師還覆書師者公本意原欲與陳蔡聯兵伐郕今乃及齊師圍郕兩事也故覆書師以别異之按春秋書㑹伐未有如此之首尾畢備者葢齊襄乃魯不共戴天之仇棄仇崇好於義既有所不可且公之本意原欲與陳蔡聯兵伐郕其忽變而與齊者必齊因與郕壤地相接意欲得之以為附庸今聞魯將伐之恐其為魯所得遂以計誘魯令謝陳蔡而與己合兵其為謀甚狡葢齊魯聯師伐郕則郕必不支而魯之兵力不强於齊郕不支必不舍齊而服於魯此事勢之顯然易見者是時魯之兵力雖較齊差弱而猶不甚相逺使不從其計齊固無如之何乃公竟懵焉墮其術中一若為積威之所劫雖與陳蔡有成約不難背之而惟齊令之是從其必迫於文姜之命無疑以軍旅之事而聽於一淫婦人公之不振亦甚矣聖人心傷其事故以俟陳蔡與及齊師對舉為文葢病其忘親釋怨又不虞其將見欺而失其所與之自貽伊戚也豈徒以擅興大衆吞併弱小為罪而已哉春秋大夫將不書至此微者將獨變文書師還者又著其兵出無功厯三時而後返雖不從慶父之請較之遂非逞忿者有間然勞師動衆至甘為仇國之所賣何若慎之於初之為愈也師還在秋諸兒冬即被弑於此而不以復仇為事後雖欲揕仇人之胸而不可得矣故特詳誌之以見義焉冬十有一月癸未齊無知弑其君諸兒齊侯使連稱管至父戍葵丘期戍而不遣代僖公之母弟夷仲年生公孫無知有寵於僖公襄公絀之故二人因之以作亂冬十二月弑公而立無知按無知不稱公孫者以未為大夫故九年春齊人殺無知傳公孫無知虐於雍廩九年春雍廩殺無知按殺無知者雍廩也書齊人義見隠五年衞人殺州吁下公及齊大夫盟于蔇是時齊無君故公與其大夫盟不諱公盟者衆故不目其人夏公伐齊納糾齊小白入于齊按糾與小白史記以小白為弟程子引薄昭之言證小白為兄按精義載程子之言曰桓公子糾襄公之二弟也大全引以為襄公之二子誤甚二説紛紛迄無定論然以經文及左氏傳考之皆非也二人本非兄弟小白乃僖公子糾乃襄公子觀左氏傳稱襄公立無常鮑叔牙奉小白出奔葢恐不為其兄所容故出奔以避其禍也及亂作而後管召奉公子糾奔魯使糾與小白皆僖公子小白畏禍及糾獨不畏禍及乎此一證也又殺兄弟宜目君如天王殺其弟佞夫是也糾若與小白為兄弟則後取子糾殺之不當書齊人此又一證也公榖書納糾不稱子惟左氏傳稱子然齊人取子糾殺之則三傳經文皆稱子春秋惟時君之子乃稱子其非兄弟尤彰彰明矣以上本梁氏錫璵説糾既為襄之子則齊襄者魯之仇人糾為襄子乃魯之仇人之子也以仇人之子而乃為伐齊以納之則忘親釋怨其罪大矣故春秋特書納以譏之其不稱子者絶其父故不子其子下文取子糾殺之稱子者所以譏其不當殺也此若亦稱子則下文譏其不當殺之義轉無由見矣左氏誤不可從小白繫齊者著其當得國也父死子繼糾何以不當得國周禮大司馬九伐之法於内外亂鳥獸行者則滅之滅者殄其世嗣之謂糾之所以不當得國者襄累之秋七月丁酉塟齊襄公八月庚申及齊師戰于乾時我師敗績春秋為魯諱敗此獨書敗績者胡氏謂能與仇戰雖敗亦榮故不諱非也莊公即位已九年矣何嘗有復仇之意其戰于乾時也納糾非復仇也不幸而敗何榮之有聖人正惡其納仇人之子至於喪師辱國非尋常戰而不利者比故直書其敗以甚其罪耳焉有以敗為榮者乎春秋序戰例以受兵之國主兵此獨以魯主兵者春秋魯史故以魯及齊不以齊及魯内魯也若有同役之國則不從此例如莊公十二年書及鄭師伐宋戰于宋是也及不書公伐齊而及齊戰一事也故承上文從省九月齊人取子糾殺之糾非弟也故不曰弟書齊人者傳稱鮑叔帥師来言曰子糾親也請君討之則取子糾者鮑叔也故稱人前稱糾兹特冠之以子者著其不當殺也不曰齊人殺子糾而曰取子糾殺之者又著魯之不自振拔始而納糾者何心今乃為齊所脅取而殺之既不能以仇人之子而絶之於前又不能以逋亡之孤而保全之於後所謂進退兩無所據者也糾来奔不書者義見閔元年季子来歸下冬浚洙張氏洽曰洙水在魯城北齊伐魯之道也魯雖殺子糾而猶有畏齊之心故浚而深之以備齊師之至十年春王正月公敗齊師于長勺傳齊師伐我公將戰曹劌請見公與之乗戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績按傳例未陣曰敗某師葢兩軍甫交此軍用謀而敵軍遽潰本未嘗戰故不書戰先儒謂惡其詐非也若惡其詐孰有詐如城濮之戰者乎且長勺之戰並無詐謀不過待其衰而鼓之耳若聖人於此即以其詐而惡之則必如宋襄之不鼓不成列然後可矣有是理乎二月公侵宋按先儒責公舉無名之師其説恐未確此必長勺之役宋人與謀而公報之者觀下齊宋次于郎可知三月宋人遷宿杜註强遷之而取其地故文異於邢遷夏六月齊師宋師次于郎公敗宋師于乗丘書次者何氏休曰二國纔止次未成於伐魯即能敗宋師齊師罷去故不言伐言次也敗宋師義見長勺下秋九月荆敗蔡師于莘以蔡侯獻舞歸傳蔡哀侯娶於陳息侯亦娶焉息媯將歸過蔡蔡侯見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸楚稱荆説詳十四年荆入蔡下獻舞殆即折之盟所謂蔡叔者諸侯執不名自此遂失國故名之如諸侯之卒則名也盟稱行次執稱獻舞望溪先生所謂義各有當而不相悖也冬十月齊師滅譚譚子奔莒傳齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師滅譚譚無禮也按用大衆曰師譚子不名與弦子温子同胡氏用啖氏之説以不名者謂其無罪而見滅名者謂其屈服而出奔其説恐不確僖公以前國滅而其君出奔及以歸者俱不名至宣公十五年晉師滅赤狄以潞子嬰兒歸其後君奔及以歸者俱名葢年逺者紀載略年近者紀載詳非褒貶之所存也如必以名為貶則潞子嬰兒何罪哉既書滅復書奔者君與國並重也奔不書出者由内而外謂之出國滅則無内故不可以言出也此與昭二十六年王子朝奔楚不書出其義正同十有一年春王正月夏五月戊寅公敗宋師于鄑傳宋為乗丘之役故侵我公禦之宋師未陣而薄之敗諸鄑凡師敵未陣曰敗某師皆陣曰戰大崩曰敗績得儁曰克京師敗曰王師敗績於某秋宋大水夏敗宋師秋大水而公使徃弔以是知春秋時怨不廢禮葢古意之猶存而未冺者也本望溪先生説冬王姬歸于齊望溪先生曰王姬之歸惟見於莊之篇所以著忘親之罪也然歸王姬于齊襄其事詳在喪而主仇昏故備書以著其惡也歸王姬於齊桓其事略惡有差也十有二年春王三月紀叔姫歸于酅杜註紀侯去國而死叔姫歸魯紀季自定於齊而後歸之全守節義以終婦道故繫之紀而以初嫁為文賢之也歸魯不書者非寜非大歸雖一事之首尾不必備夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧傳乗丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之十二年秋宋萬弑閔公于䝉澤遇仇牧于門批而殺之按傳稱宋萬弑閔公于蒙澤而經不地者義不係乎地也昭十三年楚公子比弑其君䖍于乾谿書地者葢楚靈本不死于乾谿特書其地所以著公子比迫君于死之罪也正義謂史自詳略聖人本不為義例其説恐不確冬十月宋萬出奔陳傳宋萬弑閔公立子㳺羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛於師殺子㳺於宋立桓公猛獲奔衞南宫萬奔陳宋人請猛獲於衞衞人歸之亦請南宫萬於陳以賂皆醢之按宋萬已醢而不書宋殺者葢萬既奔陳宋桓即位以萬亂赴告諸侯是時猶未獲萬也故以奔陳来告其後萬雖醢而宋不再告故苐以奔陳書閔不書塟者亦以宋不告故葢宋與魯深怨赴告缺略情理之常凡奔不書于于者連屬之詞所奔之國與其人本不相連屬也故不書于歸則必歸其本國故書于其他如公子返國書入簒君返國書入及大夫入其私邑以叛者其入皆書于至攻戰而入人之國則不書于與此同義十有三年春齊侯宋人陳人蔡人邾人㑹于北杏人者皆大夫也後倣此張氏洽曰齊桓欲合諸侯恐其未諭故不欲煩其君而使其臣来㑹告以平宋亂舉霸者之事也胡氏乃謂與齊桓而誅諸侯必無此理夏六月齊人滅遂𫝊㑹于北杏以平宋亂遂人不至夏齊人滅遂凡滅國或稱人或稱師或稱爵胡傳稱人微者也按文宣以前大夫將稱人義見隱二年莒人入向下齊人滅遂渾舉之詞耳胡以為微者恐不確秋七月冬公㑹齊侯盟于柯傳始及齊平也按曹劌劫盟之事獨見公羊恐不足信是時去先王之世不甚逺尚無戰國㳺侠之習其殆齊東野人因長勺之戰傅㑹而為之者與十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋傳宋人背北杏之㑹諸侯伐宋齊請師於周夏單伯㑹之取成於宋而還按單伯魯大夫左氏以為周大夫非也若果周大夫則冬㑹於鄄單伯當與諸侯列序矣是年左氏記鄭伯自櫟入鄭突與魯親其復國必告魯史承告必書而聖人削之者入者由外而内之詞櫟在鄭之封内非外也故不可言入知然者以定四年呉入郢之文知之葢呉自柏舉而入楚之國都不可言入楚猶突自櫟而入鄭之國都不可言入鄭也書入既不可非歸無以屬詞衞侯衎復歸於衞是其例也而突立不以正若書復歸於鄭則其簒兄得國之罪無由見矣故惟有削而不書葢以不書發疑端而見情實也然聖人猶恐後人之習其讀者或誤謂其文之偶有所缺故於其入櫟也特書名以示其義焉葢入櫟不應名惟特以名見則入鄭不書之故乃可以思而得之耳先儒乃謂大都偶國入櫟即入鄭故不書果如其説則突之得國當即在入櫟之後矣何以遲至十七年之久而始入鄭乎秋七月荆入蔡傳蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡七月楚入蔡按熊繹受封之始原以楚為號乃春秋書曰荆者楚怒周之不進其爵故僭稱王因並不屑稱其舊號而改稱荆荆禹貢州名古訓强楚以此自號如於越之以贊美詞自號也葢悍然以蠻方自處雖放棄禮法而無所忌其意固以周為無如我何也春秋因其自號而號之其目無天子之罪固即此而可見然或疑其不稱人稱爵而苐以號舉為貶則非也稱荆之罪不浮於僭王楚至僖公後其僭王如故也春秋不以為貶顧獨於此時貶其稱荆有是理乎葢春秋誌異凡諸國㑹盟侵伐之事春秋皆以其事書而於其國無異也若楚以蠻夷自處改號以荆則其國為職方之所不載適從何来遽逼處此吾兄弟甥舅之邦未聞有此一國也聖人心在天下故不稱人稱爵而特以號舉葢以入蔡者為職方所不載之荆而異之也豈惡其稱荆而貶之乎其後楚成即位當魯僖之初於時天王致胙既有以馴其桀驁之氣又子文得政乃不復以荆自號聖人於是以其國為不足異也故自僖文而後楚君臣之見於冊書者一同於齊晉遂不徒以號舉矣然則呉越之以號舉何也三代以前中國之幅員西北廣而東南狭呉越去王畿數千里皆在禹貢綏服以外蠻夷流蔡之地此與未入春秋以前之楚所謂蓽路藍縷者無以異若較之文王遷郢以後之楚則不可以同日語蓋春秋之法其號舉與否總視其所都之地以為準故楚自文王遷郢以後稱荆則以號舉稱楚則不以號舉以郢原在中夏之地也都在中夏之地者既以中夏之諸侯待之則都在蠻夷之地者自必以蠻夷之諸侯待之呉越與楚其所由以差别者至顯白而可據此即古人立子以長不以賢之意也聖人豈有所容心於其間哉冬單伯㑹齊侯宋公衞侯鄭伯于鄄傳宋服故也望溪先生曰單伯徃㑹者未肯聽於齊而使單伯先之也十有五年春齊侯宋公陳侯衞侯鄭伯㑹于鄄傳復㑹焉齊始霸也夏夫人姜氏如齊文姜鳥獸行自齊襄死姜與齊絶已七年至是齊魯之邦交始通而姜復靦顔以歸母家春秋特書之以著其非禮也秋宋人齊人邾人伐郳郳附庸屬宋而叛故齊桓為之伐郳宋主兵故序齊上胡氏謂是時齊猶未成乎伯也鄭人侵宋傳鄭人間之而侵宋冬十月春秋究遺卷三
