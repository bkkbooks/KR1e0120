body:
  text: 春秋究遺卷十左庶子葉酉撰成公元年春王正月公即位二月辛酉葬我君宣公無冰杜注周之二月今之十二月而無冰書冬溫三月作丘甲傳為齊難故作丘甲按司馬法四井為邑四邑為丘四丘為甸甸出長轂一乘甲士三人步卒七十二人據此則四丘其出步卒七十二人每丘才出十八人耳步卒七十二人分隸甲士三人每甲士一人領步卒二十四人共二十五人為一甲今每丘才出十八人是一丘所出不滿一甲之數作丘甲者蓋每丘使出一甲增多步卒六人一甸之中共百人為兵矣杜注謂甸所賦使丘出之增至四倍必無此理且果爾當謂之作丘乘不當謂之作丘甲矣胡氏引李靖之説以駁之良是夏臧孫許及晉侯盟于赤狄宣公不事齊十八年齊與晉盟懼而乞師于楚今聞齊將出楚師故又與晉盟懼齊楚也秋王師敗績于茅戎傳元年春晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公邀戎遂伐之三月癸未敗績于徐吾氏秋王人來告敗尊王故不言戰以自敗為文冬十月二年春齊侯伐我北鄙傳齊侯伐我北鄙圍龍龍人殺頃公之嬖人盧蒲齊侯親鼓之三日取龍遂南侵及巢丘取龍侵巢丘不書杜注其義未聞按魯被侵伐而取田邑者皆不書諱之也或疑哀七年齊鮑牧帥師伐我取歡及闡經不諱則此不應獨諱取龍不知取歡及闡考之經文但書取而不書伐則左氏傳誤公羊以為賂似得其實以賂取之非以兵取之也故不諱與齊人取濟西田同義安得執彼以疑此夏四月丙戌衛孫良夫及齊師戰于新築衛師敗績衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇戰于新築衛師敗績按以衛及齊者鞍之戰衛與魯同役故春秋內之六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績傳孫桓子還于新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之郤克將中軍士燮佐上軍欒書將下軍以救魯衛師從齊師于莘六月癸酉師陳于鞍郤克傷于矢左并轡右援桴而鼓馬逸不能止師從之齊師敗績按魯舊二軍鞍之戰四卿並將主帥及其佐也兵以帥為主而四卿並書者重録內也終春秋小國之大夫稱人而曹公子首獨以名見蓋三桓矜其事故與是役者志之特詳臧孫許如晉乞師不書者郤克本以婦人之笑而欲甘心于齊所為救魯衛者特名耳若書乞師則似晉真為魯出師矣春秋序戰例以受兵之國主兵鞍齊地乃春秋竟書季孫行父等會晉郤克等及齊侯戰云云者蓋春秋內魯又以伯主內晉而齊恃強凌弱晉以救魯衛為名其兵端又實開自齊故齊雖受兵之國而不以之主兵所為義理之權衡也前衛及齊戰于新築則新築衛地其主衛書及更無可疑者矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁傳晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地晉人許之秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田按以晉及齊者與戰書及齊同義八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田取汶陽田與取濟西田事同故書法亦不異濟西為曹所侵汶陽為齊所侵皆晉人命以歸魯藉伯國之力而得之故皆不曰歸而曰取冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀傳宣公使求好于楚莊王卒宣公薨不克作好公即位受盟于晉會晉伐齊衛人不行使于楚而亦受盟于晉從于伐齊故楚令尹子重為陽橋之役以救齊冬楚師侵衛遂侵我師于蜀孟孫請往賂之楚人許平十一月盟于蜀望溪先生曰蜀之盟不諱公何也此義之變也楚師內侵以鞍之戰故三桓懼討而以公試焉且是盟也不獨宋衛陳鄭之君不與也邾鄫微國皆以大夫會而魯獨君往則三桓之惡極矣書公而不諱所以著三桓之罪也按公與外大夫會盟以其降等屈尊故諱不書公此乃三桓懼討不敢往會而以公試焉非公之自為降等屈尊也故不諱卿不名先儒以為貶非也大夫會盟至成十五年會吳于鍾離始列序前此皆稱人鍾離以前大夫會盟舊史亦未必盡稱人但或名或不名聖人概削之以歸于一不然如此盟所稱楚人明是嬰齊公親預盟又不須告舊史烏有不名者哉蔡侯許男不書左氏傳乘楚車也謂之失位齊序鄭下者非卿故望溪先生曰此會楚主之故秦先于宋而齊後于從楚之國三年春王正月公會晉侯宋公衛侯曹伯伐鄭傳諸侯伐鄭次于伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之敗諸丘輿杜注宋衛未葬而稱爵以接鄰國非禮也按公羊既葬稱子踰年稱公左氏傳未葬稱子既葬稱君杜用左例故曰非禮然僖二十五年夏衛侯燬卒秋葬衛文公冬十二月公會衛子莒慶盟于洮衛侯燬既葬而衛成稱子則公羊之説似得其實此未葬而稱爵者以踰年故然雖踰年而究未葬謂之非禮亦宜辛亥葬衛穆公二月公至自伐鄭諸侯伐鄭晉獨濳軍深入為鄭所敗于諸侯無與也故無所諱而告廟甲子新宫災三日哭據古廟制考宫非新作廟也新之而遷舊主易以新主焉耳是時廟厞既徹舊主既遷易簷改塗方卜日以待新主之入而忽遇災既不得追稱僖宫又不得預稱宣宫故曰新宫先君之主不得以時入廟嗣子及羣臣臨哭禮固宜然乙亥葬宋文公七月而葬緩殆以厚葬故夏公如晉拜汶陽之田也鄭公子去疾帥師伐許傳許恃楚而不事鄭鄭子良伐許公至自晉秋叔孫僑如帥師圍棘傳叔孫僑如圍棘取汶陽之田棘不服故圍之大雩晉郤克衛孫良夫伐牆咎如傳討赤狄之餘也牆咎如潰冬十有一月晉侯使荀庚來聘晉來聘之始衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟聘而遂盟之于是始按及不書公者凡公與外大夫盟例不書公諱之也此盟在國都之內其不書公者又以書內事故非徒嫌其體之不敵而已與內大夫出聘不書公使其義正同鄭伐許鄭不稱人義見文十年秦伐晉下四年春宋公使華元來聘傳通嗣君也宋聘魯始此三月壬申鄭伯堅卒杞伯來朝傳歸叔姬故也杜注將出叔姬先修禮朝魯言其故夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉傳公如晉晉侯見公不敬公至自晉欲求成于楚而叛晉季文子不可公乃止冬城鄆鄭伯伐許前年鄭伐許侵其田冬十一月公孫申帥師以正其界許人敗諸展陂故鄭伯伐許取鉏任泠敦之田按三月鄭伯堅卒此未踰年而稱鄭伯與宣十年四月齊侯元卒冬書齊侯使國佐來聘皆既葬稱君蓋因葬後日月尚逺故既葬遂即位此禮之變而左氏遂據以為例殊失考又按傳稱晉欒書救許伐鄭楚子反救鄭經皆不書者許素服屬于楚晉不應救晉之救許特借名以伐鄭耳非真救許也故不書晉楚爭鄭並未接戰同盟蟲牢則鄭已服于晉矣故伐鄭救鄭皆不書五年春王正月杞叔姬來歸杜注出也吳氏澄曰僖三十一年杞伯姬為其子求婦而僖公以次女叔姬豫之歸為杞桓公夫人至今四十四年夫婦年皆六十以上始被出而歸疑是叔姬無子杞桓别有妾子為太子叔姬心不自安而願歸魯故叔姬既卒而杞桓復來逆其喪以歸也仲孫蔑如宋傳報華元也夏叔孫僑如會晉荀首于穀傳晉荀首如齊逆女故宣伯餫諸穀杜注野饋曰餫運糧饋之敬大國也梁山崩紀異也秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢傳許靈公訴鄭伯于楚六月鄭悼公如楚訟不勝故鄭伯歸請成于晉秋八月鄭伯與晉盟于垂棘冬同盟于蟲牢按盟垂棘不書者書蟲牢足以概之故六年春王正月公至自會二月辛巳立武宫傳季文子以鞍之功立武宫非禮也聽于人以救其難不可以立武立武由己非由人也啖氏助曰左氏意以為武功之宫如楚子所立者非也若以鞍之戰不應經五年方立之取鄟鄟附庸國也衛孫良夫帥師侵宋前年同盟于蟲牢諸侯謀復會宋公辭故晉伯宗夏陽説衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋按經不列序而只書衛者先儒謂不豫晉人率戎蠻以攻中國非也晉不當率戎蠻以攻宋列序之其罪不更著乎蓋晉以伯宗夏陽説皆非卿故輕其事而不以告而衛孫良夫則卿也故衛以侵宋告魯史承告文故單書衛夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋傳晉命也楚公子嬰齊帥師伐鄭冬季孫行父如晉傳夏四月晉遷于新田冬季文子如晉賀遷也晉欒書帥師救鄭傳楚子重伐鄭鄭從晉故也晉欒書救鄭與楚師遇于繞角楚師還遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰武子將許之知莊子范文子韓獻子不可乃還按救或書或不書者以有告有不告故先儒亦有見及者矣但同一救也何以有告有不告蓋興大衆遣大帥則告重其事也若第遣偏師赴救則不告輕其事也如趙盾當國故元年救陳則告郤缺于宣公八年代趙盾為政故九年救鄭則告欒書五年將中軍故六年救鄭則告其告者以主兵者為中軍帥故也其他如荀林父五年救鄭其時趙盾專晉林父非中軍帥也故不告十年士會救鄭十二年傳稱士會將上軍非中軍帥也故不告其不告者以主兵者非中軍帥故也惟陽處父非中軍帥而亦以救江書者此又與侵伐非中軍帥而亦告同義蓋皆書帥師則皆用大衆故耳若荀林父士會之救鄭既非中軍帥殆並不用大衆故輕其事而不以告歟七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛杜注稱牛未卜日免放也吳伐郯吳以國舉義見莊十四年荆入蔡下夏五月曹伯來朝不郊猶三望牛者未卜日之稱也故前書免牛後書不郊免牲則不郊不待言故僖公三十一年書免牲下第書猶三望不書不郊秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵傳鄭子良相鄭伯以如晉且拜師秋楚子重伐鄭諸侯救鄭八月同盟于馬陵尋蟲牢之盟且莒服故也杜注莒本屬齊齊服故莒從之按宋以五年辭會魯與衛受晉命交侵之至是與會傳不稱宋服者以蟲牢之盟宋公在列本未嘗背晉而從楚也公至自會吳入州來按傳稱巫臣大通吳于上國則州來之入必吳以告于魯是以書冬大雩衛孫林父出奔晉傳衛定公惡孫林父冬孫林父出奔晉衛侯如晉晉反戚焉杜注戚林父邑林父出奔戚隨屬晉八年春晉侯使韓穿來言汶陽之田歸之于齊杜注齊服于晉故晉來語魯使還二年所取田按田本魯田而以歸為文者凡以物與人曰歸此與歸粟于蔡之歸同義杜作還字解蓋據晉人之意以為昔取之而今還之耳稱晉侯者三年之中一豫一奪雖田本魯田竟強之以畀齊何以為伯主乎故書爵晉欒書帥師侵蔡杜注六年未得志故公孫嬰齊如莒傳聲伯如莒逆也杜注是為逆婦而書者因聘而逆宋公使華元來聘傳聘共姬也杜注昏禮不使卿今華元將命故特書之宋公無主昏者自命之故稱使按大昏六禮逆女最重納幣次之二禮自當使卿至所謂下達按下達舊注不確儀禮經傳通解辨之甚詳但華元之聘當是先來請婚逮既有成言然後徐行六禮耳乃六禮之所托始者也正當與二禮並重安在其不當使卿哉春秋時去先王之世已逺昏禮率多簡略惟逆女使卿而外大都皆使大夫今宋以伯姬賢聲逺聞特隆其禮故聖人詳書于册正以其使卿合禮著伯姬之見重于夫家也豈以其不合禮而書之以示譏乎後書季孫行父如宋致女並三國來媵其義正與此同杜注不確禮經散亡聚訟者多掇拾三傳臆為之説如諸侯不再娶及昏禮不使卿之類皆不足信也夏宋公使公孫壽來納幣正義昏有六禮發首云昏禮下達乃言納采鄭注云達通也將欲與彼合昏姻必先使媒氏通其言女氏許之乃使人納其采擇之禮此華元來聘則所謂下達也下達之後初有納采擇之禮既行納采其日即行問名問女之名將歸卜其吉凶也歸既卜得吉又使使者往告謂之納吉則昏禮定矣復遣納徵徵成也納徵有元纁束帛儷皮諸侯謂之納幣納幣之後又有請期親迎是之謂六禮也計華元來聘之後當有納采納吉二使二使之後乃納幣今惟書納幣者納采納吉其使非卿故不書晉殺其大夫趙同趙括傳晉趙嬰通于莊姬五年春原屏放諸齊莊姬為嬰之亡故譖之于晉侯曰原屏將為亂欒郤為徵六月晉討趙同趙括武從姬氏畜于公宫以其田與祁奚韓厥言于晉侯曰成季之勳宣孟之忠而無後為善者其懼矣乃立武而反其田焉趙嬰盾之弟莊姬成公女趙朔妻朔盾之子原同屏括皆嬰之兄武莊姬之子殺大夫稱國稱名而不去其官史之常文王氏樵曰據左氏則趙氏之禍由莊姬據史記則由屠岸賈其説抵牾不可強合然嘗深考之則屠岸賈殺趙朔自一事也莊姬譖殺同括又一事也但史記謂同括嬰並見殺于下宫之難則傳聞之誤耳晉殺同括因莊姬之譖同括雖死趙盾之室自在使無他外患莊姬何至無依乃將武畜于公宫乎景公何不念莊姬趙武之尚存忍即以其田豫祁奚乎蓋朔死于下宫之難盾之系已絶而盾之異母弟同括嬰專趙氏之政趙嬰通于莊姬同括因而逐之雖曰以罪然其心未必不由于爭權故內則莊姬怨之外則欒郤疾之因得以合而行其讒焉趙武之匿始則虞屠岸賈之害終使武而尚存亦必非原屏所利也故從姬氏畜于公宫及原屏既死韓厥始言于公而立之此事之實也愚按此説頗似有見但屠岸賈無端發難至滅趙氏之族此何如事而三傳俱毫無影響何耶至王氏以莊姬不應無依為疑則又有可解者趙氏自盾弒靈之後其族甚強已早有以中其君之忌而原屏咎之徒也其席寵怙勢尤必有不自檢束而為國人之所共疾者故莊姬之讒一入而晉景即斷然誅之至赤其族而不顧蓋以桃園之事為前車而惟恐其復動于惡也莊姬止知讒殺同括以泄其逐嬰之怨而不知同括皆盾之異母弟同括罪至族盾之子孫安得全故莊姬雖以成公姊且事由姬發亦只貰其死而以其田賜祁奚于是趙氏之家遂破是時武方在襁褓中乃為留其一線而使姬畜之于公宫此固事勢之所宜有者豈必有他外患而姬始無以自存乎據史記晉世家亦止云誅趙同趙括族滅之並不載屠岸賈事王氏説恐未必然闕疑可也秋七月天子使召伯來賜公命變錫命言賜命者先儒以賜者謂有加也其説穿鑿不可從竊以錫者據上為文有寵嘉之意焉如詩王錫申伯王錫韓侯及易王三錫命之類是也賜者據下為文有榮幸之意焉如禮君賜車馬乘以拜賜衣服服以拜賜及魯論君賜食之類是也成公即位八年而天子始來賜命其為請之也明甚請而得之有榮幸之意故據下為文曰賜若文公元年天王使毛伯來錫公命則恩出于上有寵嘉之意故據上為文曰錫若錫桓公命則桓公已薨不得據下為文也更審矣其變天王而稱天子者魯史舊文王止稱王有時而特致其尊稱則曰天子來賜公命有榮幸之意故不稱王而稱天子所謂特致其尊也聖人仍其舊文蓋欲著其以請而得之之實而周與魯之均有失焉者乃不待貶絶而自見矣冬十月癸卯杞叔姬卒內女之卒必有變然後書杞叔姬書卒者以出而喪歸于杞也晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯傳晉士燮來聘言伐郯也以其事吳故公請緩師不可季孫使宣伯帥師會伐郯衛人來媵傳衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否按春秋時異姓媵女者甚多未必皆不知禮毛氏竒齡曰媵女若必同姓則秦楚嫁女别無可媵故唐陸淳亦曰莒姓己邾姓曹同姓最少將孰媵乎其説可存以備參公羊傳媵不書此何以書録伯姬也注伯姬以賢聞諸侯爭欲媵之九年春王正月杞伯來逆叔姬之喪以歸傳請之也杜注叔姬已絶于杞魯復強請杞使取還葬按叔姬年老而歸于魯必與他悖義而出者不同杞伯之逆其喪以歸也未必由魯強之公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲傳為歸汶陽之田故諸侯二于晉晉人懼會于蒲以尋馬陵之盟是行也將始會吳吳人不至公至自會二月伯姬歸于宋內女歸非失禮不書此書歸者以莊姬賢故不書逆女者蓋行聘納幣其禮為宋所獨重言其重者既足以録伯姬矣至逆女使卿則當時諸侯之所同者也輕其事故略之然則隱二年紀履繻來逆女何以書彼不書行聘納幣故不得不書逆女也夏季孫行父如宋致女義見華元來聘下晉人來媵義見衛人來媵下秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭傳楚人以重賂求鄭鄭伯會楚公子成于鄧秋鄭伯如晉晉人討其二于楚也執諸銅鞮欒書伐鄭楚子重侵陳以救鄭救鄭不書者不告故冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆傳楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也按莒潰書日者有渠丘潰在前春秋書其重者故以日别之也鄆即莒與魯爭者四年書城鄆此四五年間不知何時復歸于莒或楚因伐莒之便即遣師伐魯而入鄆歟伐莒稱嬰齊入鄆稱楚人先儒謂春秋于楚無所不盡其辭非也嬰齊伐莒莒潰當入莒其入鄆者必别是一軍大夫將故稱人若莒潰之後嬰齊復移師入鄆則當書遂入鄆不當覆舉楚人秦人白狄伐晉傳諸侯二故也鄭人圍許傳示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君城中城傳書時也中城杜注魯邑在東海廪丘縣西南戴氏震曰漢志廪丘作厚丘注誤廪按廪丘屢見于左氏傳定八年哀二十年二十四年必無皆誤之理但謂魯畏晉不當城此則確不可易厚丘在今海州沭陽縣北六十里魯地當不至此定六年城中城杜注公為晉侵鄭故懼而城之中城若為厚丘在今之海州懼晉而城此何為乎中字應作內字解杜注不確望溪先生曰穀梁傳非外民胡傳譏警守之微皆非也未有設險守國而城宫外之城者必夫人僑如穢迹彰聞欲去季孟因恐季孟圖已而陰為之備耳其後沙隨之會孟獻子守于公宫則當時國勢可知矣十年春衛侯之弟黑背帥師侵鄭傳晉命也稱衛侯之弟義詳隱七年齊侯使弟年來聘下夏四月五卜郊不從乃不郊吳氏澄曰三卜不從則當止而不郊矣乃五卜不從而後不郊瀆神甚矣五月公會晉侯齊侯宋公衛侯曹伯伐鄭傳鄭公子班聞叔申之謀三月立公子繻夏四月鄭人殺繻立髠頑欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立太子州蒲以為君而會諸侯伐鄭按晉太子與會而書晉侯者當以會名諸侯之時晉侯尚無疾也既疾而諸侯已皆赴會不可以中止乃使太子代之其著于䇿書者仍稱晉侯蓋不忍豫其疾之必死也春秋安得而易之晉使太子會諸侯非立以為君也左氏妄説耳故無貶辭齊人來媵義見衛人來媵下丙午晉侯獳卒傳六月丙午晉侯欲麥將食張如厠陷而卒杜注周六月今四月麥始熟按晉用夏正據此似亦用周正矣考隱三年傳稱四月鄭祭足帥師取溫之麥秋又取成周之禾若用周正則麥與禾時皆未熟此鄭事也又用夏正雖杜注云言取者蓋芟踐之乃從而為之辭終覺傳會不安彼其所以有是異同者夏時得天列國紀載多用之非特晉用夏正而已左氏傳凡用夏正者類皆採自列國之史其本魯史舊文者用周正如襄十五年晉侯周卒經書十一月傳亦稱冬十六年葬晉悼公經書正月傳亦稱春與此晉侯獳卒經書在五月後傳亦稱六月其義正同蓋晉侯食麥其事至瑣陷厠而卒非晉史所宜言左氏云云必當時魯史因公之見辱故載此傳聞之説以醜之魯史用周正左氏本其舊文此時月之所以與經合歟其他凡時月傳與經合者倣此秋七月公如晉傳公如晉晉人止公使送葬冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也杜注諱不書晉葬也冬十日十有一年春王三月公至自晉去年伐鄭公自會所遂如晉故以自晉致晉侯使郤犨來聘己丑及郤犨盟傳晉侯以公為二于楚也故止公公請受盟而後使歸郤犨來聘且蒞盟夏季孫行父如晉傳報聘且蒞盟也杜注郤犨文子交盟晉魯之君其意一也故但書來盟舉重略輕正義遣使為輕君親為重秋叔孫僑如如齊傳宣伯聘于齊以修前好杜注鞍以前之好也冬十月十有二年春周公出奔晉傳周公楚惡惠襄之逼也且與伯輿爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉按奔必書出者史之常文先儒謂自周無出果如其説天王何以書出居于鄭乎彼其所以為此説者殆由見王子朝及尹氏召伯毛伯子瑕之奔皆不書出耳不知子朝與敬王分國而居三族奉之敗而奔楚不可以出言也子瑕于傳無考以內大夫敖歸父及晉先蔑奔秦不書出之文例之必在外而奔者也不得執彼以疑此夏公會晉侯衛侯于瑣澤傳宋華元合晉楚之成夏五月晉士燮會楚公子罷許偃癸亥盟于宋西門之外鄭伯如晉聽成會于瑣澤成故也按晉楚之成不見于經蓋舊有晉今鍾儀歸求成之説事竟不集又以向戌之事或傳聞兩屬左氏遂誤附會為此傳耳若果如傳云云則瑣澤之會宜大合諸侯以盟之矣何以魯衛之外並鄭宋皆不與耶不致者與哀十二年會衛侯宋皇瑗于鄖同蓋非殷會不致例也秋晉人敗狄于交剛傳狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛冬十月十有三年春晉侯使郤錡來乞師將伐秦也書晉乞師自此始伯主徵兵討二賦有常數不須乞也乞之云者殆欲增多于常數之外耳觀十八年士魴來乞師季文子問師數于臧武仲可知其數之無定矣三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦傳三月公如京師及諸侯朝王遂從劉康公成肅公會晉侯伐秦夏四月戊午晉侯使吕相絶秦五月丁亥晉侯以諸侯之師及秦師戰于麻隧秦師敗績杜注戰敗績不書時公在師不須告克獲有功又無所諱蓋經文缺漏傳文獨詳按此非缺文也聖人筆削之義存焉蓋天下諸侯之不知有王也久矣魯十二公未有能行朝覲之禮者欲誅之不可勝誅然不可不一示其意故因此年伐秦之役遂大書于䇿曰公如京師京師王所也非朝王何以如京師乎乃繼即書曰公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦傳稱公及諸侯朝王又稱劉康公成肅公二人會伐皆沒而不書而獨覆舉京師詞繁而不殺聖人之意可見矣朝王不書者師過而朝不豫其朝也不書劉成二公者以晉齊宋衛鄭曹諸君凡與公同此役者其罪皆與公同科故特沒劉成二公以見義焉蓋二公王臣自不當以此罪相及耳意在罪諸侯之不朝若書戰及敗績則為會伐之常詞而習其讀者或弗之察矣此聖人筆削之義宜為遊夏所不能贊者歟曹伯廬卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛傳衛侯如晉晉侯強見孫林父焉定公不可衛侯既歸晉侯使郤犨送孫林父而見之衛侯見而歸之秋叔孫僑如如齊逆女按內夫人書娶者五桓莊文宣成也餘不書先儒或以合禮則不書果如其説則成夫人之娶于禮並無不合者而此以逆女書何説乎蓋大昏萬世之嗣其重與即位薨葬等聖經必無不書之理其不書者如隱僖二公大都娶在即位前定哀不可考若襄公即位才四歲其娶不書者必以娶不成禮故耳觀哀公以冕而親迎為問則必魯至哀公時親迎之禮久廢不行故一聞子言遂疑其已重使當日此禮猶相沿不廢哀公豈宜有是問哉不親迎為不成禮不成禮即不書娶為其不成乎娶也如文夫人之逆不使卿于娶夫人之禮未協春秋即不書夫人為不成乎娶夫人也義與此同而逆不使卿非六禮不備也故仍書娶今反以娶不成禮者為合禮故不書是徒知喪昏賤逆娶仇女以及齊侯親送至魯境為非禮而不知六禮之不可不備矣蓋六禮不備雖無喪婚賤逆娶仇女及親送至魯境之失然謂其成乎娶不可也六禮克備雖有喪婚賤逆娶仇女及親送至魯境之失然謂其不成乎娶亦不可也而有喪婚賤逆娶仇女及親送至魯境之失雖成乎娶其失要不可掩聖人豈以書娶不書娶為褒貶哉襄夫人歸氏非宋子齊薑比因其為小國女而遂輕之此其娶之所以不成禮也定哀二夫人之不書娶義當倣此惟昭公娶吳女以結強援未有不成禮者而不書娶以娶同姓諱之也若以合禮則不書如昭公者豈得謂之合禮乎鄭公子喜帥師伐許傳鄭子罕伐許敗焉戊戌鄭伯復伐許許人平以叔申之封杜注四年鄭公子申疆許田許人伐之不得定其封今許以是所封田求和于鄭九月僑如以夫人婦薑氏至自齊僑如不書叔孫者承上文從省宣公元年遂以夫人婦薑至自齊不覆書公子正與此同左傳舍族尊夫人也其説非冬十月庚寅衛侯臧卒秦伯卒秦伯不名史失之十有五年春王二月葬衛定公三月乙巳仲嬰齊卒仲遂生而賜氏嬰齊其子也故可稱仲非後歸父而以王父之字為氏也然則歸父何以不稱氏公子之子稱公孫例也故歸父與嬰齊皆當稱公孫今嬰齊所以不稱公孫者魯卿有兩嬰齊皆公孫也一為聲伯屢以會盟侵伐之事見于經獨仲嬰齊一無所見若于其卒時亦稱公孫嬰齊則與聲伯相亂而十七年卒于貍脤者不知其又為何人矣此文法之不得不然者公羊之説謬甚後世議禮之家乃援以為據于是子也而以為孫弟也而以為子其所害于倫理者豈淺鮮哉癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚傳十三年曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺太子而自立也諸侯請討之晉人以其役之勞請俟他年十五年會于戚討曹成公也執而歸諸京師諸侯將見子臧于王而立之子臧辭遂逃奔宋按負芻殺太子之事經應書而不書者蓋晉人既以役之勞請俟他年又不欲負芻之知其將見討也于是佯若無是事者而命諸侯勿籍觀此會曹伯在列則並不知晉有見討之意可知惟諸侯皆祕其事故魯史遂沒其文舊史之所無聖人不得而益之也然則筆削之意安在乎如十六年曹伯歸自京師左氏傳止云曹伯歸魯史較左氏恐亦未能有以相勝聖人去其名而以不能討賊為天王病則是筆削之義存焉矣晉侯執曹伯歸于京師稱侯以執先儒以為伯討非也執所當執據事直書而其美自見聖人豈屑屑焉以稱人稱爵為褒貶哉蓋與下歸于京師連文有請命天子之意焉請天子命所以謹侯度也故不得不以爵書耳歸于京師説見僖二十八年執衛侯歸之于京師下公至自會夏六月宋公固卒楚子伐鄭傳楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有楚子侵鄭及暴燧遂侵衛及首止按侵衛不書者因侵鄭而及之餘事不足書也秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚傳宋華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師公室卑而不能正吾罪大矣敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰是多大功國人與之不反懼桓氏之無祀于宋也魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府遂出奔楚杜注四大夫不書獨魚石告蓋奔者衆故以為國惡而諱之也襄公三十年書鄭良霄出奔許自許入于鄭蒙上文不覆書鄭良霄此獨覆書宋華元者以蕩澤亂而出奔因魚石許其請討而歸宋兩事也故覆舉宋華元若良霄則奔許入鄭皆與駟氏為難其積怨深怒不至于乘間為亂不止一事也故不覆舉鄭良霄此與僖元年齊師宋師曹師城郉十四年諸侯城緣陵一覆書一不覆書其義正同先儒或以為賢華元固非或以鄭許接壤奔與入一時之事晉宋懸隔奔與歸非一時之事故有覆書不覆書之異其説恐亦不確冬十有一月叔孫僑如會晉士燮齊高無咎宋華元衛孫林父鄭公子輶邾人會吳于鍾離傳會吳鍾離始通吳也杜注殊會明本非同好按吳時在鍾離僑如及諸侯之大夫先行會禮乃偕往鍾離而與吳通好故會而又會文當然耳杜注似不的知兩次皆行會禮者以首止公及諸侯不先行會禮即不書會而書及故知此不書及為先行會禮也許遷于葉傳許靈公畏逼于鄭請遷于楚辛丑楚公子申遷許于葉不書楚遷者許所欲也十有六年春王正月雨木冰雨下著樹為冰記寒甚也夏四月辛未滕子卒鄭公子喜帥師侵宋傳楚子自武城使公子成以汝陰之田求成于鄭鄭叛晉子駟從楚子盟于武城夏四月鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍于夫渠不警鄭人覆之宋恃勝也六月丙寅朔日有食之晉侯使欒黶來乞師將伐鄭也甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績傳晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若惟鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師鄭人聞有晉師使告于楚楚子救鄭六月晉楚遇于鄢陵甲午晦苗賁皇言于晉侯曰楚之良在其中軍王卒而已請分良以擊其左右而三軍萃于王卒必大敗之公從之吕錡射共王中目楚師薄于險叔山冉搏人以投中車折軾晉師乃止囚楚公子茷晉入楚軍三日穀按敗績書楚子者楚子親集矢于目君為重故書楚子不書伐鄭者未及鄭而與楚遇也楚殺其大夫公子側傳楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽王使止之弗及而卒秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公傳宣伯通于穆薑欲去季孟而取其室公將行穆薑送公而使逐二子公以晉難告薑怒公子鉏公子偃趨過指之曰女不可是皆君也公待于壞隤申宫警備設守而後行是以後宣伯使告郤犨曰魯侯待于壞隤以待勝者郤犨取貨于宣伯而訴公于晉侯晉侯不見公杜注不諱者恥輕于執止按注意謂不見而已不如黑壤之見止也故黑壤諱而此不諱胡氏曲直之説恐不確公至自會公會尹子晉侯齊國佐邾人伐鄭傳七月公會尹武公及諸侯伐鄭諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師諸侯遷于制田知武子以諸侯之師侵陳遂侵蔡未反諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍正義宋衛不書後至故也按王臣與戰伐自此始望溪先生曰前此桓文倡伯徵兵討二不聞請命于王非禮也而實伯事之盛也及楚氛益熾中國懾威諸侯疑二然後援王臣以屬之禮也而實伯事之衰也然其號則正義亦無疵焉惟前十三年伐秦不書劉子成子則筆削之義存焉爾按先生所謂筆削之義又與鄙見不同其説具通論內曹伯歸自京師傳曹人請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出按諸侯反國皆名獨曹伯不名者蓋返國而目其人更始之義也弒逆之賊豈可與之更始乎故不名僖三十年衛侯鄭亦歸自京師而書歸于衛此獨書歸自京師者以不能肆諸市朝病天王之失刑也不言自京師歸于曹者曹不可與京師相對舉也九月晉人執季孫行父舍之于苕丘傳宣伯使告郤犨曰若欲得志于魯請止行父而殺之我斃蔑也事晉蔑有二矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉范文子謂欒武子曰季孫于魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何乃許魯平赦季孫按傳稱待于鄆則此時鄆尚屬魯九年楚人入鄆其為伐魯而入鄆也無疑然則何以不先書伐我楚入莒之後潛師入鄆初不覺其師之至也故不書伐至昭元年書取鄆必中間為莒所得經傳皆無明文其事不可考矣冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犨盟于扈望溪先生曰公在會而執者季孫盟者季孫晉人以公為贅疣矣公至自會不以伐鄭致者兵未交也乙酉刺公子偃杜注偃與鉏俱為穆薑所指而獨殺偃偃與謀十有七年春衛北宫括帥師侵鄭傳鄭子駟侵晉虛滑衛北宫括救晉侵鄭至于高氏杜注不書救以侵告夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭杜注單伯稱子蓋降爵其説非也望溪先生曰天子之卿本當以行次稱二雅所稱南仲申伯召伯方叔周語所稱樊仲是也春秋之初列會而稱王人者皆王朝卿大夫以不可爵諸侯而斥王臣之名與行次故但稱人至文之世晉卿會盟皆以名見而不稱人王朝之卿無轉稱王人之理故女栗之盟特稱蘇子以尊異之自是王臣皆稱子閔公篇書高子來盟昭三十二年城成周傳稱魏子南靣則子為時人相尊異之稱而非先王之典法明矣六月乙酉同盟于柯陵傳尋戚之盟也秋公至自會不以伐鄭致與去年同齊高無咎出奔莒傳慶克通于聲孟子與婦人蒙衣乘輦而入鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以會高鮑處守及還夫人訴之曰高鮑將不納君而立公子角國子知之秋刖鮑牽而逐高無咎九月辛丑用郊杜注九月郊祭非禮明矣公羊傳用者不宜用也黃氏澤曰用郊者以郊為用也蓋諂神以求福耳非郊之正祭而用其禮故曰用晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭傳十月圍鄭楚公子申救鄭師于汝上諸侯還按齊稱人非卿也自成以後列國之卿會盟侵伐皆以名見其不名者皆大夫故十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤十一月無壬申陸氏淳曰文誤公穀之説鑿甚十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犨郤至傳晉厲公侈多外嬖返自鄢陵欲盡去羣大夫而立其外嬖胥童曰必先三郤族大多怨遂殺郤錡郤犨郤至皆尸諸朝胥童以甲劫欒書中行偃于朝曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也使辭于二子曰寡人有討于郤氏郤氏既伏其辜矣大夫無辱其復職位楚人滅舒庸舒庸人以楚師之敗也道吳人圍巢伐駕恃吳而不設備楚公子槖師襲舒庸滅之十有八年春王正月晉殺其大夫胥童傳欒書中行偃殺胥童杜注以其劫已故庚申晉弒其君州蒲傳公遊于匠麗氏欒書中行偃遂執公焉十八年正月庚申使程滑弒厲公按弒州蒲者欒書中行偃而稱國以殺杜注君無道非也凡君而至于見弒無道者多矣何獨于此而稱國以弒乎蓋晉自靈公不君不競于楚及成公即位趙盾專政其勢稍復振起然三強未服楚氛方熾爭鄭爭陳一彼一此至于景公邲師敗績楚勢愈強直至厲公之世狄患既希齊復受盟麻隧之戰西抑強秦鄢陵之戰南摧僭楚蓋自文襄既沒以來晉勢之強未有過于此時者也夫何外患方平內憂旋作君弒臣殺兩敗俱傷晉主夏盟而禍機之一發而莫可禦也遂至于此故以春秋之常文例之不特弒州蒲當目欒書中行偃即殺胥童非厲公也亦當稱晉人乃胥童之殺既與三郤同文州蒲之弒亦第以國舉若書偃絶無與于其事者蓋故為是一施之辭大書屢書以甚晉國之亂見驕侈之為禍甚烈而傷伯業之幾于不振也其示人以其亡其亡繫于苞桑之義可謂深切著明矣或以書偃此時方用事必不以實告故懸獄而不敢有所歸第書其國有是事而已果爾則如齊商人之弒其君必不以實告更審矣何以直斥其名而不為之少寬乎齊殺其大夫國佐傳無咎奔莒其子高弱以盧叛齊侯使崔杼為大夫慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟而復之十八年齊侯使士華免以戈殺國佐于內宫之朝公如晉傳朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城傳夏六月鄭伯侵宋及曹門外遂會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉按魚石何以不書叛先儒謂其將以亂國不止于叛君非也人臣而至于叛君雖弒逆之事亦無不可為乃謂其罪較之亂猶末減也可乎且將以亂國孰有甚于宋華向之入于南里者而經亦書叛則魚石之不書叛非以叛不足以蔽其辜也可知矣蓋入而書叛者謂將據其所入之地以與君抗故謂之叛當未入之時無罪也若有故而去乃敢挾大國以求入焉則未入而先有無君之心矣未入而先有無君之心是叛在入先不待入而後書叛也晉欒盈之不書叛義與此同而欒盈之不書叛又與鄭良霄有同義焉叛必有其所據之地入于國都不可以叛名也不書楚納者魚石將為亂于國故特書復入以深罪之若書楚納則似專以不當納為楚罪而誅絶魚石之義不見矣桓十一年宋人執鄭祭仲以納突莊五年公會齊人宋人陳人蔡人伐衛以納朔二十四年戎侵曹以納赤皆不書納其義正與此同至昭元年莒去疾自齊入于莒則莒公子召之齊特遣兵送之耳若以納書尤非其事之實矣其書復入者左氏傳謂以惡曰復入亦非也大夫返國皆書歸歸者歸其位也以惡則曰入不必書復入而後為以惡也其所以書復入者先有無君之心又入而據地以叛罪有重科故曰復觀鄭良霄之入不書復其義可見公至自會晉侯使士丐來聘傳晉范宣子來聘且拜朝也君子謂晉于是乎有禮秋杞伯來朝傳杞桓公來朝勞公且問晉故公以晉君語之杞伯于是驟朝于晉而請昏焉八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師傳宋老佐華喜圍彭城老佐卒焉楚子重救彭城伐宋宋華元如晉告急晉士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾傳謀救宋也宋人辭諸侯而請師以圍彭城杜注不敢煩諸侯故但請其師丁未葬我君成公春秋究遺卷十
