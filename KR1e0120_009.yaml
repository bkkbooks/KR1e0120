body:
  text: 春秋究遺卷九左庶子葉酉撰宣公元年春王正月公即位繼弒君而書即位以其與聞乎故也抑與蔡景許悼二公之書葬有同義焉説詳桓元年公即位下公子遂如齊逆女以喪婚急于結齊好以定其位也三月遂以夫人婦薑至自齊遂不稱公子承上文從省成十四年書僑如以夫人婦薑氏至自齊不覆書叔孫與此同義婦者杜注有姑之辭按成夫人稱婦薑氏而文四年出薑及此年宣夫人皆但稱婦薑而不稱氏胡氏謂夫人亦預有貶焉非也夫人在室決無預貶之理且不書氏何足以示貶乎蓋婚禮父命之無父則母命之雖天子諸侯亦不自主婚所以養廉逺恥也文宣二公皆娶在即位後其必稱母命以命使者無疑既稱母命則為之母者即當以義正其子而文之在喪納幣又逆不使卿宣以喪婚皆失禮之大者乃竟聽其違禮而行坐視其子之失而不救為人母之道顧如是乎為人母之道未盡何以為人姑故兩夫人皆但稱婦薑而不稱氏與書葬小君不稱氏其義正可以參互得之蓋稱氏者其語輕不稱氏者其語重邦君之妻君稱之曰夫人故上稱夫人據公以為文也其下即稱氏語從輕尊君也若上稱小君據臣子以為文也其下即不稱氏語從重尊夫人也二夫人稱婦是據姑為文宜稱氏而不稱氏者重其婦使不為其姑所厭所以著其姑之不足為姑以示譏也豈如胡氏云云乎先儒又或謂妾姑則不氏出薑之不氏以成風宣夫人之不氏以敬嬴其説尤不確成風乃僖公母非出薑姑也何夢夢耶夏季孫行父如齊傳納賂以請會杜注宣公篡立未列于會故以賂請之晉放其大夫胥甲父于衛傳晉人討不用命者杜注文十二年戰河曲不肯薄秦于險正義按彼傳趙穿與同罪于時趙盾為政穿見晉君之壻或本罪輕于胥甲故得無咎公會齊侯于平州季孫請之以定公位也不致者特會例不致説具閔元年盟于落姑下公子遂如齊拜成也六月齊人取濟西田所謂納賂以請會者即賂以濟西田也上書公會齊侯于平州下書齊人取濟西田其事之情實顯然可見桓公元年上書公會鄭伯于垂下書鄭伯以璧假許田與此正相類但彼乃鄭伯脅取魯田此則魯自納賂以請會耳秋邾子來朝楚子鄭人侵陳遂侵宋傳宋人弒昭公晉荀林父以諸侯之師伐宋又會諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉故楚人鄭人侵陳遂侵宋按稱鄭人者君不在行故楚師本為陳起因陳而及宋書曰遂者蓋繼事而加甚之詞也晉趙盾帥師救陳傳稱救陳宋經不書救宋者先儒以宋有弒君之罪不當救故不書非也蓋陳被楚師即以告晉晉起師赴之至鄭而楚師已解遂駐師棐林會諸侯以伐鄭本未嘗救宋也傳所以兼稱救宋者以兩國皆被楚侵故類及之耳其實晉師本以救陳而起非為救宋而起故經不書救宋若以宋有罪不當救而救據實而書其失不更著乎宋公陳侯衛侯曹伯會晉師于棐林伐鄭不曰會趙盾而曰會晉師者胡氏謂使列序諸侯而會晉趙盾則臣疑于君不可以訓此即公羊君不會大夫之説其實非也蓋書會晉師則專會伐也若書會趙盾則似與盾先行會禮而後伐矣其不曰晉趙盾帥師救陳遂會宋公陳侯衛侯曹伯于棐林伐鄭而以諸侯會晉師為文者晉師先在棐林故也左氏傳楚蒍賈救鄭遇于北林囚晉解揚晉師乃還楚救不書者楚與魯不親鄭既從楚即自外于中國凡楚救皆不以告故不書襄十年書楚救者公會伐不須告故冬晉趙穿帥師侵崇傳晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成晉人宋人伐鄭傳以報北林之役于是晉侯侈趙宣子為政驟諫而不入故不競于楚按伐鄭者為宋也故獨與宋連兵傳無宋人殆傳聞之誤二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元傳鄭公子歸生受命于楚伐宋宋華元樂吕禦之二月壬子戰于大棘宋師敗績囚華元獲樂吕按不先書伐者敵未薄而逆與之戰也以宋及鄭者鄭受楚命伐宋宋受兵故以宋為主例也客主皆將尊師衆故並書帥師韓之戰獲晉侯不書晉師敗績君重于師也此獲宋華元先書宋師敗績將與師並重也與君將則止目君大夫將則書某帥師同義秦師伐晉傳以報崇也遂圍焦夏晉人宋人衛人陳人侵鄭傳晉趙盾救焦遂自陰地及諸侯之師侵鄭以報大棘之役楚鬭椒救鄭趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之按卿皆稱人者大夫會伐至成二年戰于鞍始列序前此皆稱人楚救不書者義見元年伐鄭下楚子伐陸渾之戎陸渾近在王都之內而楚子伐之先儒以為窺周室之漸非也伊雒之有戎晉遷之也殆以其為晉之爪牙而伐之耳昭公十三年晉荀吳帥師滅陸渾之戎亦以其二于楚故則楚之伐戎不得蔽以窺周室之罪也審矣夏楚人侵鄭傳晉侯伐鄭及郔鄭及晉平士會入盟夏楚人侵鄭鄭即晉故也按鄭及晉平不書胡氏以為與鄭非也春秋凡鄭與晉楚平皆不書所以然者春秋因史作經凡事之首尾不必備聖意只欲著晉楚之爭鄭耳至鄭及晉楚平乃戰事之首尾固春秋之所不必備其辭者也先儒又或謂春秋但書其見侵伐于此則其受盟于彼也不待言亦不得其解而從為之辭秋赤狄侵齊赤狄始見經宋師圍曹傳宋文公即位盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹按曹師伐宋不書者諱武穆之族以之不以告故不書冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向莒郯二國相怨故公及齊侯共平之稱莒人者春秋于外諸侯之事凡若此類皆稱人秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷鄭靈公怒公子宋無禮欲殺之子公與子家謀先子家不可反譖子家子家懼而從之夏弒靈公按欲弒靈公者公子宋也歸生特從之耳乃以歸生為首惡者蓋宋雖首謀而歸生位尊權重其力足以為惡宋則無是力但能勸人作逆耳所謂從之者謂聽從其謀不可作脅從之從解故十年傳載討幽公之亂斫子家之棺而逐其族則當時固有以斷斯獄矣望溪先生曰宋之譖得行于君則嘗黿之憾已釋而歸生懼譖則與君相搆之隙轉萌于歸生故知弒者歸生也赤狄侵齊秋公如齊公至自齊公如必致史之常文冬楚子伐鄭傳鄭未服也杜注前年楚侵鄭不獲成故曰未服君將稱君例也胡氏之説非五年春公如齊傳公如齊高固使齊侯止公請叔姬焉夏公至自齊公如必致常也左氏以為書過非秋九月齊高固來逆子叔姬説詳文十五年齊人執子叔姬下叔孫得臣卒杜注不書日公不與小斂張氏洽曰缺文也冬齊高固及子叔姬來傳反馬也禮嫁女留其送馬謙不敢自安于夫家若被出棄則將乘之而歸也及廟見成婦乃遣使反馬按叔姬嫁未久而高固遽與之偕來蓋溺于色而惟叔姬之命之是聽也觀此則謂高固乃申公巫臣之流益信楚人伐鄭楚人于是三至鄭矣荀林父救鄭不書者不以告故六年春晉趙盾衛孫免侵陳傳陳即楚故夏四月秋八月螽冬十月傳楚人伐鄭取成而還杜注九年十一年傳所稱厲之役蓋在此七年春衛侯使孫良夫來盟傳孫桓子來盟始通且謀會晉也夏公會齊侯伐萊秋公至自伐萊傳凡師出與謀曰及不與謀曰會此即內為志曰及外為主曰會之説也辨見桓十六年公會宋公衛侯陳侯蔡侯伐鄭下書至者用兵于萊故大旱冬公會晉侯宋公衛侯鄭伯曹伯于黑壤傳晉侯之立公不朝焉又不使大夫聘晉人止公于會盟于黃父公不與盟以賂免公見止而不與盟不書者胡氏謂行有不慊于心非也孫良父之來其謀當出于晉誘公至而執公較之聽宣伯之訴而不見公者其曲更甚有何不慊而諱之乎其所以不書止公者止者法施于罪人之詞以此而加之公恥莫大焉故不書諱之也若外諸侯見執則不諱八年春公至自會夏六月公子遂如齊至黃乃復杜注蓋有疾而還辛巳有事于太廟仲遂卒于垂有事時祭也時祭常事不書因遂卒與祭同日為下繹祭張本故書遂不稱公子者承上文從省稱仲遂者宣公篡立遂為禍始故德其援立之功生而賜氏與季友卒書氏義同壬午猶繹萬入去籥杜注繹又陳昨日之禮所以賔尸萬舞名籥管也猶者可止之辭魯人知卿佐之喪不宜作樂而不知廢繹故內舞去籥惡其聲聞戊子夫人嬴氏薨晉師白狄伐秦傳春白狄及晉平夏會晉伐秦白狄始見經楚人滅舒蓼舒蓼杜注二國名或曰地譜上義陽之蓼先已滅于楚此即如舒鳩舒庸蓋羣舒别種非二國也秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬穀梁傳葬既有日不為雨止禮也雨不克葬喪不以制也而緩辭也足乎日之辭也毛氏竒齡曰士喪禮有潦車載簑笠之文天子諸侯喪制甚設其禦雨諸備較有甚于士官師者豈周禮在魯並不一具特輴綍碑窆儀注既繁廞葆荼蜃工力復賾萬一急于行事偶失不戒此非簑笠苫蓋所得遮蔽其罪戾也若胡氏又云喪事即逺有進無退此為行匶言之今遇雨而止未嘗解車綍返廟庭不葬而退而乃以為反喪之戒不亦謬哉城平陽懼晉故也黑壤見止歸將叛晉故城平陽以備之楚師伐陳傳陳及晉平楚師伐陳取成而還九年春王正月公如齊公至自齊八年使仲遂如齊至黃而復故今年親往朝齊蓋欲固齊好而絶晉交也如至並書正月通春秋惟此一見蓋以正月往即以正月返也其他或書時或書月皆舊史有詳略聖人亦仍之而已夏仲孫蔑如京師傳春王使來徵聘夏孟獻子聘于周王以為有禮厚賄之齊侯伐萊七年會魯伐之今又親將伐之蓋不至于滅之不止也秋取根牟公羊以根牟為邾邑非也若邾邑當先書伐邾蓋近魯小國也昭八年搜于紅自根牟至于商衛即其地內滅國曰取不言滅諱之也八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳傳討不睦也陳侯不會晉荀林父遂帥諸侯之師伐陳辛酉晉侯黑臀卒于扈晉侯卒不葬魯不會也蓋黑壤之會止公而以賂免公怨之故扈之會公不與至是以喪赴亦不會葬冬十月癸酉衛侯鄭卒衛侯卒不葬魯不會與晉同蓋公之往會黑壤衛實任其無咎故怨之亦不會其葬也宋人圍滕傳因其喪也楚子伐鄭晉郤缺帥師救鄭傳楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜惟子良憂曰是國之災也吾死無日矣按六年傳稱楚人伐鄭取成而還十一年傳稱厲之役鄭伯逃歸自是楚未得志焉杜注厲之役蓋在六年此傳復云楚子為厲之役故伐鄭而六年經不書楚子伐鄭者蓋鄭既逃盟楚亦以未得志皆不以告故不書郤缺救鄭與五年荀林父十年士會之救鄭等耳彼不書而此書胡氏以為惡楚非也蓋有告不告故陳殺其大夫泄冶傳陳靈公與孔寧儀行父通于夏姬皆𠂻其衵服以戲于朝泄冶諫公告二子二子請殺之公弗禁遂殺泄冶杜注冶不為春秋所貴故書名正義宋人殺其大夫司馬貴之而不名此書名是不為春秋所貴其説非也殺大夫稱官稱名例也不以賢愚異宋人殺其大夫司馬不名者以其位近于君而為衆之所殺則弒逆之端兆矣故官而不名不得以彼例此左氏引孔子云云是昏亂之朝必不當有忠鯁之士矣豈聖人之意哉十年春公如齊公至自齊公至是四朝齊矣蓋不與扈之盟懼晉而欲固齊之好也齊人歸我濟西田杜注元年以賂齊也不言來公如齊因受之望溪先生曰濟西之田獨曰我者不獨我有濟西田而所歸獨我故封也夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛傳齊惠公卒崔杼有寵于惠高國畏其逼也公卒而逐之書曰崔氏非其罪也按春秋時諸侯之大夫以無罪奔者衆矣何獨于此而氏之左氏之説不足信先儒以為族奔其説近是而劉原父駁之曰春秋所書大事而已故戰舉元帥使舉上介衆大夫不與焉者略所微也今何為區區崔氏之族原父此論所為知其一而不知其二者也考成公十八年傳始言齊侯使崔杼為大夫則惠公時杼尚未為大夫審矣春秋之例必大夫乃以名見杼既未為大夫則不可書齊崔杼出奔又審矣乃高國畏杼之逼至乘君之喪而逐之且不止逐其一身而且及其一族是有死其先君之心更非尋常之以勢力相傾軋者比此固聖人之所尤惡者也安得以杼未為大夫而遂略之故特以崔氏書蓋窮于辭不得不變文以著其實而義即于此寓焉矣公如齊五月公至自齊傳如齊奔喪杜注公出皆書如不言其事史之常也按奔喪不言其事殆舊史恥而諱之癸巳陳夏徵舒弒其君平國傳陳靈公與孔寧儀行父飲酒于夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廄射而殺之二子奔楚按稱臣以弒據事直書史文之常杜注以為罪不加民固失之胡氏以為見泄冶忠言之驗亦未為得也六月宋師伐滕滕恃晉而不事宋故也公孫歸父如齊葬齊惠公卿供葬事文襄之制魯蓋以事晉之禮事齊晉人宋人衛人曹人伐鄭鄭以前年敗楚師恐楚怨而與之平故諸侯之師伐鄭取成而還秋天王使王季子來聘傳劉康公來報聘杜注報孟獻子之聘即王季子也其後食采于劉公孫歸父帥師伐邾取繹魯滅國書取諱之也繹邾邑例書取內大夫帥師例書名大水季孫行父如齊齊侯初即位故冬公孫歸父如齊魯侵小恐為齊所討故往謝宣公聘齊止此齊侯使國佐來聘報文子也飢楚子伐鄭傳稱晉士會救鄭逐楚師于頴北而經不書胡氏以為責晉非也五年楚人伐鄭晉荀林父帥師救鄭亦不書又何説乎蓋是時天下之大勢在晉楚陳鄭雖小然加斤兩于千鈞之上在晉則晉重在楚則楚重故二國爭之不遺餘力聖人只欲著晉楚之爭伯耳至伐者固皆凌弱暴寡之師救者亦非有扶危定傾之義告則書不告則不書聖人原不以書救不書救為褒貶也胡氏必以書救為善辭無怪乎鑿而不可通矣十有一年春王正月夏楚子陳侯鄭伯盟于辰陵傳楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏盟于辰陵陳鄭服也公孫歸父會齊人伐莒莒恃晉而不事齊故魯會齊人伐之大夫將稱人先儒以為貶非也秋晉侯會狄于欑函榖梁以不言及為外狄非也盟言及會不言及史之常文冬十月楚人殺陳夏徵舒傳楚子為陳夏氏亂故伐陳謂陳人無動將討于少西氏遂入陳殺夏徵舒轘諸栗門因縣陳申叔時諫乃復封陳按稱楚人討賊之辭人人得而誅之之義也傳殺徵舒在入陳後經書在前者楚子先滅陳因申叔時之言乃復封陳若先書入陳而不書滅失事實矣然滅而未成乎滅不可以滅書也故先書殺夏徵舒後書入陳蓋于文不得不然杜注確不可易胡氏謂善楚子之能討賊固非或謂夏氏私邑在國都外故先書殺後書入亦不得其解而從為之辭丁亥楚子入陳杜注楚子先殺徵舒而欲縣陳後得申叔諫乃復封陳不有其地故書入在殺徵舒後納公孫寧儀行父于陳二臣皆從君于昏者也不當納而納據事直書而楚莊之不得為伯討不待貶絶而自見矣二臣之出奔不書者國亂不告故又與莊三十二年季友奔陳不書同義十有二年春葬陳靈公徵舒已殺故書葬楚子圍鄭傳厲之役鄭伯逃歸自是楚未得志焉鄭伯既受盟于辰陵又徼事于晉十二年春楚子圍鄭三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽若惠顧前好不泯其社稷君之惠也君實圖之左右曰不可許也王曰其君能下人必能信用其民矣庸可幾乎退三十里而與之平按傳書入而經只書圍者退三十里而許之平入而未成乎入也先儒以為從末減非夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績晉師救鄭荀林父將中軍先縠佐之及河聞鄭既及楚平桓子欲還彘子不可以中軍佐濟韓獻子謂桓子曰彘子以偏師陷子罪大矣與其専罪六人同之不猶愈乎師遂濟與楚師遇晉師大敗按晉救鄭不書者無及于鄭而𠞰民不成乎其為救也故不書其以晉主是戰者胡氏謂釋楚不貶非也城濮之戰不亦以晉及楚乎蓋春秋內晉而外楚故以晉及楚不以楚及晉秋七月冬十有二月戊寅楚子滅蕭蕭宋附庸國楚滅之蓋將以脅宋也宋華椒以蔡人救蕭不書不成乎其為救也晉人宋人衛人曹人同盟于清丘楚滅蕭而晉懼故為此盟同盟義見盟幽下諸侯皆大夫故稱人宋師伐陳衛人救陳清丘之盟曰恤病討二宋為盟故伐陳以陳二于楚也衛人救之同盟之國自相矛盾據事直書蓋以著晉之不競于楚也而先儒以春秋書救未有非善辭者即此亦可見其不然矣十有三年春齊師伐莒十一年公孫歸父會伐今復伐之夏楚子伐宋傳以其救蕭也君子曰清丘之役惟宋可以免胡氏乃謂楚人有詞于宋而得書爵誤矣凡君將則書爵史之常文秋螽冬晉殺其大夫先縠傳秋赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪于先縠而殺之按先縠違命喪師今又召狄伐晉正名加誅非濫刑也稱國以殺不去其官殺大夫之常文先儒以為纍上誤矣十有四年春衛殺其大夫孔逹傳清丘之盟晉以衛之救陳也討焉孔達曰苟利社稷請以我説乃縊而死書衛殺者從告夏五月壬申曹伯壽卒晉侯伐鄭傳為邲故也秋九月楚子圍宋傳楚子使申舟聘于齊曰無假道于宋申舟以孟諸之役惡宋曰必死王曰殺汝我伐之見犀而行及宋宋人殺之楚子聞之投袂而起九月圍宋葬曹文公冬公孫歸父會齊侯于榖魯大夫特會諸侯者屢矣胡氏獨于此發抗尊出位之論殊不可解十有五年春公孫歸父會楚子于宋傳孟獻子言於公曰臣聞小國之免于大國也聘而獻物朝而獻功謀其不免也今楚在宋君其圖之公説十五年春公孫歸父會楚子于宋夏五月宋人及楚人平傳夏五月楚師將去宋中犀稽首于王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告雖然城下之盟有以國斃不能從也子反懼與之盟而告王退三十里宋及楚平按昭七年暨齊平定十年及齊平十一年及鄭平皆不稱人此何以獨稱人蓋兩國無事之時微有夙嫌聘問不通一旦而釋怨修好者則不稱人以睦鄰之道為國者固當如是耳若攻圍既久守者既苦病而思息肩攻者亦飢疲而思返役若不書人則邦交之常文無以著兩國之人皆困于攻守之實矣鄭與晉楚平皆不書而此獨書者何蓋晉楚爭鄭其意皆不在鄭也晉伐鄭以爭勝于楚楚伐鄭以爭勝于晉鄭介兩大之間朝晉暮楚其平不足記也故不書若宋則世與晉好被圍近一年而始與楚平蓋自邲師既敗而晉不復能與楚爭故坐視宋之平于楚而不之救此南北大勢之所關也春秋安得而略之六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸傳潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯伐之六月癸亥晉荀林父敗赤狄于曲梁辛亥滅潞以潞子嬰兒歸按潞赤狄之一族即以國名為氏者正義謂單國不復成文故以氏配之是也嬰兒潞子名自此以後滅國以其君歸及其君奔皆名世近紀載詳故荀林父帥師不書而第稱師者從告也秦人伐晉傳秦桓公伐晉次于輔氏壬午晉侯治兵于稷以略狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也按傳載晉敗秦師事甚詳而杜于經下注云無傳蓋秦遣將伐晉秦伯次于輔氏以為之援傳所載者乃晉敗秦師于輔氏而秦人伐晉之事則無傳也王札子殺召伯毛伯傳王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衛杜注王子札經文倒札子按兩下相殺不志于春秋故或稱人殺如文九年晉趙盾之殺三大夫是也或稱國殺如文六年晉狐射姑之殺陽處父成八年晉欒書之殺胥童昭十四年莒蒲餘侯之殺公子意恢是也或稱盜殺如襄十年鄭尉止五族之殺公子騑公子發公孫輒是也此獨稱名以殺者蓋王室由此而復亂例應稱國殺而周非列國比不可曰周殺其大夫也故稱名以殺詞蓋有所窮焉爾稱名以殺故不稱大夫秋螽仲孫蔑會高固于無婁大夫相會文公十一年叔仲彭生會晉郤缺于承筐已前此矣初稅畝周法井田九百畝中百畝為公田借民力而治之稅不過此今又履其餘畝復十收其一故哀公曰二猶不足也遂以為常故曰初冬蝝生飢傳蝝生飢幸之也杜注幸其冬生不為物害雖飢猶喜而志之其説非也周之冬夏之八九十三月八九月間生蝝安得不為物害乎且謂聖人以冬生蝝為幸必無此理十有六年春王正月晉人滅赤狄甲氏及留吁杜注甲氏留吁赤狄之族晉既滅潞氏今又並盡其餘黨士會稱人從告夏成周宣榭火成周洛陽宣榭講武屋也無室曰榭公羊謂宣王之廟蓋宣王南征北伐講武于此因以為廟故其制如榭與宗廟不同左傳宣榭火人火之也秋郯伯姬來歸傳出也內女出皆書來歸啖氏助曰歸姬不書常事故不書也冬大有年義見桓公三年有年下十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道傳晉侯使郤克徵會于齊齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒出而誓曰所不此報無能涉河齊侯使高固晏弱蔡朝南郭偃會及斂盂高固逃歸夏會于斷道討二也盟于卷楚辭齊人執晏弱于野王執蔡朝于原執南郭偃于溫李氏琪曰此盟諸傳皆以為謀齊榖梁獨以為外楚蓋拘于同尊同外之例恐非事實然當宋及楚平之後而徵會于齊則初意誠因懼楚但郤克既怒齊遂起伐齊之謀耳穀梁亦不為無據公至自會冬十有一月壬午公弟叔肸卒穀梁傳其曰公弟賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也按稱弟者不任職也義見桓三年齊侯使其弟年來聘下穀梁之説非但公弟未有書卒者此書卒則以其賢耳稱叔肸者肸之後叔弓叔老叔還皆以叔為氏皆書叔肸以著魯有叔氏之所自始也十有八年春晉侯衛世子臧伐齊傳晉侯衛世子臧伐齊至于陽穀齊侯會晉侯盟于繒以公子疆為質于晉晉師還公伐杞夏四月秋七月邾人伐鄫子于鄫傳凡自虐其君曰弒自外曰戕鄫子不名義見僖十五年邾人執鄫子用之下甲戌楚子旅卒楚子書卒自此始公孫歸父如晉傳公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊傳公薨季文子言于朝曰使我殺適立庶以失大援者仲也失遂逐東門氏子家還及笙壇帷復命于介既復命袒括髮即位哭三踊而出遂奔齊按奔不言出者奉使而道奔也春秋究遺卷九
