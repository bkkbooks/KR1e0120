body:
  text: 春秋究遺卷十二左庶子葉酉撰襄公下十有六年春王正月葬晉悼公三月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁傳會于湨梁以我故執邾宣公莒犁比公且曰通齊楚之使晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸杜註不書高厚逃歸故也按高厚本不預會故春秋不書若謂其以逃歸故則如七年鄬之會陳侯亦逃歸矣經何以列于會耶彼其所以不預會者是時晉平公初立不能如悼公之謙以大夫不當與公侯抗故抑高厚而不使之預會也觀其既會而宴苐使諸大夫舞以侑觴而不得預諸侯之宴則齊高厚之不得預諸侯之會審矣惟不得預會且屈在歌舞之列故高厚歌詩遂悍然而故違其令葢不勝其忿故耳自此至春秋之終惟召陵之會齊國佐在列其餘未有以大夫預者殆皆沿此會以為例歟高厚逃歸不書者外臣逃非陳侯鄭伯比輕其事故畧之然則鄭詹逃何以書以其來魯故戊寅大夫盟按會盟之見經者多矣從無諸侯會而大夫盟者有之自湨梁始先儒謂政自大夫出故春秋書此以示譏其説非也是時晉悼甫薨平公繼立傳稱羊舌肹為傅云云是所用皆賢猶未改其父之臣也何嘗有尾大不掉之事致聖人以此遍刺天下之大夫乎彼其所以諸侯會而大夫盟者晉原使諸大夫盟高厚高厚大夫也故止使大夫盟之迨高厚逃歸諸大夫雖自相與盟然因前未及盟至是而乃卒其事故諸侯仍不預也豈政在大夫之故哉然則聖人于此遂無譏乎據三年及陳袁僑盟二十七年盟于宋皆主魯卿書及且大夫皆冠之以諸侯所以然者會盟乃諸侯之事大夫不過奉其君之命以相與為好非大夫之自為會盟也故不可單以大夫書此盟叔孫豹亦在列若春秋果無所譏則當書曰叔孫豹及諸侯之大夫盟于湨梁矣乃不主叔孫豹書及且單稱大夫並不冠之以諸侯者葢晉之伯業衰於晉平故即位之初甫為此會而諸侯即有異志其時雖尚無尾大不掉之事然諸侯會而大夫盟自桓文創伯以來未嘗聞此舉也其後政令日弛馴至公室卑而大夫擅權所謂倒持太阿授人以柄者其端實由此而啟故聖經單以大夫盟書並不冠之以諸侯所以特著其為大夫以正其盟之失也此與莊元年書夫人孫于齊而不書姜氏其義正同彼義闗乎夫人故去其姜氏此義闗乎大夫故不冠之以諸侯也既不冠之以諸侯矣則魯卿亦大夫也故不主叔孫豹書及不地者説詳僖五年盟于首止下晉人執莒子邾子以歸執隣國之諸侯例稱人齊侯伐我北鄙夏公至自會五月甲子地震叔老會鄭伯晉荀偃衞甯殖宋人伐許荀偃主兵而先鄭伯者不以臣先君也疏乃引僖公二十七年書楚人陳侯蔡侯鄭伯許男圍宋以為當先荀偃之證不知圍宋之役楚子先在後乃去之獨留子玉於宋若書楚子無以見子玉之獨留矣故不得不稱楚人所謂楚人者原不專指子玉也大夫不可先諸侯此自當先鄭伯左傳為夷故也葢不得其觧而從為之辭秋齊侯伐我北鄙圍成傳孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還大雩冬叔孫豹如晉傳穆叔如晉聘且言齊故十有七年春王二月庚午邾子牼卒去年晉執以歸此書卒者葢晉尋釋之不書其歸者邾與魯屢相侵伐又以魯故見執于晉故歸而不告情理之常宋人伐陳李氏廉曰傳不見二國致釁之由而陳自逃歸之後不與于中國之盟會得非以晉命乎夏衞石買帥師伐曹傳衞孫蒯田于曹隧飲馬于重丘毁其瓶重丘人訽之夏衞石買孫蒯伐曹取重丘曹人愬于晉杜註孫蒯不書非卿按取重丘不書不以告也秋齊侯伐我北鄙圍桃齊高厚帥師伐我北鄙圍防傳齊人以其未得志于我故伐我北鄙圍桃高厚圍臧紇于防師自陽闗逆臧孫鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之九月大雩宋華臣出奔陳傳宋華閲卒華臣弱臯比之室使賊殺其宰呉宋公欲逐之左師曰臣亦卿也大臣不順國之恥也不如葢之乃舍之十一月甲午國人逐瘈狗瘈狗入于華臣氏國人從之華臣懼遂奔陳冬邾人伐我南鄙傳為齊故也十有八年春白狄來杜註不言朝不能行朝禮夏晉人執衞行人石買傳晉人執衞行人石買于長子執孫蒯于純留為曹故也按石買本有當執之罪而書行人則杜氏非使人之罪其説不足據執孫蒯不書非卿故秋齊師伐我北鄙冬十月公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊傳會于魯濟尋湨梁之言同伐齊齊侯禦諸平陰丙寅晦齊師夜遁十一月丁邜朔入平陰遂從齊師十二月戊戌門于雍門己亥諸侯之師焚申池之竹木按圍書同通春秋惟此一見葢春秋時侵伐皆主兵之國接戰餘不過為之聲勢而已獨此年圍齊則諸侯之師皆用命故書同與僖三十三年晉人及羗戎敗秦師于殽書及同義曹伯負芻卒于師楚公子午帥師伐鄭傳鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚不許楚子聞之使告子庚曰國人謂不穀主社稷而不出師死不從禮大夫圖之子庚歎曰君王其以午懐安乎臣請嘗之若可君繼之不可收師而退子庚帥師治兵于汾于是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭子庚門于純門信于城下而還甚雨楚師多凍役徒幾盡十有九年春王正月諸侯盟于祝柯祝柯澶淵之盟不書同葢席悼公之盛侈然而以盟主自居也會有王臣而盟無王臣則再舉諸侯會本無王臣而盟再舉諸侯者以中有間事故晉人執邾子公至自伐齊圍齊而以伐致者公出時原以伐齊告廟故也僖二十八年圍許則公出時只以會温告未嘗以伐許告故據其實而以圍許致取邾田自漷水傳諸侯還自沂上盟于督揚曰大毋侵小執邾悼公以其伐我故遂次于泗水取邾田自漷水歸之于我杜註督揚即祝柯按邾田謂邾之田必非魯之舊疆可知季孫宿如晉拜師也葬曹成公夏衛孫林父帥師伐齊傳晉欒魴帥師從衞孫文子伐齊杜註兵并林父不别告也望溪先生曰衎奔在齊而林父以大師伐之其惡極矣使並書而先晉則疑林父受命于晉而賊君之志隱矣按聖人因史作經凡侵伐列序諸國皆魯史舊文此經之所以不列晉者以欒魴非卿晉不以告故耳與成六年傳稱晉伯宗夏陽説衞孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋而經止書衞孫良夫侵宋並不序晉其義正同秋七月辛卯齊侯環卒晉士匄帥師侵齊至榖聞齊侯卒乃還公羊傳還者何善辭也大其不伐䘮也八月丙辰仲孫蔑卒齊殺其大夫高厚齊靈公既立光以為太子又以戎子嬖欲立其子牙遂東太子光而使高厚傅牙以為太子夙沙衞為少傅靈公疾崔杼逆光而立之遂殺戎子尸諸朝而執公子牙于句瀆之丘秋八月齊崔杼殺高厚于灑藍而兼其室稱國殺者以莊公之命來告也鄭殺其大夫公子嘉傳鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西率國人伐之殺子孔而分其室按子展子西率國人伐之殺子孔而書國殺者以鄭伯之命來告故冬葬齊靈公城西郛傳懼齊也叔孫豹會晉士匄于柯傳齊及晉平盟于大隧故穆叔會范宣子于柯杜註齊晉平魯懼齊故為柯之會以自固城武城懼齊也二十年春王正月辛亥仲孫速會莒人盟于向杜註莒數伐魯諸侯盟督揚以和觧之故二國自復共盟結其好夏六月庚申公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵傳盟于澶淵齊成故也秋公至自會仲孫速帥師伐邾傳邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之按祝柯之盟既執邾子且取其田矣尚云弗能報乎葢魯人藉口以為兵端左氏誤信焉而弗之察也蔡殺其大夫公子燮蔡公子履出奔楚傳蔡公子爕欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚陳侯之弟黄出奔楚傳陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討公子黄出奔楚按黄與爕皆不欲事楚者而履與黄不容于其國其出奔也乃不于晉而于楚高氏以為自理葢履必歸罪于其兄而黄則白二慶之讒也叔老如齊齊魯搆怨朝聘禮絶今始復通冬十月丙辰朔日有食之季孫宿如宋報向戌之聘也二十有一年春王正月公如晉傳拜師及取邾田也邾庶其以漆閭丘來奔傳庶其非卿也以地來雖賤必書重地也果如其説則二十三年邾畀我來奔昭二十七年邾快來聘皆不以地何以亦書乎葢左氏所謂非卿者小國之卿非大國之卿比即公羊所謂莒無大夫也故會伐會盟皆不名然亦未始非卿也卿來奔必書史之常文又按公去年夏與邾同盟而秋伐邾今又納其叛人信義安在而澶淵之盟仍書公則知幽之盟之不書公説者謂叛盟故必不然矣此亦其一證夏公至自晉秋晉欒盈出奔楚傳欒桓子娶于范宣子生懐子桓子死欒祈與其老州賔通懐子患之祈懼其討也愬諸宣子曰盈將為亂宣子信之懐子為下卿宣子使城著而遂逐之九月庚戌朔日有食之冬十月庚辰朔日有食之戴氏震曰日月之行終古不變凡日食後越五月六月可再食無比月頻食之理襄此年己酉推九月定朔庚戌日申時合朔入食限十月庚辰朔不入食限二十四年壬子七月甲子朔入食限八月癸巳不入食限先儒蔡氏曰想因當時史官算失一閏誤以二十一年之九月作十月朔日食二十四年七月作八月朔日食已書之史既而見其失閠不合也乃於兩年各補足一閠書為九月朔日食七月朔日食兩册俱存而後之修史者并録之也按比月頻食漢初綱目兩書之豈皆誤耶存考曹伯來朝公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子於商任傳錮欒氏也二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨傳復錮欒氏也公至自會楚殺其大夫公子追舒公子而不為大夫者即不稱公子既稱公子矣則其為大夫可知乃必以大夫書者公子親屬而其為國體之所係者大夫也文自不得從省二十有三年春王二月癸酉朔日有食之三月己巳杞伯匄卒夏邾畀我來奔畀我庶其之黨來奔故書葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳傳陳侯如楚公子黄愬二慶于楚楚人召之慶氏以陳叛夏屈建從陳侯圍陳遂殺慶虎慶寅楚人納公子黄按不書楚納者陳侯亦知其無罪非内不受者比故以自歸為文晉欒盈復入于晉入于曲沃傳晉將嫁女于呉齊侯使析歸父媵之以籓載欒盈及其士納諸曲沃四月欒盈帥曲沃之甲因魏獻子以晝入綘范宣子奉公以如固宫范氏之徒在臺後欒氏乘公門范鞅用劍以帥卒欒氏退欒盈奔曲沃晉人圍之按先書入晉者當盈入綘之時晉人不知其先入曲沃也及敗奔曲沃乃以其狀告故先書復入于晉後書入于曲沃不書叛者藉齊之力而求入則未入之先早已有無君之心矣未入而有無君之心是叛在入先不待入而後書叛也叛在入先又入而欲為亂于國罪有重科故曰復與宋魚石復入于彭城其義正同不書自齊者以潛入故秋齊侯伐衞遂伐晉遂者繼事之詞而有歸重之意齊納欒盈不遂利晉之難而伐之其意不在衞也八月叔孫豹帥師救晉次于雍榆以救晉出師而盤桓于雍榆畏齊而不敢進也己卯仲孫蔑卒冬十月乙亥臧孫紇出奔邾季武子無適子公鉏長而愛悼子訪諸臧紇紇請立之故公鉏怨臧氏孟莊子卒公鉏為立其庶子羯使讐臧氏遂誣告季孫曰臧氏將為亂季孫怒命攻臧氏乙亥臧紇斬鹿門之闗以出奔邾晉人殺欒盈殺大夫不去其官不以賢愚異惟欒盈及鄭良霄不書大夫者以奔而位絶也殺稱人者既不書大夫矣則于國體無所傷故不稱國殺而兩下相殺不志于春秋例不當目其人也以其用大衆攻而殺之故稱人殺文當然耳先儒或謂同于討賊之辭以為盈與霄使得所欲勢必至于弑君其説恐不確盈與霄使得所欲不過逐范氏公孫黑而專其國政耳春秋時世卿相仇殺如此類者多矣安得便蔽以弑君之罪哉齊侯襲莒傳齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰杞殖華還先遇莒子于蒲侯氏莒子親鼓之獲杞殖莒人行成按春秋書襲惟此一見二十有四年春叔孫豹如晉仲孫羯帥師侵齊傳晉故也夏楚子伐呉傳楚子為舟師以伐呉不為軍政無功而還秋七月甲子朔日有食之既齊崔杼帥師伐莒傳齊侯既伐晉而懼將欲見楚子楚子使薳啟疆如齊聘且請期秋齊侯聞將有晉師使陳無宇從啟疆如楚乞師崔杼帥師送之遂伐莒侵介根大水八月癸巳朔日有食之公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀傳將以伐齊水不克按晉是時國勢不競其會而不伐者葢有所畏耳曰水不克者乃其掩飾之詞冬楚子蔡侯陳侯許男伐鄭楚伐鄭以救齊不書救齊者必鄭以伐告諸侯救鄭不書者不成乎救也公至自會陳鍼宜咎出奔楚傳陳人復討慶氏之黨鍼宜咎出奔楚叔孫豹如京師傳齊人城郟穆叔如周聘且賀城杜註洛穀鬭毁王宫齊叛晉欲求媚於王故為王城之按魯自宣七年蔑如京師後不聘王者四十餘年矣至是而豹如京師者葢因齊為王城郟故欲假王寵以釋齊怨也大饑二十五年春齊崔杼帥師伐我北鄙傳以報孝伯之役也孝伯即仲孫羯夏五月乙亥齊崔杼弑其君光傳齊棠公之妻東郭偃之姊也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之遂取之莊公通焉驟如崔氏以崔子之冠賜人崔子因是欲弑公夏五月莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入于室與崔子自側户出甲興公踰墻射之中股反墜遂弑之公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀傳會于夷儀以報朝歌之役齊人以莊公説使隰鉏請成慶封如師晉侯許之望溪先生曰受賂不討齊亂而諸侯列序觀此則知盟扈會扈諸侯不序先儒以為不能討賊故畧之失其義矣六月壬子鄭公孫舍之帥師入陳傳初陳侯會楚子伐鄭當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之秋八月己巳諸侯同盟于重丘復書同盟者有欒盈之亂以盟主而見伐于齊其勢㡬于不振故復修同盟之禮不敢以主盟自居也諸侯即會于夷儀之諸侯前目故後凡杜註伐齊而書同盟以明齊亦同盟按九年同盟于戯十一年同盟于亳城北杜註皆云伐鄭而書同盟則鄭受盟可知與此註齊亦同盟同其説恐不確凡春秋書同盟皆伯主嫌于專主其事故謙言已與諸侯同為此盟焉耳非謂與所伐之國同盟也况此經統言諸侯前目故後凡前目之所無者後凡安得而有之故所為諸侯者單指在會之諸侯而言齊原不在所同之内其預盟固可書同盟即不預盟亦可書同盟也若如杜註云伐齊而書同盟以明齊亦同盟則如柯陵之盟鄭實不服何亦以同盟書乎彼其所以但書同盟不問所伐之國與盟不與盟而為是一施之辭者春秋因史作經凡事之首尾不必備伐國而同盟宜書至所伐之國或服而與盟或不服而不與盟皆戰事之首尾耳固春秋之所不必備其辭者也如晉楚爭鄭而鄭及晉楚平皆不書即此義重丘之盟據陳文子重丘之盟未可忘語齊之預盟不待言而春秋不書者以例本不應書也例本不應書則其書諸侯同盟齊必不在所同之内又何疑乎杜註既不得其解而從為之辭而劉氏炫又以齊不與盟屑屑焉而與之爭所為齊固失之而楚亦未為得也公至自會衞侯入于夷儀夷儀非國都也故書入未返國故不名鄭伯突入于櫟稱名者以返國不書故楚屈建帥師滅舒鳩呉以舟師之役召舒鳩人舒鳩人叛楚楚子師于荒蒲使讓之舒鳩請受盟楚師還二十五年舒鳩人卒叛楚楚令尹子木伐之及離城呉人救之簡師會之呉師大敗遂圍舒鳩舒鳩潰遂滅之冬鄭公孫夏帥師伐陳傳鄭復伐陳及鄭平十有二月呉子遏伐楚門于巢卒傳呉子諸樊伐楚以報舟師之役門于巢巢牛臣隱于短垣以射之卒按呉子伐楚不應名名以卒故二十有六年春王二月辛卯衞甯喜弑其君剽傳衞獻公自夷儀使與甯喜言甯喜曰必子鮮在二十六年公使子鮮為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也子鮮不獲命于敬姒以公命與甯喜言曰苟反政由甯氏祭則寡人二月庚寅甯喜右宰榖攻孫氏不克伯國傷孫氏夜哭甯子復攻孫氏克之辛卯殺子叔及太子角杜註子叔衞侯剽言子叔剽無謚也按剽簒立而以弑其君書者與文十八年書齊人弑其君商人義同衞孫林父入于戚以叛入者由外而内之辭大夫而據其私邑以叛則又以其國都為外而以其私邑為内矣故曰入甲午衞侯衎復歸于衞諸侯返國必書名更始之義也説詳僖三十年衞侯鄭歸于衞下夏晉侯使荀呉來聘傳晉人為孫氏故召諸侯將以討衞也夏中行穆子來聘召公也公會晉人鄭良霄宋人曹人于澶淵公與外大夫會盟例不書公以其降等屈班諱之也此不諱者魯至成襄以後禄去公室凡侵伐會盟之事皆三桓主之雖公親在行止供大夫之役耳非公之自為降等屈班也故不諱與蜀之盟不諱公其義同晉宋稱人必非卿使宋果向戌肯居鄭下哉左傳尊公與後之説不足信鄭良霄以名見則外大夫與公會無貶而稱人之例審矣然則邢丘之會何以卿皆稱人葢晉侯之降等屈班必人諸侯之大夫而其失始見也秋宋公殺其世子痤宋世子痤美而狠合左師畏而惡之寺人惠墻伊戾為太子内師而無寵讒太子將為亂公囚太子乃縊而死殺太子目君甚之也晉人執衞甯喜傳公會晉趙武宋向戌鄭良霄曹人于澶淵以討衞疆戚田取衞西鄙懿氏六十以與孫氏於是衞侯會之晉人執衞甯喜北宫遺使女齊以先歸衞侯如晉晉人執而囚之於士弱氏按執衞侯不書不以告也八月壬午許男甯卒于楚傳許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯十月楚子伐鄭冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋傳宋向戌善于趙文子又善于令尹子木欲弭諸侯之兵以為名如晉告趙孟許之如楚楚亦許之告齊秦亦許之皆告于小國為會于宋杜註按傳會者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地于宋則與盟可知故經惟序九國大夫楚先晉歃而書先晉貴信也陳于晉會常在衞上孔奐非上卿故在石惡下按楚先晉歃乃盟也此書會故先晉會之所以先晉者葢屈建欲盟先晉歃故于會特推趙武以晉楚狎主夏盟會既先晉則盟自應先楚持此為詞度趙武無以難之故會先晉者乃楚人之狡謀非聖人之貴信也聖人因史作經凡會盟列序皆魯史舊文故當時載書所次多與周班不合者聖人皆仍之而無所改正乃于此而獨以貴信先晉也理不宜然又據傳稱宋公兼享晉楚之大夫趙孟為客使非會已先晉宋為地主安敢蔑視楚卿而遽尊趙孟且子木亦安能無言乎地于宋即不序宋者晉自文公後主盟中夏者近百年當時諸侯雖亦徃徃從楚然終惴惴焉惟晉之討是懼迨宋向戌欲弭兵而為此會于是楚以僭王之國竟公然與晉並列一時兩伯而不復有所軒輊此非天下之小故也聖人安得不變文以見義乎故列序諸國獨没宋不書葢專以合晉楚之成致楚氛益熾為宋向戌罪若列序諸國仍書宋向戌于晉楚大夫之後則為會盟之常詞而習其讀者弗之察矣惟没宋不書使不與蔡衞陳鄭諸國相混第直書其會所之在宋而歸咎向戌之意以語氣求之自隱然見于言外此聖人之文所為游夏不能贊一辭者歟杜註非是其辨更詳具僖十九年盟于齊下衞殺其大夫甯喜患其專而殺之不以其罪也故從殺大夫之恒辭衞侯之弟鱄出奔晉衞侯既殺甯喜鱄病失言故出奔稱衞侯之弟者恒辭也先儒以為罪衞侯誤矣衞侯病在食言耳非不友于其弟也鱄稱弟不足以罪之秋七月辛巳豹及諸侯之大夫盟于宋豹去氏者承上文從省大夫而係于諸侯義具三年及陳袁僑盟下凡公與外諸侯㑹盟皆前目後凡不覆書公及以魯君例魯卿則此亦止應書諸侯之大夫盟于宋而獨覆書豹及者會先晉而盟先楚與尋常會盟皆以晉為主者不同故覆書豹及使若為異事者然此與定四年臯鼬之盟覆書公及其義正同再書于宋者會盟不同日例應再書其地也冬十有二月乙亥朔日有食之二十有八年春無冰夏衞石惡出奔晉衞人討甯氏之黨故也邾子來朝傳時事也秋八月大雩仲孫羯如晉傳告將為宋之盟故如楚也冬齊慶封來奔慶封好田而嗜酒與慶舍政盧蒲癸王何二人皆嬖于慶舍十一月乙亥嘗于太公之廟癸何殺慶舍慶封來奔十有一月公如楚傳為宋之盟故公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為非為一人行也公遂行十有二月甲寅天王崩傳癸巳天王崩王人來告䘮問崩日以甲寅告故書之以徵過也按告䘮赴文後必具日月其所具之日即崩之日此定例也魯不應有是問使者承命出使非甚愚之人必無誤告天王崩日之理其所以魯為是問而使者告稱甲寅者是時周室衰㣲物力匱絀䘮事不能如禮故天王以癸巳日崩直遲二十餘日至甲寅始告其當國大臣亦自知緩告之非禮故赴文後所具之日即用遣使之日魯與周相去非絶逺天王之崩聞諸道路者已有日矣今見其以甲寅赴故疑而問之使者不欲顯其緩告之失故堅稱甲寅非實不知天王之以癸巳崩而謾以甲寅告也魯史從告聖人亦仍之而已乙未楚子昭卒胡氏安國曰甲寅天王崩乙未楚子昭卒相距四十二日則閠月之驗也然不以閠書見䘮服之不數閠也按閠承前月而受其餘日故閏月之日繫于前月之下而不以閠書者乃史文定例胡氏以為見䘮服之不數閠聖經恐無此義二十有九年春王正月公在楚莊文成襄四公正月在晉者六皆不書而在楚則書者以僭王故惡楚也傳楚人使公親襚夏四月葬楚康王公及陳侯鄭伯許男送至西門之外楚不書葬所謂避其號而不書者也夏五月公至自楚傳公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥師徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公欲無入榮成伯賦式㣲乃歸按卞乃魯邑而不屬季氏取之以自益故公聞之而欲無入也庚午衞侯衎卒閽弑呉子餘祭傳呉人伐楚獲俘焉以為閽使守舟呉子餘祭觀舟閽以刀殺之不曰其君賤閽也雖賤之而閽亦食禄故書弑仲孫羯會晉荀盈齊高止宋華定衞世叔儀鄭公孫叚曹人莒人邾人滕人薛人小邾人城杞晉平公杞出也故合諸侯之大夫以城杞晉侯使士鞅來聘傳拜城杞也杞子來盟諸侯既城杞晉侯使魯歸所侵杞田故杞子來盟杞稱子者義詳僖二十三年杞子卒下呉子使札來聘按上書閽弑呉子餘祭此所謂呉子者夷末也杜註餘祭既遣聘而後死札以六月到魯未聞䘮也正義隱三年武氏子來求賻文九年毛伯來求金並不言王使傳皆云王未葬是知先君未葬嗣子不得命臣故杜註以為通嗣君通餘祭嗣也不知先君未葬嗣子不得命臣此周禮也呉本文身斷髪之俗豈可以是責之毛伯武氏子之來以王在諒闇不稱王命故不書王使此不用周禮稱呉子命故書呉子使皆魯史舊文聖人不得而易之也且必無餘祭立已四年而始通之理至以季子在䘮而行吉禮為疑則又有説春秋時三年之䘮雖未盡廢然每遇朝聘會盟燕享之事葬後輙以吉服成禮觀襄十六年傳稱晉平公改服修官昭十二年傳稱子産相鄭伯辭于享請免䘮而後聽命是時鄭簡公卒尚未葬故以免䘮為請子産且然則既葬即吉固當時諸侯之通禮也審矣而葬期又不盡用五月之制晉悼公卒于襄十五年十一月至十六年正月而葬鄭簡公卒于昭十二年三月至五月而葬其葬期皆僅及三月是其例也季子至魯大都在七月内外訃此時餘祭之弑已及三月其葬當已届期既葬即吉子産既可以免䘮而聽晉命矣季子獨不可以免䘮而行聘禮乎且季子呉之至親雖受命出聘或請俟先君葬畢然後就道以情理度之尤屬事所宜有果爾則其至魯之日免䘮已久諸行吉禮更可無嫌故賈逵服䖍皆以為夷末新即位使來通聘其説甚確杜註不可從稱札者來聘例書名胡氏謂譏其讓國非也讓國事在後未有因其後事而貶之于前者其不從齊年鄭語之例稱弟又不稱公子者呉在禹貢要荒之地春秋苐以號舉其世系行次聖人以為不足詳也呉子稱爵與使椒來聘稱楚子義同詳具莊二十三年荆人來聘下秋九月葬衞獻公齊高止出奔北燕按左傳齊公孫蠆公孫竈放其大夫高止于北燕而經以出奔書左氏以為罪高止杜註實放書奔所以示罪其意以出奔較甚于放故云示罪不知放者以其罪而放之奔則不必皆有罪也且放必限之以其地奔則任其所如徃若以所稱為優劣則奔優于放安有以書奔為示罪者乎高止之所以書出奔者放者上施于下之詞高止為二公孫迫逐而去本不可謂之放故以出奔書此聖人正名分之一端也冬仲孫羯如晉報范叔也三十年春王正月楚子使薳罷來聘夏四月蔡世子般弑其君固傳蔡景侯為太子般娶于楚通焉太子弑景侯五月甲午宋災宋伯姬卒穀梁傳取卒之日加之災上者見以災卒也伯姬之舍失火左右曰夫人少避火乎曰婦人之義傳姆不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也天王殺其弟佞夫王子瑕奔晉傳靈王崩儋括欲立王子佞夫佞夫不知戊子儋括圍蒍逐成愆五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也杜註括廖不書賤也按天王之殺大夫無見經者先儒謂義得專殺非也設殺之而不當亦以為天子義得專殺可以削而不載乎葢天王殺其大夫目天王不可又不可云周殺其大夫也春秋魯史于王朝事不必備窮于辭故不書耳若無罪而殺世子兄弟例應目君故天王之殺其弟必書王子瑕奔晉不言出者葢瑕與括廖同謀當括圍蒍之時瑕廖亦當在軍及佞夫被殺三人遂自軍奔晉望溪先生所謂在外而奔者是也在外故不書出秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄二十九年伯有使公孫黑如楚辭曰楚鄭方惡而使余徃是殺余也伯有將强使之子晳怒將伐伯有氏大夫和之三十年秋又將使子晳如楚庚子子晳以駟氏之甲伐而焚之伯有奔許乙巳鄭伯及其大夫盟于大宫盟國人于師之梁之外伯有聞鄭人之盟已也怒癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帯率國人以伐之伯有死于羊肆按宋華元出奔晉自晉歸于宋覆舉宋華元此不覆舉鄭良霄者義見宋華元出奔晉下入而介于襄庫攻舊北門正左氏所謂以惡矣故不曰歸而曰入其不書叛者叛必有所據之地未有入國都以叛者良霄乃一狂惑嗜酒之人醉夢之中毫無成算其冐冐焉旋出旋入不啻自投于罟擭䧟井之中適足以殺其軀而已矣不可以叛言也故不書叛位已絶故不書大夫稱人以殺與晉人殺欒盈義同冬十月葬蔡景公按春秋君弑不書葬先儒以為賊不討故果如此説則蔡景公何以書葬乎春秋大復仇葬者臣子之終事苟君父之仇一日未復即臣子之事一日未終故不書葬所以示臣子以不共戴天之義也豈賊不討之故乎知春秋所以不書葬之故則蔡景公之所以書葬者可知矣葢戕害吾君之人以天下萬世之公義言之則謂之賊以忠臣孝子一人之私憤言之則謂之仇如齊無知鄭歸生之屬賊也即仇也有仇而不可謂之賊者如魯桓之見戕于齊襄是也有賊而不可謂之仇者如蔡景之見殺于蔡般是也葢般乃世子也以世子而忍動于惡則所謂仇者即當為君父復仇之人梟獍出自宫闈臣民更復何望此時即有方伯連帥能伸天下萬世之公義者聲罪致討汙其宫而瀦其室然謂之討罪則可謂之復仇則不可葢復仇者創巨痛深人子之所自致討罪者亂臣賊子王法之所必誅也若以賊不討不書葬是大司馬九伐之法止欲安死者之體魄而已有是理乎故春秋仇未復則以不書葬示儆見未能揕仇人之胸即不啻暴吾親之骨而與古者未葬不除服之制皆動以人心之所甚惻所以儆其臣子者至矣賊未討則又以書葬示儆見以覆載所不容之人竟得假窀穸為自掩之計而四鄰諸侯胥若弗聞也者且為會其葬而莫之詰其所以儆方伯連帥者亦至矣非聖人孰能修之晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故會非卿故稱人先儒以為貶非也葢為宋災而謀歸其財其事至細故不使卿春秋據其實而人之何貶之有會未有言其所為者此言其所為公羊云録伯姬也葢國有火災其君夫人至以傳姆不在不下堂而死有人心者之所共惻也死者不可復生不得已而謀歸其財此即周禮致襘補烖之義不可謂非諸侯之善舉而亦伯姬之賢有以感之此春秋所以必書其所為歟胡氏以文與葬蔡景公連謂聖人譏其不討蔡亂而謀宋災其説非是三十一年冬莒人弑其君密州次年春會于虢尋宋盟而不討莒亂春秋未嘗書其所為也何獨于此而譏其不知類乎魯大夫不書者共姬魯女既使卿會葬必有獨致其厚者故不與會左氏以為諱亦非三十有一年春王正月夏六月辛巳公薨于楚宫按傳稱公作楚宫不書者春秋雖重用民力而公宫之作例不見經以人君寢處之所非臺榭比也不獨楚宫之不書作而已于此見聖人用法之恕秋九月癸巳子野卒傳立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也己亥仲孫羯卒冬十月滕子來會葬諸侯始親來會葬按外諸侯卒魯遣使徃葬不書㑹而此書會者春秋書内事不可據來者為文書滕子來葬我君襄公也又不可單書一葬字故書會葬文當然爾癸酉葬我君襄公十有一月莒人弑其君宻州傳莒犁比公生去疾及展輿既立展輿又廢之犁比公虐國人患之展輿因國人以攻莒子弑之乃立去疾奔齊陸氏淳曰據傳則展輿弑其父不當不書胡氏安國曰傳有乖謬信經而廢傳可也若宻州之事是矣按文公十八年莒弑其君庶其傳稱莒紀公生太子僕又生季陀愛季陀而黜僕且多行無禮于國僕因國人以弑紀公與此疑是一事傳聞兩屬左氏遂兩載之耳不然前後不應如此相類也以情理度之弑父當是莒僕之事故既弑之後即以其寶玉來奔葢弑逆之賊不能自定其位故也展輿之非弑自當以經文為斷無疑春秋究遺卷十二
