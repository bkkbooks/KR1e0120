body:
  text: 春秋究遺卷六左庶子葉酉撰僖公上元年春王正月傳不稱即位公出故也劉氏炫曰去年八月閔公遭弑僖公即自邾入事已粗定不應猶以公出故不行即位之禮也按劉氏駁傳甚確但謂不行即位之禮猶循習舊說辨詳桓元年公即位下齊師宋師曹師次于聶北救邢按春秋書救前必書伐獨是年前並不見狄伐邢而書救邢者蓋邢與衞壤地相接今狄既入衞勢必及邢故預為出師以救之是時狄尚在衞故三師次于聶北以為聲援于是狄不敢逼而邢遂得自遷于夷儀者皆此一次之力也先儒乃謂譏其救邢之不速其說非然則其救邢而不救衞何也衞懿不道國亂民散狄至則潰赴告不及非齊之厚于邢而薄于衞也惟懲衞之滅愈不得不急于救邢耳夏六月邢遷于夷儀傳邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉公羊傳遷者何其意也遷之者何非其意也按此時狄尚在衞故邢得奔師若邢已被圍則乗其潰而攻之無噍類矣雖欲遷可得乎齊師宋師曹師城郉覆舉三國榖梁傳美齊桓之功非也齊桓之功豈必覆舉三國而後為美哉杜註一事而再列三國于文不可言諸侯師故亦非也諸侯之師于文何不可之有蓋齊之救邢原無意于城邢也邢既遷乃帥諸侯以城之是救邢與城邢自兩事也兩事故再列三國若城緣陵則鹹之㑹原以淮夷病杞為謀遷都以避之一事也故前目後凡秋七月戊辰夫人姜氏薨于夷齊人以歸傳哀姜孫于邾齊人取而殺之于夷以其䘮歸僖公請而葬之張氏洽曰言齊人以歸則為魯誅其罪而以䘮歸齊可知矣胡氏謂歸之于魯謬甚誠歸于魯矣何至十二月復書夫人氏之䘮至自齊乎楚人伐鄭傳鄭即齊故也楚不稱荆而稱楚人自此始其說具莊公十四年荆入蔡下八月公㑹齊侯宋公鄭伯曹伯邾人于檉傳謀救鄭也張氏洽曰楚伐鄭桓公不遽救而㑹諸侯以謀之蓋楚方强而公謀制楚十全之策也九月公敗邾師于偃傳虛丘之戍將歸者也按經凡書敗某師皆因其來侵而敗之此必邾來侵魯公因敗之于偃耳左氏語焉不詳不必曲為之解冬十月壬午公子友帥師敗莒師于酈獲莒挐莒人來求歸慶父之賂而以兵至公子友敗之于酈公賜季友汶陽之田及費按此戰曲在莒春秋以季友主此戰胡氏謂譏其不能諭以詞命非也凡魯與外諸侯戰皆以魯主兵十有二月丁巳夫人氏之䘮至自齊杜註不稱姜缺文其說非也夫人為齊所殺故不書姜蓋絶之于齊不以夫人累桓公也不去氏嫌與文姜同文彼義關乎夫人故去姜氏此義不關乎夫人故不獨書夫人也然則前書夫人姜氏薨于夷何以不去姜桓公大義滅親以其䘮歸既絶夫人于魯矣故不復絶之于齊也二年春王正月城楚丘望溪先生曰齊桓城三國屬辭各異城楚丘則命魯獨城之而諸侯不與也當是時陳鄭廹于楚宋曹既同城邢之役而齊宋復謀㑹江黃惟魯以内難凡役皆不預故至是使獨任楚丘之役也楚丘衞地而與城内邑同文何也春秋于㑹遇盟戰之地皆不係以國蓋職方具在書某地則知為某國必如彭城之披于楚虎牢之戍于晉而後還係之宋鄭耳胡氏安國曰城楚丘畧而不書城邢詞煩而不殺何也衞人渡河野處其國已亡城楚丘是擅天子之大權而封國也邢遷于夷儀其國未滅諸侯城邢是謂同惡相恤以從簡書故辭繁而不殺美救患也按衞懿不道國亂民散狄至則潰赴告不及齊本未嘗出師以救之也故不書救衞既亡其遺民聚于楚丘而作邑焉不可以言遷也故不書遷若邢則未被狄師桓公懲于衞之事預為出師以救之既救而遷其事本詳非聖人有意詳之也城楚丘而衞國忘亡城夷儀而邢遷如歸皆所謂同惡相恤以從簡書豈可以軒彼而輊此哉胡氏之說適見其鑿而已矣城夷儀言城邢城楚丘不言城衞者上無遷于楚丘之文則當其城時楚丘尚非衞之國都也故不言城衞夏五月辛巳葬我小君哀姜虞師晉師滅下陽傳晉假道于虞以伐虢虞公許之且請先伐虢遂起師夏晉里克荀息㑹虞師伐虢滅下陽先書虞賂故也按虞起師在前故首虞非以其賂也書滅者下陽逺晉而近虞晉既不能越虞而有其地又惡虞之有斯土也于是肆其殺掠使一邑之民人畜産蕩然無存蓋下陽實為二師所滅晉欲滅下陽而虞從之者虞公貪殆㗖之以鹵獲故春秋安得不以滅書滅者剷其迹使之冺然而不復有所留遺之謂故伐人之國而夷其宗社者曰滅言天下從此遂不復有是國也邑之所以不言滅者奪彼之所有而歸之于此其邑固自在也今下陽既經殘破蕩為丘墟天下亦從此遂不復有是邑矣故謂之滅滅猶言屠也先儒乃謂下陽虢之塞邑下陽舉而虢亡矣故書滅果如其說則晉之滅虢當即在滅下陽之後何必待再舉而始得志乎不書伐虢者滅下陽之罪大擅兵伐國聖人又以為不足書矣秋九月齊侯宋公江人黃人盟于貫傳服江黃也胡氏安國曰荆楚天下莫強焉江黃者其東方之與國也江黃來定盟則楚國失其右臂矣按江黄小國其力不足以撓楚齊桓徒貪服逺之名而聽其來盟究何嘗得其毫髪之力而二國遂以此中楚人之忌而滅亡之禍其端已兆于此矣胡氏之說以當日之事勢論之恐不確冬十月不雨榖梁傳不雨者勤雨也楚人侵鄭三年春王正月不雨夏四月不雨榖梁傳一時言不雨者憫雨也憫雨者有志乎民者也徐人取舒徐稱人者徐之去王畿不甚逺猶在禹貢侯服内外尚書所謂徐戎者謂徐地之戎非以徐為戎也故春秋于此年取舒十七年伐英氏昭五年伐吳皆稱人昭四年㑹申楚人執之三十年奔楚皆稱子獨僖公十五年楚人敗徐于婁林及文七年伐莒只稱徐先儒遂謂以號舉其說非也文七年伐莒謂其侵犯中國故春秋復狄之已無解于取舒伐英氏之以人稱矣至僖十五年甫當齊桓伐厲救徐之後而楚人敗徐于婁林亦謂春秋以其僭王故以號舉于義尤不可通春秋之于徐原未嘗以號舉其敗于婁林不稱人者蓋以齊之所救者徐而即為楚之所敗故特以敗徐書使與伐徐救徐同文以著齊之不能制楚也其伐莒不稱人者則與文十年秦伐晉成三年鄭伐許昭十二年晉伐鮮虞同為赴告所不及傳聞略不得不為此槩舉之詞耳豈曰貶之云乎舒楚黨徐取之為齊通伐楚之路也取為附庸不絶其祀故不書滅六月雨榖梁傳雨云者喜雨也喜雨者有志乎民者也秋齊侯宋公江人黃人㑹于陽榖傳謀伐楚也按侵蔡次陘之師諸侯皆在而江黃獨不與蓋管仲因江黃近楚而逺齊若與于伐楚之役恐楚人就近蹂躪之或不及救則適足以速江黄之禍故姑令勿與然二國雖不與伐而去年盟于貫今又與之㑹于陽榖終不免中楚人之忌于是十餘年間二國遂皆為楚所滅此固事勢之所必然者也楚且不能庇許而卒見滅于鄭而齊顧欲庇江黃而使不為楚所滅也豈可得哉冬公子友如齊莅盟公羊傳莅盟者何往盟于彼也時公不㑹陽榖齊侯使人來請尋盟故公使季友往莅之楚人伐鄭傳鄭伯欲成孔叔不可曰齊方勤我棄德不祥汪氏克寛曰楚師三至鄭齊桓不救而孔叔謂其勤我者蓋知其㑹于檉盟于貫㑹于陽榖皆為伐楚救鄭之謀故也四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘傳齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海不虞君之渉吾地也何故管仲對曰爾貢苞茅不入王祭不供無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘夏楚子使屈完如師師退次于召陵屈完及諸侯盟按蔡自獻舞以來屈服于楚故桓公先事侵蔡所以披楚之黨也未可以蔡姬之事累之遂者繼事之詞而有歸重之意書遂伐楚言志不在蔡也伐楚而不責以僭王之罪者楚強恐其不服則勢不可已而戰又難保其必勝故第以苞茅不貢責之使其名之可受也此其所以為伯者歟夏許男新臣卒召陵地屬潁川宻邇于許許男以疾而歸卒于其國也榖梁之說固非胡氏好為苛論尤不近人情楚屈完來盟于師盟于召陵屈完不稱楚子使者杜註權在屈完非也古者大夫出疆有可以安國家利社稷者専之可也豈獨屈完一人為權之所在乎蓋楚僭王之國為王法之所必誅齊桓殫十餘年之經營聨八國之師深入其境宜乎明正其罪惟力是視務復周室之班爵而後己乃請盟之使一來而問罪之師即退亟亟焉止圗了一時之局于彼淫名以干不祥者毫髮無所損故特書楚屈完來盟聖人若曰是楚之屈完也而乃與之從容于尊俎間乎蓋著僭王之國之必不當與盟而義不關乎楚子也若書楚子使則與齊侯使國佐同文而習其讀者或弗之察矣豈權在屈完之謂哉國佐稱如師而此曰來盟者上書齊侯使則下書如師據彼以為文也上不書楚子使則下書來盟據此以為文也先書來盟于師原屈完之意後書盟于召陵指實盟之所其辭繁而不殺總以病齊桓之不能卒伸大義于天下也然則齊桓于此使不受楚盟果能服楚俾自去其僭號而從周班稱子乎是時楚氛正熾桓公非能為湯武之所為者若遽加楚以大惡之名而欲其降以相從則兵連禍結其勢萬難以得志故草草了局苟可藉口即歛師而退所為知己知彼最合事宜然使湯武處此未有不正其僭王之罪者此五伯所以為三王之罪人也聖人安得不變文以譏之齊人執陳轅濤塗按左氏傳陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病若出于東方循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出于東方遇敵懼不可用也桓公說執轅濤塗公羊傳則謂桓公諾轅濤塗還師濵海而歸䧟于大澤因執轅濤塗疑公羊之說得之若如左氏之說則仍出陳鄭而歸矣何至伐之侵之若是之甚耶稱齊人者執諸侯大夫例稱人義見桓十一年宋人執鄭祭仲下秋及江人黃人伐陳傳討不忠也杜註以濤塗為誤軍道程子曰齊命也伐楚之役江黃不預且以其國近于陳故令伐陳必使魯人及之者江黃逺國不可無魯主兵也八月公至自伐楚榖梁傳有二事偶則以後事致後事小則以前事致其以伐楚致大伐楚也葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衞人鄭人許人曹人侵陳傳叔孫戴伯㑹諸侯之師侵陳陳成歸轅濤塗五年春晉侯殺其世子申生晉獻公既立太子申生後又嬖驪姬而欲立其子奚齊因外嬖梁五東關嬖五之譖使申生居曲沃姬又讒之公殺其傅杜原欵太子縊于新城公羊傳殺世子母弟直稱君者甚之也按左氏傳稱申生四年十二月縊于新城經書五年春杜註從告正義實以去年死告稱今年殺據此則似左氏所謂十二月乃建亥之月矣不知晉既不以太子之縊為諱而告于隣國矣又何諱于四年之十二月而必改稱五年之春耶顧氏炎武曰晉用夏正其十二月乃周之春二月也其說確不可易但春秋本魯史其書五年春者非魯史改晉之告文也周正建子凡二三友邦必無不禀正朔之理晉雖用夏正不過其國史私以夏正記時如豳風商之諸侯以建子紀日耳其告魯之文必用周正無疑左氏博採晉史故稱四年十二月魯史承其告文故以五年春書非有異也杜註從告之說未嘗不是但其意則以傳與經時月實不合斯考之弗詳耳杞伯姬來朝其子社註伯姬來寧寧成風也朝其子者時子年在十歲左右卒不成朝禮故係于母而曰朝其子按經文明書來朝其子其非來寧可知杜註誤以伯姬為莊公女故云云不足信也夏公孫兹如牟兹娶于牟卿非君命不越境故奉君命聘于牟因自為逆公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止書及者公與諸侯不先行㑹禮也恵王以恵后故將廢太子而立王子帶故齊桓率諸侯㑹王太子以定其位秋八月諸侯盟于首止榖梁傳無中事而復舉諸侯何也尊王世子而不敢與盟也望溪先生曰㑹盟同地而再書所以别于異地也襄二十五年夏五月諸侯㑹于夷儀秋八月同盟于重丘是㑹盟異地而兩書其地者也異地者既兩書則同地者安得不再書也按㑹盟不同日者必再書其地不問同地異地也此史文之常惟湨梁以諸侯㑹而大夫盟故特變其例只書盟而不書地蓋欲正其盟之失義不關乎其地也先儒或謂湨梁盟之日即㑹之日故不地以傳考之並不見其同日也殆不得其解而從為之辭鄭伯逃歸不盟傳王使周公召鄭伯曰吾撫汝以從楚輔之以晉可以少安鄭伯喜于王命而懼其不朝于楚也故逃歸不盟楚人滅弦弦子奔黄傳江黃道柏方睦于齊皆弦姻也弦子恃之而不事楚又不設備故亡弦子不名說見荘十年譚子奔莒下九月戊申朔日有蝕之冬晉人執虞公傳晉侯復假道于虞以伐虢宫之竒諫不聴冬十二月晉滅虢師還館于虞遂襲虞滅之按虞虢皆滅于五年冬不書不以告也望溪先生曰武獻以下兼國若霍揚韓魏沈姒蓐黃無一見于策書者况虞虢天子之三公同姓之貴國乎其無辭以告于魯明矣然則執虞公何以告其以執吿正欲掩其滅之之迹耳觀傳所載修虞祀歸職貢則必以小邑存其五廟可知矣六年春王正月夏公㑹齊侯宋公陳侯衞侯曹伯伐鄭圍新城傳諸侯伐鄭以其逃首止之盟也秋楚人圍許諸侯遂救許楚人圍許以救鄭也不書救鄭者許以楚圍告按遂者繼事之詞先儒謂有歸重之意如桓八年祭公來遂逆王后于紀桓十八年公與夫人姜氏遂如齊莊十九年公子結遂及齊侯宋公盟僖四年遂伐楚十五年遂次于匡二十八年諸侯遂圍許三十年公子遂如京師遂如晉成十三年公自京師遂㑹晉侯某某伐秦襄二年遂城虎牢襄十年遂滅偪陽襄二十三年齊侯伐衞遂伐晉定八年晉士鞅侵鄭遂侵衞其本意皆不在前事故謂其有歸重之意是則然矣然亦有不盡然者如此年諸侯遂救許文七年公伐邾取須句遂城郚宣十八年歸父還自晉至笙遂奔晉豈可謂其本意原在後事乎其他如文十五年齊侯侵我西鄙遂伐曹入其郛宣元年楚子鄭人侵陳遂侵宋襄十三年季孫宿救台遂入鄆昭四年楚伐吳執齊慶封殺之遂滅頼諸所謂遂者皆踵前事而加甚之謂與歸重意又微有别不得作一例解冬公至自伐鄭伐鄭救許而以伐致者望溪先生曰急服鄭也按師本為伐鄭起因楚圍許以救鄭諸侯乃移師救許是救許乃因伐鄭而及之事故仍以伐鄭致榖梁所謂後事小則以前事致也七年春齊人伐鄭張氏洽曰鄭未服故復伐齊力足以制之不煩諸侯也夏小邾子來朝杜註郳犂來始得王命而來朝也邾子别封故曰小邾鄭殺其大夫申侯傳鄭殺申侯以說于齊按申侯自楚奔鄭導鄭從楚故殺之以解說于齊也稱國以殺義詳莊二十六年曹殺其大夫下殺而不去其官者凡居位而見殺者皆不去其官不以賢愚異以其為國體之所係也惟奔而位絶者乃不書大夫耳如晉欒盈鄭良霄是也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寗毋傳謀鄭故也曹伯班卒公子友如齊張氏洽曰甫盟寗毋而又使季友修聘所以勤伯國之好也冬葬曺昭公八年春王正月公㑹王人齊人宋公衞侯許男曹伯陳世子欵盟于洮鄭伯乞盟傳恵王崩襄王惡太叔帶之難不發䘮而告難于齊八年春盟于洮謀王室也鄭伯乞盟請服也襄王定位而後發䘮望溪先生曰王朝之卿士則稱行次大夫則稱名王臣而稱人者三子突書名則大夫也洮與翟泉之王人則卿大夫未可知也蓋洮之盟諸侯皆序翟泉之盟諸侯之大夫皆稱人而王人乃以行次書以名書非所安也故稱王人蓋辭有所窮也夏狄伐晉秋七月禘于太廟用致夫人夫人左氏傳以為哀姜然哀姜元年為齊所殺何今日乃致公羊以為脅于齊媵之先至者不特僖公賢君不當受脅于齊而齊桓霸主亦必無脅魯以媵為夫人之理故榖梁以為成風後儒皆宗之按致者推而極之之謂言自妾而推之為夫人使之極母儀之尊也聖經文義自明解之者不察耳不稱姓氏者榖梁傳立妾之詞其不言立者子之于母不可以立言也蓋有崇奉之義焉故曰致冬十有二月丁未天王崩傳冬王人來告䘮難故也是以緩不書葬魯不㑹也按傳稱恵王崩于七年冬經書八年十二月左氏謂王室告䘮以難故緩然必無緩至一年之理高氏閌曰或者去年恵王疾不莅政世子懼難而圗諸齊故為洮之㑹至是而恵王始崩歟其說似得其實蓋當其㑹于洮之時襄王尚為世子因恵王疾勢已殆恐王子帶乘間作亂故告于齊以謀之非恵王已崩而匿䘮不發也若果如左氏云云恵王已崩于七年冬王子帶以襄王母弟出入宫掖豈能匿不使聞且三年之䘮大事也乃匿之至一年之久惴惴焉惟已之不得立是懼而無隱其先君之心王子帶愈得以此藉口而為變不難矣此理勢所必無之事然則恵王至是而始崩學者但信經而勿泥于傳可也九年春王正月丁丑宋公御說卒宋公卒不書𦵏魯不㑹故公羊謂為襄公諱非夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘宰周公者以三公而兼冡宰也不殊㑹者宰雖尊非王世子貴有常尊之可比也宋稱子先君未葬也公羊傳背殯而出㑹以宋子為無哀矣秋七月乙酉伯姬卒内女之卒有變然後書其無變而書者以君之閔之而過于禮之常制也伯姬未嫁故不係國九月戊辰諸侯盟于葵丘覆舉諸侯宰周公不與盟也再書葵丘義見五年盟于首止下胡氏之說鑿甚甲子晉侯詭諸卒甲子在戊辰前五日公羊作甲戌自是左氏經文傳寫之誤當從公羊無疑冬晉里克殺其君之子奚齊傳晉獻公卒里克丕鄭欲納文公故以三公子之徒作亂冬十月里克殺奚齊于次榖梁傳其君之子云者國人不子也不正其殺申生而立之也按公羊之例既葬稱子踰年稱公然文十五年齊昭公以五月卒齊舎立四月被弑未踰年而稱君者稱君與稱爵不同嗣子即位于柩前是為以子繼父之義國之臣民烏得而不君之在嗣子不忍故踰年乃改元即位國内稱公于他國以爵通君臣之義不待踰年始定也然惟義有素定者從其常若立非其正義不素定將曰孰為吾君歟改元即位然後君之耳舎之為君義有素定也故書齊公子商人弑其君舎奚齊乃立非其正義不素定方踰月而見弑于次故書里克殺其君之子奚齊卓亦義不素定乃踰年而見弑于朝既改元即位可知故書晉里克弑其君卓子立子以正之義君臣之分胥于是乎見非聖人孰能修之以上約戴氏震說傳稱九年十一月殺而經書十年春者其說詳具五年殺世子申生下十年春王正月公如齊不書至何也蓋魯至是始屈服于伯國用五年一朝之禮外雖屈服而心實恥之故反而不告于廟也十五年不書至與此同狄滅温温子奔衞傳蘇子無信也蘇子叛王即狄又不能于狄狄人伐之王不救故滅按望溪先生謂王朝卿士稱伯者乃伯叔之伯稱子者乃時人相尊異之稱畿内無五之爵非伯子男之伯與子也其說確不可易此所謂温子者若如左氏傳云云則是畿内有五等之爵矣然若以尊異之稱例之則又不可蓋子而冠之以氏如單子劉子之屬其子必非伯子男之子無疑今子而冠之以邑其與子而冠之以國者無以異也若以為尊異之稱則如滕子楚子之子豈亦可謂尊異之稱乎故温子之子當與奔莒之譚子奔黄之弦子為類不當與單子劉子為類此亦無可疑者然則先生所為畿内無五等之爵者非歟春秋邑不書滅既書滅則温當為近狄小國未必為温原之温也如為温原之温則既為狄之所滅矣至二十五年周又何得以此賜晉乎程子云以經考傳之真偽此皆當信經而不可泥于傳者也晉里克弑其君卓傳里克殺奚齊荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之按卓稱君者已即位也說詳九年殺奚齊下及其大夫荀息杜註荀息稱名者從君于昏非也宋仇牧亦名也何獨于荀息而以稱名為貶乎傳弑在九年十一月經在十年春正月說詳五年殺世子申生下夏齊侯許男伐北戎晉殺其大夫里克里克躬弑二君而不從討賊之例者殺之不以其罪也望溪先生曰春秋雖重亂賊之誅亦不使誣衆行私者得假公義以掩其惡秋七月冬大雨雪十有一年春晉殺其大夫㔻鄭父傳殺在冬經書十一年春者與里克弑卓同夏公及夫人姜氏㑹齊侯于陽榖僖公娶于齊經無明文蓋娶在即位前秋八月大雩冬楚人伐黃楚滅弦狄滅温皆不書伐滅黃而先書伐者黃以伐告故十有二年春王三月庚午日有食之夏楚人滅黃楚人伐黃齊桓坐視其滅亡而不救非不欲救也勢不可也蓋江黃逺齊而近楚管仲早慮及之矣秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衞傳十二年春諸侯城衞楚丘之郛懼狄難也杜註諸侯不告魯不與故不書案此役魯不與則二年城楚丘為魯獨任其役也益信夏四月葬陳宣公公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹傳為淮夷病杞故且謀王室也案此㑹既兼謀王室則諸侯戍周何以不書傳稱齊仲孫湫致之蓋諸侯並不遣大夫帥師不過以戍卒付仲孫將之以往耳輕其事故不書也秋九月大雩冬公子友如齊陽榖寗母及鹹之㑹其後公子友皆如齊蓋僖公謹事大之禮也十有四年春諸侯城緣陵城緣陵不序者承上㑹鹹之諸侯也一事故前目後凡義見元年城邢下不書城杞者上無杞遷于緣陵之文當其城時緣陵尚非杞之國都也故書城緣陵與書城楚丘義同夏六月季姬及鄫子遇于防使鄫子來朝按左氏傳稱鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝果若是則季姬此時已嫁矣内女已嫁例繫國季姬何獨不繫鄫後又何以書季姬歸于鄫此皆左氏傳所不可通者也然如公羊傳注謂魯不防正其女使要遮鄫子滛泆使來請已則真何休所謂與禽獸無異魯秉禮之國僖公賢君斷不至此竊意季姬不繫鄫明是未嫁之稱蓋僖公既許嫁季姬于鄫矣因鄫子不朝怒而欲絶其婚然鄫子之不朝實非敢不朝也特後期耳鄫子為人迂緩後㑹盟于邾為邾人所戕亦以後期故是其明証既聞僖公之怒遂遷延于防不敢入魯季姬以貞節自矢義不改適乃至防及鄫子遇而使之來朝以請罪于魯于是僖公感之仍以季姬歸鄫春秋詳書于册十六年復書鄫季姬卒皆所以賢季姬也不然内女非夫人比遇鄫子非㑹齊侯比兒女子桑中濮上之行何足以汚簡牘哉或以季姬公宫弱質勢難逺行至防為疑不知姬以貞節自矢義不改適其保姆宫妾之屬必有為義所激隂導其行而左右之使得至防者其事本出于一時之權後世貞女或許字而未嫁忽以貧富相耀其父母不勝其勢利之見恐不能守前議遂不得已而私奔夫家者往往而有何獨于季姬而疑之且公榖同謀請已之說又何不難逺行至防乎後儒惑于異論妄生支節于是又有謂僖公溺愛其女聴自擇壻者展轉誣衊其得罪于名教不淺矣然則何以不書葬紀叔姬歸于酅其國已亡宋伯姬卒于火非常之變故魯皆遣使㑹葬㑹則書不㑹則不書内女卒例不㑹葬無他故也秋八月辛卯沙鹿崩杜註沙鹿山名服䖍曰沙山名鹿山足按山足不可言崩當以杜註為正狄侵鄭冬蔡侯肸卒赴告不具故不日榖梁謂惡之非也春秋時如肸者多矣何獨于此而惡之十有五年春王正月公如齊不書至義見十年公如齊下楚人伐徐三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡何氏休曰言次者譏諸侯緩于仁恩既約救徐復生事次止又不自往而遣大夫往卒不能觧也其說非是楚人伐徐帥師者非楚君則使大夫救之而桓與諸侯駐軍近地遥為聲援何不可之有乃用此為譏議乎遂者繼事之詞而有歸重之意春秋書遂次于匡蓋與下救徐連文正著其急于仁恩而㑹盟之本意原在救徐也諸儒顧以救而書次即非善辭不特暗于事勢其于聖人語氣亦太憒憒矣公孫敖帥師及諸侯之大夫救徐公孫敖魯卿故以名見諸侯之大夫謂列國之大夫以魯大夫及之故不得不别之為諸侯之大夫也内兵與外兵同役君卿將例書㑹此獨書及者㑹有以此就彼之意敖與諸侯之大夫此時皆在牡丘各承其君之命帥師自牡丘而往救徐不可以㑹言也故曰及夏五月日有食之不書朔與日官失之也秋七月齊師曹師伐厲傳伐厲以救徐也八月螽九月公至自㑹㑹盟書至歸而告廟也必重其事有戒心又無所諱而後以告于廟故特㑹參盟不致以其事為己輕也雖重其事而無戒心亦不致故自僖十五年牡丘以前公與諸侯㑹盟無致者隱之盟戎不致而桓則致者非我族類壤地相接簒立之人時懼諸侯之討而以盟戎為幸也牡丘之㑹致者蓋公孫敖帥師及諸侯之大夫救徐公次于匡以待之文雖以㑹盟歸而書至實則以戰伐歸而告廟也淮則公以滅項被執聲姜請之而始得歸所謂重其事有戒心而致也齊之盟不致與大夫㑹盟例不致既無戒心又以其降等屈尊諱之故不以告廟也其後蜀之盟澶淵之㑹不致義與此同薄宋二盟不致以主盟者楚魯頌方以荆舒是懲借齊事以美魯功則其以㑹楚為辱而諱之也審矣晉文嗣興首為踐土之盟而執衞侯諸侯恐懼自是伯者之㑹盟無不致者矣然踐土之盟不致者以盟踐土之時温之㑹已有期矣歸將復出故不以告廟也文七年公㑹諸侯晉大夫盟于扈不致者以趙盾主盟故與及大夫㑹盟不致義同襄七年㑹鄬九年盟戱不致者鄬之㑹未歸而如晉故以自晉致戲之㑹未歸而㑹柤故歸自柤而後致也吳之强諸侯皆懾焉而鄫與槖臯之㑹不致者吳多行無禮雖屈伏焉而以為辱故諱之而不以告廟與㑹楚不致義同黃池之㑹與晉侯偕則致矣昭公既孫而鄟陵之盟致者諸侯去國必載主祏以行也特㑹參盟不致而文十七年及齊侯盟于榖書至者商人無道連年侵伐至是許盟雖好㑹而有戒心故致也定公十年㑹齊侯于夾谷十二年㑹齊侯盟于黃十四年㑹齊侯衞侯于牽書至者齊魯當定公七八年間搆兵者屢矣時以其侵軼我為懼故與之盟㑹皆歸而以告于廟告則書不告則不書無他故也定公八年㑹晉師于瓦書至者亦以伯國來救重其事而以告于廟故耳先儒乃以褒貶之義求之遂多不可通者矣本望溪先生說畧有增易季姬歸于鄫己卯晦震夷伯之廟不曰夷伯之廟震而曰震夷伯之廟者春秋為魯紀異不為展氏紀異也若書夷伯之廟震似為展氏紀異矣冬宋人伐曹傳討舊怨也杜註莊十五年曹與諸侯伐宋楚人敗徐于婁林不曰敗徐師而第以國舉者蓋徐為齊之與國齊楚爭衡而齊所救之徐竟為楚之所敗則伯威之不足以懾楚也審矣故第以國舉蓋専為齊惜也先儒以為狄徐誤甚十有一月壬戌晉侯及秦伯戰于韓獲晉侯晉恵公之入也許賂秦伯以河外列城五旣而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉戰于韓原秦獲晉侯以歸按兵未薄其國都而逆與之戰故不書伐君重于師君見獲則師之敗績不待言矣秦舎晉君于外已而歸諸晉故不言以歸十有六年春王正月戊申朔隕石于宋五傳隕星也按不言石隕而言隕石者星隕而後為石也是月六鷁退飛過宋都是月言非戊申且失其日也傳風也三月壬申公子季友卒季氏友名先儒以季為字非也季本行次即賜之以為氏也友于僖有翼戴之功故生而賜氏夏四月丙申鄫季姬卒鄫季姬書卒賢之也與紀叔姬宋伯姬書卒義同詳具十四年及鄫子遇于防下秋七月甲子公孫茲卒冬十有二月公㑹齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮𫝊㑹于淮謀鄫且東畧也城鄫役人病有夜登丘而呼曰齊有亂不果城而還按邢舊服屬于衞故自齊桓創伯凡㑹盟邢皆不與至是乃自請列于㑹蓋不堪衞之徵求而欲附大國以叛之也十八年遂與狄伐衞矣不果城故不書城鄫十有七年春齊人徐人伐英氏傳齊人為徐伐英氏以報婁林之役也夏滅項内滅國諱言取與内殺大夫諱言刺其義正同此獨書滅項者先儒以公方在㑹滅項非公意故不為季氏諱其說非也是時季友已卒其子無佚早亡行父稚年嗣位未久滅項之事豈得歸罪季孫哉且魯至季世征伐大都皆大夫主之何獨于此惡之而不為諱也蓋魯之滅國自此始不義之事聖人尤惡其始之者故直書以例其餘焉秋夫人姜氏㑹齊侯于卞傳淮之㑹公有諸侯之事未歸而取項齊人以為討而止公秋聲姜以公故㑹齊侯于卞按婦人無外事聲姜之為此㑹與荘公之㑹杞伯姬于洮殆皆狃于㑹禚㑹防之故事而不知其非禮也即此則文姜作俑之罪可勝誅乎九月公至自㑹冬十有二月乙亥齊侯小白卒傳冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯杜註六十七日乃殯按兄弟爭立同在國都之内即彼此治兵相攻成敗之機決在俄頃必無相持至六十餘日之理且據傳云云並無治兵相攻之事史記宫中空莫敢棺之說不足信是時宋襄方􅍀然而有圗霸之志故孝公甫奔宋師即出若桓公既卒其嗣子争國至兩月之久其先君尚不及殯宋與齊相距不逺聞警必赴其定亂之師當不待十八年春早至于城下矣然經書十二月其所以與傳異者蓋夏之十月周之十二月也夏時得天當時列國史册多不用周正故凡傳文採自魯史者用周正其採自列國之史者多用夏正即如襄公十九年齊靈公卒經書秋七月傳稱夏五月夏正之夏五月正周正之秋七月是齊亦用夏時之証桓公之卒傳所以稱十月者殆以此故歟桓公以十二月乙亥卒牙與貂即内外相結潛師入宫殺羣吏之不附已者而立無虧孝公雖嘗立為太子而管仲既死其勢甚孤又變起倉卒兵力不足以相抗遂脫身奔宋羣公子皆莫敢枝梧此丙子丁丑一二日間事也越七日辛巳而桓公殯其踰諸侯五日而殯之期纔兩日耳豈如杜註六十七日云云哉傳又稱十二月乙亥赴者蓋其事本採自齊史彼亦不知其用夏正因見魯史又書十二月齊侯小白卒遂以此強相牽合耳觀其日同是乙亥則其月之本無異可知其辨更詳具五年晉殺其世子申生下春秋究遺卷六
