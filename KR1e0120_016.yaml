body:
  text: 春秋究遺卷十六左庶子葉酉撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡傳報柏舉也蔡人男女以辨使疆于江汝之間而還蔡于是乎請遷于吳杜注隨世服于楚不通中國及吳入楚昭王奔隨隨侯免之卒復楚國楚人德之使列于諸侯故得見經定六年鄭滅許此復見者蓋楚封之按胡氏謂蔡降而書圍者恕楚子之復仇非也楚之仇吳也蔡特借吳以紓其見陵之怨耳乃舍強大之吳不問惟逞其吞噬于弱小之蔡而聖人顧以楚子為復仇而恕之乎其所以不書降蔡者蓋蔡諱降第以楚圍告魯史承告故不書降而書圍鼷鼠食郊牛改卜牛牛下榖梁有角字夏四月辛巳郊榖梁傳鼷鼠食郊牛角改卜牛志不敬也夏四月郊書不時也秋齊侯衛侯伐晉傳齊侯衛侯會于乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲杜注魯師不書非公命也冬仲孫何忌帥師伐邾定公之末邾之事魯至矣而不免于伐蓋三家專魯正以其服勤于魯為罪耳二月春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田傳伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟癸巳叔孫州仇仲孫何忌及邾子盟于句繹按三人伐而二人盟先儒或謂季氏汰不屑與邾盟故使二子歃而已臨之蓋自以為君矣或以季氏包藏禍心必欲滅邾故使二子盟而已不與焉七年入邾之事已兆于此二説不同鄭氏玉曰必合而觀之而季氏與伐不與盟之故乃偹至公羊各盟其所得之説恐未必然季氏即得田何妨不與盟耶夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯瞶于戚書世子者見靈公未嘗廢蒯瞶而别立世子也于戚病晉不能聲輒之罪而使蒯瞶不得入衛也張氏洽曰蒯聵必無殺母之事觀春秋冉以世子書則知蒯聵為無辜而被惡名也審矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績傳齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之戰于鐡鄭師大敗獲齊粟千車李氏某曰據此則是鄭人為齊致粟于范氏也夫鄭雖與齊合然安甫一會之後鄭亦不與齊通觀鄭罕逹伐宋而齊不知宋皇瑗侵鄭而齊不救可見矣且齊苟欲輸范氏粟何不徑致朝歌主衛以為防護而乃使鄭越疆代送耶蓋鄭本叛晉幸其有范中行之亂或將以兵助之而趙鞅聞有鄭師遂邀擊而敗之耳其説似得其實冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟元年蔡請遷于吳而中悔吳因聘襲之蔡殺公子駟以説言不時遷者駟之為也三年春齊國夏衛石曼姑帥師圍戚以齊主兵者齊大衛小以國序故先齊襄元年為宋國彭城亦以國序先晉正與此同胡氏乃以為誅齊之黨其説非也天下豈有舍為惡者不誅而惟其黨之是問者哉不言衛戚者杜注非叛人夏四月甲午地震五月辛卯桓宫僖宫災桓僖何以有宫胡氏安國曰季氏出于桓立于僖世專魯國之政其諸以是為説而不毁歟按傳稱司鐸火而經不書者舉廟重以略之不言及者榖梁傳言及則祖有尊卑自我言之則一也季孫斯叔孫州仇帥師城啓陽杜注魯黨范氏故懼晉比年四城宋樂髠帥師伐曹討樂大心之亂也秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳左氏無傳其事不可考但經稱蔡人放殆其執政大臣逐之而不以君命故冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾邾已受盟于句繹今二卿踰年復圍之魯之棄信甚矣四年春王二月庚戌盜殺蔡侯申傳蔡昭侯將如吳諸大夫恐其又遷也公孫翩逐而射之入于家人而卒望溪先生曰稱盜者隂賊而不知何國之人也故不稱弒非其君也傳謂賊由公孫翩非也果翩也或目其人或稱國人可矣無為以盜書也惟不知賊之在故辰以懼罪而奔姓霍以見疑而殺也按注昭公已適吳矣翩在路逐而射之其迹有似于今之所謂響馬者傳又稱以兩矢門之衆莫敢進蓋昭公中矢避入人家翩即隨之以入而殺之並無徒衆故雖蔡人其始亦不知其為翩也而以盜殺赴于諸侯魯史承而書之聖人亦仍之而已左氏以為翩者殆後亷得其實而故有是傳聞之詞歟蔡公孫辰出奔吳葬秦惠公宋人執小邾子李氏亷曰宋之伐曹執小邾子蓋齊景圗霸未成而宋亦有志于爭雄也當與宋襄執滕子圍曹諸事合觀之夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚楚圍蠻氏蠻氏赤奔晉楚謂晉曰晉楚有盟好惡同之若將不廢則寡人之願也不然將通于少習以聽命趙鞅曰晉國未寧安能惡楚必速與之乃詐執戎蠻子以畀楚師按蠻子赤名者從此遂失國猶諸侯之卒則名也執稱人者執鄰國之諸侯大夫例稱人不曰歸之于者畏楚故重在楚而不重在戎蠻子也其説具僖二十八年晉人執衛侯下不曰畀楚人者著晉之京師楚也城西郛六月辛丑亳社災榖梁傳亳社者亡國之社也其屋亡國之社不得上達也注緣有屋故言災秋八月甲寅滕子結卒冬十有二月葬蔡昭公盜殺則不知為何國之人臣子雖志于復仇而不能必其時也而先君之喪不可以久而不葬也故與魯桓之戕于鄰國者别為一例而書葬望溪先生所謂義理之權衡也葬滕頃公五年春城毗夏齊侯伐宋汪氏克寬曰定十四年齊侯宋公會于洮距此六年未有釁端而忽興師以伐宋殆以宋伐曹執小邾恃強凌弱故託是討之以圗霸歟晉趙鞅帥師伐衛以衛助范氏故也遂圍中牟謝氏某曰殆以蒯聵未入故秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公卿供葬事晉文襄之制按上文只書時而閏月不書某月者古于年終置閏所謂歸餘于終也六月春城邾瑕晉趙鞅帥師伐虞以鮮虞納荀寅于柏人故吳伐陳傳復修舊怨也夏齊國夏及髙張來奔傳齊陳乞偽事髙國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇莫如盡滅之又謂諸大夫曰二子欲謀二三子盍及其未作也先諸夏六月陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乘如公戰于莊敗國人追之國夏及髙張來奔叔還會吳于柤叔還以吳在柤故往會之始通吳好也秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弒其君荼傳陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬于季孫不入于上乘故又獻此請與子乘之出萊門而告之故遂行至于齊僖子使子士之母養之與饋者皆入冬十月丁卯立之使胡姬以安孺子如賴去鬻似公使朱毛告于陳子曰君異于器不可以二敢布諸大夫僖子不對使毛遷孺子于駘不至殺諸野幕之下按陽生不稱公子者公子返國嗣位例係國而不稱公子與齊小白入于齊同弒荼目陳乞者當其召陽生之時其心固已成乎弒矣此與昭十三年書楚公子比弒其君虔其義正可以參互得之陽生之入齊陳乞召之也故弒書陳乞比之歸楚棄疾實不與謀故書弒公子比此聖人義理之權衡也又按春秋凡有弒逆之事則其國之大夫出奔不書其説詳具閔元年季子來歸下今此既書齊陳乞弒其君荼矣而前獨書齊國夏及髙張來奔者何蓋髙國受命于景公而立荼使二子不去則荼不可得而弒故陳乞之偽事髙國而與諸大夫謀先者無非為弒荼計而二子之出奔非徒大夫之不安于其位而已春秋安得而略之冬仲孫何忌帥師伐邾自公即位以來四用兵于邾蓋必欲滅之而後已也宋向巢帥師伐曹以三年伐之猶未服故七年春宋皇瑗帥師侵鄭傳鄭叛晉故也按定六年晉執宋行人其好已絶何以為晉討叛先儒或以報罕達之伐然罕達之伐已七年矣乃至是而始報者殆以鄭與齊親故必因齊亂而始用師于鄭歟晉魏曼多帥師侵衛傳晉師侵衛衛不服也杜注五年侵衛至今未服夏公會吳于鄫杜注吳欲霸中國也秋公伐邾八月己酉入邾以邾子益來傳秋伐邾及范門猶聞鐘聲大夫諌不聽茅成子請告于吳不許師遂入邾處其公宫以邾子益來按入而先書伐者纍日而後入之也公羊以為內辭若使他人然其説迂回不可通不書滅者明年吳伐魯魯復邾子不有其地故曰入在外曰以歸在內曰以來邾子何以名以歸例稱名也宋人圍曹傳曹背晉而姦宋宋人伐之晉人不救築五邑于其郊曰黍丘揖丘大城鍾𨝍冬鄭駟𢎞帥師救曹傳宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋八年春王正月宋公入曹以曹伯陽歸傳宋公伐曹將還禇師殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯以歸杜注滅非本意故以入告按是年至孟子去齊時百有餘嵗而曹交尚為曹君之弟則曹未滅審矣殆宋以小邑存其五廟而第以入告諸侯歟吳伐我討其入邾也兵直抵國都故不言四鄙望溪先生曰定哀以前公室雖卑而三家協心尚可以捍禦外侮故鄰國侵伐及四鄙而止耳至是則陪臣數叛三家異心莫肯為國任患故吳齊之師徑薄國都而莫之為蔽矣夏齊人取歡及闡傳齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取歡及闡公羊傳外取邑不書此何以書所以賂齊也曷為賂齊為以邾子益來也按經文上書取歡及闡下書歸郊子益于邾則公羊之説似得其實歸邾子益于邾傳齊侯使如吳請師將以伐邾乃歸邾子杜注齊未得季姬故請師也吳前為邾討魯懼二國同心故歸邾子按公羊以齊之伐我為以邾子益來左氏則謂以季姬二説不同然歸邾子益則皆以懼討而歸之非能去惡而不積也審矣胡氏之説迂甚不書邾子益復歸于邾而以魯歸為文者病魯之凌弱而畏強也邾子何以名從諸侯復國例故名秋七月冬十有二月癸亥杞伯過卒齊人歸歡及闡傳秋及齊平齊閭丘明來涖盟且逆季姬以歸嬖冬十二月齊人歸歡及闡季姬嬖故也按不書來歸者無將命者也或疆吏相授受或魯使微者往受而不書其人九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘鄭武子賸嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師壘合鄭師哭遂取之夏楚人伐陳陳即吳故也秋宋公伐鄭報雍丘也冬十月十年春王二月邾子益來奔邾子既歸又無道吳子使太宰子餘討之囚諸樓臺栫之以棘十年春來奔齊甥也遂奔齊公會吳伐齊傳九年齊侯使辭師于吳吳子曰昔嵗寡人聞命今又革之不知所從將進受命于君冬吳子使來警師伐齊十年公會吳子伐齊南鄙師于鄎齊人弒悼公赴于師吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之乃還三月戊戌齊侯陽生卒按傳稱弒而經以卒書胡氏拾榖梁之唾餘謂不忍以夷狄之民加乎中國之君其説非是是時吳師在郊若陽生果被弒吳必假公濟私聲罪致討其師尤為有名乃哭于軍門之外未聞以此藉口則陽生之非弒所當信經而廢傳也奚疑夏宋人伐鄭既取其師伐而又伐書之以著其修怨無已也晉趙鞅帥師侵齊伐喪非義也五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛定十四年衛公孟彄出奔鄭自鄭奔齊故今自齊歸衛也薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳楚子期伐陳以陳即吳故也吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還按札壽夢少子也夀夢以襄二年卒至今七十七年壽夢卒時札已為父兄所欲立年當在二十左右豈有近百嵗之人而尚帥師者乎左氏之失也誣如此之類是矣十有一年春齊國書帥師伐我報鄎之役也按傳稱季氏之甲七千冉有以武城人三百為己徒卒次于雩門之外又稱師及齊師戰于郊則其兵及國都也審矣兵及國都故不書四鄙而胡氏乃謂齊師及清涉泗非有城下之盟可諱之辱亦書伐我者欲省致師之由而躬自厚也豈讀左氏傳並未及卒篇耶夏陳轅頗出奔鄭陳轅頗為司徒賦封田以嫁公女有餘以為己大器國人逐之五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書傳為郊戰故公會吳伐齊甲戌戰于艾陵大敗齊師獲國書公孫夏閭邱明陳書東郭書按戰不書魯或以為魯未接戰故非也凡師會伐皆大國主兵者接戰餘不過為之聲勢耳故鞍之役魯衛皆不見有接戰之事何獨于此而不書魯乎蓋春秋內魯而外齊不可云齊國書帥師及我師吳師戰若云我師吳師及齊師戰又以吳及齊失內中國而外僭吳之義矣故沒魯不書窮于辭也不致者去年會吳伐齊今年春齊即報伐幾有城下之辱今又會吳伐齊大敗齊師公又有天使下國之語以激齊怒故季孫命修守偹惴惴焉以齊至無日為懼其不書至者以懼齊而不以告廟也此魯史之所本無聖人自不得而益之獲止書齊國書者卿也秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋傳疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣置于犁而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻耻是二者故出衛人立遺使室孔姞十有二年春用田賦杜注丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦按魯自作丘甲之後一丘已不止出馬一匹牛三頭矣此注何得復云爾乎且必無計家財使出馬牛之理陳氏曰以丘賦為未足又以田賦之田賦之也者家一人也家一人管子內政之法也諸侯之益兵自齊始晉次之春秋之季魯亦行之矣其説似較長觀左氏及仲尼私于冉有曰君子之行也度于禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度于禮而貪冒無厭則雖以田賦將又不足云云以丘與以田對舉與陳氏合然陳説主于益兵又與所謂貪冒無厭者不相肖竊意兵賦宜出夫家周禮所謂嵗時登其夫家之衆寡辨其可任者是也魯以用不足托言軍用加斂于田蓋前作丘甲每井六夫至是則每百畝一家一夫每井增多二夫而所增之夫或如漢口率出錢或如唐人庸調之法令出綿絹之屬皆不過藉之以足用非真益兵也此聖人所以謂之貪冒無厭歟夏五月甲辰孟子卒孟子昭公之夫人也卒不書薨葬不志蓋季氏逐其君而並黜其夫人也傳稱孔子適季氏季氏不絻則惡由季氏明矣公會吳于槖臯秋公會衛侯宋皇瑗于鄖不致者非殷會不致與成十二年會于瑣澤不致義同宋向巢帥師伐鄭傅宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒冬十有二月螽戴氏震曰周之十二月夏之十月也由失一閏方九月而為十月六月昏火中七月流火八月九月漸流而下至十月則伏十月不復有螽九月尚溫可有螽故季孫問而孔子答以今火猶西流司厯過也孔子明知十二月之前有失閏猶兩書十有二月螽魯史舊文不得而改焉者也十有三年春鄭罕逹帥師取宋師于嵒傳十二月鄭罕達救嵒丙申圍宋師按傳稱十二月而經書十三年春夏時之十二月正周之春也此可為鄭亦用夏時之證夏許男成卒公會晉侯及吳子于黃池傳夏公會單平公晉定公吳夫差于黃池秋七月辛丑盟吳晉爭先趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎太子死乎且夷德輕不忍久請少待之乃先晉人公羊傳其言及吳子何會兩伯之辭也按黃池之會如春秋説文所稱齊晉前驅魯衛驂乘滕薛夾轂而趨之説雖不足信而據傳稱王欲伐宋注以其不會黃池故則當日會黃池者必不止魯一國審矣且傳有單平公公羊亦云天下諸侯莫敢不至而經皆沒而不書非聖人有意削之也凡諸侯會盟有先會後盟者有不會而盟者黃池若果合天下之諸侯先行會禮春秋據事直書必無削而不載之理且是時吳氛甚熾故日旰而盟嘖有煩言使先行會禮豈肯帖然而居晉後乎今但于盟爭長而不聞其于會爭先其為不會而盟無疑不會而書公會者蓋諸侯當會盟之時有請先相見之禮公至黃池因不行會禮又未及盟期乃就晉侯吳子而請先相見焉諸侯相見曰會非必殷會而後可言會也見必以次相及故曰及而吳子書及則其非殷會也亦遂不待别白而自見矣公羊乃以及為兩伯之辭果如其説則宋之會何獨于楚屈建不書及乎盟據左傳謂晉先國語謂吳先以事勢度之晉自宋之盟已不競于楚矣陵夷至于此時豈復能與吳爭國語似得其實吳為僭王之國盟先晉歃聖人之所深惡者也故諱之而不書惟諱盟不書故公雖及晉侯吳子先相見非殷會比亦不得不以公會書使不書公會則黃池兩伯無由見經何以著時局之又一變乎然則宋之盟亦楚先晉歃而春秋不諱者何蓋春秋書宋之會已敘趙武于屈建之上矣而前目後凡其書盟也例應以諸侯之大夫渾之既不嫌于失實又不悖于內中國而外僭楚之大義此其所以不諱盟也安得執彼以難此吳不以號舉而稱子者以其為兩伯故楚公子申帥師伐陳楚畏吳之強乘其出會而伐陳於越入吳傳越子伐吳大敗吳師獲太子友丁亥入吳吳人告敗于王王惡其聞也自刎七人于幕下冬吳及越平秋公至自會晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫盜殺義見襄十年盜殺鄭公子騑下十有二月螽十有四年春西狩獲麟杜注麟者聖王之嘉瑞也時無明王出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而修中興之教絶筆于獲麟之一句所感而作固所以為終也按春秋書獲麟則聖經之作必在獲麟之後審矣但杜氏謂感麟而作其説恐不確聖人既欲以此修中興之教使無麟遂不作乎然彼之所以為是説者蓋以編年之體按年記事至年終乃止今忽終于十四年之春起止之義必有所謂故遂以感麟而作為經之所以終于是也不知聖人之所以絶筆于此者蓋春秋時天下之亂已極聖人欲為之撥亂反治雖有其德而無其位苦于無可藉手之處于是因麟之出非其時而傷吾道之所如不合將終無所望于後也故託之以終篇夫亦猶是鳳鳥河圗之嘆云爾豈絶筆于此者必以此始之故乎至文成致麟之説其理更荒誕不足信存而不論可也春秋究遺卷十六
