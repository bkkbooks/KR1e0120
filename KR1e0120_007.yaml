body:
  text: 春秋究遺卷七左庶子葉酉撰僖公下十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊宋襄之伐齊納孝公也傳稱桓公與管仲屬孝公于宋襄公以為太子管仲非從君于昏者其立孝公必有說不得以少長之序為疑傳序桓公諸子皆以其母之次第為次第長衛姬班居第一無虧乃其子故首及之非以無虧為桓公之長子也使無虧果長管仲必無聽桓公舍之而立孝公為太子之理桓公卒豎刁易牙作亂無虧立而孝公出奔則宋襄伐齊而納之于義未為不可然春秋不書納子昭而只書伐齊且以突歸于鄭赤歸于曹之文例之當繼伐齊即書昭歸于齊而經又不書只書齊師敗績者此聖人筆削之義之所在也蓋王者既久不作天下之無伯非小故也宋襄之伯雖不過伯統中之餘分閏位其事至無足道然聖人熟計中國之大勢以其時齊桓既沒晉文未興中間一線之所繫亦有不得不大書特書不一書而已者伐齊之役乃宋襄圗伯之始事也蓋宋襄之為人也量小而志大彼自齊桓創伯以來凡征伐㑹盟皆與其兵力既不弱于魯衛諸國而晉是時又多內難未遑外事故齊桓一卒彼即􅍀然而有代興之意其伐齊而納孝公也蓋以齊席九合之遺烈其嗣子若才諸侯必不舍齊而事宋今幸其五公子爭立而我為出力以納其君則已之主夏盟也可以萬全故其事雖名為納昭而其意實在于爭伯聖人窺見至隱故止以伐齊書並不書昭歸于齊若宋之伐齊之敗皆絶無預于納昭之事者凡以著宋襄之欲繼齊桓而為盟主也胡氏乃謂聖人専以奉少奪長為宋襄罪亦淺之乎測聖人矣其書師救齊及狄救齊又以著宋襄之德與力皆不足以服人以致顯與為敵者之紛紛耳亦非以救為善如胡氏云云也春秋序戰例以受兵之國主兵此獨不言齊師及宋師戰而以宋主兵者春秋固記宋襄圗伯之始事也秋八月丁亥葬齊桓公冬邢人狄人伐衛傳邢人狄人伐衛圍菟圃衛師于訾婁狄師還按狄稱人先儒以為進之非也二國同役不可云邢人及狄伐衛列序而狄以號舉于文不順故不得不人狄若以褒貶之義求之必鑿而不可通矣十有九年春王三月宋人執滕子嬰齊嬰齊何以名從此遂失國也與諸侯卒則名同蓋此君被執之後其嗣君將復見于經名見執者以别其嗣君也戎蠻子赤名義與此同然則晉人執虞公何以不名虞為晉所滅文宣以前滅國之君皆不名例也國滅嗣絶不必以名别之也故文宣以前史文殘缺滅國之君或名或不名聖人槩削之以歸于一夏六月宋公曹人邾人盟于曹南杜注曹雖與盟而猶不服不肯致餼無地主之禮故不以國地而曰曹南所以及秋而見圍按曹南者曹之南鄙也非其國都故不以國地未必以不致餼之故曹不服宋亦不必以其不致餼為不服也三傳並無明文杜說恐不確鄫子㑹盟于邾杜注不及曹南之盟諸侯既罷乃㑹之于邾故不言如㑹已酉邾人執鄫子用之傳宋公使邾文公用鄫子于次睢之社欲以屬東夷按祭祀而至用人宋襄未必殘忍至此觀後戕鄫子亦出于邾則其用之于社也豈必宋之所使乎鄫子魯姻也舊史必詳其名而聖人削之者名者恆辭不名者正其為鄫子以著用之者之罪也若係以名則或習其讀而不之察矣秋宋人圍曹傳討不服也衛人伐邢傳以報菟圃之役杜注邢不速退所以獨見伐冬㑹陳人蔡人楚人鄭人盟于齊傳陳桓公請修好于諸侯以無忘齊桓之德冬盟于齊杜注地于齊齊亦與盟按此盟齊亦在列而經不序齊者蓋魯蔡陳鄭皆伯叔甥舅之國受桓公之賜沒世不忘此固人情之所宜然者至楚則召陵誓師南風不競雖滅弦滅黃齊桓亦坐視而不能救然終有所懼于齊逮桓公死而莫豫毒楚之君臣可以彈冠相慶矣乃以南北海之遙亦不憚跋涉而來與此盟者是時楚勢日強因中國無伯遂有乘間代興之志而陳蔡與鄭皆近楚而素服之者故牽率而來名為不忘齊德實則専為楚謀蓋楚方狡焉思逞欲以此為主盟中夏之漸耳此時為齊孝者惟當以楚氛益熾亟亟焉思所以扼其吭而拊其背者以卒桓公未竟之志乃悅其甘言竟與二三友邦同引入于國都之內而與之為好若不知其有僭王之罪者聖人以是為楚與諸侯㑹盟之始而傷齊伯之不紹也故列叙諸國特沒齊不書使語勢趨下而大書其盟所之在齊聖人若曰是固桓公用之以著一匡九合之烈者也今乃與楚人刑牲歃血于其地乎蓋楚之主盟中夏聖心之所深惡者也故推原禍始而歸咎于齊今第將此盟于齊三字重讀而聖意自見此與襄二十七年叔孫豹㑹諸侯之大夫盟于宋㑹盟皆不序宋其義正同皆聖人之文所為游夏不能贊一辭者也杜注地于齊齊亦預盟其意蓋謂聖經之所以不序齊者從可知故耳然僖二十七年公㑹齊侯盟于宋其時宋方被圍不預㑹盟審矣而亦地于宋則地于齊何足以明齊亦預盟乎公及大夫㑹盟降等屈尊不書公例也或謂諱與楚盟亦非梁亡梁伯湎酒淫色好土功民先潰去秦因其潰而取之故以自亡為文公羊所為魚爛而亡也二十年春新作南門南門本名稷門所為圉人犖能投蓋于稷門是也僖公更高而大之故又名南門春秋惡其變古而踰制也故書夏郜子來朝鄭氏樵曰郜有南郜北郜取郜大鼎北郜也此南郜五月乙巳西宫災災必復作不書者春秋常事不書鄭人入滑傳滑人叛鄭而服于衛鄭公子士泄堵冦帥師入滑秋齊人狄人盟于邢傳齊狄盟于邢為邢謀衛難也于是衛方病邢按狄稱人文當然耳說詳十八年邢人狄人伐衛下冬楚人伐隨傳隨以漢東諸侯叛楚楚鬬榖於菟帥師伐隨取成而還二十有一年春狄侵衛杜注為邢故宋人齊人楚人盟于鹿上傳宋人為鹿上之盟以求諸侯于楚楚人許之按三國稱人皆大夫也先儒以為貶非夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋凡因㑹盟而執鄰國之諸侯者必書某人此㑹執宋公獨不書楚人者或謂五國皆惟楚是從而心不服宋故執宋公者雖楚人即謂五國之人共執之可也其說非是楚人之執宋公其謀甚祕豈五國之所得預聞五國既不預聞其謀而春秋顧均坐以擅執宋公之罪恐聖人之斷斯獄不若是之頗也蓋春秋之例凡接書一人兩事則覆書某人若一事而接書其首尾則不覆書㑹盟與執之事不類故皆覆舉某人以其為兩事也獨此㑹楚子挾詐而來其陽與為好者實欲出其不意而劫之於壇坫之上故其執之時即其㑹之時非㑹自㑹而執自執也一事故不覆舉楚人惟不覆舉楚人特著其為一事則楚子之以㑹為執者既有以見其深詭之機更非尋常之以勢力相凌暴者比而宋公之輕慮淺謀以楚之狡焉思逞冒冒然竟墮其術中而為其所執所為愚而好自用者亦遂不待貶絶而可見矣冬公伐邾為滅須句故楚人使宜申來獻捷几外諸侯之以事接于魯者若此類槩不書爵義不關乎其爵也此與齊侯來獻戎捷同而稱人稱爵異者彼則以禮相交而有降等屈尊之失此則以威相脅而有恃强凌弱之心其事同而其情異故書法不得不異也宜申楚卿故以名見不曰宋捷者先儒謂為宋諱非也執宋公不諱獻宋捷而諱之乎蓋齊之獻捷重在戎以山戎之伐魯亦與謀也故書戎捷楚之獻捷重在捷彼只欲自雄其兵力耳故不書宋捷即此一字之增減而齊之以禮相交楚之以威相脅其情實遂顯然可見宜其為游夏所不能贊者歟十有二月癸丑公㑹諸侯盟于薄釋宋公公羊傳執未有言釋之者此其言釋之者何公與謀爾也按諸侯被執返國例書其歸而不書其釋若以公與謀故則如三十年衛侯鄭之歸于衛亦公為之請矣何以不言釋乎蓋彼既書歸則其釋不待言此旋執旋釋並未挾與俱去不可以言歸也故書釋二十有二年春公伐邾取須句按傳稱公伐邾取須句反其君焉審爾則當書納須句子矣而經止書取須句者蓋反其君而稍致其土田之所入使之無乏而已不成乎其為納也故從恆辭書取夏宋公衛侯許男滕子伐鄭三月鄭伯如楚故伐之子魚曰所謂禍在此矣秋八月丁未及邾人戰于升陘傳邾人以須句故出師公卑邾不設備而禦之戰于升陘我師敗績邾人得公胄懸諸魚門及不稱公不書敗績諱之也冬十有一月己巳朔宋公及楚人戰于泓宋師敗績傳楚人伐宋以救鄭宋公及楚人戰于泓宋人既成列楚人未既濟司馬請擊之不可既濟而未成列又以告不可既陳而後擊之宋師敗績公傷股門官殱焉按楚稱人先儒以為貶非也盂之㑹不貶而泓之戰乃貶乎殆遣大夫帥師而楚子特駐軍近地遙為之援耳三十年秦晉圍鄭稱人正與此同二十有三年春齊侯伐宋圍緡傳討其不與盟于齊也案孝公之立宋襄納之也以怨報德豈人情乎蓋齊席桓公之餘烈孝公有志繼霸齊之盟陳蔡楚鄭咸在而宋獨不與則其不度德量力而急于圗霸之意早有以中孝公之忌而欲乘釁而動也久矣既敗于泓遂從而伐之皆宋襄之自貽伊戚耳于齊乎何尤夏五月庚寅宋公兹父卒秋楚人伐陳傳討其二于宋也吳氏澄曰曹南之盟陳不從宋伐鄭之役陳亦不從宋盟齊則陳從楚考之經惟見陳之服于楚不見陳之二于宋也今楚討陳之二蓋以伐宋之後鄭畏朝楚而陳未朝即誣以二宋之罪伐之而取其二邑不至于滅陳不已也冬十有一月杞子卒杞伯爵故莊二十七年來朝稱伯至此年忽稱子二十七年來朝稱子自是以後皆稱伯至襄公二十九年來盟又稱子或以為時王所黜此年及二十七年不可知若襄公時杞方與晉親時王未必能黜之也且滕為時王所黜自桓二年稱子後終春秋皆以子稱杞則自文公後㑹盟㑹伐史不絶書皆稱伯其非時王所黜審矣先儒以為棄周禮似得其實然有不可槩論者按僖二十三年以前杞小而貧凡中國之㑹盟皆不與雖以齊桓為謀杞而為鹹之㑹杞君亦不在列則僖二十三年二十七年兩次稱子以棄周禮理或宜然至襄二十九年稱子則前後皆稱伯必無前後皆遵用周禮獨此一年而棄禮之理蓋是年晉合諸侯城杞又使魯歸所侵杞田魯怒其藉晉之力以逞志于魯故于其來盟仍援僖二十七年舊例特殺其餼牽之數而以子禮待之君既待之以子矣史安得不以子書乎諸侯卒必名且杞子魯姻也而其卒不名必以其國荒陋不足與諸侯齒故史遂失其名二十有四年春王正月夏狄伐鄭鄭公子士泄堵俞彌帥師伐滑王為滑請鄭不聽命王怒使頺叔桃子出狄師伐鄭夏取櫟按鄭在畿內王所倚毗伐鄭必非王意觀是冬王出居于鄭可見若既伐之矣而又依之豈人情乎殆頺叔為叔帶謀將欲叛王故先以狄伐鄭耳左氏所傳恐不足信秋七月冬天王出居于鄭王德狄人立其女為后甘昭公通于隗氏王替狄女頺叔懼狄之怨已遂奉叔帶以狄師攻王王適鄭處于汜按出者自內而外之辭出而曰居者普天之下莫非王土也居于狄泉不言出者王本不在王城故晉侯夷吾卒傳卒在二十三年九月經後一年餘杜注文公定位而後告顧氏炎武曰不告文公之入而告惠公之薨以上年之事為今年之事以新君入國之日反為舊君即世之年非人情也疑此經乃錯簡當在二十三年之冬按惠公既卒圉立未久而秦師壓境倉卒之際未暇告喪故杜注謂文公既定而後告魯史從告故後一年餘非錯簡也顧氏之說恐不確其不告文公之入而告惠公之薨者蓋春秋之初晉與諸戎雜處武公篡立享國日淺及獻公嗣位尤務蠶食一切中國之㑹盟自齊桓創伯以來晉從不一與故其赴告甚簡而列國請侯以不同盟故亦遂不與之講邦交之禮故佹諸之卒彼雖告喪而魯並不㑹葬魯既不㑹則列國之㑹葬者必寡訃而若弗聞也者國之恥也而彼又自揣此時之力尚不足以得志于諸侯故不特文公之入不告並惠公之入其不告已在先蓋以禮人弗答為恥而故不告以自全其體也然晉大國返國大事又不可不聞于諸侯也故惠公入而以殺里克告其告辭必致惠公之命則惠公雖不告入而其入可知文入而以惠公之喪告其告辭必致文公之命則文公雖不告入而其入可知是告喪正所以告入也安得以不告入而告喪為疑然則告惠公之喪何不嫌諸侯之不㑹也彼不告于方卒之日者雖倉卒有所不暇亦正以諸侯之不㑹為嫌耳至文公定位惠卒已逾年矣逾年而後告諸侯五月而葬雖欲㑹已不及期故不嫌于不㑹也其後悼公之入亦不書蓋國家之事惟例是循殆視諸故府猶行惠與文之故事歟至謂以新君入國之日反為舊君即世之年則誠有不安者按戴禮雜記篇載告喪之文曰寡君不祿敢告于執事並不具卒之日月所以然者以赴文後必具月日如今官府文書必注月日于後古今當一例故赴文中不復言卒于某月某日也晉告惠公之喪于文公定位之日其去惠公卒時已逺且借此告文公之入必無追用惠公卒時月日之理而惠公卒時月日赴文中例不具此魯史所以書之後一年餘而杜氏從告之說為得其實也然從告之說雖得其實而杜氏之意則謂從其赴文中所告卒之月日不知魯史從告實從其赴文後所具之月日也若謂從其赴文中所告卒之月日則以新君入國之日反為舊君即世之年無怪乎寧人先生以為非人情而疑其為錯簡矣二十有五年春王正月丙午衛侯燬滅邢傳衛侯將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年春衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢同姓也故名按春秋時滅同姓者多矣何獨于此而名之蓋衛嘗為狄所滅矣邢亦屢有狄難皆賴齊桓公為之合諸侯以存恤之城夷儀而邢遷如歸城楚丘而衛國忘亡不特同病宜有相憐之意即推齊桓之德亦不應操同室之戈遂至如此其酷也故諸侯不生名而于此獨名者蓋著滅邢者之非他人乃衛侯燬也他人滅邢罪所同也衛侯燬滅邢則以覆亡之禍已之所身受者而加諸人聖人尤惡其心之太忍矣故名之以别其人于凡滅國者耳豈曰貶之云乎夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦伯姬魯女而配蕩氏以姑自逆婦而公下主大夫之婚非禮也故書宋殺其大夫義見莊二十六年曹殺其大夫下秋楚人圍陳納頓子于頓頓子迫于陳而出奔楚故圍陳而後能納之不言遂一事也葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮傳衛人平莒于我十二月盟于洮修文公之好且及莒平也衛稱子者按公羊之例既葬稱子踰年稱公左氏傳則未葬稱子既葬稱君二說不同然衛文公以今年秋葬至是而衛成稱子則公羊之說信矣以未踰年也杜注非二十有六年春王正月己未公㑹莒子衛寧速盟于向傳尋洮之盟也望溪先生曰自文公以前外大夫㑹盟皆稱人而僖二十五年莒慶二十六年衛寧速皆名者蓋莒慶吾姻也故特書其名而衛寧速因例焉按春秋文公以前外大夫㑹盟稱人者惟殷㑹衆盟則然耳若専以事接于我則未有不名者如莊二十二年及齊高傒盟于防是其例矣洮向二盟據傳稱衛人平莒于我是皆専以事接于我者安得而不名乎然則隱元年宿之盟八年浮來之盟宋人莒人何皆以人稱也殆年逺或史失其名或及盟者宋非卿而莒則小國之大夫非吾親姻例皆不以名見故稱人耳安得執彼而疑此齊人侵我西鄙公追齊師至酅弗及傳討是二盟也按魯與衛盟而齊來伐者蓋以天下諸侯當惟已是從不當私相盟㑹也與謀衛伐宋同意侵稱人追稱師者人指其將而言追則自追其全師非止追其一將而已夏齊人伐我北鄙按傳稱齊孝公伐我北鄙而經書齊人者蓋先使大夫來伐而孝公特駐軍近地遙為之援耳故傳下文即稱公使展喜犒師齊侯未入境杜注得之但齊人不必微者辨見隱二年莒人入向下衛人伐齊傳洮之盟故也公子遂如楚乞師魯數被齊師而力不足以敵之故不得已而乞師于楚春秋所以詳書于策者蓋齊桓既汲宋襄急于圖伯雖不度德量力不足以繼一匡九合之烈然猶能以攘楚為事不得謂非伯舉也至齊孝有志復伯乃不能紹桓公恤災患畏簡書之意既與狄盟謀衛又乘宋之約而伐之至是又以魯與衛盟兩見侵伐以致魯僖向以荆舒是懲見頌于閟宫者一旦而降心相從以泄一時之忿魯則失矣然驅之而使合于僭王之楚者誰之罪乎故春秋據事直書一則曰齊人侵我西鄙再則曰齊人伐我北鄙乃繼之曰公子遂如楚乞師比事屬辭而聖人筆削之義可見矣胡氏顧専以黨衛即楚為魯罪豈得謂之近情之論乎秋楚人滅夔以夔子歸夔子不名義見莊十年齊師滅談下冬楚人伐宋圍緡傳宋以其善于晉侯也叛楚即晉楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取榖公至自伐齊傳凡師能左右之曰以置桓公子雍于榖易牙奉之以為魯援按楚師即伐宋圍緡之師書至者侈伐齊之功故歸而告廟也二十有七年春杞子來朝杞稱子義見二十三年杞子卒下夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公傳有齊怨不廢喪紀禮也乙巳公子遂帥師入杞傳杞桓公來朝公卑杞杞不共也秋入杞責無禮也按桓二年秋七月杞侯來朝九月入杞左傳亦以為不敬劉氏炫曰春秋雖亂世而來朝有少不敬未宜使入其國左氏誤紀為杞遂生不敬之說耳其說甚當但此年杞甫來朝而魯遽伐之與前事正相類所謂欲加之罪何患無辭亂世相凌暴之事未可以常理論也冬楚人陳侯蔡侯鄭伯許男圍宋楚稱人先儒以為貶者固失之又或謂傳稱楚子使子玉去宋則圍宋者乃子玉故稱人其說亦未為得也人字使果指子玉則春秋書戰伐必不以大夫先諸侯此何以先書楚人乎按正義楚子初來圍宋原身親在宋及見晉之盛身始去之其說于情事極合惟楚子先在宋後乃去之故春秋要其事之首尾不稱楚子而稱楚人所謂人者兼其君臣言之原不専指子玉所以序于諸侯之上也下文公㑹諸侯盟于宋其時楚子尚在宋故前目後凡十有二月甲戌公㑹諸侯盟于宋諸侯兼楚子在內公與楚有好聞其圍宋故往㑹之必無不見楚子之理先儒或謂諸侯専指陳蔡鄭許四國君由不知上文楚人原不専指子玉也其說恐不確二十有八年春晉侯侵曹晉侯伐衛傳楚子及諸侯圍宋宋公孫固如晉告急狐偃曰楚始得曹而新婚于衛若伐曹衛楚必救之則齊宋免矣二十八年晉侯將伐曹假道于衛衛人弗許還自南河濟侵曹伐衛按覆舉晉侯者侵曹既返而後伐衛兩事故覆舉春秋常文公子買戍衛不卒戍刺之傳公子買戍衛楚人救衛弗克公懼于晉殺子叢以說焉謂楚人曰不卒戍也按殺大夫未有書其故者此書不卒戍刺之所以見其辭之不直而公子買死非其罪不止為國體之所係而已稱刺者為內諱殺也楚人救衛蓋分圍宋之師以救衛也三月丙午晉侯入曹執曹伯畀宋人傳晉侯圍曹三月丙午入曹宋人告急公曰我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曺君而分曹衛之田以畀宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公說執曹伯分曹衛之田以畀宋人按傳稱分曹衛之田以畀宋人經書執曹伯畀宋人蓋傳聞異辭執曹伯承上入曹之文以入曹稱晉侯非稱侯以執也執諸侯大夫例稱人夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績傳楚子入居于申使子玉去宋曰無從晉師子玉使宛春告于晉曰請復衛侯而封曹臣亦釋宋之圍先軫請私許復曹衛執宛春以怒楚公悅乃拘宛春于衛且私許復曹衛曹衛告絶于楚子玉怒從晉師晉師退楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子慗次于城濮己巳晉師陳于莘北胥臣以下軍之佐當陳蔡陳蔡奔楚右師潰狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績按楚人得臣也大夫將例稱人齊宋秦皆稱師將卑師衆也傳稱宋公齊國歸父殆傳聞異辭以晉及楚者春秋內晉而外楚故以晉及楚不以楚及晉胡氏之說非傳有陳蔡而經不書者以兵屬右師也楚子入居于申蓋至是始去宋以避晉當未入申之先楚子原身親在宋也此圍宋之楚人所以序于四國之上歟楚殺其大夫得臣子玉剛而無禮城濮既敗正名加誅非濫殺也惜不能制之于早及陷于罪然後從而刑之耳衛侯出奔楚傳衛侯聞楚師敗懼出奔楚使元咺奉叔武以受盟衛侯不名胡氏以為著晉侯之罪非也諸侯失國出奔而名者以有二君也無二君則不名後獻公郕伯不名與此同其無二君而名者去國而不返也諸侯卒必名去國而不返則以是終矣北燕伯欵蔡侯朱莒子庚輿邾子益是也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土傳癸酉晉師還甲午至于衡雍作王宫于踐土五月丁未獻楚俘于王癸亥王子虎盟諸侯于王庭杜注踐土宫之庭按天子下勞不書諱之也王子虎蒞盟不書不同歃也葵丘書㑹宰周公此不書㑹王子虎者傳稱盟于王庭自不得不以王臣蒞之諸侯行㑹禮無在王庭之理所以不書王子虎者以王子虎蒞盟不與㑹故衛子叔武從喪未踰年之例稱子者晉立之為君也陳侯如㑹杜注陳本與楚楚敗懼而屬晉來不及盟故曰如㑹公朝于王所春秋傳信之書王下勞不書而書公朝于王所則其實自不可掩矣六月衛侯鄭自楚復歸于衛衛元咺出奔晉傳或訴元咺于衛侯曰立叔武矣其子角從公公使殺之咺不廢命六月晉人復衛侯衛侯先期入叔武將沃聞公至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之元咺出奔晉按諸侯返國例書復歸義具三十年衛侯鄭歸于衛下必名者既嘗失國矣復歸而目其人更始之義也歸于衛必書自楚者以三十年書衛侯鄭歸于衛蓋歸自京師也故此以自楚别之或曰大夫返國必書自諸侯何獨不然蓋諸侯返國其國乃其所自有雖出奔在外而義未嘗絶也不可與所奔之國暫時浮寄者相對舉故不書自若大夫出奔則與其本國絶而于其所奔之國反有臣事之義焉一新一舊不嫌對舉故書自公子返國嗣位非有奉不書自與諸侯同陳侯欵卒秋杞伯姬來吳氏澄曰杞桓公伯姬之次子繼其兄成公而立即來朝魯而為魯所卑又使卿帥師入其國故伯姬來以謝過公子遂如齊齊伐魯者再魯以楚師伐齊取榖至是晉文主盟中夏兩國不敢復相侵伐故魯使遂聘齊以講好而釋前怨也冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫傳討不服也杜注討衛許按陳蔡鄭許皆從楚圍宋之役楚既敗蔡鄭即從晉陳雖後盟亦來如㑹獨許最小弱而猶不改圖故晉文為此㑹合諸侯以討之衛侯既復國矣猶欲討衛者元咺訴之也天王狩于河陽傳晉侯召王以諸侯見且使王狩按晉侯之所以使王狩者蓋諸侯殷見燕享餼牽之費不資是時周室衰微物力匱絀故城濮戰後不難降萬乘之尊下勞㑹所以就諸侯之朝事雖失體然豈得已哉晉文亦知天子之以諸侯朝周為苦而下勞之事非義所安故特諷令以狩為名蓋曲體天子之意而為之省經費非已憚于朝王而故移天子使就已也安得以後世之强藩悍鎮以臣召君者擬之左氏傳仲尼云云似未可信河陽即溫也正義㑹指所在之地故言溫狩是田獵之所故廣言其地壬申公朝于王所晉人執衛侯歸之于京師傳衛侯與元咺訟衛侯不勝執衛侯歸之于京師按此與晉侯執曹伯歸于京師同文而上書晉人下增一之字者蓋之字指人而言執衛侯歸之于京師重在人蓋欲王為殺之也故曰歸之于執曹伯歸于京師則重在京師也有禀命天子之意焉故曰歸于成二年晉韓穿來言汶陽之田歸之于齊哀四年晉人執戎蠻子歸于楚一書歸之于一書歸于與此同義稱晉人者志在于殺强天子以從我非不敢自専請命于天子者比故從恆辭稱人衛元咺自晉復歸于衛諸侯返國例書復歸大夫則第書歸不書復此獨書復歸者元咺以臣訟君悍然不顧此一歸也將立公子瑕據有其國以與其君抗是雖不可從逆辭書入然使第書歸則與凡大夫之書歸者無别矣故特以復歸書蓋同之于諸侯以示譏也書自晉者大夫返國必書所自史文之常諸侯遂圍許諸侯即㑹溫之諸侯為討不服而㑹一事也故前目後凡書遂者義見六年諸侯遂救許下曹伯襄復歸于曹遂㑹諸侯圍許傳晉侯有疾曹伯之竪侯獳貨筮史使曰以曹為解公說復曹伯遂㑹諸侯于許按曹伯名胡氏以為貶非也諸侯返國無有不名者二十有九年春介葛盧來介國葛盧杜注以為名按附庸之君例稱字此稱名者介夷國或止有名而無字歟不稱朝不見公且不能行朝禮也然雖不見公國賔禮之故書公至自圍許兩事偶則以後事致例也㑹溫原為討許故不以㑹致而以圍許致按㑹溫致而盟踐土不致者蓋踐土之盟許不在列晉文將聲罪致討則盟踐土後必即告諸侯以伐許之事令各歸其國搜乘補卒以待徵發是溫之㑹雖在冬而盟踐土後已有晉命歸將復出故不以告廟也不告廟則不書至史之常文夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉傳尋踐土之盟且謀伐鄭也正義踐土及溫二㑹鄭伯咸在而此㑹謀伐鄭者文公昔嘗過鄭鄭不禮焉城濮戰前鄭復如楚雖楚敗之後畏威來㑹晉以大義受之內實懷恨故謀伐之也按公及外大夫盟㑹第書及諱之也此有王人在列亦諱公不書者諸侯不當與王臣共歃文十年及蘇子盟于女栗亦諱公不書是其例也王人據傳乃王子虎而稱人者以諸侯之大夫皆稱人而王人因例焉文當然也秋大雨雹傳為災也冬介葛盧來春來未見公故復來三十年春王正月夏狄侵齊傳晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也故侵齊秋衛殺其大夫元咺元咺顯與君訟無人臣之禮不可謂無罪而書法若此者亦原其事之始終而恕之耳及公子瑕殺叔武不書而書殺公子瑕者叔武之死前驅射而殺之非公意也瑕已立而不據周顓冶厪為文曰衛弒其君瑕者瑕為元咺所立不成乎其為君也衛侯鄭歸于衛傳晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之請納玉于王與晉侯皆十㲄王許之秋乃釋衛侯按諸侯返國例書復歸復者復其國也歸者歸其位也蓋對乎既之謂復對乎去之謂歸諸侯失國則其國既矣故曰復諸侯雖失國然猶是諸侯也天子無貶黜之文其位未嘗失也特去其位耳故曰歸衛侯鄭所以不言復者歸自京師也王者無外諸侯即不敢自外于天子諸侯而在于王所猶子而在于父母之側也國未失故不可言復其他如大夫歸不言復者國乃諸侯之國非大夫之國謂之歸其位則可謂之復其國則不可也其以惡者則曰入晉欒盈鄭良霄是也然公子返國雖不以惡而亦以入書蓋以公子出以諸侯入諸侯本非其位也故不可以言歸言歸既不可非入無以屬辭也然則突歸于鄭赤歸于曹又何以不言入也既絶之于其國矣不言歸無以著其為鄭與曹之公子也衛侯朔入于衛鄭伯突入于櫟又何以不曰復歸也國本非其國位亦非其位以篡而得之者也故謂之入而鄭伯突之入于櫟又與衛侯之入于夷儀有同義焉皆非其國都也然突之復歸于鄭不書衛侯衎繼此即書復歸于衛此又名不名之所以别也凡此皆隨事立文至當而不可易所為游夏不能贊一辭者歟晉人秦人圍鄭傳晉侯秦伯圍鄭以其無禮于晉且二于楚也鄭伯使燭之武見秦君曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰秦伯說與鄭人盟使杞子逢孫楊孫戍之乃還按晉侯秦伯稱人先儒以為貶非也據傳稱晉軍函陵秦軍汜南函陵在今襄城縣汜南在今中牟縣圍者環其城而攻之也然則晉侯秦伯特駐師近地遙為之援而圍其城者皆大夫也故稱人介人侵蕭張氏洽曰介再來魯而次年遂侵蕭求援而後出兵也冬天王使宰周公來聘公子遂如京師遂如晉自莊元年王使榮叔來錫桓公命之後王臣不至魯者幾六十餘年蓋莊僖之間王室多難未遑外事又隱桓間王亟加禮而魯不一報焉故王亦知空名不足以結魯而益怠也至是而復來聘者豈以僖公兩朝于王所而故以是寵之歟遂者繼事之詞而有歸重之意蓋著其本意原在聘晉因周公來聘故便道如京師以報之此聖人誅意之法也或以遂為即公子遂舍族者承上文從省不知春秋書法惟一事而接書其首尾則承上文從省如逆女以夫人至之類是也若兩事則未有不覆舉者如文八年公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴兩書公子未嘗單舉一遂字也則此為繼事之詞審矣三十有一年春取濟西田濟西田左氏傳分曹地也公羊傳班其所取侵地于諸侯按濟西田不繫曹則其為吾故田也審矣取者據此為文强諸人以相畀而非其心之所願也若于人無所强則據彼為文曰歸公子遂如晉傳拜曹田也夏四月四卜郊不從乃免牲猶三望啖氏助曰天子以冬至祭上帝又以夏之孟春祈榖于上帝于郊故謂之郊魯以周公之故特以孟春祈榖于上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也卜三旬皆不吉則不郊凡牲必養二牲一以祀上帝一以祀后稷帝牛不吉則改卜稷牛以代之而别以他牛為稷牛若卜稷牛不吉及稷牛又死亦皆不郊凡不郊皆卜免牲卜免牲吉則免牲不吉則但不郊而已不敢免繫牲待明年卜牲時卜用未成牲曰牛牲傷亦曰牛吳氏澄曰三卜不吉而至四卜四不吉而至五卜瀆甚矣汪氏克寬曰周官四望蓋望四方魯三望者蓋泰山在魯西海在魯東而河在魯北殺天子之禮也按魯僭郊禮先儒謂其所僭者只祈榖之郊其說恐不確宣三年春秋明書春王正月郊牛之口傷改卜牛牛死乃不郊矣非魯僭冬至郊之確證乎又按宣三年郊牛之口傷改卜牛牛死乃不郊正與啖氏稷牛又死亦皆不郊之說合而彼傳以為非禮杜注亦以牛雖傷死當更改卜郊不可廢又與啖氏之說異竊意稷牛又死自應不郊但不郊而望為非禮耳觀經文猶字可見若如杜注謂郊不可廢則春秋所書四卜五卜亦皆可以無譏矣豈理也哉秋七月冬杞伯姬來求婦求婦非禮也故書狄圍衛十有二月衛遷于帝丘吳氏澄曰狄去年侵齊今又圍衛若無晉伯然豈以文公居狄久而狎之歟帝丘亦衛地左氏傳卜曰三百年三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟傳夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟杜注不地者就狄廬帳盟按二十年齊人狄人盟于邢不主齊人書及此獨書衛人及狄盟者承上衛人侵狄之文故以衛人主此盟也冬十有二月己卯晉侯重耳卒按左氏載秦伯納文公及殺懷公于高梁其事甚詳而春秋不書者不告也三十有三年春王二月秦人入滑傳杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉召孟明西乞白乙使出師于東門之外及滑鄭商人弦高遇之使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉杞子奔齊逄孫揚孫奔宋孟明曰鄭有備矣滅滑而還按滅而書入者不能有其地也齊侯使國歸父來聘報二十八年公子遂之聘也遂聘齊已五年而後報者蓋間晉喪而有爭伯之意夏四月辛巳晉人及姜戎敗秦師于殽傳晉原軫曰秦違蹇叔而以貪勤民天贊我也遂發命遽興姜戎子墨衰絰夏四月辛巳敗秦師于殽按春秋兩國㑹兵例不書及此獨稱及者並有功也晉禦其上戎亢其下故能敗秦師非戎則晉雖角之而無犄之者矣杜注不同陳固非先儒又或謂並有怨則不書及戎與秦無怨惟晉命是從故書及其說亦不確五伯摟諸侯以伐諸侯豈皆並有怨哉晉襄親將不稱晉子而稱晉人者伏兵掩擊與兩陳相對不同晉襄雖墨衰從軍必不親履險地也故稱人秦下公羊無師字左氏榖梁俱有當從左榖癸巳葬晉文公狄侵齊傳因晉喪也公伐邾取訾婁秋公子遂帥師伐邾傳公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之杜注魯亦因晉喪以凌小國晉人敗狄于箕狄伐晉及箕晉師敗之郤缺獲白狄子吳氏澄曰秦晉同圍鄭秦私與鄭盟而晉文不忍伐其師狄嘗侵齊又圍衛而晉文從其冦中國蓋出亡在狄歸國由秦皆嘗受其惠也今晉襄紹伯惟恐伯威不立而伯業遂衰故汲汲焉墨衰從戎既敗秦而又敗狄也冬十月公如齊十有二月公至自齊張氏洽曰比事觀之間晉而虐邾所以因齊聘而朝之以自託也按十年十五年如齊皆不致而此獨致者事久則習且彼來聘而此往朝有施報之義焉故不以為諱而告廟也乙巳公薨于小寢不終于路寢言即安之非正也隕霜不殺草李梅實晉人陳人鄭人伐許傳討其二于楚也春秋究遺卷七
