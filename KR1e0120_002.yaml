body:
  text: 春秋究遺卷二左庶子葉酉撰桓公元年春王正月公即位魯桓簒立而王討不加聖人傷王法之不行故但書正月而王則削而不書宜矣顧其元年正月何以仍書王榖梁傳有王以治桓也果如其說則莊閔以下諸公無罪之可治者其元年正月即皆不應有王矣豈春秋示天下以大一統之㫖乎蓋隠公於去年十一月被弑桓元年正月即位其為時無幾王之討不討尚未可知既未能預知其必不討則王或竟為撥亂返治之王春秋安得而遽削之此元年正月之所以仍書王也然則正月不書王斷當自二年始矣而二年十年十八年三正月仍書王者何葢自二年至十八年一首一尾而十年適當其中前後相距各八年聖人之意以正月必書王者原示天下以大一統之義今雖以不能討賊傷王法之不行不得不削之以示譏然大一統之義要不可不明且周之正月尤不可不書王以别於建寅之正月也故特撮此三年仍書王正月以例其餘焉而此三年之正月仍書王則他年之正月不書王以不能討賊傷王法之不行其義愈曉然矣繼弑君不書即位此書即位者先儒謂桓行即位之禮故書即位果如其說則如莊閔僖三公之不書即位必皆縁其不行即位之禮可知矣莊閔僖三公既以繼弑君而心有所不忍故不行即位之禮桓公獨非繼弑君乎彼雖預聞乎故然傳言討寪氏有死者則隠公之弑不可掩方詐為自掩之計治斯獄矣若行即位之禮即為忍於先君不知彼何所快於片刻之觀美而顯示國人以其心之無所不忍哉蓋易世傳授國之大事無間於繼故繼正未有不行即位之禮者魯惟隠公志在讓桓攝位也故不以禮即位餘十一公則皆行即位之禮魯史亦皆書即位乃聖人因史作經獨於莊閔僖三公之即位不書者其義與弑君之不書葬正同葬者臣子之終事君父之仇未復即臣子之事未終故不書葬位者受之天子傳之先君苟未能復先君之仇即不可踐先君之位故不書即位皆責以不共戴天之義非縁其不行即位之禮也知三公之不書即位非縁其不行即位之禮則桓宣二公之書即位必非縁其行即位之禮也又何疑乎彼其所以書即位者蓋二公皆預聞乎弑豈可以復仇之義責之而二公書即位則天子方伯之不能討賊其罪亦遂不待貶絶而自見矣此又蔡景許悼二公之所以書葬與三月公㑹鄭伯于垂鄭伯以璧假許田傳公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也按隠公之世鄭伯歸祊原未嘗有覬覦許田之心只欲求成於魯以離宋之黨耳及桓立而以璧假之者葢鄭莊與魯隠鄰好夙敦又親遭叔段之亂今見桓簒弑公惡之良尚未盡冺但其為人也明於利害不能勝以理義之心故見賊雖欲討而恐其力有不能又欲因以為利故前歸之於隠者至是乃欲取償於桓葢挾以不得不從之勢若其不與將不待十年而問罪之師早至於城下矣觀垂之㑹而不盟必以璧假田之後而始盟于越則當日之情事顯然可見其曰假者葢無故而欲許田於辭不順故以假為文而春秋亦書以璧假者所以著其脅取之實也若但書曰鄭人取許田則與宣公元年齊人取濟西田同文似桓亦如宣之納賂以請㑹矣假田稱鄭伯義見鄭伯使宛來歸祊下夏四月丁未公及鄭伯盟于越胡氏安國曰垂之㑹鄭為主也故稱㑹越之盟魯志也故稱及此拘於我所欲曰及外為志曰㑹之例耳辨詳隠元年公及邾儀父盟于蔑下桓以簒立故欲修好於鄭其㑹于垂也豈得謂非我所欲哉秋大水冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父初宋穆公舍馮而立與夷使馮出居鄭與夷既立而鄭莊公欲納馮于宋於是鄭宋屢相侵伐華督馮之黨也將弑與夷而憚孔父故先攻殺孔父殤公怒則弑之遂召馮而立焉按孔父據左氏傳孔父嘉為司馬則孔父乃其字而胡氏以為名春秋於列國之大夫皆名而孔父乃聖人六世祖榖梁為祖諱之說似得其實無駭以公子展之孫故公命以字為展氏孔父之後皆孔氏則其為字無疑君前臣名之說穿鑿不可從荀息仇牧之稱名豈以名其君於上之故乎胡氏以稱名為貶故從而為之辭弑君名猶君卒則名也滕子來朝滕侯爵稱子者杜註旹王所黜沙隨程氏謂列尊貢重故小國降爵以從殺禮其説亦通或謂吳楚僭王春秋既皆從周班稱子矣使滕果自降自當從周班稱侯豈得徇其私意以亂名實不知稱子非稱王比也滕既自降則當其來朝之時魯自以子禮待之春秋安得不以子書如杞本伯爵至襄二十七年來朝魯以子禮待之春秋亦遂以子書矣何獨於滕而疑之但為時王所黜之說亦無以見其必不然存叅可也三月公㑹齊侯陳侯鄭伯于稷以成宋亂傳為賂故立華氏也按成平決也即周禮訝士四方有亂獄徃而成之之成華督弑君之賊大司馬有殘之之文此豈可以司冦之法治之者今公不能聲罪致討徒利其寶貨之賂牽率與國以平決之於是以馮為先君之子父死當繼以與夷本不當立又十年十一戰民不堪命而督之弑與夷謂其非忍動於惡也原以為立馮地遂立之為宋宗卿雖得罪於宋殤公名在諸侯之籍其後世子孫猶能言之而公亦有所不顧矣春秋書㑹例不言其所為此言其所為者惡其假簡孚之名以寛亂賊之誅而傅之輕典也辭嚴義正仍止據事直書先儒以成作成就之成解則幾於詈矣聖人豈有此惡聲耶夏四月取郜大鼎于宋戊申納于太廟臧哀伯諫不聽其事與臧僖伯諫觀魚相似而僖伯之卒見於經哀伯之卒不書者蓋桓之大夫皆有可誅之罪哀伯之諫納郜鼎所謂不能三年之喪而緦小功之察者故不書卒秋七月杞侯來朝程子曰凡杞稱侯者皆當為紀杞爵非侯文誤也劉氏炫曰左傳云杞侯不敬歸乃謀伐之春秋雖亂世而來朝有少不敬未宜便入其國也左氏誤紀為杞遂生不敬之說耳蔡侯鄭伯㑹于鄧傳始懼楚也公羊云離不言㑹此其言㑹何葢鄧與㑹耳劉氏炫曰非也二國實行㑹禮非㑹而何按鄧蔡地非鄧國也正義辨之甚詳九月入杞公及戎盟于唐冬公至自唐傳修舊好也特相㑹徃來稱地讓事也杜註二人相㑹莫肯為主兩讓㑹事不成故但書地按及戎盟不書㑹以但行盟禮而不行㑹禮也不行㑹禮故不以㑹致豈兩讓之謂哉然謂㑹事不成猶之可耳若定八年㑹于瓦十年㑹于夾谷十二年㑹盟于黄皆明明行㑹禮矣而亦不以㑹致則以兩國特㑹究不與殷㑹等其以地致者不足乎㑹之辭也如傳云云尤非其事之實矣望溪先生曰盟唐而至者懼戎也隠之盟戎不至而桓致者戎與魯接壤鍾巫之事時懼諸侯之討而以盟戎為幸也三年春正月正月不書王何也蓋正月書王示天下大一統之義聖人欲以王法治天下也乃弑君之賊竟出於周公之裔而王討不加四鄰諸侯亦無有沐浴之請王法之所以治天下者安在乎然聖人非拘拘焉靳此一字也王法不行則王之一字為虚設而聖人之心至誠無偽自不容此虚設之一字犯其筆端耳此春秋所以為傳心之要典歟公㑹齊侯于嬴公欲昏于齊故㑹齊侯于嬴此我所欲也而書㑹益見外為志曰㑹之謬夏齊侯衛侯胥命于蒲張氏洽曰春秋時王政不綱諸侯放恣荆楚僭横莫有任中國之事者齊衛為列國之望欲起而圖之遂私以牧伯相命如戰國時齊魏㑹於徐州以相王乃其遺智也按此説本之朱子確不可易公羊乃以為近正非也齊僖衛宣豈能相諭以信不復要質於鬼神者哉且考詩衛風旄丘篇黎臣嘗責衛以不能修方伯連帥之職矣衛之國勢不甚强使非嘗以牧伯與齊相命黎臣豈宜以是責之此亦其一證然則二君既以牧伯相命而經止以胥命書者何諸侯當奉天子之命以行事命者上施於下之詞今不惟命是奉而彼此相命其目中尚有天子乎聖人以是為伯事之所由始而惡其以諸侯而目無天子也故特以胥命書其不更贅一詞者以義止係乎胥命故耳胥命猶言自相署置也又按魯之國勢較强於衛而桓公為惡之才尤非衛宣淫昏者比乃齊僖圖霸不與魯胥命而與衛者以簒立之人不可以方伯連帥之事命之也觀此則十年郎之戰其必以寪氏之獄無所歸為問也益信六月公㑹杞侯于郕公羊作紀與六年夏同杞侯來朝公羊亦作紀程子謂杞爵非侯凡稱杞文誤也則此當從公羊決矣秋七月壬辰朔日有食之既公子翬如齊逆女翬為桓弑隠故為桓逆女以結好於齊所以定桓之位而因自固也翬稱公子說詳隠四年翬帥師下九月齊侯送姜氏于讙杜註已去齊故不言女未至魯故不稱夫人公㑹齊侯于讙夫人姜氏至自齊杜註告于廟也不言翬以至者齊侯送之公受之于讙冬齊侯使其弟年來聘傳致夫人也杜註古者女出嫁又使大夫隨加聘問存誠敬叙殷勤也年何以稱弟望溪先生曰稱公子者大夫也稱兄弟者不任職也說詳隠四年翬帥師下有年望溪先生曰二百四十年惟桓宣之世一書有年一書大有年承嵗祲也隠五年螟八年螟桓元年大水故三年有秋喜而誌之宣自即位後螽蝝水旱史不絶書故十六年大有秋喜而誌之四年春正月公狩于郎蒐狩或書公或不書公望溪先生曰書公者公之私行也不書公者國政也狩于郎非地也蒐狩有常地自昭以前狩非其地者獨此知然者以大閲得其地則不地也至中軍既毁三桓擅國不獨軍政變而蒐狩之地亦惟其所便而不主故常矣夏天王使宰渠伯糾來聘渠氏伯行次也杜註伯糾名也殆伯達伯适之類歟伯糾何以名詳具隠元年宰咺歸賵下不書秋冬先儒謂以宰糾來聘故去秋冬非也設此年秋冬有事遂皆去而不録乎望溪先生曰缺文也五年春正月甲戌己丑陳侯鮑卒傳甲戌己丑陳侯鮑卒再赴也於是陳亂公子佗殺太子免而代之陸氏淳曰甲戌下文脫按明年書蔡人殺陳佗此無不書佗殺太子免之理甲戌下脫文即佗殺免事無疑但先儒以長歴推算甲戌在桓四年十二月二十一日己丑在桓五年正月六日今並書正月此則不可解按困學紀聞嘗謂長歴不足信夏齊侯鄭伯如紀齊甫與衛胥命而此役無衛者詐朝而襲人之國豈方伯連帥之事哉鄭莊奸雄之才齊僖與之好合故二君同心而如紀也天王使仍叔之子來聘仍叔之子未有職司於王室者也譏使童子出聘與使宰書官義同葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭傳王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗按王以諸侯伐鄭經乃據從王者為文何也天子討而不伐大司馬九伐之法皆命方伯連帥主兵故謂之伐伐者敵辭王不可以言伐也然天子既親在行若非書伐又不得其事之實矣據從王者為文此春秋謹名分之一端歟據從王者為文故王不稱天王卒大敗不書不忍言也大雩雩謂之大者諸侯之雩禱境内山川及百神耳今魯雩及上帝用盛樂故特謂之大葢魯之僭禮欲悉著於䇿則有不勝書者惟因旱而雩即變文以書曰大雩而其義自見此舊史之所不能預者也螽冬州公如曹州稱公與祭公同外相如不書此何以書以其來魯故六年春正月寔來淳于公自曹來朝不書州公承上如曹間無異事故從省文成二年傳王曰所使來撫予一人而鞏伯寔來夏四月公㑹紀侯于郕傳紀來諮謀齊難也按五年齊與鄭同謀襲紀紀覺之故來諮于魯也公既頻與紀㑹而齊好遂不終矣於是有郎之師秋八月壬午大閱是年北戎伐齊諸侯之大夫戍齊不書者葢齊强其力自足以禦戎諸侯之戍特欲為好於齊耳非救災患恤小弱者比春秋輕其事故不書也杜註缺文恐不確非時簡車徒殆郎之兵端已見故懼而修備歟蔡人殺陳佗陳桓公卒陳佗弑太子而自立陳厲公蔡出也故蔡人殺佗而立之簒弑之賊討之不閒於鄰國故曰春秋成而亂賊懼九月丁夘子同生書子生十二公惟此一見以其舉之以太子生之禮也此與書娶夫人其義正同凡子生而不舉之以太子生之禮輒不書子生則娶夫人而不行親迎之禮即不書娶夫人也奚疑冬紀侯來朝傳請王命以求成于齊公告不能杜註公無寵於王故告不能按八年祭公逆王后於紀魯為之主婚矣何言不能請命也當由齊欲滅紀魯畏齊强不敢顯言為紀求成耳七年春二月己亥焚咸丘焚火田也譏盡物故書夏穀伯綏來朝鄧侯吾離來朝逺方小國之君經不再見故特詳其名先儒以為貶非也桓之立也天王且屢遣使來聘矣于榖鄧乎何誅不書秋冬與四年同先儒以為因二國來朝故去秋冬亦非也設此年秋冬有事亦將去而弗錄乎竊意竟時無事則書首時者舊史本有事而聖人削之故存其首時其舊史本無事者則舊史必不書首時聖人亦仍之而已因此悟莊公二十二年書夏五月先儒疑五當為四是固然矣抑或凡書首月者舊史首月皆有事獨此年夏四月無事而五月有事故存五月亦可備時不必拘定首月歟八年春正月己夘烝周之正月夏之仲冬當烝祭之月也常事書者以五月復烝故先録此天王使家父來聘家父杜註以父為字望溪先生以為名王朝之大夫稱名例也但古未有以一父字為名者殆家父二名如禄父行父之類歟不稱氏者宰咺亦不稱氏史文之常錫桓公命王不稱天此於王無貶辭何也桓之篇正月不書王已足以概之故又按小雅作誦之家父或疑即此家父非也小雅之家父賢者也彼豈肯聘於弑逆之賊况求車更為失體即力不能止其事何至以身充使且其詩編於宣王之後小弁之前其為刺幽王詩無疑時之相去已七十餘年其必非一人尤彰彰明矣夏五月丁丑烝非時復烝黷亂甚矣故書秋伐邾冬十月雨雪建酉之月而雪記異也祭公來遂逆王后于紀祭公來不稱使胡氏謂不予王之使祭公非也公羊傳曰昏禮不稱主人故紀履緰來逆女亦不稱使紀季姜在國而稱王后顧氏炎武曰從逆者而言謂之王后從歸者而言謂之季姜此自然之文也其說是矣然何以不曰遂如紀逆女乎嫌與諸侯夫人同文所以尊王后也書遂逆者天王娶后使魯主婚魯既報可於王矣至是祭公乃過魯問期隨即如紀逆后故書曰遂以來魯本意原為逆后也胡氏引劉敞之說以専命不報為祭公罪恐不確九年春紀季姜歸于京師歸而稱紀季姜者從歸者為文是固然矣抑以下書歸於京師以天子臨之故不得不稱紀季姜以示后之不敢敵王也夏四月秋七月冬曹伯使其世子射姑來朝曹伯有疾故使其子來朝十年春王正月十年書王義見元年正月下天道一周之說穿鑿不可從庚申曹伯終生卒夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇杜註衛侯與公為㑹期中背公更與齊鄭故公獨徃而不相遇也冬十有二月丙午齊侯衛侯鄭伯來戰于郎傳六年北戎伐齊諸侯救之鄭太子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衛師助之按左氏此説不足信以周班後鄭魯之所持者正且其事甚小鄭忽若遽以是請師是自輸其不直矣齊雖徳鄭亦安肯助此無名之舉哉此殆魯人之飾辭左氏誤信焉而不之察耳當春秋之初齊僖具奸雄之才有圖霸之志故嘗與衛胥命於蒲所謂胥命者葢相命以方伯連帥得専征討之事也當時有能舉方伯連帥之職者征討之所加孰有先於魯者故三國來戰必以鍾巫之事興問罪之師蓋齊主兵而衛與鄭從之衛與齊胥命於蒲而石門之盟鄭與齊之交本固故皆從齊非鄭請師而齊以衛助之也知其必以鍾巫之事興問罪之師者以春秋來戰之文知之也疆場之事一彼一此通春秋二百四十二年之中書來戰者惟此一見蓋春秋魯史凡魯與外諸侯戰皆主魯書及内之也今魯有罪而三國伐之若仍書曰公及某某戰於郎則是内有罪之魯而三國仗義執言反為聖經之所外而與擅兵伐國者等所為春秋成而亂賊懼者安在乎故特以來戰書而其序三國也必以齊衛先鄭而不以鄭主兵其事之情實顯然可見左氏乃誤信魯人之飾辭後儒解經者從而和之且謂鄭主兵而先齊猶衛州吁主兵而先宋真可謂之遁辭矣宋之先衛謂為誅亂賊之黨猶之可也齊不可謂亂賊之黨也明矣乃鄭主兵而先之何說乎然則其遲至十年而後來討何也葢鍾巫之事其名也而其所由以昏姻之國而剪為仇讐者則釁生於紀蓋紀處齊肘腋之下齊之狡焉思啟其封疆而欲甘心於紀也非一日矣乃桓與之再㑹於郕三年六年紀又兩朝於魯齊見公之與紀親也而其怒已不可解至八年又為紀謀納女于王以為重九年紀季姜歸于京師於是齊怒益甚乃藉口於鍾巫之事以加兵于魯蓋假公以濟私故遲至十年而後有此戰也抑因是愈見左氏鄭太子忽請師之說不足信葢戍齊之事在六年距此亦已五年矣請師在五年前來戰在五年後有是理乎十有一年春正月齊人衛人鄭人盟于惡曹稱人大夫也三國之師既退復各使其大夫為是盟者圖復舉耳十三年而齊宋衛燕之師至城下矣傳有宋杜註經缺按宋與盟則十三年宋㑹師愈有根據夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲鄭莊公娶鄧曼生忽立為世子又納宋雍氏女生突莊公卒祭仲立昭公而雍氏宗有寵於宋莊公欲立其出故誘祭仲而執之曰不立突將死亦執突而求賂焉按執諸侯大夫例稱人而不稱爵或以為貶非也春秋於外諸侯之事凡若此類其恒稱云爾説詳隠六年鄭人來輸平下祭氏仲行次也諸侯之大夫不應以行次稱此與魯之單伯單與祭皆周之貴族先儒或引王制天子使其大夫監於方伯之國國三人之文疑其為監國之大夫其說不為無據惟為監國之大夫故仍從周卿士例以行次稱傳稱仲乃祭之封人有寵於莊公而使為卿是時卿大夫皆世官必無以封人為卿之理也如莊二十五年書陳侯使女叔來聘二十七年書公子友如陳葬原仲恐亦此類至僖十五年書震夷伯之廟則夷伯已死又不可以尋常内大夫例之矣突歸于鄭突不係鄭者著其不當有鄭也凡公子争國例書入如齊小白入于齊莒去疾自齊入于莒齊陽生入于齊之類皆是獨此與赤歸于曹書歸者葢既不以國氏使又不書歸則無以著二人為鄭與曹之公子矣鄭忽出奔衛按諸侯出奔必書爵而鄭忽及曹羈莒展輿獨書名先儒謂不成君非也鄭忽立已五月先君已葬例應稱子至曹射姑則於莊公二十三年卒二十四年三月葬至冬而羈始出奔莒宻州于襄三十一年被弑展輿於昭元年秋出奔皆已踰年矣例應稱爵安在其不成君哉葢春秋道名分以五等之尊而至於出奔則名分何在故必書爵以著其變若兄弟爭國而至於出奔則釁生骨月又不止名分之變矣聖人心傷其事以其變不止在名分也故不稱子稱爵而一歸一出彼此皆名其故為是對舉之文者所以著其以分形連氣之人而忍於相軋也此與昭十一年楚子䖍誘殺蔡侯般䖍與般皆以名見其文法正同以國氏者先儒謂聖人以忽為正故係國亦非也出奔與返國不同返國必當立者乃係國出奔則未有不係國者蓋著其本國對下所奔之國為文不問其正不正也觀莒展輿之出奔亦係國則忽之係國不以其正可知矣柔㑹宋公陳侯蔡叔盟于折桑魯大夫未賜族者蔡叔杜註蔡大夫叔名也望溪先生曰古未有以伯仲叔季名者且於季曰字于叔曰名非所安也以情事推之叔乃蔡侯封人之弟封人老而無子將以承國故使㑹盟非卿大夫也故不稱公子承國非承嗣也故不稱世子而以行次稱世子列㑹皆以名見而叔不名何也世子以名見固知其為世子也以名而係於叔則與卿大夫無别矣其不稱蔡侯之弟何也經所書某氏之子某君之弟皆無位之稱也然則叔為蔡侯之弟而將以承國也審矣盟於折者未能信於宋而以柔先之也公㑹宋公于夫鍾臣與宋公盟于折君與宋公㑹于夫鍾於闞明年又㑹于虛于龜蓋公與鄭突皆簒立聲勢相倚而宋自納突之後以責賂生隙故公不憚屈己力為突請以固宋交而定其位也闞魯地夫鍾亦近魯其㑹也殆宋志欲因魯以責賂虛龜與榖丘皆宋地其㑹也殆魯志欲為突請免賂迨宋公辭平而武父之盟遂相約伐宋矣冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹杞侯莒子盟于曲池傳平杞莒也杜註隠四年莒人伐杞自是遂不平按程子曰杞非侯爵凡稱杞侯皆當作紀公羊此經亦作紀左氏平杞莒之說恐不足信秋七月丁亥公㑹宋公燕人盟于穀丘傳公欲平宋鄭葢宋納突于鄭求賂而後使之入突入國之後不能償其責言遂成仇隙故公欲平之宋公與燕人並與盟燕小國聽於宋者也宋好不成而燕即隨之此十三年之戰所以宋公及燕人並書八月壬辰陳侯躍卒公㑹宋公于虛冬十有一月公㑹宋公于龜按傳㑹于虛又㑹于龜宋公辭平則内為主可知而書㑹益見外為志曰㑹之例不足據丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒孫氏曰再書丙戌羡文十有二月及鄭師伐宋丁未戰于宋傳宋公辭平故與鄭伯盟于武父遂帥師伐宋望溪先生曰先儒謂戰于宋與來戰于郎之義相發而弊罪内外非也内師外師之非義有過於二役者矣而於二役特文以罪之則輕重之衡失矣來戰于郎與齊宋衛燕之戰為類者也戰于宋與衛人及齊人戰為類者也既書齊人伐衛復書衛人及齊人戰于衛則贅矣既書及鄭師伐宋復書宋人及我師鄭師戰則亦贅矣其或地或不地文當然耳按春秋序戰例以受兵之國主兵今宋為受兵之國既不可云我師鄭師及宋師戰而春秋内魯而外列國又不可云宋師及我師鄭師戰也故以戰于宋為文蓋辭有所窮焉耳非避其文之贅也上既無宋人及之文下自不得不地及不書公微者也使微者㑹伐不欲竭己之兵力也戰而先書伐者已薄其城邑而後出戰也其不先書伐者敵未迫而逆戰也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績左氏以為鄭與宋戰榖梁以為紀與齊戰趙氏曰内兵以紀為主外兵以齊為主若實為宋鄭戰何以主齊紀乎葢齊與三國之師伐紀欲滅之公與鄭救之而勝也胡氏張氏俱從之望溪先生曰戰未有不地者使戰于紀則當書四國伐紀戰于齊則當書公㑹紀侯鄭伯伐齊葢齊宋之怨結于紀鄭而魯居其間故四國來伐而魯援紀鄭以拒戰也其説本公羊但謂齊宋之怨結于紀鄭乃舍紀鄭而伐魯於情理不順且以齊主兵而序於宋上何説乎竊意齊既以鍾巫之事興問罪之師乃未能得志於魯一戰而退同役之國必有掣其肘而不得不退者故申之以惡曹之盟至是又結衛宋燕以伐之蓋亦猶是郎之志也知然者以春秋書戰之文知之凡兵未至而逆與之戰者例書戰而不書伐若已薄其國都而後與之戰則伐與戰兩書莊二十八年齊人伐衛衛人及齊人戰是其例也今兵已薄國都矣而不書伐者葢聲罪致討此曲彼直故不得不以伐為諱耳此與郎之戰不主魯書及其義正同彼例不應書伐故以不書及見義此例應書伐故以不書伐見義也而魯所以援紀鄭以敵之者蓋紀與魯親而鄭與宋仇也外兵以齊為主故序於宋上紀侯爵故序於鄭上其戰不地城下之師公羊所謂近於圍也燕人大夫也傳曰惟卿為大夫燕小國必不敢使微者㑹師其敗績稱師者重衆也師與人連文不嫌於將卑師衆三月葬衛宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹傳曹人致餼禮也無冰夏五鄭伯使其弟語來盟語稱弟詳具隠七年齊年來聘下秋八月壬申御廩災不書復作常事也乙亥嘗誌不時也周之八月夏之六月也冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭傳報宋之戰也按此書宋人以益知十三年左傳鄭以紀魯及四國戰之説不足據果如其説經何以不書鄭以乎十有五年春二月天王使家父來求車家父詳八年來聘下三月乙未天王崩按桓王之後為莊王莊王之後為僖王莊王於莊公十二年崩僖王十七年崩經皆不書者周不訃也其不訃何也望溪先生曰天下諸侯宜親周者莫如魯王恩禮所加亦莫如魯惠公仲子之賵天子之宰親焉而平王之葬魯不㑹也錫桓公命榮叔實來而桓王之葬魯乃使微者徃此莊僖二王之喪所以不訃也當是時齊桓創伯而不能率諸侯以達王事何也齊桓之霸也與晉文異晉文之興霸者之轍迹已前見矣故曰求諸侯莫如勤王齊桓之前則未有是也非先得諸侯不能致勤於王室而方是時齊桓始入諸侯尚渙也故師于長勺而魯敗之㑹于北杏而宋叛之再㑹于鄄而鄭叛之同盟于幽而魯叛之以信則未孚以威則未懾諸侯方􅍀然自外於齊而安能使帥王職哉直至僖公之世退狄伐戎帖楚然後諸侯服霸勢成而尊王之事起著於經者可考也魯事周之勤怠一視乎霸迹之盛衰文九年葬襄王叔孫得臣如京師至十四年而頃王之崩葬無聞焉則文襄既殁而霸統中絶也自宣以後天王之崩葬無不志者以晉霸雖衰而㑹盟征伐嘗假王命以屬諸侯也景王之葬叔鞅如京師以平丘之㑹劉子實蒞之也自齊桓創霸晉文繼之然後諸侯知有王觀莊僖二王崩葬之不志則霸者之功不可掩矣觀桓文以後諸侯卒無親赴天王之崩葬者則霸者之罪亦不可掩矣抑於此見經因魯史有所損而不能益焉天王崩葬雖易世以後猶可考而知而魯史所無者不敢益也非不能益也益之而悖慢之實隠矣其文則史而義即於是取焉此其較著者也夏四月己巳葬齊僖公五月鄭伯突出奔蔡傳祭仲専鄭伯患之使其壻雍糾殺之雍姬知之以告仲仲殺雍糾公出奔蔡按不書逐陸氏淳曰君而見逐其惡甚矣聖人之教在乎端本澄源故以自奔為文所以警乎人君其說非也逐者上施於下之辭以臣逐君聖人之所不忍言也故以自奔為文若謂警人君書逐不更足警乎突稱名者望溪先生曰諸侯出奔而名者國有二君也鄭伯突名以忽也衛侯朔名以黔牟也北燕伯款當亦類此按襄十四年衛侯出奔齊國人立公孫剽是有二君矣而衎不名葢突與朔皆簒立故忽與黔牟得成其為君衎非突與朔比剽嘗北面而臣之矣不得為二君也故衎不名昭三年北燕伯𨽻出奔齊二十一年蔡侯朱出奔楚皆名從此遂失國也又非以國有二君故鄭世子忽復歸于鄭諸侯返國例書復歸稱世子者忽立五月而出奔未踰年也諸侯踰年即位未踰年則未即位例應稱子不可稱鄭伯也然莊公之卒去忽復歸之時已五年矣突稱鄭伯而忽仍從其初喪之稱非所安也稱子稱爵兩無所處不得不以世子稱葢辭有所窮也而稱世子則其當得國可知又不與鄭伯突相混而經文後此所稱鄭伯皆指突一人遂不待别白而自見矣許叔入于許許叔以行次書者説詳莊三年紀季以酅入於齊下入者由外而内之辭許叔自東偏而入許之國都東偏非外也乃言入許者何葢許中并於鄭其國都久已非許之所有矣故可言入也公㑹齊侯于艾傳謀定許也葢鄭原與齊魯同入許許并於鄭非齊魯之所利故因許叔入許遂為此㑹而謀定其位也邾人牟人葛人來朝杜註三人皆附庸之世子也其君應稱名故其子稱人按附庸之君例應稱字義詳隠元年公及邾儀父盟于蔑下杜註以為應稱名恐不確秋九月鄭伯突入于櫟入櫟不應書名衛侯入于夷儀不書名是其例也此因突之復國不書故入櫟特名而入櫟書名則其後之復國不書非文有所缺以書歸書入兩無所處故以不書𤼵疑端而見情實其義愈曉然矣説詳莊十四年單伯㑹伐宋下櫟非國都故書入又與衛侯朔入于衛有同義焉葢國本非其所有也不書自蔡者諸侯復國例不書自說見僖二十八年衛侯鄭自楚復歸于衛下冬十有一月公㑹宋公衛侯陳侯于袲伐鄭傳將納厲公也按連數國之師必致此不致者不克而還將圖再舉故不以告廟也十有六年春正月公㑹宋公蔡侯衛侯于曹未能納突故復㑹再邀蔡黨益盛矣夏四月公㑹宋公衛侯陳侯蔡侯伐鄭蔡序衛下蓋後至按杜註春既謀之今書㑹者魯諱議納不正其說非也盟則或書㑹或書及侵伐皆書㑹十二年公㑹鄭伯盟于武父十有二月及鄭伯伐宋蓋遣微者㑹伐故書及若君卿將無不書㑹者杜葢據左氏與謀不與謀之說從而為之辭至隠十年公㑹鄭伯于時來秋及齊侯鄭伯入許不書㑹而書及者蓋伐可書㑹入則不可以書㑹文當然耳豈預謀之謂哉或謂㑹伐亦必先行㑹禮故書㑹說亦太泥㑹有以此就彼之意對盟而言必先行㑹禮乃書㑹㑹伐則不必先行㑹禮也倉猝相遇禮猶從殺軍旅之際更可知矣秋七月公至自伐鄭連數國之師夏出而秋還兵力已疲權欲休息不圖更舉矣故書至冬城向十有一月衛侯朔出奔齊傳衛宣公烝於夷姜生急子屬諸右公子為之娶於齊而美公取之生夀及朔屬夀於左公子夷姜縊宣姜與公子朔搆急子公使諸齊使盜待諸莘將殺之夀子告之使行不可飲以酒夀子載其旌以行盜殺之急子至曰我之求也又殺之二公子故怨惠公十二月立公子黔牟惠公奔齊按左氏宣公烝夷姜之說不足信烝父妾而有子必在即位之後宣公於隠四年即位至桓十二年卒計在位僅二十年耳即使元年生急子急子十五年而娶妻宣公奪之生夀及朔至宣公卒時二子皆襁褓耳夀安能載其兄之旌以行而朔又安能於桓公十三年即稱侯以接鄰國也據史記只稱夫人夷姜無烝父妾之說似得其實衛侯朔名義見十五年鄭伯突出奔下是年左氏記鄭高渠彌弑昭公而立公子亹經不書者魯桓崇奸醜正怨鄭忽而助突故昭公之弑子亹之立鄭皆不以告不告故不書十有七年春正月丙辰公㑹齊侯紀侯盟于黄傳平齊紀且謀衛也葢紀與魯親而衛朔在齊故齊欲納朔而魯欲平紀二月丙午公㑹邾儀父盟于趡夏五月丙午及齊師戰于奚及不書公微者也疆場之事無損于好六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡按季或疑即獻舞果爾則當書蔡季入于蔡不當書自書歸矣稱行次者詳具莊三年紀季以酅入于齊下蔡季奔不書者不告故癸巳葬蔡桓侯啖助曰蔡桓稱侯葢蔡季之賢知請諡也杜註葢謬誤及宋人衛人伐邾杜註邾宋爭疆魯從宋志冬十月朔日有食之傳不書日官失之也十有八年春王正月正月書王義見元年正月下公㑹齊侯于濼公與夫人姜氏遂如齊變及言與何及者連類之詞以此及彼蓋主乎公以為文也公及夫人偕行至濼其如齊也乃行㑹禮後自濼如齊非自魯如齊也偕行不自濼始不可主乎公以為文矣故曰與言遂者著公與夫人之本意原在如而不在㑹也夏四月丙子公薨於齊丁酉公之喪至自齊傳公及文姜如齊齊侯通焉公謫之以告四月丙子享公使公子彭生乘公公薨於車魯人告於齊曰寡君畏君之威來修舊好禮成而不返無所歸咎惡於諸侯請以彭生除之齊人殺彭生按文姜隨喪而歸不書罪大惡極絶之也秋七月按左氏於是年秋記齊侯師于首止殺鄭子亹而轘髙渠彌祭仲逆鄭子於陳而立之經不書者鄭與魯邦交乆絶齊又以魯有大喪方内慙彭生之事故皆不以告不告故不書冬十有二月己丑葬我君桓公仇不復不書葬桓公書葬何望溪先生曰敵國相仇臣子雖志於復而不能必其時也而先君之喪又不可以乆而不葬也故與蔡靈公别為一例而書葬此義理之權衡也春秋究遺卷二
