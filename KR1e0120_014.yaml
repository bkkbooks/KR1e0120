body:
  text: 春秋究遺卷十四左庶子葉酉撰昭公下十有六年傳公在晉晉人止公不書諱之也按晉前以取郠既不使公與盟今往謝而復執之晉之無禮甚矣而春秋諱之益知胡氏自反而縮之説迂而不可通春齊侯伐徐傳齊師至于蒲隧徐子行成賂以甲父之鼎楚子誘戎蠻子殺之傳楚子聞蠻氏之亂也使然丹誘戎蠻子殺之遂取蠻氏既而復立其子焉按戕隣國之君稱人僖十九年邾人執鄫子用之是其例矣此獨以楚子書者挾詐以殺人其隂險尤為聖心之所惡惡其詐自不得不目其人也戎蠻子不名與鄫子不名同義夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公卿供葬事文襄之制十有七年春小邾子來朝夏六月甲戌朔日有食之傳六月甲戌朔日有食之祝史請所用幣平子禦之曰止也惟正月朔伐鼓用幣太史曰在此月也杜註正月謂建巳正陽之月于周為六月于夏為四月秋郯子來朝八月晉荀吳帥師滅陸渾之戎傳荀吳帥師渉自棘津使祭史先用牲于雒陸渾人弗知師從之遂滅陸渾數之以其貳于楚也陸渾子奔楚冬有星孛于大辰楚人及吳戰于長岸楚先勝而後敗勝負敵故不書楚稱人者說詳隠二年莒人入向下吴常敗楚于鵲岸于房鍾皆不書而楚伐吴屢見于經葢吳猶不足以敵楚也至是則國勢匹敵而抗兵相加矣故書戰自此始長岸楚地兩國皆僭王故仍以楚主兵十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災杜註來告故書天火曰災按傳稱許不弔災君子知其先亡則魯必皆遣使往弔審矣不書者其人微也六月邾人入鄅傳邾人襲鄅遂入之盡俘以歸鄅子曰余無歸矣從帑子邾邾人反鄅夫人而舍其女秋葬曹平公冬許遷于白羽杜註自葉遷也正義九年許遷于夷十年楚靈王遷許胡沈道房申于荆平王即位皆復之許又歸于葉故知此年是自葉遷也楚以其偪于鄭遷之所以存許也故以自遷為文十有九年春宋公伐邾傳鄅夫人宋向戌之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘杜註不書圍取不以告也按宋伐邾而盡歸鄅俘義舉也取邑則似貪其土地矣故諱之而不以告其不書歸鄅俘者書伐邾足以概之故夏五月戊辰許世子止弑其君買傳許悼公瘧飲太子止之藥而卒按傳稱飲太子止之藥而卒則止並非不嘗藥而已榖梁傳恐不足據葢止乃雜學喜事之人平日自詭能醫適遇父疾一藥而殂雖無弑逆之意而律載和御藥誤不如法者死則止雖欲辭此惡名而不可得矣己夘地震秋齊高發帥師伐莒杜註莒不事齊故冬葬許悼公許悼公書葬義見襄三十年葬蔡景公下二十年春王正月夏曹公孫㑹自鄸出奔宋按奔未有言所自者此云自鄸正義云與二十二年宋華亥向寧華定自宋南里出奔楚其文正同彼華亥等入南里以叛又從南里出奔則此亦應爾叛不告故不書而胡傳引劉敞之說以為待放二說未知孰是然公子之子稱公孫據事直書並無賢之之意鄸邑名與宋南里在宋國都内不同故不係曹秋盗殺衛侯之兄縶衛公孟縶奪齊豹之邑又惡北宫喜褚師圃欲去之公子朝通于襄夫人而懼故齊豹北宫喜褚師圃公子朝作亂丙辰衛侯在平壽公孟有事于葢獲之門外齊子氏帷于門而伏甲焉遂殺公孟按殺縶書盗者葢凡私有仇于其人並不假君命而殺之者則書曰盗不問其為大夫為士也義見襄十年盗殺鄭公子騑下左氏求名而不得之說固非胡氏以為蔽罪宗魯亦無此理齊豹首謀宗魯與聞其事雖不為無罪然既以身死之矣乃舍豹而責魯恐聖人之斷此獄不如是之頗也稱衛侯之兄無職司也亦無責衛侯意冬十月宋華亥向寧華定出奔陳宋元公惡華向華定華亥與向寧謀曰亡愈于死先諸遂殺羣公子刼公取太子樂與母弟辰公子地以為質公亦取華向之子以為質冬十月公殺華向之質而攻之華向奔陳十有一月辛夘蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘晉頃公即位通嗣君也宋華亥向寧華定自陳入于宋南里以叛宋司馬華費遂生華貙華多僚華登多僚與貙相惡譖諸公曰將納亡人公懼使告司馬乃與公謀逐華貙華貙將見司馬而行則遇多僚御司馬而朝其臣張匄遂與華貙殺多僚刼司馬以叛而召亡人壬寅華向入居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之按南里係宋者以其為宋國城内之里名也秋七月壬午朔日有食之八月乙亥叔輙卒冬蔡侯朱出奔楚傳楚費無極取貨于東國而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國杜註東國隠太子之子平侯廬之弟朱叔父也公如晉至河乃復傳公如晉及河鼓叛晉將伐鮮虞故辭公按鼓叛何妨于邦交葢晉之權家黨季氏而恐公之訴其罪也故假以是為辭而却公耳二十有二年春齊侯伐莒傳齊北郭啟帥師伐莒莒子將戰苑羊牧之諌曰大國不可怒也不聴敗之于壽餘齊侯伐莒莒子行成莒于是大惡其君宋華亥向寧華定自宋南里出奔楚傳冬十月華登以吳師至救華氏齊烏枝鳴戍宋丙寅齊師宋師敗吳師于鴻口華登帥其餘以敗宋師十一月癸未公子城以晉師至曹翰胡㑹晉荀吴齊苑何忌衛公子朝救宋大敗華氏圍諸南里二十二年二月華登如楚乞師楚薳越帥師將逆華氏使告于宋曰寡君聞君有不令之臣請受而戮之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已己巳宋華亥向寧華定出奔楚按書自宋南里别自國出奔也大蒐于昌間書昌間非其地也夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂王子朝有寵于景王王欲立之夏四月乙丑王崩丁巳葬景王子朝因舊官百工之喪職秩者與靈景之族以作亂按不曰京師亂而云王室亂者言京師則通于上下言王室則其父子兄弟自亂之耳劉子單子以王猛居于皇子朝亂劉子奔揚單子奔平畤羣王子追之單子殺之子朝奔京伐之奔山劉子入于王城單子欲告急于晉以王如平畤遂如圃車次于皇以者王猛弱不能自立必賴二子左右之也王猛在喪不可稱天王稱王子又與他王子相亂故以猛繫之于王王者諸侯目王國之辭乃王人之王非天王之王猶詩有王風不可謂之周也苟既正其為天王之王則後不得復稱子矣秋劉子單子以王猛入于王城按傳稱晉荀躒帥九州之戎及焦瑕温原之師納王于王城經乃不書晉納而書劉單以者子朝奔京劉子入于王城單子使王子處守之則王之入王城實二子以之晉不過以師從王入耳故不書晉納公羊傳云入者篡辭非也入者自外而内之辭若以為篡下經天王入于成周何說乎冬十月王子猛卒前稱王猛卒乃稱王子猛者生以名繫王不使與他王子相亂卒稱王子正其為未踰年之子也王謂王國與前同稱子故不曰崩而曰卒十有二月癸酉朔日有食之二十有三年春王正月叔孫舍如晉傳邾人城翼還自雒姑武城人塞其前遂取邾師邾人愬于晉晉人來討叔孫婼如晉晉人執之癸丑叔鞅卒晉人執我行人叔孫舍上書叔孫舍如晉其為行人明矣春秋只據實而書非有心以著其無罪也說見莊十七年齊人執鄭詹下晉人圍郊傳晉籍談荀躒賈辛司馬督帥師次于社王師次于任人辛丑伐京毁其西南二十三年正月壬寅二師圍郊癸夘郊潯潰杜註二師王師晉師也王師不書不以告按凡圍必乆而不觧者然後書郊明日即潰而書圍者邑不言伐非圍無以屬辭也夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔傳莒子庚輿好劍苟鑄劍必試諸人國人患之又將叛齊烏存帥國人以逐之遂來奔齊人納郊公按郊公出奔不書而庚輿書者以其來奔故諸侯奔不名此名者從此遂失國也戊辰吴敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧傳吳伐州來楚薳越帥師及諸侯之師救州來吳人禦諸鍾離子瑕卒楚師􅑒戊辰晦戰于雞父吴子以罪人三千先犯胡沈與陳三國争之吴為三軍以繫于後吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔按不書楚者楚師未與吳接也君戰死曰滅生得曰獲韓戰稱獲晉侯大棘戰稱獲宋華元不嫌君臣同辭公羊傳大夫生死皆曰獲無以見陳夏齧之必為死也胡沈之君經書滅而傳稱獲者見獲而死也書其敗不以國分以君大夫為序觀此則春秋序戰必不以大夫先諸侯也益信天王居于狄泉傳六月壬午王子朝入于尹庚寅單子劉子以王如劉甲午王子朝入于王城杜註于是敬王居狄泉按居狄泉入成周皆單劉以之而不書以何也望溪先生曰王猛時尚未知誰為當立者以出入者獨單劉耳敬王之立則晉人問于介衆而辭子朝名義顯然歸心者不獨單劉矣此所以不書二子以也不書出者傳稱王子猛卒敬王即位館于子旅氏葢自子旅氏如劉又自劉而居于狄泉故不可言出也尹氏立王子朝立王子朝者尹圉也不稱名而稱氏胡氏謂著世卿之擅權亂國以為後戒其説非也稱名則無别于列國之大夫非所以尊天子矣稱子又與劉子單子同故不得已而稱氏亦因時有此稱詩云王謂尹氏是也八月乙未地震冬公如晉至河有疾乃復傳為叔孫故如晉及河有疾而復二十有四年春王二月丙戌仲孫貜卒叔孫舍至自晉左榖皆無叔孫字殆公羊衍文大夫不致此致者以見執故與意如書致義同夏五月乙未朔日有食之秋八月大雩傳旱也丁酉杞伯郁釐卒冬吳滅巢胡氏安國曰巢楚之附庸實邑之也書吴滅巢以著入郢之漸葬杞平公二十有五年春叔孫舍如宋傳季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父傳謀王室也按謀王室大事也諸侯莫至僅合大夫以謀之且納王又期在明年其亦異于桓文之盟首止以定太子誅叔帶以定襄王之舉矣有鸜鵒來巢傳書所無也秋七月上辛大雩季辛又雩書再雩旱甚也九月己亥公孫于齊次于陽州齊侯唁公于野井傳九月戊戌公伐季氏平子登臺而請待于沂上以察罪弗許請囚于費弗許請以五乗亡弗許郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾救季氏帥徒以往䧟西北隅以入公徒釋甲執氷而踞孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏殺郈昭伯遂伐公徒公與臧孫如墓謀遂行己亥公孫于齊次于陽州齊侯將唁公于平隂公先至于野井齊侯唁公于野井按先儒以唁于野井罪齊侯之不急公非也公次于陽州方遣使請逆于齊齊侯即欲親唁公于平隂公不敢當其厚意故先行至野井而與齊侯相遇葢平隂之去陽州近野井之去陽州逺而其去齊都也則平隂逺而野井近齊侯欲以逺迎為恭故使有司待于平隂而不意公已先至野井也其唁于近地豈齊侯之不急公哉然公欲藉之以復國則其勢實有所不能是時晉伯雖衰而威令猶行魯又素屈服于晉使晉誠見恤則季孫必且為所脅而欲公之入也不難若齊則非晉比其威令固不能行于季孫也即興大師以伐之亦難保其戰之必勝今齊侯唁公野井既以不早至平隂為己罪且為取魯邑以安其居而不使流寓于他國其于公不可謂不盡力矣乃公不知其力之僅能及此也第悦其甘言以為是必能憂人之憂者于是入陵盟後如齊者再凟請不已卒至宰夫主獻宴比大夫乃知齊之不足恃而轉而如晉焉春秋詳書于䇿葢病公之輕慮淺謀不揣情度勢而漫為此無益之求也至晉之所以待公者則不逮齊逺甚當請逆時既有即安甥舅之誚及公復于竟亦第逆著乾侯而不容公至其國都以與晉侯相見迨二十九年公又自鄆如晉仍不得與晉侯見而次于乾侯葢晉之强家與季孫同惡相濟惟恐公之見晉侯而訴其罪也故逆以拒之此即公在國時五如晉皆辭公于河之故智也其後晉定新立毅然欲以師納公又沮于范鞅之邪謀以逐君之賊竟任其無咎而召之使來以脱其罪何以教天下之為人臣者乎故春秋兩書公如晉次于乾侯即繼之曰季孫意如㑹晉荀躒于適厯比事屬辭而聖人之情可見矣冬十月戊辰叔孫舍卒昭子從公于齊歸將安衆而納公平子有異志昭子使祝宗祈死戊辰卒按祈死之説不足信此年春婼聘宋與宋公對語而泣樂祈已知其將死何待于祈哉十有一月己亥宋公佐卒于曲棘宋元公為公故如晉道卒故書地十有二月齊侯取鄆凡外取内邑不書諱之也此不諱者取之以居公故二十有六年春王正月葬宋元公是年正月不書公在者以齊侯唁公野井之後即偕公入其國都也正月在齊例不應書三月公至自齊居于鄆公未返國都而書至者賈氏逵謂季氏示欲為臣故以告廟非也諸侯去國必載主祏以行此昭公自告廟耳豈有季氏在國而代公告至鄆之理鄭伯突入于櫟衛侯入于夷儀皆書入此不書入而書居者若適他國而返居于是者然為内諱也此時公在齊都故書至自齊夏公圍成齊侯使公子鉏帥師從公圍成不書以齊師者葢著齊師之不足以而病公之不量力而輕為此舉也不致者無功而還不以告廟故秋公㑹齊侯莒子邾子杞伯盟于鄟陵謀納公也莒邾杞皆魯之與國公至自㑹居于鄆九月庚申楚子居卒冬十月天王入于成周吴氏澂曰王城為東都以鎬京為周之西都東對西而言也成周為下都以王城為洛之上都下對上而言也時子朝據王城故王入于成周而居左氏序事以王入成周在子朝奔後合依經正之胡氏安國曰因狄泉故稱入尹氏召伯毛伯以王子朝奔楚杜註召伯當言召氏經誤也尹召族奔非一人故言氏正義傳言召伯盈逐王子朝朝及召氏之族奔楚則召氏族出奔召伯身不奔也按經稱尹氏義見尹氏立王子朝下不必以族奔也以族奔稱氏則立王子朝豈亦以族立乎尹稱氏召伯毛伯稱行次尹首惡召與毛特從之者耳然亦不得以子稱矣召伯經書奔傳稱召伯盈逐王子朝傳聞異辭聖人必確見所據杜氏信傳而欲改經誤甚二十有七年春公如齊公至自齊居于鄆是年傳稱孟懿子陽虎伐鄆公徒敗于且知而經不書者伐鄆之罪無加于逐君故于内敗而諱之從恒例也夏四月吴弑其君僚傳吴子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潜使延州來季子聘于上國吴公子光曰此時也不可失也夏四月光伏甲于窟室而享王鱄設諸置劍于魚中以進抽劍刺王遂弑王按春秋弑君而稱國者四莒庶其晉州蒲吴僚薛比其義各異惟吴僚薛比則望溪先生所謂懸獄而不敢有所歸其說是也薛比事無可考吴僚見弑于公子光而操刃者則鱄設諸也其赴告之文不曰鱄設諸必曰國亂而無主名可知矣春秋之例國亂而無主名稱人㣲者弑亦稱人鱄設諸賤名氏不合登史冊例應以人書而經則稱國以弑者聖人之慎也葢春秋至襄昭以後皆聖人所見之世而事非本國仍多傳聞傳聞之詞乆然後定若正當所見之世一事也而言人人殊是非混淆公論未出于是或以諱惡而故為掩飾者有之或以愛憎而各持異同者有之此固聖人所無可如何者吴雖與魯通而僻處東南事難徵信僚之見弑聖人亦知赴告之不實也欲從告書人既不可而欲徑書吴公子光弑其君又有萬一失入之慮故懸獄而不敢有所歸第書其國有是事而不少溢一辭焉此所為聖人之慎也胡氏乃謂歸罪于其大臣鑿矣或曰吴以號舉不書吴人從其恒稱也其說亦通楚殺其大夫郤宛楚令尹子常賄而信讒費無極讒郤宛遂攻郤氏且爇之郤宛自殺盡殺郤氏之族黨秋晉士鞅宋樂祁犁衛北宫喜曹人邾人滕人㑹于扈傳㑹于扈且謀納公也宋衛皆利納公范獻子取貨于季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡于是乎弗獲君又弗克而自出也夫豈無偹而能出君乎故鞅以為難乃辭小國而以難復按傳稱公使子家如晉在此盟後恐當在此盟前使非子家請之晉不應無故而謀納公也冬十月曹伯午卒邾快來奔徐氏邈曰自此以前邾畀我庶其並來奔今邾快又至邾魯隣國而為逋逃主為過之甚故悉書之公如齊公至自齊居于鄆傳冬公如齊齊侯請饗之子家子曰朝夕立于其朝又何饗焉其飲酒也乃飲酒使宰獻而請安杜註比公于大夫也禮宴大夫使宰為主獻獻爵也請安齊侯請自安不在坐也劉炫引燕禮謂請賔自安以規杜正義謂齊侯與公敵體安賔乃其常事何須傳載其文以為卑公之義明是齊侯請欲自安不在其坐按請安謂請自安于文不順劉氏說似較長葢與上宰獻連文請安者宰請公安也正足明慢公之甚正義駁之悮矣二十有八年春王三月葬曹悼公公如晉次于乾侯傳公如晉將如乾侯子家子曰有求于人而即其安人孰矜之其造于境弗聴使請逆于晉晉人使公復于境而逆之杜註逆著乾侯也言公不用子家子之言所以見辱按此與次于陽州文法同而其事之情實則異此葢病晉之强家黨季孫以沮公而使之不得至晉都也夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公二十六年書公至自齊而此不書公至自晉者以公未至晉都故齊侯使髙張來唁公唁公至晉而不見受也公如晉次于乾侯傳齊侯使髙張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯杜註為齊所辱故復適晉冀見恤按傳稱公如乾侯而經必曰公如晉次于乾侯者葢著公之如晉其本意原欲至晉都而乾侯特其所次止之地耳乃至明年正月而公仍在焉則晉之强家黨季孫以沮公者其罪不待貶絶而自見矣又按乾侯晉地而公如晉之初即不待于晉境而如乾侯子家云有求于人而即其安人誰矜之不知乾侯何以為公之所安也公于去年三月次于乾侯至今年春已一年矣乃甫至自乾侯居于鄆旋又如晉而次于乾侯其戀戀于乾侯者當必有故然不可考矣夏四月庚子叔詣卒秋七月冬十月鄆潰榖梁傳潰之為言上下不相得也上下不相得則惡矣昭公出奔民如釋重負按榖梁此說必有所本先儒或以季氏誘之使潰此刻論也葢從公者皆小人雖淹恤在外必依勢作威以一邑之小而責以公家平日供億之浩繁是時公又在乾侯如子家輩皆随行其留在鄆者必以無所禀承而益肆于是鄆人不勝其擾遂相率而去之此事勢之所必有者季氏逐君其罪自莫可逭然若以此莫須有之罪加之反不足以服其心矣三十年春王正月公在乾侯公正月在鄆不書者魯邑也乾侯晉邑非其所宜在矣故書不曰居而曰在者亦以其為晉地故夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吴滅徐徐子章羽奔楚徐子名者世近紀載詳故三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適厯傳晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之晉侯召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適厯陸氏淳曰逐君之臣晉不之罪而反與㑹據事直書而晉之為盟主可見矣荀躒之為人臣可見矣此不待貶絶而罪惡見者也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯傳季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公曰寡君使躒以君命討于意如意如不敢逃死君其入也君曰君恵顧先君之好施及亡人將使糞除宗祧以事君則不能見夫人所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難秋葬薛獻公冬黑肱以濫來奔杜註不書邾史缺文十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞按昭公之難叔孫如闞則其為魯邑明矣殆季氏自晉返魯而以闞歸公欲自掩其逐君之罪猶歸馬及衣屨之意云爾書取者不以其名予季氏也夏吴伐越傳始用師于越也秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周王使富辛與石張如晉請城成周范獻子謂魏獻子曰與其戌周不如城之使伯音對曰天子有命敢不奉承冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周己丑士彌牟令役于諸侯屬役賦文書以授帥而效諸劉子韓簡子臨之以為成命杜註臨履其事以命諸侯經所以不書魏舒按此年傳稱冬十一月魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也云云定公元年傳又稱春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衛彪傒曰將建天子而易位以令非義也云云此一事也左氏兩載之而失刪其一耳此年傳己丑士彌牟營成周云云定元年傳云孟懿子㑹城成周庚寅栽庚寅即己丑之明日而傳分為兩年此役不過三旬而畢豈有去年已令役于諸侯遲之兩月而始栽者乎其為複出無疑前載其事于冬十一月後載其事于春王正月周之正月夏之十一月也其月同其為一事無疑本顧氏炎武說十有二月己未公薨于乾侯傳書公薨于乾侯言失其所也
