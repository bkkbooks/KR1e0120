body:
  text: 春秋究遺卷十一左庶子葉酉撰襄公上元年春王正月公即位於是公年四嵗仲孫蔑㑹晉欒黶宋華元衞寗殖曹人莒人邾人滕人薛人圍宋彭城傳彭城降晉晉人以宋五大夫在彭城者歸寘諸瓠丘按春秋書地例不係國彭城獨書宋者以楚人既取之以封魚石矣故特正其為宋之彭城則楚人不得取之宋魚石不得受之楚皆不待貶絶而自見矣晉以五大夫歸不書者罪人既得不肆諸市朝而置諸瓠丘以其寛亂賊之誅故輕其事而不書也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫傳晉韓厥荀偃以諸侯伐鄭入其郛于是東諸侯之師次于鄫以待晉師秋楚公子壬夫帥師侵宋傳秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘按楚不書救鄭而書侵宋者宋以侵告故九月辛酉天王崩邾子來朝冬衞侯使公孫剽來聘晉侯使荀罃來聘杜註冬者十月初也王崩赴未至皆未聞䘮故各得行朝聘之禮而傳善之按邾子來朝之時謂赴未至于諸侯猶之可也踰月之後猶以為未聞䘮乎且經但書冬安見為十月初也註葢因傳以為禮故從而為之辭二年春王正月葬簡王鄭師伐宋傳楚令也夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衞寗殖侵鄭宋雖非卿因晉亦非卿故以國序在衞上望溪先生曰以此知將卑師衆稱師而不稱將將尊師少稱將而不稱師也秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚傳謀鄭故也孟獻子曰請城虎牢以偪鄭知武子曰鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也罃將復于寡君而請于齊得請而告吾子之功也若不得請事將在齊己丑葬我小君齊姜杜註齊諡也叔孫豹如宋傳通嗣君也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢傳齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成按城虎牢不係鄭者春秋書地例不係國十年戍鄭虎牢乃係鄭者以既成于晉疑其為晉地故楚殺其大夫公子申傳楚公子申為右司馬多受小國之賂以偪子重子辛楚人殺之三年春楚公子嬰齊帥師伐呉傳楚子重伐呉為簡之師使鄧廖帥組甲三百被練三千以侵呉呉人要而擊之獲鄧廖子重歸既飲至三日呉人伐楚取駕楚人以是咎子重子重病之遂遇心疾而卒公如晉夏四月壬戌公及晉侯盟于長樗公至自晉杜註晉侯出其國都與公盟于外正義悼公謙不敢使國君就已出盟于外若似相就然盟訖還入于晉故公歸書曰公至自晉六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤傳晉為鄭服故且欲修呉好將㑹諸侯使士匄告于齊齊侯欲勿許而難為不恊乃盟于耏外六月己未同盟于雞澤晉侯使荀會逆呉子于淮上呉子不至按凡㑹盟并舉必先書會而後書盟會不日而盟日故會盟同日者則書日于會之上會盟不同日者則書日于盟之上此例之無可疑者也而與盟不同日之會必書地如葵丘之盟先書會于葵丘重丘之盟先書會于夷儀之類是也其不書地者或有伐救之事則書會伐會救如馬陵柯陵之類是也獨此與文十四年新城之盟先書會而列序諸侯之下即書日並無伐救及于某地之文葢諸侯始將為會至期而更為盟本無伐救之事故不書伐救並未嘗行會禮故不書會某某于某地而其始以㑹召故先書會而後書盟所以别于始以盟召諸侯者也本望溪先生説陳侯使袁僑如會傳楚子辛為令尹侵欲于小國陳成公使袁僑如會求成戊寅叔孫豹及諸侯之大夫及陳袁僑盟杜註其君不來使大夫盟之匹敵之宜按大夫而必冠之以諸侯者别其為外大夫也凡春秋書諸侯有不主魯書及者統魯在内有主魯書及者不統魯在内葢諸之為言衆也諸侯猶言衆侯故主魯書及其所謂諸侯者自不統魯在内于文無所疑此以叔孫豹為主書及若不冠之以諸侯則叔孫豹魯卿亦大夫也主魯卿書及而單言大夫猶主魯君書及而單舉侯之一字也何以别其為外大夫外諸侯乎此文法當然先儒以為存諸侯鑿矣其説更詳具十六年大夫盟下不地者會盟兩事故雖同地必再書于某地此與雞澤皆盟也故承上文從省不列序大夫者上既列序諸侯矣大夫係於諸侯故前目後凡例也秋公至自㑹冬晉荀罃帥師伐許傳許靈公事楚不會于雞澤冬晉知武子帥師伐許四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒定十五年葬定姒哀公之母也妾母不備禮特從公之諡以定姒書此定姒則諡也故不嫌從同冬公如晉傳公如晉聽政請屬鄫晉侯許之杜註受貢賦多少之政鄫小國也欲得使屬魯陳人圍頓傳楚人使頓間陳而侵之故陳人圍頓五年春公至自晉夏鄭伯使公子發來聘傳鄭子國來聘通嗣君也叔孫豹鄫世子巫如晉傳穆叔覿鄫太子於晉以成屬鄫不書及者比巫于内臣也仲孫蔑衞孫林父㑹呉于善道傳呉子使壽越如晉請聽諸侯之好晉人將為之合諸侯使魯衞先㑹呉且告會期按春秋内魯凡魯大夫與外大夫同役必主魯大夫書及此獨列序而不主仲孫蔑書及者葢二國同受晉命各自其國徃會故不可以言及而㑹盟非下文戍陳比凡在列者必書又不可獨書内事也若書仲孫蔑會衞孫林父呉人于善道更無以見晉使二國先徃會呉之實矣文固各有所當歟秋大雩杜註雩夏祭所以祈甘雨旱則又修其禮雩而獲雨故書雩而不書旱楚殺其大夫公子壬夫傳楚人討陳叛故曰令尹子辛實侵欲焉乃殺之公會晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光呉人鄫人于戚呉所以稱人者與諸侯列序獨以國舉則于文不順故稱人來聽諸侯之好故不殊㑹皆文法當然無義例也傳稱盟于戚不書者杜註不以盟告廟非也凡諸侯㑹盟皆先㑹而後盟此獨先盟而後會葢晉之合諸侯原重在㑹呉呉只與㑹而不與盟故諸侯之盟不書者輕其事也鄫與㑹者四年十月邾人莒人伐鄫臧孫紇救之而敗于邾故穆叔以為不利乞復還之而使鄫大夫聽命于會臧孫紇救鄫不書者春秋為魯諱敗君將則書戰而不書敗大夫將則並不書戰葢君舉必書大夫非君比也故諱其敗即並不書戰觀春秋所書内大夫侵伐傳未有言其敗者則諱其敗即並其侵伐而諱之審矣公至自㑹冬戍陳不書諸侯戍陳者杜註諸侯在戚皆受命戍陳各還國遣戍不復有告命故獨書魯戍楚公子貞帥師伐陳公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳傳楚子囊為令尹伐陳十一月甲午㑹于城棣以救之杜註公及救陳而不及㑹故不書㑹城棣十有二月公至自救陳辛未季孫行父卒六年春王三月壬午杞伯姑容卒夏宋華弱來奔傳宋樂轡以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之秋葬杞桓公滕子來朝傳始朝公也莒人滅鄫傳鄫恃賂也杜註鄫有貢賦之賂在魯恃之而慢莒故滅之按公穀不歆非祀之説不可信聖人既明書莒人滅鄫矣其為莒人以兵滅之無疑但左氏恃賂之説亦未必然五年穆叔既以屬鄫為不利而使聽命于㑹矣復何賂之可恃耶冬叔孫豹如邾傳穆叔如邾聘且修平杜註平四年狐駘戰季孫宿如晉傳晉人以鄫故來討曰何故亡鄫季武子如晉且聽命十有二月齊侯滅萊傳晏弱圍萊三月入萊萊共公奔棠晏弱圍棠十一月丙辰滅之按君將稱君史文定例此既稱齊侯則左氏云云恐非其實抑或經文齊侯乃齊師之誤歟七年春郯子來朝夏四月三卜郊不從乃免牲三卜葢三月二卜四月又一卜三卜在春分後故孟獻子曰既耕而卜郊宜其不從也小邾子來朝城費傳南遺為費宰叔孫昭伯為隧正欲善季氏而求媚于南遺謂遺請城費吾多與而役故季氏城費秋季孫宿如衛傳報子叔之聘且辭緩報非貳也八月螽經自莊公以後螟不書螽然後書葢不可勝書故書其重者耳冬十月衞侯使孫林父來聘壬戌及孫林父盟傳衞孫文子來聘且拜武子之言而尋孫桓子之盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衞侯曹伯莒子邾子于鄬傳楚子囊圍陳會于鄬以救之不書救者以陳侯逃歸而兵遂中止也鄭伯髠頑如會未見諸侯丙戌卒于鄵按鄭僖公之卒三傳皆以為弑而經獨以卒書胡氏遂力主公穀為中國諱之説果爾則春秋非傳信之書矣是時鄭子駟當國襄二年傳稱鄭成公疾子駟請息肩于晉距此纔五六年耳安有髠頑欲從晉不勝其臣之欲從楚遂因此而被弑之理况髠頑既卒若果如公穀之説即應改而從楚矣何以明年鄭子國子耳又欲求媚於晉而侵蔡耶此正所為事有乖謬所當信經而廢傳者也如會而卒于鄵必書未見諸侯者按公羊傳傷而返未至乎舍而卒其所謂傷而反者不足信至云反未至乎舍而卒則事理之可信者葢髠頑如會甫至㑹所得暴疾未及與諸侯相見遽返至于鄵而卒其卒也乃既至㑹所返而卒于鄵非未至㑹所徃而卒于鄵也惟既至會所以暴疾返而卒于鄵故傳聞異詞遂誤以為弑然㑹所非行弑之地若于㑹所而弑其君則形迹彰徹獨不虞大書於册未見云者理應相見之詞也諸侯相見曰㑹理應相見則其已至㑹所不待言葢特著其以暴疾卒而不忍誣其臣以大惡之名忠厚之道也若苐書鄭伯某如㑹丙戌卒于鄵則似徃而辛于鄵而其事之實無由見矣不書有疾者卒不言疾宣八年公子遂如齊至黄乃復不言疾是其例也不書返者當其返之時病勢已殆特至鄵乃絶耳非病者自返故不可以言返也髠頑書名者以卒故名非名其如㑹也與呉子遏伐楚書名同義陳侯逃歸傳陳人患楚慶虎慶寅謂楚人曰吾使公子黄徃而執之楚人從之二慶使告陳侯于會陳侯逃歸春秋書逃凡三見莊五年鄭詹僖五年鄭伯及此皆恥之之辭八年春王正月公如晉傳公如晉朝且聽朝聘之數正義曰文襄之制諸侯三年而聘五年而朝自襄以後無復定準今晉悼復修伯業故公朝而禀其多少之數如公朝者葢亦非一晉侯謙不敢在國約束故出外合之又難煩諸侯使大夫聽命故為邢丘之㑹夏葬鄭僖公鄭人侵蔡獲蔡公子燮杜註鄭侵蔡欲以求媚于晉不言敗惟以獲告季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘傳㑹于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戌衞甯殖邾大夫㑹之按鍾離以後卿皆列序此獨稱人者左氏以為尊晉侯非也春秋嚴上下之分故公及外大夫盟概不書公以其降等屈班諱之也此會晉侯不欲煩諸侯意非不善而不使大夫與之會乃以伯主之尊下與諸侯之大夫齒則降等屈班為已甚矣而外事又不可不書晉侯也故人諸侯之大夫人者輕之之詞見其不足與諸侯抗所以著晉侯之失也或謂諸稱人者皆非卿左氏以為齊高厚宋向戌衞寗殖葢傳聞之誤今仍從左氏謂實卿稱人者命朝聘之數大事也晉君親在故魯使卿預㑹諸侯必無敢使㣲者預㑹之理程子云以經辨傳之真偽必以義例求之一無可通然後可决其偽耳若不悉心以求苐見傳與經少有齟齬即以傳為不足信則鹵莽之病與穿鑿等又未免矯枉過正之失矣鄭伯因獻㨗而親聽命春秋無譏焉故書爵從恒辭公至自晉㑹鄬未歸而如晉故會鄬不致而以自晉致莒人伐我東鄙傳莒人伐我東鄙以疆鄫田杜註莒既滅鄫魯侵其西界故伐魯以正其封疆秋九月大雩冬楚公子貞帥師伐鄭傳討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰詩云發言盈廷誰敢執其咎請從楚騑也執其咎乃及楚平晉侯使士匄來聘傳拜公之辱告將用師於鄭九年春宋災夏季孫宿如晉傳報韓宣子之聘也五月辛酉夫人姜氏薨傳穆姜薨于東宫杜註穆姜淫僑如欲廢成公故徙居東宫事在成十六年秋八月癸未葬我小君姜穆冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲傳諸侯伐鄭師于汜令曰修器備盛餱糧歸老㓜居疾于虎牢肆𤯝圍鄭鄭人恐乃行成三月己亥同盟于戲鄭服也杜註伐鄭而書同盟則鄭受盟可知按杜註以同盟之同統鄭及諸侯皆在内其説恐不確此盟及十一年盟于亳城北鄭皆在列以為同鄭猶可耳若成十七年盟于柯陵鄭實不服而亦書同盟何説乎其辨詳二十三年盟于重丘下楚子伐鄭傳楚子伐鄭鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟曰吾盟固云惟强是從今楚師至晉不我救則楚强矣乃及楚平十年春公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會呉于柤呉先在柤晉帥諸侯徃會之故會而又會與成十五年會吳于鍾離義同夏五月甲午遂滅偪陽傳會于柤晉荀偃士匄請滅偪陽而封向戌焉荀罃曰城小而固勝之不武不勝為笑固請丙寅圍之弗克荀偃士匄請班師知伯怒投之以机出于其間曰七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午滅之以與向戌向戌辭乃予宋公汪氏克寛曰偪陽與柤皆在今沛縣乃呉人入中國之要衝柤之會葢謀滅偪陽而通呉也按此説于情事極合惟原為謀滅偪陽而會故書曰遂所為繼事之詞而有歸重之意也公至自㑹戲之盟未歸而如柤故以後會致楚公子貞鄭公孫輙帥師伐宋以宋公受偪陽故按傳稱衞侯救宋師于襄牛鄭子展曰必伐衞不然是不與楚也故鄭皇耳侵衞楚令也又稱秋七月楚子囊鄭子耳伐我西鄙還圍蕭八月克之而經皆不書葢經止欲著鄭之從楚耳既書伐宋則因衞救宋而伐衞不必言矣至伐我西鄙不書者卓氏爾康曰伐宋之師聲言伐魯志在還兵取蕭魯不受兵故不書其説似得其實圍蕭亦不書者殆不告故晉師伐秦傳晉荀罃侵秦報其侵也杜註荀罃不書不親帥也秋莒人伐我東鄙傳莒人間諸侯之有事也故伐我東鄙公會晉侯宋公衞侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭傳諸侯伐鄭己酉師于牛首此三駕之一冬盜殺鄭公子騑公子發公孫輙傳初子駟與尉止有爭將禦諸侯之師而黜其車曰爾車非禮也子駟為田洫司氏堵氏侯氏子師氏皆䘮田焉故五族聚羣不逞之人因公子之徒以作亂十月戊辰攻執政于西宫之朝殺子駟子國子耳按殺大夫必書官此不書官者葢上書國殺則下必書大夫若以盜為文則止以名見義不闗乎大夫也稱盜者或謂陰賊不知為何國之人故稱盜非也春秋稱盜殺凡三見此年傳明書尉止及司氏堵氏侯氏子師氏矣昭公二十年盜殺衞侯之兄縶亦明書齊豹矣豈不知何國之人耶葢私有仇于其人並不假君命而殺之者則書之曰盜所以然者其君既不與聞又諱其國之無政以致羣下相殺故飾其辭而以盜殺告舊史遂承而書之而書盜殺則其國之無政可見故聖人亦仍之而已盜殺陳夏區夫傳不載其事當亦此類惟殺蔡侯申則真陰賊不知何國之人耳惟不知何國之人故不稱弑以非其君也望溪先生説具載本條下戍鄭虎牢楚公子貞帥師救鄭傳諸侯之師城虎牢而戍之楚子囊救鄭諸侯之師還楚人亦還按虎牢係之鄭者以既城于晉疑其為晉地故還係之鄭以見其為鄭之巖邑也戍虎牢則鄭不得不服矣不書諸侯戍鄭虎牢者與戍陳同義公至自伐鄭十有一年春王正月作三軍傳十一年春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍杜註魯本無中軍惟上下二軍皆屬于公有事二卿更帥以征伐季氏欲專其民故假立中軍因以改作正義成王封周公于曲阜地方七百里其時必有三軍也詩頌僖公能復周公之宇云公徒三萬鄭註云大國三軍則僖公復古制亦三軍矣葢自文公以來伯主之令軍多則貢事多自減為二軍耳非是魯衆不滿三萬也周禮小司徒凡起徒役無過家出一人故鄉為一軍天子一軍出自六鄉則大國三軍出自三鄉其餘公邑采地之民不在三軍之數季武子今為三軍則異于是以魯國屬公之民皆分為三亦謂之三軍其軍之民不止于一萬二千五百家也望溪先生曰作三軍者季氏自為一軍孟叔共為一軍而公徒為三軍也孟孫取四之一叔孫取四之二故共為一軍而公所得之五為中軍惟中軍屬公故後復毁之夏四月四卜郊不從乃不郊穀梁傳夏四月不時也四卜非禮也按書不郊不書免牲葢卜免牲不吉而不敢免留以待後卜也鄭公孫舍之帥師侵宋傳鄭人患晉楚之故諸大夫曰楚弱于晉晉不吾疾也晉疾楚將避之何為而使晉師致死于我楚不敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之夏鄭子展侵宋公會晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭此悼公三駕之二秋七月己未同盟于亳城北公至自伐鄭傳六月諸侯會于北林師于向右還次于𤨏圍鄭觀兵于南門西濟于濟隧鄭人懼乃行成秋七月同盟于亳楚子鄭伯伐宋傳楚子囊乞師于秦將以伐鄭鄭伯逆之丙子伐宋公會晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚傳諸侯悉師以復伐鄭鄭人使良霄如楚告將服于晉楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成十二月會于蕭魚赦鄭囚皆禮而歸之納斥堠禁侵掠杜註會于蕭魚鄭服而諸侯會公至自會以會致者觀兵而不果伐故以會致楚人執鄭行人良霄杜註既成後告故書在蕭魚後書行人者説見莊十七年齊人執鄭詹下冬秦人伐晉傳秦庶長鮑庶長武帥師伐晉以救鄭士魴禦之少秦師而弗設備戰于櫟晉師敗績杜註不書敗績晉恥易秦而敗故不告也十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆穀梁傳受命而救台不受命而入鄆惡季孫宿也遂者繼事而加甚之詞夏晉侯使士魴來聘拜師也秋九月呉子乗卒冬楚公子貞帥師侵宋傳楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也公如晉十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防傳書事時也於是將早城臧武仲請俟畢農事禮也十有四年春王正月季孫宿叔老會晉士匄齊人宋人衞人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會呉于向傳十一年秋呉侵楚養由基奔命子庚以師繼之戰于庸浦大敗呉師十四年春呉告敗于晉會于向為呉謀楚故也杜註魯使二卿並會敬事伯主晉人自是輕魯幣而益敬其使叔老雖介亦列于會按齊宋衞稱人必非卿也左氏惰不書之説不足信下伐秦書衞北宫括卿也左氏又以為攝葢誤信傳聞從而為之辭二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衞北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦傳諸侯之大夫從晉伐秦以報櫟之役濟涇而次秦人毒涇上流師人多死乃還晉人謂之遷延之役晉與秦兵爭止此己未衞侯出奔齊傳衞獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章文子曰君忌我矣弗先必死公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之公出奔齊衞人立公孫剽孫林父寗殖相之以聽命于諸侯不書孫林父甯殖逐其君而以自奔為文者義見桓十五年鄭伯突出奔蔡下不名者諸侯出奔例不名莒人侵我東鄙秋楚公子貞帥師伐呉傳楚子為庸浦之役故子囊師于棠以伐呉呉不出而還子囊殿以呉為不能而弗儆呉人敗之冬季孫宿會晉士匄宋華閲衞孫林父鄭公孫蠆莒人邾人于戚傳晉侯問衞故于中行獻子對曰衞有君矣伐之未可得志而勤諸侯不如因而定之冬會于戚謀衞也按孫林父在會葢謀定剽也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉杜註報二年豹之聘尋十一年亳之盟按不盟于國而盟于劉其義未聞或謂下書劉夏逆王后因誤衍劉字後人遂附會增于字以成文容或有之劉夏逆王后于齊公羊傳外逆女不書此何以書過我也按逆后使大夫非禮也故因其過我而書之不書王使所為婚禮不稱主人也夏齊侯伐我北鄙圍成公救成至遇齊貳于晉又以衞侯衎在齊而季孫會戚以立剽故伐我凡師至中途止而不進曰次此不曰次而曰至殆至遇即還並未次止于其地歟季孫宿叔孫豹帥師城成郛成者孟氏私邑乃救之者公城其郛者季孫宿叔孫豹而孟孫皆不與焉非不與也葢成被圍于齊竭其捍禦之力而使齊不能取而有之者孟孫也其力既竭于守迨齊師既退而城郭不完使宿與豹不為任其板築之役則成將不得為魯所有矣此同舟共濟之道也秋八月丁巳日有食之邾人伐我南鄙傳秋邾人伐我南鄙使告于晉晉將為會以討邾莒晉侯有疾乃止冬十有一月癸亥晉侯周卒晉悼公自三駕服鄭之後伯畧漸衰葢其志已滿又何怪平公之不能嗣其業也春秋究遺卷十一
