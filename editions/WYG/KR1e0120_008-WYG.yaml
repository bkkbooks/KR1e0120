body:
  text: 春秋究遺卷八左庶子葉酉撰文公元年春王正月公即位繼正書即位史之常文即位者告廟臨羣臣也何氏濟川曰先謁宗廟明繼祖也還之朝正君臣之位也事畢而反䘮服焉朱子曰易世傳授國之大事當嚴其禮而王侯以國為家雖先君之䘮猶以為己之私服也二月癸亥日有食之不書朔史失之天王使叔服來㑹葬叔氏服名杜註以為字非也天子大夫例書名蘇氏轍曰外卿㑹葬不書尊王使故特書之夏四月丁巳葬我君僖公天王使毛伯來錫公命榖梁傳禮有受命無來錫命來錫命非禮也案左氏傳王使毛伯衞來錫公命衞毛伯名據此則舊史王使必皆書名而聖人削之以王之卿士不可無别于諸侯之卿士也望溪先生說信而有徵矣晉侯伐衞傳晉文公之末年諸侯朝晉衞成公不朝使孔達侵鄭晉襄公既祥使告于諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居胥臣伐衞據此則伐衞乃晉大夫當書晉人而書晉侯者蓋晉襄始以親伐告諸侯故書晉侯從告辭也叔孫得臣如京師謝錫命也衞人伐晉傳晉師圍戚取之衞人使吿于陳陳共公曰更伐之我辭之衞孔達帥師伐晉按陳為衞謀不告以事大睦隣之道而乃稱兵報伐其為謀也過矣秋公孫敖㑹晉侯于戚傳晉侯疆戚田故公孫敖往㑹之按此為内大夫特㑹諸侯之始嗣是行父㑹齊侯于陽榖歸父㑹齊侯于榖歸父㑹楚子于宋叔弓㑹楚子于陳通此㑹為五而胡氏特發傳于歸父之下不知所謂冬十月丁未楚世子商臣弑其君頵傳初楚子以商臣為太子既又欲立王子職而黜太子商臣商臣聞之告其師潘崇潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王縊按弑君目世子者甚之也有君之尊有父之親而忍動于惡著其為世子而其罪乃愈無所逃矣公孫敖如齊傳穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事隣國以衞社稷忠信卑讓之道也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績傳殽之役晉人既歸秦帥秦伯復使為政二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師按不書秦師伐晉者未薄其城邑而逆與之戰也以晉及秦者春秋以霸主内晉故以之主兵例也胡氏之說非丁丑作僖公主毛氏竒齡曰禮卒哭之明日以主祔廟是作主當在五月之後祔廟之前今僖公薨十五月而作主故傳曰緩三月乙巳及晉處父盟傳晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之按凡公與大夫盟皆諱公不書此盟則聖人尤以為辱故並公如晉不書稱處父者蓋深以處父之盟公惡晉非徒病大夫之與公抗而已故于處父特畧其辭以見義焉去其族所以専治晉也不地者盟于晉都也經書三月乙巳傳稱四月己巳經傳必有一誤夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴傳公未至六月穆伯㑹諸侯及晉司空士縠盟于垂隴晉討衞故也陳侯為衞請成于晉執孔達以說望溪先生曰此外大夫㑹盟書名之始也由是而衡雍新城之趙盾承匡之郤缺皆以名見矣至宣十五年無婁之盟而齊高固亦以名見矣然自宣以前盟㑹書名者不過伯國之大夫而已列序諸國之大夫無有也至成十五年㑹吳于鍾離則晉士燮齊高無咎宋華元衞孫林父鄭公子輶皆列序焉蓋大夫漸張舊史書之亦漸詳而非春秋之法也以為褒貶所寓則義無所處矣按大夫漸張舊史書之漸詳此論確不可易但所以書之漸詳之故惜猶未之及耳據檀弓縣子曰昔之大夫束脩之問不出竟今之大夫交政于中國蓋大夫既張之後凡㑹盟侵伐之事昔以國書赴告于諸侯者今皆自以文告魯史承其自所赴告之文而書之安得不以名見始而伯國之大夫自以文告繼而列國之大夫尤而效之亦皆自以文告矣此書之所以漸詳之故也此後侵伐稱人者大都皆大夫間有卿將而稱人者如七年令狐之戰十二年河曲之戰十四年晉人納捷菑于邾之類蓋仍以國書赴告故皆畧而稱人以告文中只以侵伐某國告原不具將之名氏也成十五年㑹吳于鍾離之後卿皆列序殆皆自以文相期㑹歟垂隴之㑹魯卿在列不須告而士縠名者亦必自以文徵盟故耳自十有二月不雨至于秋七月榖梁傳歴時而言不雨者不憂雨也不憂雨者無志乎民者也八月丁卯大事于太廟躋僖公大事祫也合羣廟之主食于太廟升僖于閔之上左氏所謂逆祀也冬晉人宋人陳人鄭人伐秦傳晉先且居宋公子成陳轅選鄭公子歸生伐秦報彭衙之役卿不書為穆公故其說非也外大夫侵伐至文三年陽處父伐楚始以名見前此皆書人公子遂如齊納幣以䘮婚失禮故書先儒謂納幣不當使卿非也說詳成八年宋公使華元來聘下三年春王正月叔孫得臣㑹晉人宋人陳人衞人鄭人伐沈沈潰傳以其服于楚也几民逃其上曰潰在上曰逃夏五月王子虎卒傳王叔文公卒來赴弔如同盟禮也趙氏曰天子大夫無與諸侯盟之禮左氏乃曰禮也豈聖人之意乎秦人伐晉傳秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還按取邑不書者二國之争亟矣邊邑彈丸朝秦暮晉無關于勝負之數故畧而不詳後倣此經書秦人而傳稱秦伯誤秋楚人圍江雨螽于宋傳墜而死也冬公如晉十有二月己巳公及晉侯盟晉人懼其無禮于公也請改盟公如晉及晉侯盟晉陽處父帥師伐楚以救江傳冬晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還杜註朱楚大夫伐江之師也聞晉師起而江兵解故晉亦還望溪先生曰此外大夫侵伐書名之始也自是而郤缺之伐蔡趙盾之救陳趙盾之侵崇皆以名見矣由是而宋華元鄭公子歸生衞孫免亦以名見矣然自宣以前侵伐書名者不過伯國之大夫與一二國之大夫而已列序諸侯之大夫無有也至成二年戰于鞌内大夫四人並列而晉郤克衞孫良夫曹公子首皆列序焉蓋大夫漸張舊史書之亦漸詳而非春秋之法也以為褒貶所寓則義無所處矣按先生此論確不可易說見二年盟于垂隴下春秋書伐未有言其故者此獨以救江書蓋楚有弑君之罪晉不能討而以救江伐楚故書其故以病晉之舎其大而事其細也然必上書伐楚乃疑于討罪故必書其所為以示譏若襄三十年澶淵之㑹則本不疑于討蔡而書其所為自當以公羊錄伯姬之說為正不得執此以例彼四年春公至自晉夏逆婦姜于齊傳卿不行非禮也君子是以知出姜之不允于魯也按賤逆不成其為娶夫人也故不書夫人微者例不見經故逆者不以名見惟逆者不以名見故其如齊不書春秋凡微者㑹葬只書葬某國某公不書如某國正與此類惟逆者不書如故不得不變逆女而曰逆婦姜蓋上書如齊則據齊為文故曰逆女女者齊之女也上不書如齊則據逆者為文故曰逆婦姜此皆文法當然聖人初無所容心于其際也不書至以不告廟故不稱氏者說詳宣元年遂以夫人婦姜至自齊下狄侵齊汪氏克寛曰狄自箕之敗至是始復侵齊以晉襄無攘却之謀而齊伯不紹故也秋楚人滅江晉侯伐秦傳圍邧新城以報王官之役稱晉侯胡氏以為貶非也君親將則稱爵衞侯使寗俞來聘汪氏克寛曰自孔達被執之後蓋寗俞代之為政至三年春衞從晉伐沈四年晉人歸孔達其夏衞侯朝晉至秋而來聘焉事大睦隣以安社稷或者皆出俞之謀歟冬十有一月壬寅夫人風氏薨風氏僖公之母莊公妾也其卒也書薨其葬稱小君據實而書其為非禮不待貶絶而自見矣五年春王正月王使榮叔歸含且賵王不稱天者成妾母為夫人亂倫之甚失天理矣故不稱天不書來者榖梁傳不周事之用其說不確孔疏辨之甚詳先儒又以為請之故亦非也請之何以不言來乎按珠玉曰含所以實口乗馬曰賵所以送葬二事不同時榮叔正月自周來歸含時成風尚未及葬期因留魯俟葬臨期歸賵王使榮叔雖兼此二事然含己後期賵正濟用王之恩禮尤重在賵故曰且賵見其所尤重也留魯俟葬非始自周來也故不書來程子所謂春秋一字異必有義者此類是已恵公仲子之薨不見于經故歸賵必舉其所為之人此夫人新薨則歸含賵為夫人不待言三月辛亥葬我小君成風妾母書葬蓋祔也魯禮之失自此始矣王使召伯來㑹葬使召伯來㑹葬較之歸含賵更創見矣故王再不稱天夏公孫敖如晉王含且賵又來㑹葬矣捨天王而謹事晉不待貶而惡自見秦人入鄀傳鄀叛楚即秦又貳于秦夏秦人入鄀秋楚人滅六傳六人叛楚楚成大心仲歸帥師滅之冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳傳臧文仲以陳衞之睦也欲求好于陳夏季文子聘于陳且娶焉秋季孫行父如晉傳季文子將聘于晉使求遭䘮之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害按文子此時必已聞晉侯有疾故求遭䘮之禮若無故而為此過求所謂幾千人而國不亡者將在此矣八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公杜註卿共葬事文襄之制晉殺其大夫陽處父晉狐射姑出奔狄傳晉蒐于夷使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍賈季怨陽子之易其班也而知其無援于晉也九月使續鞫居殺陽處父按殺陽處父者賈季而稱國以殺公榖謂君漏言故罪累上非也凡兩下相殺不志于春秋賈季之殺陽處父特兩下相殺耳非春秋之所宜志而聖人志之者意不在于賈季也蓋處父雖剛而失中然其易中軍也使能利國不可謂私而賈季敢挾其易班之怨公行剚刄而無所忌誰秉國成取而肆諸市朝可矣乃趙盾竟縱其出奔不惟不正其擅殺之罪且使臾駢致其帑失刑如此尚何以為國乎故上稱國殺而下即書晉狐射姑出奔狄蓋以失其所以為國者病趙盾之縱賊也是時晉襄已卒必無以亂人而累其先君之理公榖之說既不足信胡氏又從而和之皆不得其解而強為之辭閏月不告月猶朝于廟按所謂頒朔者蓋以一月中日之甲乙編為一書而頒于諸侯如今之時憲書也諸侯藏之祖廟每月之朔告于廟而受行之本當謂之告月傳稱告朔者以朔日而告文偶異耳胡氏之說穿鑿不可從此年稱閏不告月十六年稱四不視朔者此與下猶朝于廟連文故稱告月十六年見公之怠于政事故稱視朔七年春公伐邾三月甲戌取須句傳春伐邾間晉難也三月取須句寘文公子焉非禮也按僖公嘗伐邾取須句而返其君矣邾復取之不知在何年不書者凡外取内城邑例不書諱之也遂城郚杜註因伐邾師以城郚郚魯邑備邾難夏四月宋公王臣卒宋人殺其大夫傳昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣弗聽穆襄之族帥國人以攻公殺公孫固公孫鄭于公所按傳既明言殺公孫固公孫鄭矣而經何以不名蓋國人因攻公而及其大夫大夫者君之股肱股肱見殺是將及君矣故大夫不名以殺之者原以其為大夫而殺之非私有仇于其人而殺之也此與曹殺其大夫不名同而所以不名者異彼稱國殺自是史失其名此稱人殺則以宋人與大夫對舉為文見以賤害貴而義不關乎其人也戊子晉人及秦人戰于令狐晉先蔑奔秦傳晉襄公卒靈公少晉人以難故欲立長君使先蔑士㑹如秦逆公子雍秦康公送公子雍于晉穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舎適嗣不立而外求君將焉寘此宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師宣子曰我若受秦秦則賔也不受冦也既不受矣而復緩師秦將生心潛師夜起戊子敗秦師于令狐按戰而不書敗者晉逆雍而秦納之其勢不當用大衆晉師夜起一戰遽奔雖敗而不甚故不書秦師敗績既陳矣故書戰令狐晉地故以晉主兵胡氏之說不確晉陽處父伐楚已以名見矣此趙盾帥師仍稱人者義見垂隴下狄侵我西鄙間秦晉之争也秋八月公㑹諸侯晉大夫盟于扈傳秋八月齊侯宋公衛侯陳侯鄭伯許男曹伯㑹趙盾盟于扈晉侯立故也按春秋凡書諸侯皆前目後凡而外大夫㑹盟必書名獨此諸侯前無目而從凡辭又不名晉大夫者以晉大夫主諸侯之盟也晉大夫何以主諸侯之盟是時晉襄甫卒主少國疑趙盾忠于為晉者也恐伯業不振諸侯生心欲示以盟主之尊以懾服之故遂以當國之權自予一切禮文儀節之間儼若晉侯之親在行者不稍為貶損而使諸侯悉拱聽約束此其心良苦而其事不可為訓故春秋特正其為晉大夫而諸侯畧而不序蓋以趙盾之僭為失其所以為大夫而諸侯之俯首帖耳惟其令之是從亦失其所以為諸侯也交譏之或曰文二年垂隴之盟晉襄既不在列則諸侯莫適為主亦必以士縠主之是晉大夫之主盟前此矣而見義于此何也士縠之主盟垂隴不過奉君命以行事耳若扈之盟則盾専之矣冬徐伐莒徐不稱人義見徐人取舒下公孫敖如莒涖盟莒為徐所伐故來求援以修洮之盟公孫敖徃涖之八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍傳晉人以扈之盟來討冬襄仲㑹晉趙盾盟于衡雍按扈之盟公若果後至則不應與㑹矣春秋何以書公㑹衡雍之盟未必因來討故乙酉公子遂㑹雒戎盟于暴杜註時雒戎將伐魯公子遂不及復君故専命與之盟果爾則當書曰遂㑹雒戎盟于暴矣必兩事皆受命故覆舉公子遂公孫敖如京師不至而復丙戌奔莒傳穆伯娶于莒曰戴已生文伯其娣聲已生恵叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲恵伯諫公止之使仲舎之敖反之復為兄弟如初八年秋襄王崩穆伯如周弔䘮不至以幣奔莒從己氏焉按奔不書出者奉使而道奔也螽宋人殺其大夫司馬宋司城來奔傳宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也按司馬書官而不名者蓋昭公欲去羣公子以致穆襄之族率國人攻公而殺其大夫然尚非六卿也至是又不禮于嫡祖母以致襄夫人因戴氏之族而殺其司馬其位愈尊則其去君愈近始而不保其大夫繼而並及其司馬岌岌乎殆哉不至于孟諸之弑不止矣故前書宋人殺其大夫以宋人與大夫對舉為文此復繋之以司馬所以著其亂形之日甚而義不關乎其人也蕩意諸來奔亦書司城者奔僅免于一死耳司城之書官與司馬之書官其義正同抑病其救敗之無術為不稱乎其官也此又華孫來盟之所以書官與氏而不名歟九年春毛伯來求金不書王使未葬也與求賻同求金蓋以共葬事夫人姜氏如齊出姜齊昭公女夫人父母在歲一歸禮也何以書望溪先生曰以著變也夫人之歸魯也貴聘而賤逆至而不致敬嬴仲遂同心以搆禍夫人至是蓋不安于魯矣故志其出而並志其返也是他日君薨子弑夫人大歸之端兆也二月叔孫得臣如京師辛丑葬襄王晉人殺其大夫先都按左氏傳夷之蒐晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之先克又奪蒯得田故先都士縠箕鄭父梁益耳蒯得殺先克不書先儒以為不告非也盾殺三大夫來告于魯必坐以殺先克之罪不可謂不吿而不書者凡兩下相殺不志于春秋以是為有司之事非王法之所寓也殺三大夫稱晉人者殺之者趙盾故不可稱國殺而以國法殺之又非兩下相殺者比故書晉人以著生殺之柄之不自其君出也三月夫人姜氏至自齊晉人殺其大夫士縠及箕鄭父箕鄭父書及者賈氏逵云非首謀按六年夷之蒐晉侯將登箕鄭父先都註云登之于上軍也七年令狐之戰箕鄭父將上軍則是箕鄭父已登矣故殺先克非首謀楚人伐鄭公子遂㑹晉人宋人衞人許人救鄭楚稱人者胡氏以為貶非也按左氏傳范山言于楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭杜註陳師狼淵為伐鄭援則是楚子本未嘗親將以伐鄭也故稱楚人四國皆卿稱人者左氏傳以為懲不恪亦非也自宣以前㑹伐㑹盟未有列序大夫之名者夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘莊公二十三年第書荆人來聘此稱楚子者蓋楚至是已復楚之舊號故也凡來聘必書爵秦伯之使術吳子之使札與此同義秦人來歸僖公成風之襚秦稱人者凡外諸侯之事舎㑹盟征伐及遣聘外概稱人來者使人來也不書使某者其人微也僖公成風之襚者兩襚並致不可以成風及僖公又不可以僖公及成風故列序而先僖公者夫死從子之義也或謂僖公薨已十年不應歸襚不知成風之薨亦已五年矣成風可歸襚僖公獨不可歸襚乎且恵公仲子之賵未有以為専賵仲子者何獨于此而疑之葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉凡伐國或稱君或稱大夫或稱師或稱人者其恒也而此年秦伐晉成公二年鄭伐許昭十二年晉伐鮮虞獨稱國先儒以為號舉望溪先生曰非也其事同時相次而獨于一役貶則其異于前後者何也蓋秦晉鄭許晉狄之戰亟矣又二國之私而與諸侯無與也或赴告不及傳聞畧不知其主兵者為君為大夫又不知其師之衆寡則第書某國加兵于某國而已楚殺其大夫宜申宜申謀弑而不以討賊書者獄疑而不敢定也胡氏謂以商臣故果爾則齊商人之見弑也何一同于弑君之恒辭乎自正月不雨至于秋七月榖梁傳歴時而言不雨者不閔雨也不閔雨者無志乎民者也及蘇子盟于女栗諸侯不當與王臣盟故諱公不書與盟于翟泉不書公同義王人稱子自此始蓋是時大夫張晉卿盟㑹冊書皆以名見而不復稱人則王朝之卿無轉稱王人及斥其行次之理故特為是稱以尊異之至成公八年天子使召伯來賜公命仍以行次稱者上書天子使故下不可以子稱也冬狄侵宋楚子蔡侯次于厥貉傳陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋逆楚子勞且聽命遂道以田孟諸按不書伐宋者未成乎伐也宋陳鄭皆從而特書蔡者陳鄭從楚而來宋以逆楚而至其與楚子期㑹次于厥貉而共謀伐宋者惟蔡而已春秋只據實而書非諒三國之不得已也胡氏之說非十有一年春楚子伐麇厥貉之㑹麇子逃歸故伐之楚書君將自此始夏叔仲彭生㑹晉郤缺于承筐傳謀諸侯之從于楚者杜註九年陳鄭及楚平十年宋聽楚命秋曹伯來朝公子遂如宋傳襄仲聘于宋且言蕩意諸而復之因賀楚師之不害按蕩意諸來奔而其歸不書者歸而無救于宋亂故輕其事而不書也十六年宋昭被弑傳稱蕩意諸死之而經亦削之者春秋時弑君者三十有六其君大都以無道遘禍惟宋昭即位之初以欲去羣公子而致殺其大夫繼又以無禮于襄夫人而致殺其司馬羣公子皆公子鮑之黨襄夫人淫行雖不為所禮亦别無甚不孝之事二者皆不當以無道之罪坐之乃公子鮑輸粟貸民卒使一國之人胥懐小恵而忘大義甘從指嗾不至于攻而殺之不止者以公輕慮淺謀其于羣公子及襄夫人處之不得其道故耳觀其臨命之時自以為不能其大夫至于君祖母以及國人其語亦良可悲矣聖人心傷其事故大書屢書終之以宋人弑其君杵臼雖事由王姬以朱子綱目書後魏馮太后弑其君之文例之其獄當有所歸而只以衆亂而無主名為文者蓋傷宋昭之狷隘少容自貽伊戚而著其禍之至如此其酷者示天下以幹母之蠱不可貞之道也聖人旣欲以宋昭垂戒而非為宋昭討賊則蕩意諸之死自不得不從略義固各有所取焉爾乃胡氏謂意諸知國人之將弑其君而不能止坐待其及而死之故不得與死于其職者比果如其說則如荀息之死亦知里克之將為難而不能止者也春秋何不以為匹夫匹婦之諒削之而不書乎狄侵齊冬十月甲午叔孫得臣敗狄于鹹傳鄋瞞侵齊遂侵我叔孫得臣追之冬十月敗狄于鹹獲長狄僑如以命宣伯十有二年春王正月郕伯來按傳稱郕太子來奔而經稱郕伯者蓋公以諸侯逆之史若以世子書是顯著公之失矣春秋為尊者諱故書郕伯杞伯來朝二月庚子子叔姬卒傳杞桓公來朝始朝公也且請絶叔姬而無絶昏公許之二月叔姬卒不言杞絶也按成公五年杞叔姬來歸其見絶與此叔姬同而八年冬十月書杞叔姬卒何以不絶之于杞也且此叔姬來歸何以不見于經當是嫁而未廟見因疾甚婦人之性當伏枕危殆之際尤戀戀于母家抑或欲就醫藥以庶幾其萬一之救杞伯不忍拂其意故假來朝之名送之歸魯不幸而卒遂訂後姻耳惟未廟見不成其為婦故不係杞非絶之也但此年書子叔姬卒踰二年又書齊人執子叔姬不應同為文公女而有兩叔姬也先儒謂此年叔姬以庚子卒誤衍一子字然考公榖經文皆書子叔姬斷無三傳皆誤之理殆如叔夜叔夏之類以二姬孿生故皆稱叔姬歟其所以稱子者未廟見不成其為婦既不係杞若但稱叔姬則與女之未嫁者無别矣故稱子叔姬此與嗣君未踰年即位者稱子其義正同諸侯未即位既可稱子而示其未成君矣則夫人未廟見何不可稱子而示其未成婦乎夏楚人圍巢傳羣舒叛楚夏楚令尹子孔執舒子平及宗子遂圍巢秋滕子來朝傳亦始朝公也秦伯使術來聘秦君臣始並見冬十有二月戊午晉人秦人戰于河曲傳秦為令狐之役伐晉取覊馬晉人禦之從秦師于河曲臾駢請深壘固軍以待之秦人欲戰秦伯問士㑹曰若何而戰對曰趙有側室曰穿好勇而狂若使輕者肆焉其可十二月戊午秦軍掩晉上軍趙穿追之不及反怒將獨出乃皆出戰交綏秦行人夜戒晉師明日請相見臾駢曰將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰薄人于險無勇也乃止秦師夜遁按戰不書及者春秋書戰以受兵之國主兵例也據傳稱秦伐晉晉固為受兵之國矣然秦取覊馬而退晉師從之直至河曲則兩國邊界一彼一此相加以兵而交受其害非彭衙令狐比也故不書及趙盾將稱人說見二年盟于垂隴下季孫行父帥師城諸及鄆杜註鄆魯莒所争者以其逺逼外國故帥師城之十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒傳邾文公卜遷于繹史曰利于民而不利于君邾子曰苟利于民孤之利也遂遷于繹五月卒君子曰知命自正月不雨至于秋七月義與二年十年同世室屋壊左氏經文作太室杜註太廟之室公羊作世室壊必更作不書者常事不書冬公如晉衞侯㑹公于沓請平于晉也狄侵衞十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐亦請平于晉也十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾傳邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故恵伯伐邾夏五月乙亥齊侯潘卒春秋于外諸侯之葬魯不㑹即不書此常例也獨齊侯潘卒不書葬則别有故蓋昭公卒舎立四月而被弑昭公尚未及葬期舎弑而子叔姬即被執蓋商人惡魯與舎婚故並執單伯以辱魯昭公之葬魯即遣使者往商人必不使㑹不㑹故不書此與陳哀公之書葬其義正可以參互得之彼以楚聽魯使者㑹葬故書葬此以商人不聽魯使者㑹葬故不書葬皆舊史之文聖人不得而易之也不然魯于齊君之葬無不㑹者獨潘之卒乃無故而廢䘮紀豈情也哉六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城傳同于楚者服且謀邾也杜註謀捷菑同盟義見莊十六年盟幽下秋七月有星孛入于北斗公至自㑹晉人納捷菑于邾弗克納傳邾文公元妃齊姜生定公二妃孝姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乗納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還公羊傳弗克納何大其弗克納也按晉人左氏傳謂趙盾公羊謂郤缺榖梁謂郤克三人皆嘗以名見矣而人之者義見垂隴下抑或以傳聞異辭聖人故疑而缺之歟捷菑不係邾明其不當立也弗克納者著其納所不當納以義折之即不能不廢然而返蓋以伯令不行于小國而病晉人之輕舉也公羊云云于聖人語氣似不甚恊九月甲申公孫敖卒于齊齊公子商人弑其君舎傳子叔姬妃齊昭公生舎叔姬無寵舎無威公子商人驟施于國而多聚士盡其家貸于公有司以繼之夏五月昭公卒舎即位秋九月商人弑舎按舎即位纔四月而商人弑之稱君者未踰年第不可以爵稱耳君臣之分則已定故正其為君以著弑之者之罪也商人稱公子蓋已為大夫故宋子哀來奔高哀何以稱子賢之也司馬司城皆書官此獨不書官者位非六卿孟諸之禍于彼無責焉爾冬單伯如齊齊人執單伯單伯莊元年見經至今已八十餘年必非一人或其子若孫歟齊稱人者執諸侯大夫例稱人不稱行人者本非聘問之使故也齊人執子叔姬按左氏傳以子叔姬為齊君之母既弑其君又執其君之母商人之惡極矣春秋必異文以著其罪不當僅以執子叔姬書公羊傳單伯之罪何道淫也惡乎淫淫乎子叔姬何註時子叔姬當為齊夫人使單伯送之據此則子叔姬非舎之母乃舎之夫人其說似得其實但舎弑在九月春秋書冬單伯如齊乃遣使在冬非至齊之日在冬也齊魯相去不逺舎既弑而遣使送女必無此理叔姬歸齊當在昭公未卒之前甫至齊而昭公卒舎在諒闇中未廟見旋即被弑魯因舎既弑而叔姬無所從故遣單伯往請商人惡魯與舎婚單伯至適觸其怒遂並叔姬執之此當日之情實也道淫之說不足信商人執君夫人無禮已甚然其罪固無加于弑君也故春秋只據實而書文無加貶兩事故覆舉齊人内女有變則書歸叔姬被執其歸應書而不書者未廟見不成乎其為歸也故不書其稱子者說詳下齊人來歸子叔姬下十有五年春季孫行父如晉傳為單伯與子叔姬故也杜註欲因晉請齊三月宋司馬華孫來盟按華孫之所以來盟者是時宋公子鮑弑械已成宋昭孤立其勢甚危華孫忠于公室者也故孫氏覺謂其懼隣國因間以謀其國特來盟以結好而紓難是固然矣然其意不在魯也考十三年傳稱公如晉朝衞侯㑹公于沓公還鄭伯㑹公于棐皆因公請平于晉鄭子家至賦鴻雁欲公逺行還晉以安恤之則公之睦于晉可知矣華孫之來蓋欲因魯以求晉冀結覇國之援以潛消其肘腋之變也前司城子哀來奔當亦此意不然魯為自守之國不但不可以持危定傾之義望之並所謂因間以謀其國者魯亦斷無此事乃奔者奔盟者盟皆不于他國而于魯也何為乎至華孫之所以不名者蓋司馬主兵之官位尊權重當危亂之時誠竭其股肱之力輔其君以和其民上有以囘襄夫人之心下有以散公子鮑之黨則轉危為安非遂無可措手之處乃心有餘而智不足徒僕僕焉不憚行李之往來以庶幾于將伯之助此其為謀之不臧不待智者而知其多此一盟矣故春秋特書其官而不以名見蓋著其為司馬宜若可以有為而以其救敗之無術傷孟諸之禍之將及也豈如左氏貴之之說哉殺與來奔第書官此係以華孫者前書殺其大夫司馬矣此又一司馬也故特書華孫以别之其不别之以其名何也義不關乎其人本當與公子卬蕩意諸一例第書其官而不名因嫌與前司馬相混故不得不有以别之然若别之以其名則書其官之義轉晦故特係之以華孫而仍不以名見此聖人之文所為至當而不可易者歟不書使者說具閔二年齊高子來盟下夏曹伯來朝齊人歸公孫敖之䘮不書來者蓋齊人但置諸境上其家取而殯之也六月辛丑朔日有食之鼓用牲于社單伯至自齊公羊傳大夫不致此致者喜禍患解也晉郤缺帥師伐蔡戊申入蔡傳新城之盟蔡人不與郤缺以上軍下軍伐蔡以城下之盟而還榖梁註伐入兩舉者伐而不即入也秋齊人侵我西鄙季孫行父如晉以齊人侵我西鄙告晉也冬十有一月諸侯盟于扈傳冬十一月晉侯宋公衞侯陳侯蔡侯鄭伯許男曹伯盟于扈㝷新城之盟且謀伐齊齊人賂晉侯故不克而還于是有齊難是以公不㑹按晉自文襄以後凡諸侯之㑹盟未有諸侯自為之而晉不與者而晉靈方㓜不在諸侯故其在位十四年凡㑹盟從不親行此年盟于扈十七年㑹于扈必仍以趙盾主之無疑乃七年書公㑹諸侯晉大夫盟于扈而此及十七年獨稱諸侯並不書晉大夫者先儒或以七年㑹盟雖以趙盾主之而猶列序于下此及十七年盟㑹則以趙盾主之而且列序于上矣春秋謹名分列序于下猶可言也列序于上不可言矣故没而不書其說非也春秋序㑹盟從不以大夫先諸侯以當日本無其事也趙盾雖専晉然亦何至䟦扈若此乎經之所以不書晉大夫而諸侯不序者蓋趙盾因前此在扈以大夫而主諸侯之盟其體旣有所不順又當主少國疑之日陳蔡鄭宋同時而折于楚文襄之伯業幾于不振故十四年新城之盟復書同蓋盾亦自知前此主盟之失又懼伯業之不振故特舉久曠不行之典以明其謙也然其禮雖較殺而大夫主盟之實如故也終嫌于逼上而恐諸侯生心故此年盟于扈十七年㑹于扈其徵召諸侯之文皆以晉侯親行為詞及後雖盾主其事而其著于策書而藏在盟府者仍以晉侯列序諸侯之上而盾並不以名見蓋為此掩耳盜鈴之計欲以晉侯藉口而使天下不得而議其僭也左氏傳所以謂晉侯親之者以此聖人于此使復如七年書晉大夫則趙盾本不以名見魯史舊文聖人不得而易之也然趙盾又實假其君之名以主其事若竟以晉侯書則其假竊専擅之罪無由著矣故惟有沒趙盾不書而諸侯則畧而不序以發疑端而見情實此聖人之文所為游夏不能賛一辭者也左氏謂此年及十七年扈之盟皆不序諸侯以病晉侯之不能討賊亦不確賊之討不討不以諸侯之序不序異義也盟主大合諸侯而不能討賊列序之其罪不更著乎不書同盟者蓋自莊二十七年盟幽之後盟不稱同者已久前新城之盟復書同者特趙盾自悔其主盟之失故復用其禮以明謙耳非常典也至是以晉侯藉口遂侈然而仍以盟主自居矣十有二月齊人來歸子叔姬叔姬稱子者先儒謂時君之女稱子然内女之見經者多矣豈皆先君之女而此獨别之以子耶其他猶不可考如成九年書伯姬歸于宋不稱子若以伯姬為先君之女則必宣公女審矣考宣公五年書齊高固來逆子叔姬以行次論之伯姬必叔姬之姊又審矣高固所逆之叔姬在宣公時既以稱子而决其為宣公女伯姬在成公時又以不稱子而决其亦為宣公女乃妹嫁已二十餘年而其姊始嫁揆之情理當不其然故伯姬為成公女無疑伯姬為成公女在成公時而不稱子則凡稱子者必非以其為時君之女也又何疑乎然則叔姬何以稱子也按小戴記曾子問曰女未廟見而死則如之何孔子曰不遷于祖不祔于姑壻不杖不菲不次歸葬于女氏之黨示未成婦也又曾子問曰取女有吉日而女死則如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之據此有吉日而夫死既與女死同則女未廟見而夫死其為不成婦也亦當與女死同今叔姬未廟見而舎被弑不成其為婦固不可云齊人執其君夫人也若云齊人執我叔姬則又以叔姬屬之于魯而與女之未嫁者無以異故稱子叔姬蓋著其子而不婦不婦云者疑于為婦之詞其為己嫁之女亦遂不待别白而自見矣然則宣公五年齊高固所逆之叔姬經亦以子稱者何按高固所逆之叔姬杜註以為宣公女然據傳稱公如齊高固使齊侯止公而請叔姬云云則高固之欲與魯婚其意専在于叔姬耳若叔姬果宣公女高固不應無端相慕悦若此且高固齊之貴卿是時魯方事齊以禮相求必不見拒何必使齊侯止公以強之也蓋此年齊人所歸之叔姬即高固所逆之叔姬也姬在齊日久公羊道淫之說雖不足信然必有所以致此惡聲者高固乃申公巫臣之流故必欲娶之而又恐魯以故君之夫人為辭故使齊侯止公而强委禽焉聖人深惡其事故大書屢書四叔姬皆從嫁而未廟見者之稱蓋特著其前後之為一人非宣公時别有一叔姬也于是高固之貪戀美色雖干犯名義而不顧叔姬之甘從二夫不能以死自矢並齊魯二君之均有所失者其責遂皆無所逃此春秋筆削之義固非游夏之所能贊者歟稱齊人者春秋于外諸侯之事凡若此類皆稱人以義不係乎其爵也齊侯侵我西鄙遂伐曹入其郛傳齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也遂者繼事而加甚之辭義見僖六年諸侯遂救許下十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟傳春及齊平公有疾使季文子㑹齊侯于陽榖齊侯弗肯曰請俟君間夏五月公四不視朔傳疾也按諸侯每月必告朔聽政謂之視朔前書不告月此書不視朔者以公疾不能聽政也六月戊辰公子遂及齊侯盟于郪丘傳公使襄仲納賂于齊侯故盟于郪丘秋八月辛未夫人姜氏薨毁泉臺傳有蛇自泉宫出入于國如先君之數秋八月聲姜薨毁泉臺按毁臺與築臺異而春秋必書者譏其惑于蛇妖而不知死生之有命也楚人秦人巴人滅庸傳楚大饑戎伐其西南至于阜山又伐其東南至于陽丘庸人帥羣蠻以叛楚麇人率百濮聚于選將伐楚于是申息之北門不啟楚人謀徙于阪高蒍賈曰不可我能往冦亦能往不如伐庸乃出師旬有五日百濮乃罷使廬戢黎侵庸及庸方城庸人逐之又與之遇七遇皆北庸人曰楚不足與戰矣遂不設備楚子乗驛㑹師于臨品分為二隊子越自石溪子貝自仭以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸按滅庸者子越子貝也故稱楚人冬十有一月宋人弑其君杵臼傳宋公子鮑禮于國人襄夫人助之施昭公無道夫人將使公田孟諸而殺之冬十一月昭公田孟諸未至夫人王姬使帥甸攻而殺之按宋昭甫立即欲去羣公子又不禮于襄夫人以致骨肉之間狡焉思逞于是司城懼禍而出奔于前子哀復潔身而行遯于後其亂亡之象岌岌乎不可以終日矣至是而果為國人所弑通前後文觀之一則曰宋人殺其大夫再則曰宋人殺其大夫司馬終之曰宋人弑其君杵臼是何宋人之好亂乎公非甚無道之主而禍機之屢發而卒莫之救也遂至于此書之重而詞之複聖人之情可見矣十有七年春晉人衞人陳人鄭人伐宋傳晉荀林父衞孔達陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也按宣公以前㑹伐㑹盟未有列序大夫之名者夏四月癸亥葬我小君聲姜傳有齊難是以緩齊侯伐我西鄙杜註西當為北蓋經誤六月癸未公及齊侯盟于榖傳襄仲請盟六月盟于榖杜註晉不能救故請服諸侯㑹于扈傳晉侯蒐于黃父遂復合諸侯于扈平宋也諸侯不序義見盟于扈下秋公至自榖特㑹參盟不致而㑹齊致者齊甫伐我北鄙不得已而請服有戒心焉故致也後凡㑹齊而致義皆倣此冬公子遂如齊十有八年春王二月丁丑公薨于臺下薨不于路寢非正也于臺下抑又甚矣或謂因隕而斃秦伯罃卒夏五月戊戌齊人弑其君商人傳齊懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乗夏五月公游于申池二人乃謀弑公納諸竹中歸舎爵而行按弑君稱人者其人微也商人弑君之賊然既以賊為君矣則弑弑君之賊者不得借名以貰其罪故曰春秋成而亂臣賊子懼六月癸酉葬我君文公秋公子遂叔孫得臣如齊二卿並書者按傳稱恵公立故且拜葬兩事故並命非相為介也故並書冬十月子卒子卒而不地辨詳莊三十二年子般卒下不名者先君既葬故不日者變由敬嬴仲遂秘不可詳按叔仲彭生傳稱仲以君命召入殺而埋之馬矢之中而經不書其卒望溪先生曰内大夫之卒必書大夫國體也有生無所見而卒書者矣未有生見于經而卒不書者而桓莊之間五十年如翬如柔如單伯如溺如結其逆女㑹盟帥師大書特書而卒則無見焉蓋隠之大夫而臣于桓則背君也桓所建置則黨賊也故凡隠之大夫而臣于桓桓之大夫而死于莊之世者皆不書其卒以示為王法所不容也至莊三十二年而後書牙之卒則莊之大夫也然則叔彭生之卒不見于經何也此義之變也使紀外事當書公子遂弑其君赤及其大夫彭生而為國諱惡不敢然也子之弑不書而第書叔生之卒則習其讀者以為内大夫卒之常詞而狥君之迹隱矣故反削其卒而不書此即君薨不地葬而不書之義也内大夫卒無不書而桓之大夫不書宣之大夫得罪于先君者卒皆書而狥君者不書皆所以發疑端見情實也安知非舊史本不書乎為舊史者非明于春秋之法也再世而不錄大夫之卒史無是法也彭生之事非諱而書卒即誣而書刺耳以是知孔子削之也夫人姜氏歸于齊傳文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公夫人姜氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜杜註所為出姜不允于魯季孫行父如齊張氏洽曰告宣公之立按宣十八年行父云使我殺適立庶以失大援者仲也夫則子赤之弑宣公之立行父實與聞乎故故經書行父如齊于夫人大歸之後其罪不待貶絶而自見矣莒弑其君庶其傳莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮于國僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑季文子使司冦出諸境按弑庶其者僕也春秋乃以國舉蓋僕以其寳玉來奔必以國亂君弑為辭而公且命與之邑其不以僕為弑君之賊可知矣魯史承而書之必曰莒人弑其君聖人修之欲仍其舊則失實欲正其失則國惡又不可不諱故懸獄而不敢有所歸第書其國有是事而已此春秋所以為謹嚴歟春秋究遺卷八
