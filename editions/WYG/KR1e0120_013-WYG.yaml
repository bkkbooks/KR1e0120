body:
  text: 春秋究遺卷十三左庶子葉酉撰昭公上元年春王正月公即位按子野之卒先儒謂季氏隂弑而以毁告果如其説則昭公不當書即位矣季氏雖不臣然非若慶父之意在得國與仲遂之意在立庶也昭公與子野皆襄公子昭是時又年已十九彼何所利于昭公之立而為此大不韙之事哉叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢傳尋宋之盟也楚令尹圍請用牲讀舊書加于牲上而已杜註楚恐晉先歃故欲從舊書不歃血經所以不書盟按陳招稱公子以其為大夫也諸侯之兄弟見經者十而傳獨于招稱司徒則其為大夫審矣為大夫故稱公子義狊隠四年翬帥師下不歃血不成乎其盟也故不書盟三月取鄆凡取邑必先書伐某國此不先書伐莒者鄆乃魯之舊疆若先書伐莒則似取莒之邑矣襄公十二年季孫救台遂入鄆不言伐莒亦此意也夏秦伯之弟鍼出奔晉傳秦后子有寵于桓如二君于景其母曰弗去懼選癸丑鍼適晉其車千乗六月丁巳邾子華卒晉荀吴帥師敗狄于大鹵傳晉中行穆子敗無終及群狄于太原崇卒也將戰魏舒曰彼徒我車所遇又阨請皆卒自我始乃毁軍以為行翟人笑之未陣而薄之大敗之秋莒去疾自齊入于莒傳莒展輿立而奪羣公子秩公子召去疾秋齊公子鉏納去疾按公子返國或書自或不書自其不書自者以其于外諸侯無所藉力如齊小白陽生是也其書自者以諸侯納之傳所謂外有奉是也莒去疾以齊公子鉏帥師納之故書自齊入于莒然桓十一年突歸于鄭荘二十四年赤歸于曹傳稱宋人執鄭祭仲戎侵曹則其藉力于宋與戎審矣而不書自者何葢文有所承不必書也然突與赤皆文有所承此獨無所承者何􅊳與赤之歸寔宋與戎主之去疾則莒公子召之齊特使公子鉏帥師以送之耳其事異故文不得不異也去疾以名係國正也傳稱犁比公生去疾及展輿則去疾長子當立可知與齊小白陽生繫國義同莒展輿出奔吳展輿係國先儒以為罪諸侯之與其立非也凡入國必當立者乃係國不當立者即不係國以國本非其所有也若出奔則未有不係國者葢雖不當立而既有其國矣安得不以實書乎不書爵説詳桓十一年鄭忽出奔衛下叔弓帥師疆鄆田傳因莒亂也葬邾悼公冬十有一月己酉楚子麇卒按傳楚令尹圍將聘于鄭未出竟聞王疾而還縊而殺之並殺其二子而經以卒書先儒紛紛異論至以不書弑為聖人制人欲而存天理迂誕至此大抵皆為傳所誤而不援經以為斷耳春秋傳信之書使麇果弑經必不書卒經既以卒書則麇必非弑而傳所以為是説者葢當麇卒時其子尚幼圍大權在握因殺其孤而篡其位而其後又窮凶極惡身犯衆怒下流之人衆毁所歸故並加以弑麇之罪左氏遂從而信之而不知其實不然也凡弑逆之賊未有不自諱其事而惟恐人之揭之者乃楚靈于慶封蔡般之弑其君也皆聲罪致討其不以弑君之事為諱者彼固自以為無是事耳迨慶封不肯從戮然後知己固被此惡名而惟恐其聞于諸侯也使速殺之而其于蔡侯般直殺之而不以狥矣使當日果出于弑吾知其並慶封亦不待其不肯從戮也早殺之而不以狥矣然則楚麇之非弑所當信經而廢傳也奚疑楚公子比出奔晉凡國有弑逆之事則大夫出奔不書葢春秋舉重重莫重于弑君一大夫之出奔猶世變之小者耳輕其事故畧之如魯季友之奔陳齊紏之奔魯皆不書是其例也其他如哀三年書桓宫僖宫災而傳記司鐸火經文不書即此義此既書楚公子比出奔晉則楚子麇之是卒而非弑也益信二年春晉侯使韓起來聘杜註公即位故夏叔弓如晉傳報宣子也秋鄭殺其大夫公孫黑鄭公孫黑好在人上攻良霄而逐之又與公孫楚争室將作亂欲去游氏而代其位駟氏與諸大夫欲殺之子産在鄙聞之乘遽而至使吏數之黑遂縊尸諸周氏之衢冬公如晉至河乃復季孫宿如晉傳晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉杜註致少姜之禭服按齊使陳無宇致少姜晉且怒其非卿也而執之矣則公之弔少姜雖曰非禮當亦晉平之所喜者肯以為非伉儷也而辭之乎且繼此辭公者四其為拒公而非尊公也審矣意當時季孫專魯其取卞也襄公歸自楚而不敢入矣今公如晉季孫恐其訴已故結晉卿而逆拒之耳然必以少姜為辭左氏所載乃晉之餙辭也似不得其實三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公杜註卿共小國之葬禮過厚葬襄公滕子來㑹故魯厚報之按昭公謹于交隣之禮故以知禮稱秋小邾子來朝八月大雩冬大雨雹北燕伯欵出奔齊諸侯出奔不名此名者從此遂失國也與諸侯卒則名義同四年春王正月大雨雹胡氏安國曰雹戾氣也隂脅陽臣脅君之象申豐者季氏之孚也不肯端言其事故暴揚于朝歸咎蔵氷之失夫蔵氷特調爕之一事耳謂能使四時無愆伏凄苦之變雷出不震無菑霜雹則亦誣矣夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚子使椒舉如晉求諸侯晉侯許之夏諸侯如楚惟魯衛曹邾不㑹六月丙子楚子合諸侯于申胡氏安國曰申之㑹楚子為主而不殊淮夷是在㑹之諸侯皆狄也其説非是按春秋于吳多殊㑹成十五年㑹吳于鍾離襄十年㑹吳于柤于向皆以吳先在是而晉帥諸侯往㑹之故不得不㑹而又㑹若襄五年秋諸侯㑹于戚吴人入聼命則不書㑹吳于戚矣淮夷與于申之㑹非先在申而楚帥諸侯以㑹之也豈有殊㑹之理乃遂以為遍刺天下之諸侯適見其鑿而不可通矣楚人執徐子徐子吴出也以為貳焉故執之按盂之㑹執宋公不覆舉楚人此獨覆舉者其説詳彼條下先儒或謂若不覆舉楚人不知執之者為誰矣其説非是楚主㑹而執徐子豈不知執之者為誰乎如僖十五年書晉侯及秦伯戰于韓獲晉侯亦不覆舉秦人也此自是兩事故覆舉耳别為之說要不可通秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳杜註因申㑹以伐吳不言諸侯者鄭齊滕小邾宋不在列故也執齊慶封殺之按執齊慶封不書楚人者克朱方而執其邑大夫與伐吳一事也故不覆舉楚人上文執徐子則㑹不與執為類兩事也故必覆舉其不曰殺齊慶封而曰執齊慶封殺之者楚與吳為仇初無意于殺齊慶封也克朱方而執之因欲狥于諸侯以為名葢慶封被執之後而楚始有殺之之意若不書執而但書曰殺齊慶封則其語勢直而急似楚真為討齊慶封而伐吳矣傳稱圍朱方克之而經不書者克而不有其地書執齊慶封足以槩之故遂滅賴九月取鄫不書伐莒者傳稱鄫叛而來本未嘗以兵取之也冬十有二月乙夘叔孫豹卒五年春王正月舍中軍傳初作中軍三分公室而各有其一季孫盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇其二二子各一皆盡征之而貢于公按初作云作三軍今不云舍三軍者初作時舊有二軍非于二軍外更增一軍也乃令舊皆屬公者今以五分屬公七分屬私屬私者為上下二軍屬公者為中軍是增一軍而二軍皆動故云作三軍此則惟舍中軍之衆屬上下二軍而已其上下二軍如故也故惟云舍中軍作三軍者卑公室之漸舍中軍者卑公室之極楚殺其大夫屈申傳楚子以屈申為貳于吴乃殺之公如晉汪氏克寛曰昭公如晉者七至晉而見止者一及河而不至者五惟此年得善往返然以莒人之愬亦幾不免于辱夏莒年夷以牟婁及防茲來奔傳牟夷非卿而書尊地也辨見襄二十一年邾庶其以漆閭丘來奔下防兹言及者公羊傳不以私邑累公邑也秋七月公至自晉傳莒人愬于晉晉侯欲止公范獻子不可請歸之而以師討焉乃歸公戊辰叔弓帥師敗莒師于蚡泉傳莒人來討不設備戊辰叔弓帥師敗諸蚡泉莒未陳也秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳報􅁄櫟麻之役也越始見經稱人者與諸國列序而獨以號舉于文不順故稱人傳稱吳人敗之于鵲岸不書者不告也六年春王正月杞伯益姑卒傳弔如同盟禮也杜註魯怨杞因晉取其田而今不廢䘮紀故禮之葬秦景公夏季孫宿如晉傳拜莒田也杜註謝前年受牟夷邑不見討葬杞文公宋華合比出奔衛傳宋寺人栁有寵太子佐惡之華合比曰我殺之栁聞之坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐合比按襄二十六年寺人恵牆伊戾讒太子痤亦坎牲加書而告公曰與楚客盟矣與此事相類毛氏竒齡曰猶是宋平一人前既識太子之寃已烹寺人而今復受其譖猶是太子佐前不能救兄今復不能為合比辨此皆事之不足據者解經者不可不察也秋九月大雩楚薳罷帥師伐吳傳楚子使薳洩伐徐吳人救之令尹子蕩帥師伐吳師于豫章而次于乾谿吳人敗其師于房鍾杜註楚不以敗告故不書按下叔弓如楚傳稱弔敗則非不告矣葢春秋于勝負無闗于火勢者畧而不載其常也冬叔弓如楚弔敗也齊侯伐北燕傳齊侯伐北燕納簡公燕人行成戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還按傳稱納簡公而經不書者得賂而還不成乎納也七年春王正月暨齊平按傳文十六年稱及齊平襄二十年稱及莒平哀八年稱及齊平而經皆不書獨此年書暨齊平定十年書及齊平十一年書及鄭平先儒或以文十六年書行父㑹齊侯于穀襄二十年書㑹莒人盟于向哀八年書齊人歸讙及闡則其平可知故從省文不書平其説非也定十年下書公㑹齊侯于夾谷上仍書及齊平何不從省文也葢凡彼為我所侵伐而有怨于我者與之平則書若我為彼所侵伐而有怨于彼者與之平則不書考傳文十六年齊商人無道既執子叔姬又伐我西鄙晉不能救故公與之平襄二十年以督揚之盟與莒平哀八年以齊討入邾而與之平或以勢不能抗或廹于大國之命雖與之平而非其心之所願故其平不書者魯史之舊文以非其心之所願而諱之也魯史之所無聖人安得而益之正月暨齊平三月叔孫婼如齊蒞盟與定十一年及鄭平叔還如鄭莅盟事正相類其為魯暨齊平無疑且外諸侯相與平非有闗于天下之大勢者春秋不書左氏謂齊求燕而與之平其説不足信變及言暨者榖梁傳不得已曰暨齊强而魯弱魯不應能强齊所為不得已者殆卑詞厚幣以請成在外曰輸在内曰暨而為所强者亦遂有不得已而從其請者歟是時季氏不臣之迹已著四分公室而擇取其二故公欲結大國之援將藉之以除其偪而晉政多門既不能預知魯國之難吳楚又鞭長莫及惟齊與魯壤地相接景公方有圗伯之志故公强齊而與之平以冀其緩急之相濟也春秋書之曰暨明其汲汲然于此一平非徒敦隣國之好而已二十五年公伐季氏不克而孫于齊其端已兆于此矣三月公如楚傳楚子成章華之臺願與諸侯落之薳啟疆來召公三月公如楚叔孫舍如齊莅盟始暨齊平故盟以結好夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師傳陳哀公元妃鄭姬生悼太子偃師二妃生公子留三妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺世子偃師而立公子留哀公縊按招為司徒故元年招稱公子此變文以陳侯之弟書者著其以親屬而忍為大惡也本望溪先生説夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人于徵師殺之傳干徵師赴于楚且告有立君公子勝愬之于楚楚人執而殺之按稱行人者先儒謂事由招過非徵師之罪故書曰行人其説非也詳見莊十七年齊人執鄭詹下陳公子留出奔鄭稱公子不子招之立為世子也秋蒐于紅不言公先儒以為權在三家望溪先生曰書公者公之私行也不書公者國政也但書蒐者選徒約也曰大者境内畢作也按春秋五書蒐皆在昭定之世豈前此皆不蒐耶葢蒐狩必在近郊之地得其地則不書昭定之世三桓檀國四分公室各有分地往往就其私邑所近之處以閱其軍實故于紅于昌間于比蒲皆惟三家之所便而不主故常聖人詳書于冊葢以蒐非其地而譏之也昭定以前豈有是哉然亦有得其地而書如桓六年書大閲者則以非時簡車徒為戰于郎之張本也陳人殺其大夫公子過傳公子招歸罪于公子過而殺之是時陳無君故不稱國殺而兩下相殺不志于春秋招專陳國故稱人而不目招大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐傳楚公子棄疾帥師奉孫吳圍陳冬十一月滅陳按不目棄疾者放招殺奐非棄疾所得専也若滅陳目棄疾而放招殺奐更舉楚子或更稱楚人則于文贅孔奐公子招之黨係之陳者楚殺之也不曰陳大夫者殺隣國之大夫與執隣國之大夫同例不書其官葬陳哀公按陳已滅而哀公書葬先儒以為存陳非也几春秋書外諸侯之葬皆據魯為文非據彼國為文也若據彼國為文則當書曰某國葬某公矣惟據魯為文故魯不遣使往㑹輙不書葬而其文曰葬某國某公言魯遣使往葬某國某公也卿往則書某人如某國葬某國某公微者往則不書某人如某國第書葬某國某公不言㑹葬者禮重往葬義不係乎㑹也陳哀公之所以書葬者葢溺卒即赴魯即遣使往㑹其葬及楚滅陳葬哀公時魯使在列故仍以葬陳哀公書葢據魯為文非據陳國為文此哀公之所以國既滅而書葬也或又以葬哀公者楚據其實而書之承上楚師滅陳文從省則其説更不足信春秋凡一國接書兩事必覆書某國從無承上文從省之例九年春叔弓㑹楚子于陳傳叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳杜註楚子在陳四國大夫往不行㑹禮故不總書愚按經書㑹未有不行㑹禮者四國離至不旅見故不總書許遷于夷杜註許畏鄭欲遷故以自遷為文夏四月陳災陳已滅而書陳災者災害必繫于所災所害之處書陳災指其處也秋仲孫貜如齊傳孟僖子如齊殷聘杜註自叔老聘齊今二十年禮意乆曠今復盛聘無忘舊好也冬築郎囿傳書時也十年春王正月夏齊欒施來奔傳齊欒高氏皆嗜酒信内强于陳鮑氏而惡之陳鮑方睦遂伐欒髙氏戰于稷欒髙敗欒施髙彊來奔杜註髙彊不書非卿秋七月季孫意如叔弓仲孫貜帥師伐莒中軍既毁則仍二軍矣此三卿並書非必一卿領一軍也殆季孫自將一軍其一軍以正佐分領之歟叔弓宣公弟叔肸之後非叔孫氏也胡氏以為三家誤矣傳稱取郠而經不書者意如以此見執故諱之戊子晉侯彪卒九月叔孫舍如晉葬晉平公十有二月甲子宋公成卒不書冬缺文十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申傳楚子在申召蔡靈侯蔡大夫曰幣重言甘誘我也不如無往蔡侯不可楚子伏甲而饗蔡侯于申執而殺之刑其士七十人按楚子虔何以名先儒謂惡其誘殺非也楚子棄疾亦嘗誘戎蠻子而殺之矣何獨于此而名之葢楚靈弑君之事雖不可知而殺其君之二子以篡其位則無可疑者是其罪與弑君等天下惟無瑕者可以責人已則有罪而討人之罪君子弗予也故諸侯不生名而于此獨名者著誘殺蔡侯般者非他人乃楚子虔也他人挾詐而殄不義已不得為伯討以楚子虔而誘殺蔡侯般則如同浴而譏裸裎尤不足以服其心矣故名之以别其人于凡討罪者耳豈徒惡其誘殺云爾乎楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨左氏以齊歸為娣望溪先生曰非也未有誌娣之薨而反削夫人之薨葬者也歴襄昭定哀而未嘗别見襄夫人之薨以此知齊歸之為嫡也大蒐于比蒲有大喪而不廢蒐非禮也仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憗傳謀救蔡也晉人使狐父請蔡于楚弗許九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之傳楚子滅蔡用隠太子于岡山申無宇曰不祥五牲不相為用况諸侯乎按申無宇稱用諸侯則有已嗣君位矣未踰年宜稱子而以世子書者禮國君薨既殯五日嗣子于柩前即位國人稱子是時般見殺而國被圍有並無柩前可以行禮故春秋不得以子稱也邾人執鄫子用之不名而有名者既滅其國矣用其世子不足以甚其罪也故有名十有二年春齊髙偃帥師納北燕伯于陽陽非北燕之國都故不書復歸納于陽不應名衛侯入于夷儀不名是其例也欵終于陽不得其卒而名之故不得不名其出奔與莒庚輿蔡朱名同義不曰北燕伯入于陽而以齊納為文者以著齊景公之有志于復伯也三月壬申鄭伯嘉卒夏宋公使華定來聘通嗣君也公如晉至河乃復傳取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子憗遂如晉榖梁傳季孫氏不使遂乎晉也按公如晉者七至河而復者五豈皆莒之愬耶榖梁之說似得其實五月葬鄭簡公杜註三月而葬速楚殺其大夫成熊傳楚子謂成熊若敖之餘也遂殺之杜註宣四年鬭椒作亂楚子信讒而托若敖之餘秋七月冬十月公子憗出奔齊南蒯不禮于季平子與公子憗謀欲出季氏而歸其室于公使憗更其位及憗從公如晉蒯懼不克以費叛如齊憗還及郊聞費叛遂出奔楚子伐徐傳楚子狩于州來次于穎尾使蕩侯潘子帥師圍徐以懼吳楚子次于乾谿以為之援按圍徐者非楚子故書伐而不書圍晉伐鮮虞晉不稱師義見文十年秦伐晉下十有三年春叔弓帥師圍費按經書内圍邑七皆不書叛成三年圍棘拒命者非棘民則齊有司也定六年圍鄆與齊人争皆不可以叛言也昭二十六年圍成時公已孫齊舉國拒命不得獨言成叛也定十二年圍成欲書公歛處父叛則為孟氏守而非叛也欲書孟孫以成叛又非其事之實故第書圍以紀其拒命而不目其人焉惟昭十三年圍費則南蒯以費叛定十年再圍郈則侯犯以郈叛而經不書先儒或謂魯至昭定之時中軍既毁尺地一民皆歸三家使以叛書是為三家討賊也而舍叛又無以屬辭故書圍以著陪臣據邑之實而不書叛以寓三家竊國之誅晉趙鞅荀寅士吉射治兵相攻未嘗叛君也而並書叛邯鄲稷據邑以叛趙氏則不書即此義其說非也内三叛與邯鄲稷之所以不書者皆以家臣賤姓名不登于史冊故雖叛不書耳若以嫌為三家討賊故不書則齊商人弑君之賊也及其見弑也仍以弑其君書何不嫌為商人討賊乎夏四月楚公子比自晉歸于楚弑其君虔于乾谿傳楚薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啟越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已殉于蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊蔡公使須務牟與史猈先入因正僕人殺太子禄及公子罷敵公子比為王公子黒肱為令尹次于魚陂公子棄疾為司馬先除王宫使觀從從師于乾谿而告之且曰先歸復所後者劓師及訾梁而潰王沿夏將欲入鄢芋尹無宇之子申亥求王遇諸棘圍以歸夏五月癸亥王縊于芋尹申亥氏按公子返國嗣位例書入此獨書歸者弑君之賊旋即見殺未嘗一日能自定其位故春秋不成其為君也然大夫以惡亦曰入下書弑君而不從以惡例者當其自晉歸楚之時並無徒衆故也其必書地者乾谿師潰䖍自縊于芋尹氏以其迹觀之比之罪疑與剚刃于其君者有間然先歸令下弑械已成聖人本比欲死其君之心而加之以惡名故必書䖍所在之地以實之不使與剚刃者殊科也春秋凡接書一人兩事必覆舉其人此書弑其君不復書公子比者歸楚而弑其君弑不可與歸對舉為兩事也此與僖二十八年晉侯入曹執曹伯宣十一年楚子入陳納公孫寧儀行父于陳皆不覆舉其義正同楚公子棄疾殺公子比傳觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也從曰人將忍子吾不忍俟也乃行國毎夜駭曰王入矣乙夘夜棄疾使周走而呼曰王至矣國人大驚二子皆自殺丙辰棄疾即位按比弑君之賊也以齊無知衛州吁之文例之當從討賊之詞書曰楚人殺公子比若以比為王棄疾為司馬比固棄疾之君也以齊商人之文例之又當書曰楚公子棄疾弑其君比乃止以兩下相殺為文者葢乾谿之禍棄疾之罪更浮于比其以計殺之者圗自立耳故不可從討賊之詞而又不以弑其君比書者同謀作亂之人比又未嘗一日能自定其位不成乎其為君臣也然則前弑虔何以獨書公子比傳稱蔡公將食見之而逃則觀從之召二子棄疾實不與謀可知矣葢非棄疾從亂則比之逆謀不遂非比啟釁則棄疾之逆謀不生比雖不能自定其位而推原禍始安得不歸獄于比哉秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘傳晉成虒祁諸侯朝而歸者皆有二心叔向曰諸侯不可以不示威乃並徵㑹遂合諸侯于平丘邾人莒人愬于晉曰魯朝夕伐我幾亡矣晉侯不見公甲戌同盟于平丘公不與盟按成十六年沙随之㑹書不見公此書公不與盟則公猶與㑹但不與盟耳左氏晉侯不見公之説恐不確八月甲戌同盟于平丘覆舉平丘者㑹盟不同日也書同盟者有王臣同歃晉不敢以主盟自居故公不與盟公不與盟不諱者耻輕于見執晉人執季孫意如以歸望溪先生曰春秋時國事之傎未有甚于魯者三桓之在國重于君而諸侯視之亦重于君平丘之盟公不與而執意如非恕公也謂止公不若止季孫為魯所急也公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳楚公子干公子晳之歸楚也依陳蔡人以國及平王即位封陳蔡隠太子之子廬歸于蔡悼太子之子吳歸于陳按太子之子也而稱蔡侯陳侯正其名不與楚人専封也公子返國則書入此諸侯也故不曰入而曰歸諸侯返國則書復歸陳蔡中并于楚國本非其所有也故不曰復不書自楚者諸侯返國之常文冬十月葬蔡靈公國復乃葬凡三十有一月矣公如晉至河乃復傳公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河吳滅州來王氏葆曰州來近楚小國楚嘗取以為附庸故書滅而不係國按傳稱吳滅州來令尹子旗請伐吳王弗許且有州來在吳猶在楚之言據此則州來之于楚當不過名相役屬耳其田土貢賦之所入州來自有之本不全以供楚故雖為吳所滅而于楚亦無大損此可為近楚小國之確証十有四年春意如至自晉傳季孫猶在晉子服恵伯私于中行穆子曰魯事晉何如夷之小國土地猶大所命能具若為夷棄之使事齊楚其何瘳乎晉乃歸季孫不書季孫者承上省文大夫不致必見執而後致三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒莒子卒而不書葬魯不㑹也昭公號知禮雖薛杞小國無不㑹其葬者而獨于莒之葬不㑹胡氏謂季氏故理或然也冬莒殺其公子意恢傳莒著丘公卒郊公不慼國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善于庚輿郊公惡公子鐸而善于意恢公子鐸因與蒲餘侯謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯夫兹殺公子意恢按殺意恢者蒲餘侯也何以稱國殺葢兩下相殺不志于春秋故不可目蒲餘侯殺也而殺大夫而稱人者如陳人之殺公子禦㓂宋人之殺其大夫司馬晉人之殺三大夫陳人之殺公子過非羣下之作亂即執政大臣之擅權故皆書曰人以著其生殺之柄之不自其君出也若晉欒書中行偃之殺胥童則以其為厲公之所嬖也故欲弑厲公而先殺胥童莒蒲餘侯之殺意恢亦以其為郊公之所善也故欲逐郊公而先殺意恢厲與郊且不能自免又豈特生殺之柄之不自其君出而已故稱國殺以見其國亂已甚必將有弑逆廹逐之禍随其後也凡此皆随事立文其義固各有所當歟郊公出奔不書者去疾卒而魯不㑹葬故郊公出奔庚輿入立皆不以告不告故不書杜註微之非也去疾之入展輿之奔見于經者屢矣何獨于郊公而微之不書大夫者公羊所謂莒無大夫也十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事傳禘于武宫叔弓莅事籥入而卒去樂卒事禮也按有事乃時祭非禘也不著祭名者為叔弓卒起故畧之武宫魯武公廟復立于成六年夏蔡朝吳出奔鄭朝吳事楚而係之蔡者以其忠于蔡也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞傳荀吳帥帥伐鮮虞圍鼓鼓人告食盡力竭而後取之克鼓而還不戮一人以鼓子䳒鞮歸按滅鼓不書者不告也稱荀吳帥師胡氏謂以正兵相加而不納其叛臣故稱名氏非也自宣成以後君將稱君大夫将稱名舊史之文云爾冬公如晉傳平丘之㑹故也杜註平丘之㑹公不與盟季孫見執今既得免故往謝之春秋究遺卷十三
