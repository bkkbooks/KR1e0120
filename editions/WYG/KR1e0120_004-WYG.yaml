body:
  text: 春秋究遺卷四左庶子葉酉撰莊公下十有六年春王正月夏宋人齊人衞人伐鄭傳宋故也序先宋與伐郳同秋荆伐鄭傳鄭伯自櫟入緩告於楚秋楚伐鄭不禮故也冬十有二月㑹齊侯宋公陳侯衞侯鄭伯許男曹伯滑伯滕子同盟于幽㑹不書公程子謂魯叛盟故諱不書公未有叛盟在後而諱之於前者按公羊經文㑹上有公字左氏脱文耳當以公羊為正盟書同者先儒之説不一惟呉氏澂謂不敢専主盟之權故曰同盟似得其實惜語焉而不詳耳葢齊桓本非命伯以一國而主天下之盟其初猶不自安故文其詞曰同盟言與諸侯同為此盟云爾非専主也然既以同盟為詞則其禮文儀節之間必有降等與諸侯齒而不敢獨居其尊者故史家遂承而以同盟書之自是以後霸權日盛侈然自尊無復有書同盟者矣文襄既没靈公方幼陳蔡鄭宋同時而折於楚故文十四年新城之盟復書同葢因霸業之不振趙盾又以大夫而主諸侯之盟尤不敢以主盟自居故也明年諸侯盟于扈亦趙盾主之而諸侯不序盟不言同者葢盾以晉侯借口仍侈然而以盟主自尊故渾之而不序也其後清丘斷道蟲牢馬陵蒲戚柯陵虚朾諸盟無不言同者雖以悼公之盛而雞澤戲亳之盟亦書同悼公謙觀長樗之盟可見其盟皆書同則呉氏之説益信而有徴矣則以楚勢益張諸侯反側故皆率由舊章欲假謙退以為牢籠之一端耳至祝柯澶淵重丘平丘臯鼬之屬其或書同或不書同者由勢有盛衰而所用之禮本異故史文不得不異也僖二十一年盟於薄二十七年盟於宋成二年盟於蜀皆主之者楚自不屑與諸侯同襄二十七年盟於宋皆諸侯之大夫晉趙盾楚屈建必以主盟自居故皆不書同觀此則凡書同者皆霸主之謙不敢獨居其尊也審矣三傳同欲服異及同尊同外諸説皆穿鑿不足信存而不論可也大指本呉氏又増易望溪先生通論以足成其説邾子克卒杜註克字儀父稱子者葢齊桓請王命以為諸侯也十有七年春齊人執鄭詹傳鄭不朝也按執鄰國之大夫或稱行人或不稱行人杜註謂非其罪則稱行人罪見執者則不稱行人其説恐不確凡執政之大臣見執則不書行人以執之者原以其當國用事而執之故不可以行人書也如此年齊人執鄭詹桓十一年宋人執鄭祭仲襄二十六年晉人執衞寗喜及成十六年晉人執季孫行父昭十三年晉人執季孫意如皆不稱行人其義正同至僖四年齊人執陳轅濤塗文十四年齊人執單伯定元年晉人執宋仲幾於京師皆非執政大臣而不稱行人者以非聘問之使劉炫所謂本非行人是也本非行人故不稱行人其稱行人者如襄十一年楚人執鄭行人良霄襄十八年晉人執衞行人石買昭二十三年晉人執我行人叔孫舍定六年晉人執宋行人樂祁犁定七年齊人執衞行人北宫結皆以其本為聘問之使故稱行人耳若謂非其罪則稱行人罪見執者則不稱行人如衞石買以伐曹而見執不得為無罪季孫行父以僑如之讒見執行父何罪之有總之聖人之書行人者祇以其官之不當為所執而異之不問其有罪無罪也其説具定七年齊人執衞行人下又公羊傳稱行人而執者以其事執也不稱行人而執者以已執也其説亦不確衞石買宋樂祁犁皆以已罪執者也何亦稱行人乎鄭詹據傳稱鄭有叔詹堵叔師叔三良為政故杜註謂鄭執政大臣夏齊人殱于遂齊滅遂使人戍之遂之餘民飲戍者酒而殺之齊人殱焉據齊人為文言齊之自貽伊戚也秋鄭詹自齊逃来魯與齊外合而中離故詹自齊逃来而魯亦遂受其逋逃而不恤幽之盟者以其心本不服也詹為使被執竊身潛竄同於苟免之匹夫故書逃以罪之冬多麋書多者麋魯之所有特以多為異耳下文􅈮則魯之所無故以有為異十有八年春王三月日有食之夏公追戎于濟西不覺其来已去而追之也此魯患戎之始秋有􅈮按王氏應麟云沙隨春秋例目云有蜮或考隸古春秋作有蟘爾雅食葉蟘音特果如其説則春秋此節乃紀災非紀異矣紀災不書有紀異書有例也若食葉之蟲而書有則螽何以不言有螽螟何以不言有螟乎杜註短狐即射工之類冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟正義鄄是衞之東地陳取衞女為婦魯使公子結送媵向衞至鄄聞齊宋為㑹將謀伐魯故權事之宜去其本職不復送女至衞遂與二君㑹盟鄄盟地故言于鄄既盟之後不復送女其盟本非公意又失媵陳之好故至冬而三國来伐程子曰鄄之巨室嫁女於陳人結以其庶女媵之二説互異然如正義説當書媵陳人之婦於衞至鄄遂及齊侯宋公盟不當書媵陳人之婦於鄄矣故程子云云似得其實至正義謂盟本非公意尤與當日之情事不合媵女小事耳公子結不應以卿奉使若如程子之説庶女徃媵公子結尤不應自行彼其所以為是行者是時齊霸未盛魯以背盟納逋之故齊桓將率諸侯徃討之魯莊聞其謀雖亦自知其不直而不肯降心相從故特遣結假媵陳之名若以己意因便而請盟於鄄以庶幾其事之猶可及止此當日之情實也豈結自去本職而為此専命之事哉春秋大書於冊葢著其謀之不臧既惴惴焉惟大國之討是懼又不甘心服罪屈己請成以致三國之師之終不免於見伐者皆公之自貽伊戚也遂者繼事之詞而有歸重之意觀春秋之所書可知結之此行意本不在送媵矣意既不在送媵則盟豈果非公意乎齊既與宋謀伐魯而仍使結與盟者殆欲掩其不備故夫人姜氏如莒冬齊人宋人陳人伐我西鄙三國之伐葢以魯受鄭詹之逃故興師以問其背盟之罪先儒乃謂其以結之盟為不恭故来伐其説非是魯大夫之及外諸侯盟者多矣乃於此獨以其不恭而伐之也有是理乎二十年春王二月夫人姜氏如莒夏齊大災天火曰災齊来告魯徃弔之也故書秋七月冬齊人伐戎是時周有子頺之亂鄭與虢胥命于弭而齊桓若罔聞知方以伐魯伐戎為汲汲焉葢伯事方興假之未久天下方狃於無王之習雖霸主亦不知其禍亂之不可不急為圖之也至晉文則以求諸侯莫如勤王矣望溪先生曰王室禍亂魯不與聞則不書而先儒以筆削之㫖求之是以終不能安也子頺之亂惠王之定不書以虢鄭尸之而魯不與也襄王之入叔帶之討不書以晉尸之而魯不與也子朝之亂備書於冊以叔鞅方有事於京師而其後戍周城周魯皆與也葢王室懿親莫重於魯有禍亂興魯不能救而他國有功則魯人恥之而不書於冊孔子不能益也襄王之出獨書何也王命特至於魯而臧文仲有奔問官守之對則其時已著於冊書矣厥後終不能勤王是以忌晉之功而不書王入也二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月塟鄭厲公二十有二年春王正月肆大𤯝榖梁傳為嫌天子之塟也註文姜之罪應誅絶誅絶之罪不塟若不赦除衆罪而書塟者嫌天子許之明湏赦而後得塟其説迂迴不足信或是文姜遺命欲以此悦其國人耳癸丑塟我小君文姜文姜以去年七月薨至此經七月始塟必當有故然不可考矣變夫人稱小君者塟者臣子之終事據臣子為文故謂之小君與塟魯公稱我君其義正同因此悟弑君之不書塟愚向謂示臣子以不共戴天之義其説益信而有徴矣陳人殺其公子禦寇張氏洽曰不稱世子者未誓於天子也未誓則稱公子重王命也按春秋時諸侯之世子皆不誓於天子何獨於禦寇而以公子稱葢諸侯之世子雖不誓於天子亦必其君立之而後得以世子稱禦寇宣公之嫡子也猶未立為世子故不稱世子豈重王命之謂哉殺稱人者國亂無政而羣下擅相殺也夏五月無事書首月未有書五月者殆四訛而為五與秋七月丙申及齊髙傒盟于防自文以前外大夫多不以名見此髙傒特名者為其専以事接於我也防魯地及不書公與大夫盟諱之也不書齊侯使髙傒来盟者傒至防公出而與之盟未至國故不可言来盟也冬公如齊納幣杜註不使卿而親納幣非禮也母喪未再期而圖婚二傳不見所譏左氏又無傳失禮明故二十有三年春公至自齊公如必書至史文之常祭叔來聘非王命也故不稱使天子之内臣而外交諸侯據事直書其失自見夏公如齊觀社程子曰婚議尚疑故以觀社為名再徃請㑹後一年方迎葢齊難之按幣已納矣豈復有疑殆以文姜之喪未及二十五月公遽欲親迎而齊欲遲其期與如齊觀社者考襄二十四年傳楚子使薳啟疆如齊齊社蒐軍實使客觀之則齊固以社為娯客之具公之此行必齊請公徃觀以示相親之意公方與齊好故不欲逆其意耳觀春秋特以觀社書則公之失自見不必假此為名而後為非禮也程子之言恐不確公至自齊荆人来聘荆未稱楚以前皆苐書曰荆而不係之以人此係之以人者葢既以邦交之禮接於我春秋魯史故即進之以人而不復以號舉禮無不答之義也然何以不稱爵是時楚仍以荆自號不可稱荆子也若書楚子又失其實故不得不稱荆人葢詞有所窮焉爾公及齊侯遇于穀蕭叔朝公蕭叔或以為蕭君之弟非也十二年宋萬弑其君傳稱蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛於師立桓公即此蕭叔也葢宋賞其功故使之為附庸其後滅於楚仍以邑屬宋附庸之君例稱字此稱行次者古人行次亦謂之字也於此益知邾儀父之為字無疑若儀父書名則此何不書蕭大心耶公羊傳其言朝公何公在外也秋丹桓宫楹榖梁傳天子諸侯黝堊大夫倉士黈丹楹非禮也冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈程子曰遇于榖盟于扈皆為要結姻好也二十有四年春王三月刻桓宫桷榖梁傳天子之桷斵之礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也葢公將逆姜氏故丹桓宫之楹刻其桷以夸示之葬曹莊公夏公如齊逆女秋公至自齊公至不日者魯史書至大都以告廟之日為準而告廟之日不盡皆實至之日也聖人知其日之不實欲從而正之不可得故惟有缺而不書葢聖人之慎也至其並不書月者殆年逺文缺聖人亦仍之而已八月丁丑夫人姜氏入公不與夫人偕至者婚禮婿奠雁之後御輪三周先俟於門外公雖逆女於異國而特重其事亦欲先期而歸俟著俟堂而夫人乃徐徐以入也變至言入者公既以逆女歸而告廟故夫人之至不再告不再告故不書至既不書至非入無以屬詞也故書入戊寅大夫宗婦覿用幣宗婦大夫之妻也榖梁傳男子之贄羔雁雉腒婦人之贄棗栗腵修用幣非禮也大水冬戎侵曹曹羈出奔陳赤歸于曹書法與突歸于鄭鄭忽出奔衞同但鄭先書突歸曹先書羈出則以事之先後本異也其義詳桓十一年突歸于鄭下郭公榖梁以赤為郭公名其説荒唐不足信或謂公字為亡字之誤事見管子二十有五年春陳侯使女叔来聘女氏叔行次也諸侯之大夫以行次稱者義見桓十一年宋人執鄭祭仲下女汝同周畿内大夫之采邑因氏女諸侯交聘自此始葢齊桓為之夏五月癸丑衞侯朔卒六月辛未朔日有食之鼓用牲于社禮日月蝕諸侯用幣於社伐鼓於朝今伐鼓於社又不用幣而用牲非禮也故書伯姫歸于杞按伯姬杜註莊公女望溪先生以為桓公女據二十七年書公㑹杞伯姬于洮㑹者敵詞也父之於女豈可言㑹伯姬為桓公女無疑是時莊公即位已二十五年矣伯姬與叔姬皆年近三十而始嫁者殆文姜淫悍以二姬非己所出妬其母遂惡其女故不及時而嫁與聖人以其嫁不及時為不合禮也故書抑因此愈知杜註以為莊公女之説之不足信春秋常事不書果莊公女也其歸並無失禮嫁後又無他變於法即不應書矣秋大水鼓用牲于社于門傳凡天災有幣無牲非日月之𤯝不鼓公羊傳於門非禮也冬公子友如陳此内大夫出聘之始報女叔之聘也按外臣来聘即以来聘書内臣出聘則止書某人如某國不書聘者彼以禮来誌之不可不詳此以禮徃則以為常事而略之也若不惟聘而已即必書如乞師告糴㑹塟致女之類是也然皆不書公使春秋為魯紀國事非魯君一人之私也故凡魯事皆不書公不特内臣如不書公使而已其如京師不書聘亦以常事故從略先儒或謂譏其聘而不朝恐無此義至魯君朝霸國奔喪㑹塟皆書如葢舊史恥而諱之聖經亦仍之而已二十有六年春公伐戎夏公至自伐戎侵伐書至者葢重其事則反必告廟告則書至通十二公未有用師於小國而致者以是知輕其事則不致也此伐戎而致者以用兵於戎故與宣七年致伐莱義同桓公十五年十六年兩伐鄭前不致而後致者前歸而將復出後歸而不圖更舉也僖四年伐楚前後皆有事而獨以伐楚致者大伐楚也觀魯頌以荆舒是懲美僖公則當時之所重可知矣六年伐鄭遂救許而以伐致葢救許原因伐鄭所為後事小則以前事致也十五年救徐而以㑹致葢諸侯之大夫救徐而公不親徃故也二十八年㑹温遂圍許而以圍致兩事偶例以後事致故成十年㑹伐鄭而不致者以晉侯獳卒公遂自㑹如晉故以自晉致也與襄九年㑹伐鄭而不致義同葢冬㑹伐鄭己亥同盟於戲遂自戲如柤故以後㑹致也傳稱公送晉侯於河上還至衞冠於成公之廟則未返國可知矣鄢陵之後成公㑹伐鄭者三前以㑹致而後以伐致者前㑹而未伐後㑹而伐也十六年諸侯次於鄭西魯以内難不敢過鄭則不與伐可知矣十七年夏伐鄭自戲童至於曲洧楚人師於首止而諸侯還則兵未嘗交可知矣故皆以㑹致惟冬伐鄭傳稱圍則恊心同攻而薄其城下故以伐致也盟戲之後襄公㑹伐鄭者三前以伐致而後以㑹致者前㑹而伐後㑹而不伐也十年秋伐鄭戍虎牢以逼之十一年夏伐鄭圍之幾踰時焉故皆以伐致蕭魚之役則觀兵而鄭已受盟故以㑹致也成七年救鄭而以㑹致者諸侯之師未與楚接故也凡書至皆與霸主同役也否則連數國之師也而僖二十六年公以楚師伐齊取榖書至者以齊與魯壤地相接屢被侵伐今而後得反之故快之而以告於廟也定公六年侵鄭八年兩侵齊皆獨用師而致者魯自宣公伐杞之後惟霸主在行公乃親㑹其餘侵伐皆三桓更將公不主兵至是公復親將故歸而告廟者重其事也惟哀十一年公㑹呉伐齊不致則以小勝大懼齊之至而不以告廟耳至定公圍成而致則事之變也邦分崩離析故視封内不啻異國視家臣如大敵也然亦非經之特文使當日不告廟不著於冊書則孔子不能益也先儒乃以筆削之義求之遂無一可通者矣本望溪先生説略有增易曹殺其大夫稱國以殺胡氏謂國君大夫預謀其事非也春秋凡執諸侯大夫例稱人以執準殺自應亦以人書其所以不稱人者葢大夫繫一國之望無論其有罪無罪而至於見殺皆國體之所係也故苐稱國殺而不係以人其係以人者非羣下之作亂即執政大臣之擅權否則未有稱人以殺者曹殺其大夫殆由羈赤出入之際有不附赤而為赤之所殺者與大夫不錄其名氏者年逺國小故史失之耳秋公㑹宋人齊人伐徐按張氏洽謂左氏古本無公字公榖作公㑹誤果爾則必卿將乃可稱㑹然卿將當稱名無單書㑹之理其為公㑹無疑徐是時已服楚故齊率諸侯伐之宋序齊上葢齊桓使之主兵也不書至者用師於小國例不書至冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮莊公與伯姬兄妹也無故而為此㑹不合禮故書夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽傳陳鄭服也杜註二十二年陳亂而齊納敬仲二十五年鄭成公之四年獲成於楚皆有二心於齊今始服也同盟義詳十六年同盟于幽下秋公子友如陳葬原仲大夫出例不書至原仲稱行次義見桓十一年宋人執鄭祭仲下原周畿内大夫之采邑因氏原葢以天子命而仕於陳者與女叔同汪氏克寛曰僖五年公孫兹如牟娶焉文六年季孫行父如陳聘且娶文七年公孫敖如莒蒞盟且逆女成八年公孫嬰齊如莒自為逆昭二十五年叔孫婼如宋為季平子逆經皆不書此獨書葬原仲者季孫請於公而公命之行也冬杞伯姬来春㑹于洮冬又来不合禮故書莒慶来逆叔姬叔姬伯姬妹以其年近三十而始嫁也故書杞伯来朝杞伯爵乃僖二十三年二十七年兩次稱子先儒謂其棄周禮是固然矣但此年在兩次稱子之前豈此獨不用夷禮耶葢杞小而貧自僖二十七年前其邦交之禮皆不備此年所以不稱子者以伯姬於去年歸杞至今年春甫與公㑹于洮冬又来魯杞與魯甚親故禮雖不備而公仍待以伯禮至僖二十三年二十七年兩次稱子則以其棄周禮而輕之此僖二十七年来朝之後所以即有公子遂無禮之責也杞既以無禮見伐遂懲於前事竭力以事大國不敢復用其俗而春秋亦遂不復以子書矣其説更詳具僖二十三年杞子卒下公㑹齊侯于城濮初王姚嬖於莊王生子頺有寵惠王即位子頺作亂伐王不克奔衞衞師燕師伐周二十一年鄭伯虢公胥命于弭同伐王城殺王子頺至是王使召伯廖賜齊侯命且請伐衞以其立子頺也此㑹葢謀伐衞按子頺伏誅己十年衞君亦易世矣齊桓特以衞不㑹幽之盟申明其立子頺之罪而請討於王耳魯與㑹不與伐故後伐衞祇書齊人二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績按伐不書日而書日戰之日也見齊人以是日至即以是日戰也不地者於衞也書衞人及齊人戰者春秋書戰例以受兵之國主兵以其為地主故且有内之之意焉葢征伐天子之大權諸侯擅兵伐國聖人之所甚惡者也惡之故外之而以受兵之國主兵外彼而内此也觀魯與外諸侯戰皆以魯主兵則内之之意可見先儒乃謂聖人責其不告天子方伯而忿與之戰故以之主兵其説非也如此年齊人假王命以討衞謂其不徴詞服罪猶之可耳其他或恃其强大無故以兵伐人受兵者因其来伐不能不以一矢相加遺所謂敵加於己不得已而應之者聖人於此顧不惟强大是問而専以忿與之戰為受兵者罪此豈近於人情然則柏舉之戰又何不以楚主兵也楚有僭王之罪故春秋外之敗績例稱師重衆也少則稱人夏四月丁未邾子瑣卒秋荆伐鄭二十三年既書荆人矣此復以州舉者非聘故從其恒稱公㑹齊人宋人救鄭傳楚令尹子元以車六百乗伐鄭入於桔柣之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁按不致者望溪先生曰時齊霸未盛又二國之君不同役故輕其事而不致也冬築郿傳非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城按此説似不確春秋書魯城邑凡二十有四惟郿一邑書築其二十三邑皆曰城豈皆有宗廟先君之主乎況定十五年城漆漆乃邾邑其非有先君之主更審矣何亦曰城而不曰築耶郿之所以獨言築者當大無麥禾之年莊公賢君衣食所安必以分人且自即位以来並無城築不應至是而忽亟亟於土功如是殆如後世之以工代賑乎聖人亦知其事之為權宜以取濟與尋常城邑不同故特變其文曰築見其意在用民之力以為救荒之䇿而郿之城本非其所急也明年春書新延廐義與此同大無麥禾張氏洽曰不言水旱而言大無麥禾者天時人事至是兩不足也臧孫辰告糴于齊服氏䖍曰不言如重榖急詞以其情急於糴故不言如齊告糴乞師則情緩於榖故云如楚乞師按乞師先書如楚兹不然者葢與上大無麥禾連文糴即糴其所無自不得先書如齊也此文法當然服氏之説鑿甚或曰彼以乞師於僭王之楚為譏故先書如楚此以無一年之蓄為譏故先書告糴其説亦通但春秋内大夫以事如列國者皆先書如某國後乃書其所為之事不獨乞師先書如楚也若如或云云則他處先書如某國者其義無所處矣故不可從二十有九年春新延廐不曰新作延廐而曰新延廐者因其故而新之意不在於延廐也榖梁譏其用民力為己悉失其義矣夏鄭人侵許侵義見隠二年鄭人伐衞下秋有蜚閻氏若璩曰爾雅蜚蠦蜰郭樸注蜰即負盤臭蟲劉歆曰負蠜誤矣江休復雜志唐彥猷有舊本山海經説蜚處淵則涸行木即枯疑春秋所書即此物若是負蠜不當云有謂之多可也冬十有二月紀叔姬卒杜註紀國雖滅叔姬執節守義故係之紀賢而錄之城諸及防此與築郿新延廐不同其時去大無麥禾之時已一年不必以工代賑也故仍曰城而不曰築三十年春王正月夏師次于成榖梁傳欲救鄣而不能也按是時齊方與魯親且魯明知力不能救何故虛為徳於鄣而間齊好葢齊伐鄣而魯出師徃㑹至於成而聞齊已降鄣故遂次止而不前耳未必如榖梁云云也秋七月齊人降鄣降者脅服之名不書鄣降而曰降鄣見齊人不道肆其强力脅之使降也八月癸亥葬紀叔姬九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟傳謀山戎也以其亟病燕也齊人伐山戎既書齊人則非齊侯親行審矣胡氏以為齊侯者以来獻戎捷稱齊侯故耳不知獻捷亦非齊侯自来也其説見本條下齊桓自圖霸以来從未嘗興大衆出征伐也山戎非勁敵而乃親帥師以伐之乎三十有一年春築臺于郎杜註刺奢且非土功之時夏四月薛伯卒築臺于薛六月齊侯来獻戎捷来者使人来也不書使某者其人微也目齊侯者葢諸侯不相遺俘以齊侯而獻捷於魯非禮也故正其為齊侯而其降尊屈體之失自見非謂齊侯自来也伐戎不親而獻捷乃親来乎然則楚人使宜申来獻捷何以不目楚子葢彼乃挟其戰勝之威欲行其脅服之計與齊之為好於魯者不同書其爵不足以著其罪所為義不闗乎爵者也故從恒稱曰人秋築臺于秦冬不雨三十有二年春城小榖傳為管仲也杜註齊邑榖梁傳魯邑程氏迥曰齊城别有榖在濟北非小榖也按經文明書小榖其非齊邑審矣且桓公必無以管氏私邑而勤諸侯之理故當以榖梁為正夏宋公齊侯遇于梁丘傳齊侯為楚伐鄭之故請㑹於諸侯宋公請先見於齊侯夏遇于梁丘書先宋公者張氏洽曰齊不以霸主自居以梁丘近宋而先之也秋七月癸巳公子牙卒傳公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般成季使以君命命僖叔待於鍼巫氏使鍼季酖之曰飲此則有後於魯國飲之歸及逵泉而卒立叔孫氏按叔牙黨慶父而萌簒弑之心故季子正其罪以君命討而誅之又以親親之道不彰其惡陸氏所謂恩義俱立權而得中也春秋書牙卒使若以疾死然亦緣季子之心而為之諱焉耳八月癸亥公薨于路寢路寢正寢也榖梁傳男子不絶於婦人之手以齊終也冬十月己未子般卒初公築臺臨黨氏見孟任從之生子般焉般嘗鞭圉人犖公薨般即位次于黨氏慶父使犖賊般立閔公成季奔陳按般卒不地先儒謂與公薨不地同非也君薨地大夫卒不地子尚未成乎君也故不地與書卒不書薨義同慶父之弑以閔公不書即位見義不以般卒不地見義也公子慶父如齊胡氏安國曰不書出奔而曰如齊見慶父主兵自恣國人不能制也張氏洽曰慶父雖弑子般而尚未能取國故因閔公之立告於霸主以為自托之計其説較長當日本非出奔安得不以如齊書狄伐邢狄前此不見經書之自此始春秋究遺卷四
