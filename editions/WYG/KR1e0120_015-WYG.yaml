body:
  text: 春秋究遺卷十五左庶子葉酉撰定公元年凡元年必書春王正月所以正始也獨此年正月不書者公即位在六月故正義公未即位元必不改未改之日必乘前君之年于時春夏當名此年為昭公三十三年而史官定策須有一統不可半年從前半年從後雖則年初亦統此嵗故入年即稱元年也按此時定公雖未即位而昭公已薨故可稱元年若後世以先君在位之月改從嗣君即位之年則于君臣父子之教所闗甚鉅不得以此藉口矣春王三月晉人執宋仲幾于京師傳孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國于周以我適楚晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦惟命仲幾曰踐土固然士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘之乎乃執仲幾以歸三月歸諸京師按京師成周也不曰成周而曰京師者所以甚晉大夫無王之罪也夏六月癸亥公之喪至自乾侯戊辰公即位杜註諸侯薨五日而殯殯則嗣子即位癸亥昭公喪至五日殯於宫定公乃即位趙氏匡曰即位皆于朔日故不書日定公待昭公喪至既殯而即位故書日按杜註所謂殯則嗣子即位者謂即柩前立為喪主與春秋所書即位不同春秋所書即位則行告廟臨羣臣之禮也秋七月癸巳葬我君昭公九月大雩立煬宫杜註平子逐君懼而請禱于煬公昭公死于外自以為獲福故立其宫煬公伯禽之子公羊傳立者不宜立也按煬公伯禽之子考公弟也魯以弟繼兄葢始于此定公昭公之弟季孫恐人責已以擅立之罪故特立煬宫若曰兄終弟及亦猶行古之道云爾冬十月隕霜殺菽榖梁傳未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也二年春王正月夏五月壬辰雉門及兩觀災曰及者災起雉門而延及兩觀也秋楚人伐吴傳􅇸瓦伐吴師于豫章吴人見舟于豫章而潛師于巢冬十月吴軍楚師于豫章敗之冬十月新作雉門及兩觀凡災而復作者皆不書雉門兩觀書者承僭而不能革也本望溪先生說三年春王正月公如晉至河乃復正義三傳皆無其說不知何故乃復程子曰季孫意如上不請于天子下不告于方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟于臯鼬按請盟之說似不甚確辨見盟于臯鼬下二月辛夘邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于㧞修邾好也四年春王二月癸巳陳侯吴卒杜註癸巳正月七日書二月從赴正義杜以長厯推之知癸巳是正月七日知非日誤者以崩薨之事皆以赴為文按二月既無癸巳日則二月自是正月之誤不必强為之辭二月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚傳蔡侯為兩佩與兩裘以如楚獻一佩一裘于昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之不與三年止之蔡侯歸如晉請伐楚四年三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨于蔡侯弗得言于范獻子曰國家方危諸侯方貳將以襲敵不亦難乎乃辭蔡侯晉人假羽旄于鄭明日或斾以㑹晉于是乎失諸侯夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之傳沈人不㑹于召陵晉人使蔡伐沈夏蔡滅沈按殺沈子嘉以邾人用鄫子例之不當名而以名見者滅國之罪大書殺沈子不足以甚之也五月公及諸侯盟于臯鼬覆舉公者先儒謂定公受國于意如因㑹而請盟以定其位故春秋覆舉公以示譏其說非也既與于㑹其位固已定矣復何藉于盟乎且桓公㑹鄭伯于垂盟于越宣公㑹齊侯于平州皆嘗結外援以自固矣何獨于此而特變文以譏之按春秋書侵伐或書及或書㑹微者將書及君卿將書㑹其㑹字與及字對非㑹于某地之㑹也若㑹于某地之㑹則與盟對㑹有㑹禮盟有盟禮軍旅之際禮無兼舉故有先書㑹于某地後書伐某國者如桓十五年書㑹于袲伐鄭是也有先書伐某國後書㑹于某地者如襄十一年書伐鄭㑹于蕭魚是也然皆㑹而不盟盟皆書在侵伐後如成七年書救鄭八月戊辰同盟于馬陵十七年伐鄭八月乙酉同盟于柯陵襄九年伐鄭十有二月己亥同盟于戲十一年伐鄭秋七月己未同盟于亳城北十八年冬同圍齊十九年春王正月同盟于祝柯是也然皆盟而不㑹從未有先書㑹于某地繼書侵某國又書盟于某地如召陵臯鼬㑹盟二禮並行于侵楚之前後者通春秋惟此一見彼其所以㑹而又盟如此其不憚煩者據傳稱劉文公合諸侯于召陵謀伐楚也則當其㑹于召陵之時意本在于伐楚乃荀寅求貨楚不果伐僅遣偏師侵掠其境于是始以伐召諸侯者不得不變而為盟葢楚不果伐則召陵為虚㑹不可以示諸侯也故假此盟以實之一若其本意原欲與諸侯盟非欲為蔡報怨而㑹者故聖人特書侵楚于㑹于召陵下盟主大合諸侯從無以侵書者兹獨以侵楚書則其無能為之實已可見而于臯鼬之盟復覆書公以别異之葢始以伐召諸侯倐變而為盟故春秋特著其為兩事而傷晉之不能抑強扶弱徒為此紛紛以煩我友邦也豈病公之請盟云爾乎觀下文接書楚人圍蔡晉士鞅伐鮮虞蔡侯以吴子及楚人戰于柏舉比事屬辭而聖人之情可見矣書諸侯者劉子以疾故不與歃也不日缺文杞伯成卒于㑹六月葬陳恵公許遷于容城許至是葢四遷矣秋七月公至自㑹劉卷卒不曰劉子卷而曰劉卷則望溪先生所謂子非爵乃時人相尊異之稱益信召陵之㑹劉子與焉㑹罷而卒天王為赴故稱名葬杞悼公楚人圍蔡以蔡滅沈故也楚稱人者說詳隠二年莒人入向下晉士鞅衛孔圉帥師伐鮮虞杜註無傳按三年傳稱秋九月鮮虞人敗晉師于中平獲晉觀虎恃其勇也疑是此經下傳誤載三年下葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚􅇸瓦出奔鄭傳自昭王即位無嵗不有吴師蔡侯因之以其子乾與其大夫之子為質于吴冬蔡侯吴子唐侯伐楚舍舟于淮汭自豫章與楚夾漢子常濟漢而陳十一月庚午二師陳于柏舉闔廬之弟夫槩王以其屬五千擊子常之卒楚師亂吴師大敗之子常奔鄭按春秋自成公以後卿將皆以名見此獨書楚人者葢將尊師衆必當書曰楚􅇸瓦帥師而上書楚􅇸瓦帥師下又書楚師敗績楚􅇸瓦出奔鄭覆舉師及􅇸瓦則于文贅故上只書楚人此屬辭之不得不然者也吴稱子先儒以為進之非也哀八年楚公子結帥師伐陳吴救陳春秋亦第以號舉何獨于此而進之葢楚瓦貪黷無厭至以一裘之故乆羈蔡侯于是蔡侯以見陵之怨控告大邦為晉侯者惟仗義執言投袂而起文襄之業庶幾其復振耳乃召陵之㑹荀寅求貨既與子常之為餓豺狼者無以異迨楚人圍蔡而晉士鞅伐鮮虞其能為蔡侯所以而敗楚師于柏舉者吴子也誰主夏盟竟甘以此義舉讓人何以視十六國之諸侯乎故春秋于吴概以號舉而此獨以吴子書非進之也葢著其為吴子以病晉侯之不能故耳不然吴聴子胥之謀其欲甘心于楚也乆矣是舉特㑹逄其適原非専為蔡報怨也而春秋遽以救災恤隣之義予之豈理也哉其不書救蔡者師至而圍已解蔡侯以吴子深入楚境不可以救書也若如胡氏之說又無解于哀八年之書吴救陳矣柏舉楚地因楚有僭王之罪而吳為蔡侯所以故不以楚主兵不得以長岸為比庚寅吳入郢傳吳從楚師及清發将擊之夫槩王曰困獸猶鬭况人乎若使先濟者知免後者慕之蔑有鬬心矣半濟而擊之又敗之五戰及郢按吳以號舉從其恒稱觀此則前書吴子之非因其救蔡而進之也更審矣不曰入楚而曰入郢者楚為一國之總稱郢乃楚之國都吴自柏舉而入楚之國都謂之入郢則可謂之入楚則不可以柏舉楚地吴師至柏舉即已入楚境故也楚旋滅旋復吴不有其地故曰入五年春王三月辛亥朔日有食之夏歸粟于蔡杜註蔡為楚所圍飢乏故魯歸之粟望溪先生曰歸粟于蔡魯獨歸之諸侯不與也若諸侯並歸粟則當如㑹于澶淵宋災故書暨晉人某人某人歸粟于蔡可也且至定公時晉令不行于諸侯乆矣不能救蔡而吴専其功蔡既勝楚無為復令諸侯歸粟葢淮泗通流舟漕易致故蔡人告糴而魯以粟歸之耳於越入吴傳越入吴吴在楚也望溪先生曰越之見經也或稱越或稱於越稱越者從吴楚之告也稱於越者從越告也一國而兩稱舊史從告春秋不革則謂稱尺稱爵稱號紛紛然易舊史以為褒貶者必無是理矣六月丙申季孫意如卒内卿卒必書史之常文胡氏之說鑿甚秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞傳報觀虎之役也杜註三年鮮虞獲晉觀虎六年春王正月癸亥鄭游速帥師滅許以許男斯歸傳因楚敗也二月公侵鄭傳為晉討鄭之伐胥靡也杜註周儋翩因鄭人以作亂鄭為之伐胥靡故晉使魯討之按左傳鄭伐胥靡事在此年夏公侵鄭在二月若為晉討鄭之伐胥靡不應反在前按魯自宣公十八年伐杞之後惟伯主在行公乃親㑹其餘侵伐皆三桓更将而公未嘗主兵至定哀而反有親将者葢自成襄以來兵權雖歸三家然民之去公未乆故猶忌公而使不得主兵至中軍既毁尺土一民皆非公有于是以公為不足忌也故私家之兵有事則使公将之猶魯盛時公家之兵有事則使大夫将之公名為主兵實供大夫之役耳然圍私邑伐與國三桓仍時復尸之犯强隣結仇釁則必使公試焉據事直書而其罪自不可掩矣本望溪先生說公至自侵鄭夏季孫斯仲孫何忌如晉傳季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之聘晉人兼享之杜註賤魯不復設兩禮明經所以不備書晉夫人聘魯不書者其使非卿故秋晉人執宋行人樂祁犁祁犁聘于晉主趙簡子飲酒焉獻楊楯六十范趙方惡其宰曰昔吾主范氏今子主趙氏是賈禍也范獻子果怒言于晉侯曰以君命越疆未致使而私飲酒不敬二君不可不討也乃執樂祁犁冬城中城杜註公為晉侵鄭故懼而城之辨詳成九年城中城下望溪先生曰僑如欲去季孟則城中城陽虎欲去三桓亦城中城皆欲得公以濟其亂謀也季孫斯仲孫忌帥師圍鄆杜註何忌不言何缺文鄆貳于齊故圍之七年春王正月夏四月秋齊侯鄭伯盟于鹹傳齊鄭盟于鹹徵㑹于衛許氏翰曰齊鄭之盟叛晉也霸道隳諸侯散離盟始復志此葢自是天下無殷㑹矣齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙傳衛侯欲叛晉諸大夫不可使北宫結如齊而私于齊侯曰執結以侵我齊侯從之乃盟于𤨏杜註即沙也按春秋書執行人者五皆以其本為聘問之使故書行人劉氏之說是已然聘問之使何以必書行人葢春秋紀異聘問之使以通好也于此而加桎梏焉不可以言好矣故特以行人書誠以其官之不當為所執而異之也豈如杜氏非其罪之說乎然若謂春秋只據事直書並無異其執聘使之意則凡外大夫之見執未有書其官者而此獨以行人書何為也哉大雩齊國夏帥師伐我西鄙齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆九月大雩冬十月八年春王正月公侵齊報去年國夏伐我西鄙公至自侵齊二月公侵齊正月侵齊未得志故三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙報上二侵公㑹晉師于瓦傳晉士鞅趙鞅荀寅救我公㑹晉師于瓦按救不書者師至而齊已去也不曰㑹晉士鞅而曰㑹晉師者書㑹士鞅則因來救而往㑹之實不著矣公至自瓦書至者以伯國來救重其事而以告于廟也其不以㑹致而以地致者說詳桓二年公至自唐下秋七月戊辰陳侯栁卒晉士鞅帥師侵鄭遂侵衛晉師自瓦還盟衛侯于鄟澤趙簡子使渉佗成何盟之衛人請執牛耳成何曰衛吾温原也焉得視諸侯将歃渉佗捘衛侯之手及捥衛侯怒歸叛晉晉人請改盟弗許秋士鞅㑹成桓公侵鄭為周報伊闕之役遂侵衛按遂者繼事之詞而有歸重之意晉討衛叛意不在鄭也葬曹靖公九月葬陳懐公季孫斯仲孫何忌帥師侵衛為晉故也冬衛侯鄭伯盟于曲濮相結叛晉也從祀先公按左氏傳陽虎欲去三桓冬十月順祀先公而祈焉辛夘禘于僖宫杜註不于太廟而于僖宫順祀之義當退僖公懼于僖公之神故于僖廟行順祀胡氏則引蜀人馮山之說以為昭公至是始得從祀于太廟果如其說則當書曰禘于太廟用致昭公矣今但書曰從祀先公上無所承何以見其為昭公恐聖人無此鶻突文法也似當以左氏為正其不曰僖公而曰先公者葢合祭于僖公之廟因退僖公于閔公之下雖曰順祀而所祀非一公故以先公為文亦不欲顯前此逆祀之非禮也盜竊實玉大弓陽虎将享季氏于蒲圃而殺之林楚御桓子将如蒲圃桓子謂林楚曰而能以我適孟氏乎林楚怒馬及衢而騁適孟氏陽虎刼公與武叔伐孟氏公斂處父帥成人自上東門入與陽氏戰陽氏敗陽虎脱甲如公宫取寳玉大弓以出按傳稱陽虎入于讙陽闗以叛即在竊寳玉大弓之後而經不書者陪臣賤姓氏不合見經此竊寳玉大弓之所以亦不書陽虎而書盜歟九年春王正月夏四月戊申鄭伯蠆卒得寳玉大弓傳陽虎歸寳玉大弓按陽虎陪臣名氏不登于春秋故前只以盜書前既以盜書此目其人不可又不可云盜歸寳玉大弓也故變文以書曰得左氏傳凡獲器用曰得得用焉曰獲杜註謂用器物以有獲如麟為田獲俘為戰獲其說非也對失而言謂之得麟以田獲俘以戰獲本無所失也故曰獲六月葬鄭獻公秋齊侯衛侯次于五氏杜註不書伐晉者諱伐盟主以次告正義傳言齊侯伐晉夷儀乃與衛侯次于五氏次既告則伐亦應告明以衛新叛晉又魯與晉親故耻以伐告惟告次耳秦伯卒冬葬秦哀公十年春王三月及齊平杜註平八年冄侵齊之怨按先儒皆以為叛晉非也是時聖人用魯安有叛晉之事哉葢齊魯不相能非國之利也睦隣之道固當如是耳夏公㑹齊侯于夾谷公至自夾谷按萊人以兵刦魯侯之事乃好事者傅㑹之說非其實也齊景圗霸魯方請成以兵刦之何以視諸侯厯堦數語不過曹沫藺相如作用耳豈足以語大聖人哉司馬遷云優倡侏儒為戲葢若今之演梨園者或聖人惡其非禮諌止其事則猶情理之所有者耳晉趙鞅帥師圍衛傳報夷儀也齊人來歸鄆讙龜隂田杜註陽虎九年以此奔齊按來歸者使人將命也先儒謂心服而歸之則于來歸衛俘之義不可通矣本望溪先生説叔孫州仇仲孫何忌帥師圍郈傳叔孫成子欲立武叔公若藐固諌曰不可成子立之而卒公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人殺公若侯犯以郈叛武叔懿子圍郈弗克秋二子及齊師復圍郈侯犯奔齊按侯犯叛不書者以賤故秋叔孫州仇仲孫何忌帥師圍郈圍郈事同州仇何忌人同而必覆舉者兩事也文自不得從省觀此則隠四年宋公陳侯蔡人衛人伐鄭胡氏所謂書之重詞之􅃨其中必有大美惡者其説真不可通矣宋樂大心出奔曹宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾樂祁之子子明言于公曰右師不肯適晉將作亂也乃逐右師宋公子地出奔鄭傳公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子為君禮不過出竟君必止子公子地出奔陳公弗止辰為之請弗聼辰曰是我廷吾兄也吾以國人出君誰與處冬辰暨仲佗石彄出奔陳冬齊侯衛侯鄭游速㑹于安甫以衛有晉難也叔孫州仇如齊謝歸田也宋公之弟辰暨仲佗石彄出奔陳暨者不得已之辭葢辰脅之而與俱出也十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛正義莊十二年宋萬弑閔公蕭叔大心者宋蕭邑大夫也平宋亂立桓公宋人嘉之以蕭邑封叔為附庸宣十二年楚子滅之復為宋邑故辰等今入之以叛按上言暨而此言及者叛非人所能强之事故不可以暨言也夏四月秋宋樂大心自曹入于蕭入蕭從叛人叛可知故不言叛冬及鄭平杜註平六年侵鄭取匡之怨左傳始叛晉也按鄭附齊魯及齊平歸三邑即與鄭平皆夫子用魯睦隣之道也叔還如鄭涖盟十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈傳仲由為季氏宰將墮三都於是叔孫氏墮郈衛公孟彄帥師伐曹傳衛公孟伐曹克郊按不書取郊者疆場小邑無闗重輕春秋畧之者多矣季孫斯仲孫何忌帥師墮費傳季氏将墮費公山不狃叔孫輙帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之二子奔齊遂墮費秋大雩冬十月癸亥公㑹齊侯盟于黄杜註結叛晉辨見及齊平下十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成傳将墮成公斂處父謂孟孫墮成齊人必至于北門且成孟氏之保鄣也無成是無孟氏也子偽不知我将不墮冬十二月公圍成弗克按郈有侯犯之亂費有南蒯之亂季孫叔孫皆苦之故墮之易成則未叛孟孫也又有公斂處父為之宰故雖公親将圍之而亦無如之何此當日之事勢也十有三年春齊侯衛侯次于垂葭杜註二君将使師伐晉次于垂葭以為之援夏築蛇淵囿大蒐于比蒲杜註書不時也按是時孔子方見用于魯乃聴其有此舉何耶葢墮郈墮費季孫叔孫皆苦其家臣之叛故遂聴子路之謀而自墮其保障及孟氏不肯墮成二子乃覺其為強公抑私之計于是季氏之慮遂變彼方以用孔子適以自貽伊戚耳安肯遲至十四年復使之與聞國政乎故司馬遷魯世家記仲由毁三桓城事即繼之曰季桓子受女樂孔子去皆在定公十二年葢自公斂處父之謀用而聖人之于魯已有不可一朝居之勢矣蛇淵之築比蒲之蒐殆皆在孔子既去之後歟胡氏所引孔子世家云云乃好事者張大其詞太史公亦知其説之不足據也故于魯世家皆削而不載而大司宼攝相之説尤荒誕不經胡氏不察而遽信之可慨也已衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛傳趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄皆不可趙鞅怒遂殺午趙稷渉賔以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲将作亂董安于聞之告趙孟曰先備諸趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之據此則趙鞅之入晉陽拒荀范也而經書曰叛先儒謂其不知投鼠忌器之義其説雖正而于當日之情事恐未盡也觀後梁嬰父之惡董安于也以范中行之亂安于實發之則當日趙鞅因荀范之不與圍邯鄲聞安于之言必先謀伐之乃機事不宻為荀范所覺遂先伐之趙鞅戰不勝而出奔此知氏之所以討其先發難也左氏所謂趙孟不可云云者葢荀范從此遂亡而趙氏分晉故晉乗左􅃝趙氏而為是掩飾之辭左氏不察而遽信之耳若果如其説荀范攻鞅鞅束手不敢校而逃死于晉陽其情亦可憫矣而聖人顧書之曰叛亦何足以服其心哉冬晉荀寅士吉射入于朝歌以叛傳荀躒言于晉侯曰君命大臣始禍者死今三臣始禍而獨逐鞅刑不鈞矣請皆逐之冬十月奉公以伐范氏中行氏弗克二子遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌晉趙鞅歸于晉傳韓魏以趙氏為請十二月趙鞅入于絳盟于公宫按大夫返國例書曰歸不書自晉陽者私邑亦晉不可與晉對舉也抑聖人筆削之義于是乎寓焉葢趙鞅之歸與凡出奔而歸者不同其與荀范為難也較之宋華向輩顯與君敵者其罪有間故書歸以寛其據邑以叛之誅然其迹究渉不順故仍不書自以存其由叛而歸之實此所為變通之權衡也薛弑其君比説見昭二十七年吴弑其君下十有四年春衛公叔戌來奔衛趙陽出奔宋傳衛侯惡公叔戌以其富也公叔戌又将去夫人之黨夫人愬之曰戍将為亂十四年春衛侯逐公叔戌與其黨故趙陽奔宋戍來奔二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸傳頓子牂欲事晉背楚而絶陳好二月楚滅頓夏衛北宫結來奔亦公叔戌黨五月於越敗吳于檇李吳子光卒傳吳伐越勾踐禦之患其整也使罪人三行屬劍于頸而辭曰二君有治臣奸旗鼔不敏于君之行前不敢逃刑敢歸死遂自剄也師屬之目因伐之闔廬傷将指還卒于陘去檇李七里夫差使人立于庭苟出入必謂已曰夫差而忘越王之殺而父乎則應曰唯不敢忘三年乃報越按書卒于敗下見以傷卒還兵而隕非陣没者比故不書滅去檇李未逺故不地報越不書者以不告故胡氏乃謂報仇常事故不書非也報仇之師雖敗猶榮胡氏于莊公乾時之戰且謂春秋以此故不諱魯敗矣乃于此復以為常事而不書乎公㑹齊侯衛侯于牽謀救范中行氏也非殷㑹不致而此致者以齊在列故公至自㑹秋齊侯宋公㑹于洮天王使石尚來歸脹石尚大夫也應稱名榖梁傳脹者俎實也祭肉也生曰脹熟曰燔衛世子蒯瞶出奔宋傳衛侯為夫人南子召宋朝㑹于洮太子蒯瞶獻孟于齊過宋野野人歌之曰既定爾婁豬盍歸我艾貑太子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余太子奔宋劉氏敞曰左氏序蒯瞶事曰蒯聵欲殺夫人予謂蒯瞶雖不善安有此事哉且殺夫人蒯瞶獨能全乎彼所羞者以夫人名惡也如殺其母為惡愈大豈不知可羞乎葢蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥已之滛則啼而走言太子将殺余以誣之靈公惑于南子所言必聴故外則召宋朝内則逐公叔戌趙陽固亦不難逐蒯瞶矣此其真也不當如左氏所記及蒯瞶出奔乃奔宋宋南子家也蒯瞶負殺南子之名又走入其家敢乎哉衛公孟彄出奔鄭公孟彄蒯瞶之黨也宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公以相見于比蒲故不用朝禮用㑹禮故曰㑹城莒父及霄杜註公叛晉助范氏故懼而城二邑十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛不言其所食食非一處以致于死也按正月改卜牛在滌三月自應至四月而郊獨此年書郊成七年書不郊猶三望皆在夏五月其義未聞二月辛丑楚子滅胡以胡子豹歸傳吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為二月楚滅胡夏五月辛亥郊書不時也壬申公薨于高寢杜註高寢宫名不于路寢失其所鄭罕達帥師伐宋傳鄭罕達敗宋師于老丘杜註老丘宋地宋公子地奔鄭鄭人為之伐宋欲取地以處之事見哀十二年齊侯衛侯次于渠蒢傳謀救宋也不果救故書次李氏堯俞曰五氏垂葭之次皆謀伐晉此次疑亦謀晉故明年遂伐晉時鄭從齊齊肯救宋以仇鄭耶其説于情事極合左氏傳恐未足信邾子來奔喪諸侯奔魯喪者惟此一見秋七月壬申姒氏卒姒氏哀公之母也妾母故卒不書薨葬不稱小君望溪先生曰成風敬嬴定姒之卒書薨葬稱小君非禮也而是時魯尚有君也故諸大夫從君所欲姒氏卒不書薨葬不稱小君禮也季氏弱其君不使備禮君嬴而不能自主也八月庚辰朔日有食之九月滕子來㑹葬㑹葬不止滕子大夫合禮故不書丁巳葬我君定公雨不克葬戊午日下昃乃克葬榖梁傳葬既有日不為雨止禮也雨不克葬喪不以制也乃急辭也不足乎日之辭也辨詳宣八年𦵏敬嬴下辛巳葬定姒按定非諡也妾母不敢從夫本當有諡隠公之母諡聲是其例也魯自文姜之後夫人皆不從君諡于是遂以别諡為尊夫人而定姒以妾母不備禮反從公之諡曰定葢周公之典法至是已掃地盡矣不然則襄公之生母諡定亦號定姒世之相去未乆也何必故與之相犯乎冬城漆春秋究遺卷十五
