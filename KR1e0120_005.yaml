body:
  text: 春秋究遺卷五左庶子葉酉撰閔公元年春王正月繼弒君不書即位說詳桓元年公即位下胡氏謂內無所承上不禀命非也十二公皆不請命于天子昭公亦不承國于先君何獨于此而譏之齊人救邢齊人渾舉之詞辨詳隱二年莒人入向下夏六月辛酉葬我君莊公傳亂故是以緩秋八月公及齊侯盟于落姑傳請復季友也齊侯許之使召諸陳公次于郎以待之公羊注時慶父內則素得權重外則出奔强齊恐為國家禍亂故季子如齊奉閔公托齊桓為此盟下書歸者使與君同致其說與左氏異按經文上書盟于落姑下書季子來歸則季子之歸在盟後審矣且必無與君同致之理何休之說不足信但當慶父弒般之後若友方出奔在外則閔公以九齡藐孤㷀㷀在疚孰能奉之出㑹伯主而為國計者故吳氏澄疑必魯之世臣有不當權而忠于國如衛之石碏者密告伯主請復季友其說似得其實然猶有未盡者慶父専權自恣請復季友本非其心之所願使密告伯主而彼不預聞則愈足以中其忌而沮其事不難矣雖欲季友之歸也得乎是時莊公甫薨遺澤在人諸臣不盡慶父之黨誠有如吳氏所云不當權而忠于國者意必僞托僚誼設辭以誘之謂季才而弱且兄弟至親復之可藉以靖國人以此說慶父于是慶父惡貫既盈天奪之鑒或遂信以為得計而不疑耳其後閔復被弒魯勢更危使于此無人焉以大義激衆怒同聲疾呼如水火之不可犯慶父何遂至于出奔僖公恐亦難以入立此皆國猶有人之效也魯之所以危而復安者其以此也歟不致者特㑹參盟例不致先儒因夾谷黃牽諸盟㑹皆致遂疑魯與齊壤地相接屢相侵伐故凡與之㑹盟皆致果如其說此與宣元年㑹齊侯于平州何皆不致乎蓋特㑹參盟書至者以有戒心故此與平州之㑹無戒心故不致從恆例也季子來歸按傳稱成季奔陳經第書其歸而其出不書者聖人心在天下凡大夫出奔必書者以當時諸侯政刑不綱至使股肱一體之人往往為事勢所迫而不安于其位即此足以徵世變焉故謹而志之蓋為天下之大局志非徒為此捐墳墓背桑梓一人之身家志也魯至莊公之末先君甫薨嗣子被弒世變莫甚于此季友因君弒國亂而出奔是其奔乃君弒之餘事耳世變之甚者書其餘事可以概之故季友之出奔不書者所謂春秋舉重也莊八年齊無知弒其君諸兒其時糾來奔魯史未有不書者而聖人削之即此義莊十二年宋萬出奔陳閔二年公子慶父出奔莒其異于季友之不書出奔者宋萬慶父二人皆弒逆之賊春秋以其出奔為失刑也故書以示譏不得執彼以疑此然則來歸之文不嫌于無所起耶是殆不然聖人因史作經以垂教萬世非為魯國修史也其事之首尾聖人以為不必備者以有魯史在耳其後魯史不傳必三家惡其害己而去其籍固聖人之所不及料者也此既書來歸則前之出奔不待言如糾之來奔不書而書公伐齊納糾固亦不嫌于文之無所起也何獨于此而疑之季友不名者當時魯國幾亡季友歸國勢乃危而復安于是國人皆有喜出望外之意夫子篤于父母之國雖生百數十年之後而與生當其時者有同情焉故其津津于筆削之間者蓋據國人以為文國人固不可以名大夫也下書齊仲孫來明年又書齊高子來盟齊大夫之來皆不名義與此同稱子者單季字不成文又不可云我季也故稱季子大夫歸例書自某國而落姑之請復季友傳稱公待之于郎則其歸也乃見公于郎之後自郎來歸故不書自陳也冬齊仲孫來按仲孫之來齊侯使之也不書齊侯使者先儒謂齊侯使來覘國其說恐不確蓋魯為東方之望國齊桓本欲寧其難而親之以示救災恤鄰之義湫之來魯實省難非覘國也逮聞仲孫言其難未已乃不免動其覬覦之心萬一乘其危而取之于己未為不利此伯者之所為假之也然當其使仲孫來之時固無取魯之意安得遽以覘國疑之仲孫承桓公取魯之問能以魯秉周禮勸其君以霸王之器其為功于魯者甚大于是魯人喜之故書法與下齊高子來盟同其說詳具彼下不以子稱者仲孫復氏文當然也二年春王正月齊人遷陽陽小國蓋齊人迫而遷之夏五月乙酉吉禘于莊公按禮三年喪畢致新死者之主于廟廟之逺主當遷入祧因大祭以審昭穆謂之禘禘吉祭也莊公喪制未闋行之太早又不于太廟故詳書以示譏其曰于莊公者穀梁所為在三年之中未可以稱宫廟也秋八月辛丑公薨不地義見隱公十一年公薨下慶父縊緣臣子之義仇既復矣而閔不書葬何也魯為慶父立後非所以待不共戴天之人故仍從仇未復之例以病季子也九月夫人姜氏孫于邾傳閔公哀姜之娣叔姜之子也故齊人立之共仲通于哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾杜注哀姜外淫故孫稱姜氏先儒謂哀姜殺子罪輕故不去姜氏皆非也書夫人未有不書其氏者文姜不書氏著其為夫人以正其罪耳哀姜殺子單書夫人不足以著其罪也故從恆辭書氏豈謂其罪之較輕于文姜哉其不孫于齊而孫于邾者蓋知齊桓之怒其淫行而懼其討也邾附于齊夫人齊女故欲暫托以免禍公子慶父出奔莒傳初公傅奪卜齮田公不禁秋八月共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊按叔牙鴆而書卒慶父縊不書卒何也慶父之罪浮于叔牙魯不正其罪而誅之且為之立後失刑甚矣故第以出奔書而閔公不書葬皆所以罪季友不明于瀦宫滅親之義而寬亂賊之誅也冬齊高子來盟按高子不書齊侯使者胡氏謂權在高子非也齊桓既聽仲孫之謀務寧魯難而親之矣至是閔公雖復被弒而夫人孫慶父奔天去其疾矣桓雖欲取魯其勢恐亦有所不能故高子之來盟公羊稱其將南陽之甲立僖城魯其與存恤邢衛之事何以異扶危定傾此齊桓所以為五伯之盛也豈如胡氏云云哉其所以不書齊侯使者蓋據國人以為文故高子仲孫皆不以名見使書齊侯使則上下衡决不成文理矣所為聖人之情見乎辭有欲贅一辭而轉無以見其情者安得以權在高子之說為解且合前後文觀之元年秋書公及齊侯盟于落姑下即繼之曰季子來歸則並季子之歸且以為職桓之由况許人臣者必使臣許人子者必使子二子之大有造于魯者夫孰非桓公為之乃因其取魯一問専文致其乘人之危以為利之罪遂若存魯之功毫于桓公無涉皆由昧于聖經所以不書齊侯使之故耳豈不謬與十有二月狄入衛不書滅者衛旋滅旋復若以滅書則與滅而不復者無以别矣鄭棄其師杜注鄭伯素惡高克使將師救衛隨後逐之因將師而去不目鄭伯者胡氏謂君臣同責非也惡其臣而棄其師失為國之道矣故以國書不稱爵者義不關乎其爵也春秋究遺卷五
