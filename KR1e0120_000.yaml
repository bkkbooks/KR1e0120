body:
  text: 春秋究遺目録春秋類卷一隱公卷二桓公卷三莊公上卷四莊公下卷五閔公卷六僖公上卷七僖公下卷八文公卷九宣公卷十成公卷十一襄公上卷十二襄公下卷十三昭公上卷十四昭公下卷十五定公卷十六哀公臣等謹案春秋究遺十六卷國朝葉酉撰酉字書山號花南桐城人乾隆己未進士官至左春坊左庶子是編多宗其師方苞春秋通論而亦稍有從違其曰究遺者蓋用韓昌黎贈盧同詩春秋三傳束髙閣獨抱遺經究終始語也於胡傳苛刻之説及公榖附會之例芟除殆盡於左氏亦多所糾正乃往往併其事迹疑之如開卷之仲子謂惠公違禮再娶以嫡禮聘之可也酉必據此謂諸侯可再娶則衛莊公於莊薑見在復娶於陳陳之厲媯有娣戴媯其正名為嫡可知亦將據以為諸侯之禮可以建兩嫡乎又謂仲子之宫立所當立故書考而不書立是據何禮典也郎之戰距桓公之立已十年酉乃謂三國來討弒隱公之罪左傳周班後鄭之説為誣鄫季姬之事左氏以為歸寧見止於事理稍近公羊以為使自擇配已屬難據乃斷為季姬已許鄫子而僖公悔婚故季姬義不改適私會鄫子文公十二年之子叔姬與十四年之子叔姬酉以為孿生之女已屬臆度又以齊人所執之子叔姬為舍之妻傳誤以為舍之母又以宣公五年齊髙子所娶之子叔姬即此妻舍之子叔姬並非兩人輾轉牽合總以叔之一字不容有兩生意不知女笄而字不過伯仲叔季四文益以庶長之孟亦不過五設生六女何以字之是知未笄以前用名為别既笄而字字不妨復因此而駁傳文未免橫生枝節莒人滅鄫傳言恃賂酉以為襄公五年鄫已不屬魯傳為失實而下文季孫宿如晉又引傳晉以鄫故來討曰何故亡鄫之語使鄫不屬魯其亡與魯何關亦為矛盾他如王不稱天桓無王之説因仍舊文不能改正而以趙岐孟子注曹交曹君之弟語證左傳哀公八年宋人滅曹之誤更為倒置然大致凖情度理得經意者為多其比例中所謂變例特文隱文缺文之説亦較諸家之例為有條理他若據漢地理志辨戎伐凡伯之楚丘非衛地據史記夷薑為衛宣夫人非蒸父妾據宣公五年經書春王正月郊牛之口傷改卜牛牛死乃不郊辨魯不止僣祈榖之郊如斯之類亦時有考證統核全書瑕固不掩其瑜也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋究遺凡例一春秋據事直書注家只當以發明聖意為主若逞其臆見務為苛刻穿鑿之論縱能引經據史總屬節外生枝先儒頗多此弊不敢效尤一聖經如書同盟書公至書歸書入書人之類頭緒如亂絲今悉為一一拈出又恐散見各條下或難參考其異同故每于開首一條下輒作一總案覽者第將此總案理清則其下皆迎刃而解矣一凡禮制地名以及一切應加考訂之事先儒具有成説然于聖人筆削之義無與也兹故略為疏解無事嘵嘵一春秋義例有為衆人所共知者輒隨筆為注數語于下雖先儒成説槩不標出以本非特出手眼故也一三傳誤信傳聞有情理所必無之事不得不為辨明或先儒已有舊説輒採入之一凡事之緣起有節録左氏傳不增易一字者則標一傳字于上若傳文先後參錯或頭緒繁多不能備載只以數語括之者則不標傳字一吾師望溪先生通論皆發從前人所未發其為功于經學甚大惜先生精力全注于三禮之學于春秋則大綱雖舉而節目未詳今悉為綴緝完備頗有與先生異同處亦由先生先闢其門徑而承學之士特因其説而加審焉爾若謂青出于藍則吾豈敢一春秋比例一編鄙意欲補從來説是經者之所未備蓋必理清頭緒而後可以斬斷葛藤天下不乏好學深思之士當不河漢余言春秋總説聖人因史作經原欲垂教于天下萬世非為魯國修史也故凡事之無關于勸懲者輒削而不録其所削之事非必盡一事而削之也或録其前而削其後或録其後而削其前其事之首尾聖人以為不必備者以有魯史在耳其後魯史不傳必三家惡其害己而去其籍固聖人之所不及料者也王介甫目為斷爛朝報所為斷爛誠有之然學者所宜盡心之處正在于此彼乃因此而欲廢此一經斯則為聖門之罪人矣聖人春秋凡事止撮其大綱魯史舊文必詳備古者史官記事小則書之于簡大則書之于册所謂册者蓋聨數版為之事大則文繁故必以册書之而始盡也若魯史舊文一如聖人春秋止撮其大綱則通二百四十二年之事書之未有過三行者登之于簡足矣安用册為哉春秋所以不仍舊史之文而凡事止撮其大綱者史官記事大都皆循習舊例案而不斷不足以見褒貶之義如鄭伯之歸祊假田若止如舊史之文雖首尾詳備不過見兩國之以利交耳至鄭伯目無天王之罪必如經文兩書鄭伯乃足以見之蓋褒貶之義恆隱寓于一兩字之內此一兩字非撮其大綱則其文繁而其義無由著故朱子綱目雖本溫公通鑑而必先撮其要以為綱者正倣春秋以一兩字寓褒貶之法也蓋案者所以為史斷者所以為經聖人若止為魯國修史則據事直書而史家之能事畢矣又何必以竊取其義為己任也哉以朱子綱目例之聖經如綱魯史如目聖人當日若不恃有魯史聖人固不能逆料身沒後之必有左氏為之傳也亦安用此一部首尾不具之書以疑誤來學乎春秋一定之例有本乎舊史者有不本乎舊史者如崩薨卒葬之必書官爵名氏之從告此本乎舊史者也至若一兩字之間辨别名分如諸侯返國書復歸大夫書歸之類其為例至纎至悉史官記事往往有至數百言之多者豈能拘拘于是哉故魯史有魯史之例聖經有聖經之例然皆非褒貶之所寓也褒貶之義惟當于變例中求之如歸祊假田例應書鄭人而書鄭伯是也聖人若為魯國修史自有一定史例如齊之盟不序齊宋之會不序宋天下有如是之史例乎又如季姬及鄭子遇于防舊史必不為季姬著此特筆當是書鄫子來朝因序其事之緣起如是耳聖人則欲以季姬垂教遂大書特書若不勝其咨嗟愛惜之意所為因史作經非為魯國修史者于此等處見之先儒謂春秋以一字為褒貶是則然矣但皆以稱名稱人為貶稱官稱爵為褒是以黜陟為褒貶非為下不倍之道也褒貶與黜陟不同黜陟為人君馭臣之大柄必天子諸侯有其權乃得行其事若褒貶不過托諸空文是是非非無所避忌耳所為庶人之議也春秋之所以有褒貶者只緣聖人之心渾然天理故見善則好見不善則惡而此好善惡不善之心誠于中自不覺流露于筆削之際蓋欲顯著其善不善之迹以垂教於天下後世聖人並非有意為此褒貶也况敢以匹夫而僭擬天子諸侯黜陟之大柄哉然則孟子以春秋為天子之事何也是是非非以誅討亂賊為己任天子固不能外是以為事也豈必書諸侯而去其爵書大夫而去其官而後為天子之事乎程子春秋傳序云春秋大義數十炳如日星乃易見也惟其微辭隱義忽豫忽奪忽抑忽縱時措從宜者為難知耳其意蓋指稱人稱爵之類不知聖人固不以此等為褒貶也且其忽豫忽奪云云尤不脫前人窠臼若引此斷獄則舞文弄法弊將有不可勝言者矣是書為伊川未成之書想亦自知其無當于經義也故甫至桓公十年而遂己歟史記載聖人之言曰我欲載之空言不若見諸行事之深切著明蓋謂是非只據理而言則虛而無實不若就當時諸侯所行之事而斷其是非以垂教于天下後世為更犂然易曉也先儒誤會文義竟以作春秋為聖人自己所行之事豈不可笑杜氏預春秋序云韓宣子適魯見易象與魯春秋歎曰周禮盡在魯矣韓子所見蓋周之舊典禮經也周德既衰官失其序上之人不能使春秋昭明赴告䇿書諸所記注多違舊章仲尼上遵周公之遺訓刋而正之以示勸戒云云其語俱不甚允愜周公佐武王定天下制禮作樂事非一端史官記注一文學之臣任之而有餘矣周公遺訓恐不在兹春秋昭明語更鶻突周德既衰惟是禮樂征伐不自天子出耳赴告䇿書現存舊章何至違異彼其所以為此語者總由誤以聖人為魯國修史故不得不坐舊史以違舊章之失惟欲坐舊史以違舊章之失故不得不以韓子所見者為周之舊典禮經不知韓宣子來聘在昭公二年逆推而上自昭公元年至平王四十九年凡一百七十餘年之春秋其藏之太史者當韓子來聘時魯豈皆祕之而不以相示乎乃於韓子之所見者則以為舊典禮經於孔子之所本者則以為多違舊章前後矛盾失考殊甚竊意魯史舊文為聖經藍本其記注必不至有甚差謬但案而不斷不足以垂教耳杜氏只刋而正之一語便見其受病之處種種支蔓由此而生學者誠確然知聖人非為魯國修史則其于春秋也思過半矣事以積而成例聖人初不知有所為例也事變則例變如夏之不得不葛冬之不得不裘皆行其所無事而已聖人曷嘗容心于其際哉春秋之所以為經雖遊夏不能贊一辭者只三語足以盡之一曰心胸大二曰義理精三曰文法妙天下大局勢有緊要關係之處聖人必不草草敘過如胥命于蒲為伯事之始黃池之會為伯事之終齊桓沒而楚氛漸熾于是有齊之盟晉伯衰而楚勢益強于是有宋之盟前後二百年間天下之大局數變皆特立異文以見義焉蓋聖人之心上下千古至此不覺怦怦一動而筆即隨之其文法之妙能使千載而下玩其詞而考其事猶不勝世變升降之感宜其為遊夏所不能贊者歟王迹既熄則伯之係于天下不小晉至厲公之世國勢甚強而匠麗禍作伯業幾于不振此天下大局之所係也故州蒲之弒稱國而不目其人聖人于楚所以深惡而痛絶之者只為其僭王而楚之僭王與後世之稱兵犯順僭稱大號者不同不過妄自尊大耳聖人却見得此事極重使非義理精到極處不能如此榮叔歸賻王不稱天聖人之謹于名分如此後世人子官至一二品其母雖妾媵亦受夫人之封若凖以春秋之法皆為亂嫡庶之大分此義非聖人不能見得如此清楚非聖人不能斷得如此斬截天下無不是之父母祖父母與父母同宋昭無禮于襄夫人以致孟諸之禍畢竟于孝道有虧欠處故春秋只以宋昭垂戒而不為宋昭討賊若朱子綱目書魏馮太后弒其主以母而鴆殺其子竟以弒書雖所持未嘗不正究不即乎人心之安以此見聖人精義之學雖朱子大儒尚不免毫釐之差其他則又何説聖人心細如髮其文法之妙雖至無關緊要之處亦必斟酌盡善恰與其事相稱如季子來歸不書自陳王使榮叔歸含且賵不書來以及晉人及薑戎敗秦師于殽不列序而書及公與夫人遂如齊不言及而言與之類皆是所謂語小天下莫能破焉者于此見之春秋義例頭緒極多而極清分肌劈理細入微芒容一毫粗疏不得如返國書入在大夫則為逆辭在公子則為恆辭諸侯返其國都書入則為逆辭返其國邑書入則為恆辭先儒不問其為公子為大夫或都或邑但見一入字即以逆辭槩之及推之而不可通則又以為難辭皆所為遁辭之必窮者也他如弒君之不書葬乃以仇未復之故若以賊未討則蔡景許悼二公之書葬推不去矣賊與仇有分先儒多鶻突過去其弊總由于心粗春秋逐條史例之外又有全經通例如國有弒逆之事其大夫之因亂而出奔者即不書所謂春秋舉重也又如書桓宫僖宫災不書司鐸火書虞師晉師滅下陽不書伐虢皆是此義觀此益見聖人作經以垂教之意若為魯國修史則如季友之奔陳與齊糾之來奔安有不書者乎春秋史例之外又有聖人文法辭以達意為主人止知以多為達而春秋則往往以少為達如鄭伯克段于鄢不書段出奔單伯逆王姬不書如京師之類使非以少為達其于義無所處矣又凡接書一國兩事或一人兩事必覆舉某國某人若一事而接書其首尾則不覆舉凡此兩法聖人止隨事立文本無所容心于其際也而褒貶之義所以扶人極而明王法者每即于此見之學者不可不察春秋有聖人文法又有聖人語氣如齊之盟不序齊宋之會不序宋知是聖人歸咎于此二國者只將下三字重讀而聖人之語氣自見其他如楚屈完來盟于師蔡侯以吳子及楚人戰于柏舉以及魯閔宋昭時諸大夫不名之類皆是是在善學者之以意逆志耳左氏傳于宣元年公子遂如齊逆女以稱公子為尊君命遂以夫人婦薑至自齊以不稱公子為尊夫人與成十四年稱族舍族之説同一穿鑿不知前稱公子叔孫而後不稱者不過承上文從省耳何必多費此解乎然從來説春秋者又有鹵莽之弊即如此兩婦薑一稱氏一不稱氏聖人必非無故而漫為增損此一字也乃或以缺文衍文疑之則又過于鹵莽其弊與穿鑿等學者不可不知左氏有極心粗處如宋之盟楚先晉歃明明是盟先楚彼却誤認作會又無奈聖人先序趙武何乃曲為之解曰貴信此不細心分别盟與會之故也于此益見聖人文法不可不知若知有兩事覆舉之法則此盟之覆舉叔孫豹聖人已明示天下以會先晉而盟先楚而一切支詞蔓説自無所容其喙矣公羊有大亂道處如鄫季姬以貞女而目為淫泆千古覆盆至今日始為一灑之其所以知其為貞女者只是反覆經文有以得聖人嘉豫之意耳胡傳有與聖意恰相反處如兩國接戰例以受兵之國主兵主之者內之也胡氏乃謂聖人以其不告天子方伯而忿與之戰為罪果如其説則凡魯與外兵接戰皆以魯主兵豈皆譏在魯乎周正建子不特正月宜書王以别于建寅之正月也自子至亥十二月皆與夏時不同皆當書王以别之因多不勝書故止書開首一月以例其餘正月無事則書王二月二月無事則書王三月二三月之書王與正月之書王皆不過以其為開首一月耳無他義也公羊存夏商二王之説謬甚春秋終于獲麟其文法之周匝亦斷非聖人不能蓋春秋記二百四十二年之事如一堆散錢竒零雜亂漫無統紀若只逐年逐件依次加增何時了局耶今以麟之出非其時喻己之老不得志忽從天下大局勢轉入一己之遇合為全書作結離竒天矯遂使一堆散錢囊括都盡此後更增一語不得真天造地設之文春秋比例春秋有一定之例諸家之所以橫生異議隨處窒閡而不可通者皆坐不知其例故耳又多為三傳之例所誤即如及者我所欲會者外為志此公羊書及盟與會盟之例也彼蓋見隱公初年公即位而欲求好于邾故以及邾盟為我所欲見戎請盟故以公會戎于潛為外為志然以下文公及戎盟于唐比之即不合矣况如首止之盟書公及某某會王世子一事也及與會並書我所欲乎外為志乎又如國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入此左氏書出奔歸入之例也然昭公十三年楚公子比歸于楚傳稱以蔡公之命召子干子晳則是國逆而立之矣而經書歸何説乎杜注以陳蔡為解穿鑿不可從至以惡曰復入謬誤尤甚彼其所以為此説者特以欒盈魚石書復入故耳抑思例必有文義可解復字豈可作惡解乎大夫返國例書歸書入即為逆辭不必書復入而始為以惡也如鄭良霄出奔許自許入于鄭彼固入而欲為亂于國者何嘗書復入乎其他如稱人稱名稱官爵行次皆有一定之例例當稱人稱名者則稱人稱名例當稱官爵行次者則稱官爵行次聖人豈有所容心于其際哉今概以褒貶求之至以泄冶之忠亦以稱名而謂非春秋之所貴此皆所謂不知其例者也然經文明白簡易細繹之其例皆顯然可見諸家顧為此紛紛者蓋春秋雖有一定之例而隨事立文往往不可以一例拘彼見聖人之不可以一例拘也求其故而不得于是反并其例之顯然可見者胥以不拘乎例者亂之而疑為筆削之義之所存夫春秋之義聖人之所謙言竊取者也而其文則史史之例文也非義也然欲明春秋之義者要當即一定之例求之蓋義必得其間而後有可致吾思之處間不生于同而生于異惟明乎一定之例而于其彼此異同之間有所據以相印而其間乃出既得其間由是沈潛反覆融會貫通覺千端萬緒皆有天造地設之妙斯筆削之義因文以見而一切支離附會之論自無所容其喙矣例凡若干條每一條下各有其文之不合例者若干條爰彚為春秋比例一編辨諸首王稱天王變例莊公元年冬十月王使榮叔來錫桓公命文公五年春王正月王使榮叔歸含且賵文公五年三月王使召伯來會葬異文成公八年秋七月天子使召伯來賜公命正月稱王正月變例桓公自三年至九年又自十有一年至十有七年俱不書王公即位必書其不書者如隱公則以攝讓莊閔僖三公則以繼故皆變例也然繼故亦有書即位者又變中之變其義則更精矣桓公元年春王正月公即位宣公元年春王正月公即位凡公薨書地弒則不地未即位書子卒不地未葬書名隱文文公十有八年冬十月子卒叔仲彭生之及不書凡公會盟會伐以及有事如鄰國皆書至大夫則不書至然公行亦有不書至者不告廟故也無變例凡嗣君既葬稱子踰年稱爵變例宣公十年四月齊侯元卒冬齊侯使國佐來聘成公四年三月鄭伯堅卒冬鄭伯伐許凡附庸之君稱字變例莊公五年秋郳黎來來朝稱名僖公二十有九年春介葛盧來同上王卿士書行次文公後稱子大夫書名宰聘則書官或繫名或繫爵會盟則書官繫爵變例隱公三年秋武氏子來求賻稱武氏子桓公五年夏仍叔之子來聘稱仍叔之子莊公六年春王正月王人子突救衛僖公八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮僖公二十有九年夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉以上皆稱王人昭公二十有三年秋七月尹氏立王子朝稱氏昭公二十有六年冬十月尹氏召伯毛伯以王子朝奔楚尹稱氏召毛稱行次凡內外臣惟卿為大夫非卿則姓名不登于册故雖內三叛不書微之也無變例凡外諸侯會而不盟則書某某會于某地盟而不會則書某某盟于某地若會而又盟則書某某會于某地某日盟于某地變例文公十有五年冬十有一月諸侯盟于扈諸侯不序文公十有七年夏六月諸侯會于扈同上異文桓公三年夏齊侯衛侯胥命于蒲凡外大夫會盟自文公以前卿皆稱人惟以事接于我者稱名至盟于垂隴之後始以名見然自宣公以前尚不列序至成公十五年會吳于鍾離始列序惟大夫則稱人諸小國之大夫稱人小國之大夫謂卿也小國之卿只謂之大夫變例僖公二十有五年冬十有二月癸亥公會衛子莒慶盟于洮小國之大夫名襄公八年夏季孫宿會晉侯鄭伯齊人宋人衛人邾人于郉丘齊宋衛皆卿稱人特文襄公三十年冬晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故凡魯君與外諸侯會而不盟則書公會某某于某地盟而不會則書公及某某盟于某地若會而又盟則書公會某某盟于某地其盟會不同日者則書公會某某于某地某日盟于某地前目後凡不覆書公變例文公七年秋八月公會諸侯晉大夫盟于扈諸侯不序晉大夫不名文公十有四年六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城列序後不書于某地襄公三年六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤同上定公四年三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚五月公及諸侯盟于皋鼬覆書公及特文桓公二年三月公會齊侯陳侯鄭伯于稷以成宋亂異文哀公十有三年夏公會晉侯及吳子于黃池缺文春秋缺文甚多其無關於義例者不具列莊公十有六年冬十有二月會齊侯宋公陳侯鄭伯同盟于幽左氏榖梁無公字公羊有公字當從公羊凡魯君與外大夫會盟不書公與王臣會盟同此例變例隱公八年九月辛卯公及莒人盟于浮來成公三年十有二月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀襄公二十有六年公會晉人鄭良霄宋人曹人于澶淵異文文公二年三月乙巳及晉處父盟不書族隱文僖公十有九年冬會陳人蔡人楚人鄭人盟于齊不書齊人魯臣會盟或會而不盟或盟而不會或會而又盟俱與魯君同變例襄公五年夏仲孫蔑衛孫林父會吳于善道不主魯卿書及襄公十有六年三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞子小邾子于湨梁戊寅大夫盟不書諸侯之大夫不主魯卿書及又不書盟于某地襄公二十有七年秋七月辛巳豹及諸侯之大夫盟于宋覆書豹及異文莊公十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟隱文襄公二十有七年夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋不書宋向戌凡外諸侯侵伐君將稱君大夫將自文公以前卿皆稱人至晉陽處父伐楚救江之後始以名見然尚不列序至成二年戰于鞍始列序惟大夫則稱人諸小國之大夫稱人師衆則稱師少則稱人小國之大夫謂卿也小國之卿只謂之大夫以其不命于天子故變例文公以後卿將亦多有稱人者蓋偶不得其名氏故以人渾之特文文公三年十有二月晉陽處父帥師伐楚以救江凡魯國侵伐君將稱君卿將稱某帥師微者將稱師若與外兵同事侵伐君卿將書會微者將書及戰則君將書公及某國戰于某地卿將則書某帥師及某國戰于某地微者將但書及某國戰于某地特文莊公八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還書俟陳蔡書治兵書師還皆惟此一見異文桓公十有二年十有二月及鄭師伐宋丁未戰于宋隱文成公十有三年三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦不書戰又不書成劉二子魯被侵伐異文桓公十年冬十有二月丙午齊侯衛侯鄭伯來戰于郎凡內外取邑必先書伐某國變例昭公元年取鄆昭公四年取鄫序戰不以大夫先諸侯變例僖公二十有七年冬楚人陳侯蔡侯鄭伯許男圍宋凡內兵與外兵戰皆以魯主兵書及外兵與外兵戰皆以受兵之國主兵惟吳楚僭王雖戰于其地不以之主兵如柏舉之戰是也外之也變例僖公十有八年五月戊寅宋師及齊師戰于甗不以齊主兵文公十有二年冬十有二月戊午晉人秦人戰于河曲兩國列序不以晉人主兵書及凡伯國合兵侵伐只列序而不書及變例僖公三十有三年夏四月辛巳晉人及薑戎敗秦師于殽凡侵伐不書戰者或服而聽命或守而不出本未嘗戰也書戰而先書伐者兵薄其城邑而後出戰也其不先書伐者兵未至而逆與之戰也入而先書伐者攻圍久而後入也兵甫至而即入者不書伐變例桓公十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績兵薄國都而不先書伐異文定公四年冬十有一月庚辰吳入郢凡敗績君傷則書某君敗績君卒於陳書滅君見獲則書獲而不書敗大夫見獲則先書敗後書獲未陳書某敗某師王師敗則書王師敗績于某魯敗君將則書戰而諱其敗卿並不書戰變例莊公九年八月庚申及齊師戰于乾時我師敗績魯敗不諱僖公十有五年冬楚人敗徐于婁林徐不稱師異文隱公元年五月鄭伯克段于䣕書克凡春秋書地皆不係國變例襄公元年仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城襄公十年冬戍鄭虎牢凡魯築城皆曰城不論其為都為邑也惟臺囿則曰築變例莊公二十有八年冬築郿凡內外相與平書及某國平變例宣公十有五年夏五月宋人及楚人平書人異文隱公六年春鄭人來輸平昭公七年春王正月暨齊平凡外臣來俱書某君使某來王臣來亦書天王使某來變例隱公三年秋武氏子來求賻不書王使桓公五年夏仍叔之子來聘同上莊公二十有三年荆人來聘書人又不書楚子使閔公元年齊仲孫來閔公二年齊髙子來盟僖公四年楚屈完來盟于師文公十有五年三月宋司馬華孫來盟以上皆不書君使文公五年春王正月王使榮叔歸含且賵不書來特文成公八年晉侯使韓穿來言汶陽之田歸之于齊凡內臣出聘書某如某國不書公使變例莊公元年夏單伯逆王姬不書如京師凡外臣來逆女納幣皆不書君使變例成公八年夏宋公使公孫夀來納幣凡諸侯出奔書某爵出奔某國稱爵而不名變例桓公十有一年九月鄭忽出奔衛莊公二十有四年冬曹羈出奔陳昭公元年秋莒展輿出奔吳以上皆書名不書爵桓公十有五年五月鄭伯突出奔蔡桓公十有六年十有一月衛侯朔出奔齊昭公二十有二年冬蔡侯朱出奔楚昭公二十有三年秋七月莒子庚輿來奔以上皆書名異文莊公四年夏紀侯大去其國凡諸侯返國書爵書名書復歸不書自某國變例桓公十有五年五月鄭世子忽復歸于鄭不書爵莊公六年夏六月衛侯朔入于衛不書復歸僖公二十有八年衛侯鄭自楚復歸于衛書自楚僖公三十年秋衛侯鄭歸于衛書歸不書復成公二十有六年秋曹伯歸自京師書歸不書復不書名又書自隱文桓公十有五年秋九月鄭伯突入于櫟其入鄭不書凡大夫出奔書某國某人出奔某國變例文公七年夏四月戊子晉人及秦人戰于令狐晉先蔑奔秦文公八年冬十月公孫敖如京師不至而復丙戌奔莒宣公十有八年冬十月歸父還自晉至笙遂奔晉以上皆不書出王臣王子瑕于襄公三十年奔晉尹氏召伯毛伯于昭公二十六年奔楚俱不書出宣公十年齊崔氏出奔衛書氏不書名異文定公十年宋公之弟辰暨仲他石彄出奔陳凡大夫返國書名書歸書自某國變例閔公元年秋八月季子來歸不書自僖公二十有八年衛元咺自晉復歸于衛書復歸與諸侯同成公十有八年夏宋魚石復入于彭城不書歸又不書自襄公二十有三年夏晉欒盈復入于晉入于曲沃同上襄公三十年秋七月鄭良霄出奔許自許入于鄭不書歸定公十有一年秋宋樂大心自曹入于蕭同上定公十有三年冬晉趙鞅歸于晉不書自凡公子返國嗣位書入當立者係國不當立者不係國外有奉書自某國變例桓公十有一年九月突歸于鄭不書入又不書自某國莊公二十有四年冬赤歸于曹同上特文隱公四年冬十有二月衛人立晉異文文公十有四年秋七月晉人納捷災于邾弗克納隱文僖公十有八年春王正月宋公曹伯衛人邾人伐齊五月戊寅宋師及齊師戰于甗齊師敗績不書納昭不書齊昭入於齊諸侯不生名變例桓公七年夏榖伯綏來朝鄧侯吾離來朝僖公二十有五年春王正月衛侯燬滅邢昭公十有一年夏四月丁巳楚子虔誘蔡侯般殺之于申外諸侯之事凡不以身親第為其臣之所奉命而行者如今部院中奉旨所辨之事皆稱人變例隱公八年三月鄭伯使宛來歸祊桓公元年三月鄭伯以璧假許田莊公四年六月乙丑齊侯葬紀伯姬莊公二十有七年齊侯來獻戎捷成公八年晉侯使韓穿來言汶陽之田歸之于齊大夫稱名變例閔公元年秋八月季子來歸閔公元年冬齊仲孫來閔公二年冬齊高子來盟文公八年冬宋人殺其大夫司馬宋司城來奔文公十有五年三月宋司馬華孫來盟凡公子而為卿者稱公子不為卿者時君之子稱子先君之子而為時君之兄弟者稱某侯之兄某侯之弟先君之子而與時君之屬稍疏者稱名皆不稱公子變例隱公元年夏五月鄭伯克段于鄢不稱弟桓公十有一年柔會宋公陳侯蔡叔盟于折桓公十有五年五月許叔入于許桓公十有七年秋八月蔡季自陳歸于蔡莊公三年秋紀季以酅入于齊以上皆稱行次昭公八年春陳侯之弟招殺陳世子偃師公子為卿而不稱公子荆吳狄越皆以號舉變例莊公二十有三年夏荆人來聘僖公十有八年冬邢人狄人伐衛僖公二十年秋齊人狄人盟于邢襄公五年秋公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚昭公五年冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳以上皆稱人定公四年冬十有一月庚午蔡侯以吳子及楚人戰于柏舉稱爵哀公十有三年夏公會晉侯及吳子于黃池同上凡弒君稱某人弒其君某不書地微者弒稱人討而殺之書人殺變例文公十有八年冬十月莒弒其君庶其成公十有八年正月庚申晉弒其君州蒲昭公二十有七年夏四月吳弒其君僚定公十有三年冬薛弒其君比以上皆書國襄公二十有九年夏五月閽弒吳子餘祭書閽昭公十有三年夏四月楚公子比自晉歸于楚弒其君虔于乾溪書地凡外諸侯之卒書爵葬則稱公從其臣下之辭也無變例特文襄公七年十有二月鄭伯髠頑如會未見諸侯丙戌卒于鄵凡外諸侯之葬魯會則書不會則不書其會而不書者或諱其辱或避其號或不以考終皆變例也然弒君亦有書葬者又變中之變其義則更精矣襄公三十年夏四月蔡世子般弒其君固冬十月葬蔡景公昭公十有九年夏五月戊申許世子止弒其君買冬葬許悼公凡殺大夫書某國殺其大夫某兩下相殺不書其羣下作亂而殺或為執政之大臣所擅殺皆書人殺弟及世子目其君內殺大夫諱言刺變例文公六年十月晉殺其大夫陽處父狐射姑殺而稱國殺文公七年四月宋人殺其大夫不名文公八年十月宋人殺其大夫司馬同上成公十有八年春王正月晉殺其大夫胥童欒書殺而稱國殺昭公十有四年冬莒殺其公子意恢蒲餘侯殺而稱國殺特文僖公二十有八年春公子買戍衛不卒戍刺之缺文莊公二十有六年夏曹殺其大夫僖公二十有五年夏四月宋殺其大夫凡書盜殺者據其告詞本無主名也書盜竊則以陪臣賤故此皆無變例凡伐人之國而夷其宗社曰滅滅而旋復者則書入或取之為附庸而存其五廟亦曰入魯滅國諱之曰取邑只書取不書滅變例僖公二年虞師晉師滅下陽邑書滅僖公十有七年夏滅項魯滅國不諱凡滅國或書爵或書人或書師或書某帥師滅某國見滅者或書奔或書以歸其奔不書出宣公以前不名宣公以後名變例僖公二十有五年春王正月衛侯燬滅邢書名凡戕殺鄰國諸侯稱人見戕者不名國滅則名變例昭公十有一年夏四月丁巳楚子虔誘蔡侯般殺之于申彼此皆名昭公十有六年春楚子誘戎蠻子殺之稱楚子凡執鄰國諸侯稱人見執者書爵而不名從此遂失國者名變例成公十有五年二月晉侯執曹伯歸于京師稱晉侯凡執鄰國大夫稱人見執者稱某國某人不稱官惟行人稱某國行人某無變例凡夫人稱某氏有姑稱婦某氏葬稱小君稱諡係姓變例莊公元年三月夫人孫于齊不稱薑氏僖公元年十有二月夫人氏之喪至自齊不稱薑文公四年夏逆婦薑于齊不稱氏宣公元年三月遂以夫人婦薑至自齊同上異文隱公三年夏四月辛卯君氏卒凡夫人與公並序以公為主書及變例隱公元年秋七月天王使宰咺來歸惠公仲子之賵異文桓公十有八年公與夫人遂如齊凡娶夫人書某人如某國逆女某人以夫人某氏至自某國其逆女之人前稱氏後從省文第稱名變例桓公三年九月夫人薑氏至自齊莊公二十有四年八月丁丑夫人薑氏入文公四年夏逆婦薑于齊凡內女已嫁者係國未嫁者不係國變例文公十有二年二月庚子子叔姬卒文公十有四年齊人執子叔姬文公十有五年十有二月齊人來歸子叔姬宣公五年秋九月齊高固來逆子叔姬冬齊髙固及子叔姬來以上俱稱子異文僖公十有四年季姬及鄫子遇于防使鄫子來朝
