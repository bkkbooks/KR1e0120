body:
  text: 春秋究遺卷一左庶子葉酉撰隱公元年春王正月元者氣之始古人謂一為元元年隱公之一年也春與下王正月連文月為周月必無冠以夏時之理蓋冬至一陽來復故建子之月即可謂之春也王正月者夏時得天故周兼用夏正周禮正月之吉用周正正嵗即夏正夏曰嵗故謂之正嵗也左氏傳博採當時諸侯史䇿之文亦多用夏正春秋魯史以周正紀事聖人欲傳信於後故特書王正月以别於建寅之正月也然則建子之月周既改稱春正月矣而經不以春係王而但以正月係王者何春統三月其建寅建丑兩月在夏商亦謂之春故不可係之於王也不書即位者隱公志在讓桓以攝位不敢行即真之禮故舊史本不書即位聖人亦仍之而已此與莊閔僖三公之不書即位同而其所以不書即位者異此乃魯史本無其文彼則聖人削之也詳具桓元年公即位下春秋竟時無事例書首月以備時此下三月有事而空書首月者以元年正月故三月公及邾儀父盟于蔑魯侯爵稱公者臣子之詞盟不曰會而曰及者張氏洽曰內為主書及外為主書會説本傳例及者我所欲會者外為志其義多不可通春秋有今日書會而明日書及某人盟者一事也豈可分內外哉蓋侵伐書會則與及對若盟會之會則與盟對不與及對也會有主賓相見之儀盟有刑牲插血之事故凡魯君與外諸侯會盟有會而不盟者則書曰公會某某於某地有盟而不會者則書曰公及某某盟於某地會有以此就彼之意及者連類之詞皆以公為主文義相似故會不言及盟則昭大神以相要言不可云公盟某某於某地也左氏傳往往有此文法後人特習其讀而不知其非耳故言及內外之説非蔑之盟不先行會禮故言及而不言會邾儀父即邾子克未王命故不書爵稱儀父者左氏以為貴之非也胡氏安國曰附庸之君例稱字所以然者附庸之君亦君也既無爵之可稱若竟以名書則與諸侯之大夫無别矣春秋謹名分胡氏例稱字之説似得其實古人名克者多以儀為字如周莊王弟之子克字子儀楚鬭克字子儀桓司馬之臣克字子儀之類皆是儀父為邾子克之字無疑然則郳黎來介葛盧何以稱名郳與介國尤小非邾賦六百乘者比或魯史僅知其名故春秋不得不以名書未可執彼以難此也且安知黎來葛盧非字而左氏誤以為名耶夏五月鄭伯克段于鄢傳初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生遂惡之愛共叔段欲立之亟請于武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城太叔祭仲曰先王之制大都不過三國之一今京不度非制也君將不堪公曰薑氏欲之焉辟害既而太叔命西鄙北鄙二於己公子吕曰國不堪二公將若之何公曰無庸將自及太叔又收二以為己邑至於廩延子封曰可矣厚將得衆公曰不義不昵厚將崩太叔完聚繕甲兵將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛太叔段段入於鄢公伐諸鄢五月辛丑太叔出奔共按稱鄭伯者以鄭伯親伐鄢故也君將稱君史文定例不曰鄭伯伐段于鄢克之而曰克段于䣕者天子討而不伐伐者敵辭非所施於臣下者也辭有所窮故特變其文曰克先儒多以鄭伯志在殺段故春秋專目鄭伯且書克以著其失親親之恩其説非也人臣無將將則必誅傳稱段將襲鄭則段固有可誅之罪矣微論鄭伯並無殺段之志即果志在於殺亦大義滅親事非得已况第迫之使奔並不極之於所往正與榖梁所為緩追逸賊者合聖人於此顧不責其弟之不臣而専以失親親之恩責其兄之不友有是理乎然則春秋於鄭伯遂無譏乎安得而無譏也特以其不孝而惡之而非譏其不友耳蓋段不過一驕侈公子耳其欲襲兄之國而有之者大都薑氏之謀居多然子無仇母之理薑氏雖欲段得國猶幸其機事不密逆迹遽彰此時為莊公計者惟有引咎自責涕泣以謝其母而申宫警備嚴斥其左右親信預聞逆謀之人使其黨胥潛自解散而不敢發然後開心見誠許段不死且請薑氏任其無咎諭之使歸而處之以一小邑如此則兄弟母子之間其所全者多矣乃莊公因薑氏愛憐少子自亟請武公之時已怨之特深故至是倉猝聞變即投袂而起以積怨其母之心而釋憾於其弟於是窮極兵力伐京伐䣕幾有迅雷不及掩耳之勢蓋鄭伯仇視其母必欲取諸其懷中而剪其所愛此其不孝之罪固聖人之所深惡者也豈以其不友而惡之哉知然者以段不稱弟與不書段出奔知之蓋段不稱弟者以鄭伯之罪在不孝義不關乎段之為弟也故不稱弟非徒以段不弟而已不書段出奔者聖人欲以鄭伯之不孝示戒故只據鄭伯為文若書段出奔則似譏鄭伯之迫逐其弟而以不孝示戒之意轉晦故深沒其辭於彼所以専治其罪於此也左氏以為難之亦非其説更詳具莊元年單伯逆王姬下秋七月天王使宰咺來歸惠公仲子之賵周王稱王耳加天於上謂王當奉若天道也春秋天子之使未有書官者惟咺及渠伯周公三宰稱官蓋天子之冢宰其位至尊其任至重下聘侯國非其事也重臣而輕使之故書宰之官所以著其不當使也其他如凡伯南季之屬皆以卿士充使非冢宰比於義無疵焉故不書官王朝卿士例稱行次咺冢宰而反稱名者上既書其官下自不得不書其名蓋官必著之於籍官著於籍必各係之以其名未有係之以行次者咺若以行次書則以籍考之宰之中無是人矣然則文十五年書宋司馬華孫來盟何以不名蓋官而係之以名者恆辭也如殺大夫必書名即此義書華孫者以欲别之於公子卬義不關乎其人也其説詳具本文下焉得執彼以疑此宰周公又何以不名既繫以周公矣王朝無兩周公故不必復繫以名也糾書氏而咺獨名者殆本未賜族如魯挾無駭之類與仲子桓公之母先儒以為惠公妾非也隱母賤桓母貴公羊之説確有可據左氏所為繼室以聲子者不過以妾媵而攝行內政原非娶之以夫人之禮者也仲子則以手文之異惠公以夫人之禮娶之於是一國之人皆稱之為夫人無異詞其與聲子一嫡一庶名分顯然今乃斥之為妾者拘於諸侯不再娶之説耳然諸侯不再娶果何禮乎先儒嘗考邑薑亦武王之繼配載在史册者可據也乃程子又為遷就其詞曰內無主則家道不立卿大夫而下不妨有再娶之禮其説似尤不能無弊卿大夫之妻所理者一家之內政耳然且不可以無主矣况諸侯之夫人與諸侯同主宗社其妃嬙嬪御之屬實繁有徒一旦不幸而嫡夫人即世其人皆故等夷爭妍妒寵不足以相彈壓家道不立以諸侯而較之卿大夫其所關者為更巨非再娶何以肅隂教而襄外治乎春秋凡兩重不書及如哀三年書桓宫僖宫災是也今天王歸賵並書惠公仲子而不以惠公及仲子誠以再娶非以妾為妻者比乃葵丘五命之所不禁而仲子之位號素定欲不成之為夫人而弗得也春秋既成仲子為夫人而後儒必斥之為妾有是理乎王使榮叔歸含且賵王不稱天此於王無貶辭若仲子而果妾也斯其異於成風者於義無所處矣不稱夫人者夫人既薨則稱諡係姓無諡故稱仲子例不應稱夫人也其無諡何也婦人從夫以夫之諡為諡惟妾母則不敢從夫故聲子有諡而孟子無諡何獨於仲子而疑之其不稱惠子而稱仲子者孟子亦當從惠諡也故以行次别之文薑之所以有諡者絶之於桓公也魯自文薑後夫人皆有諡以絶文薑於桓公為諱故槩從其例非古也乘馬曰賵衣衾曰襚貝玉曰含錢財曰賻九月及宋人盟于宿傳惠公之季年敗宋師于黃公立而求成焉九月及宋人盟于宿始通也按杜注云主客無名皆微者也其説不確凡侵伐書及而不目其人者則微者耳盟書會書及而不目其人者君也蓋公與外大夫盟會降等屈尊有玷於其爵矣故不書公以諱其失此與外諸侯之降等屈尊者反書爵以著其失其義正同宋人亦非微者望溪先生曰自文公以前侵伐會盟內大夫以名見而外大夫悉稱人蓋大夫未張奉君命以行事第稱為某國之人而不必詳其名氏也冬十有二月祭伯來杜注祭國伯爵也胡氏安國曰畿內諸侯為王卿士望溪先生曰周秦以前之書無言畿內有五等之爵者惟公羊傳曰寰內諸侯蓋據春秋所書周公凡伯尹子之屬而為言耳王制曰分天下為左右曰二伯蓋據公羊氏陜以東周公主之陜以西召公主之並周南所稱召伯而為言耳不知詩稱召伯以行次言非爵也召公在文王時豈得為方伯哉春秋所書凡伯祭伯召伯皆以行次書與榮叔南季類也其稱伯多於叔季者承嗣多長嫡也周公祭公天子之三公也蘇子尹子單子劉子乃時人相尊異之稱非伯子男之子也尹單劉皆執政使有五等之爵豈宜居卑列哉且王臣見經者何以止有公伯子而無侯男哉按祭伯非王命而來朝于魯經止書曰來者當是祭伯來朝魯隱以其為王朝卿士謙不敢當不聽其行朝禮故不言朝胡傳謂不豫其朝非也不當朝而朝據實而書其失不更著乎公子益師卒按傳公不與小斂故不書日胡氏引公孫敖叔孫舍之卒公皆不與小斂而書日以左氏之説為非不知釋例明云公在外大夫不卒於國而猶存其日者為其有故非不欲臨也則胡氏所引未足以難左矣但不書日亦無以見公之不與小斂也其諸恩禮薄而史遂失其日歟二年春公會戎于潛胡氏安國曰戎正朔所不加也奚會同之有書會戎譏之也按牧野誓師羌髳在列戎豈果不可會乎况淮夷徐戎於魯為門庭之冦尤有不得不迎其善意而與為好者公始與之會必遲之又久審知其無他然後為唐之盟其與孟浪輕信者異矣自是至莊公十八年始書公追戎于濟西戎不為魯患者四十餘年殆猶不欲背唐之盟也歟夏五月莒人入向傳莒子娶于向向薑不安於莒而歸夏莒人入向以薑氏還杜注向小國將卑師少稱人按隱五年公羊傳曰將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人杜注本此其説似不為無據然詳考之惟將卑師衆稱師一語確不可易其餘殊不盡然將尊者既以名見然自文公以前外諸侯之侵伐何以並無稱將稱某帥師者乎稱師稱人既以師之多少異何以桓十三年齊宋衛燕之戰戰稱燕人敗績稱燕師僖二十八年城濮之戰定四年柏舉之戰皆戰稱楚人敗績稱楚師乎此皆其説之不可通者也蓋大夫未張之時凡大夫將皆稱人所以别於君之自將耳非特將卑師寡者而已即將尊師衆與將尊師寡者其詞一施之以其皆承君命以行事故概之以人人者人其將非人其師故師與人並舉於文無所嫌此按之文宣以前之春秋而可知者也及後大夫既張乃如公羊氏之説將尊師少者以將重於師稱將將尊師衆者以將與師並重稱某帥師俱不復以人槩之矣將尊者既不槩之以人則凡將不以名見又不稱師而稱人者疑於將卑而師寡矣然試思春秋至成襄以後列國諸侯殆無不阻兵安忍而輕用民命者矣將卑師寡何以克敵况如秦晉吳楚諸大國彼此相侵伐肯以一旅之師使卑者將之而往乎此以情勢揣之而知其有不然者彼其所以稱人者蓋由赴告有詳略傳聞有同異偶不得其將之名氏故時復槩之以人耳公羊臆度之詞杜注襲訛承誤不足信也無駭帥師入極極附庸襄十三年傳弗地曰入謂入其國都旋即去之而不有其土地也無駭未賜族故不氏秋八月庚辰公及戎盟于唐杜注八月無庚辰日月必有誤會不書日而盟必書日張氏洽曰以其或尋或寒皆考於此固有國者所尤謹也前此蔑宿二盟不書日久逺失之耳九月紀履緰來逆女卿為君逆則稱逆女其自為逆則稱所逆者之行次尊卑之别也內女無書逆者獨此書逆何録伯姬也與宋伯姬書納幣同義其不稱使何公羊云婚禮不稱主人蓋雖天子諸侯亦不自主婚所以養廉逺恥也故不稱使冬十月伯姬歸于紀張氏洽曰天子諸侯無出疆親迎之理必使上卿往迎於其國至於所館然後親迎以入此哀公問所謂大昏既至冕而親迎也胡氏安國謂逆女必親迎使大夫非禮也程子曰假如秦君娶于楚豈可越國親迎耶足以正胡氏之失紀子伯莒子盟于密傳作紀子帛程子從公穀曰缺文也當云紀侯某伯莒子盟于密十有二月乙卯夫人子氏薨子氏杜注謂桓公之母隱讓桓以為太子成其母喪以赴於諸侯故稱夫人然天王歸賵必於仲子既卒之後左氏豫凶事之説非人情也不可從公羊傳隱之母也穀梁傳隱之夫人也程子從穀梁蓋隱公攝讓其母之卒必不赴而其妻則魯人既奉隱為君矣於其妻自不得不稱之曰夫人也子氏不書葬者先儒謂婦人從夫故君存則葬禮未備待君薨而合祔其説非也望溪先生曰古者葬各有期未有君在而久不葬者蓋隱志乎讓子氏之薨不以夫人之禮葬故不書於册也鄭人伐衛鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延至是鄭人伐衛討滑之亂也傳例凡師有鐘鼓曰伐無曰侵正義鳴鐘鼓以聲其罪曰伐寢鐘鼓以入其境曰侵掩其不備曰襲按鳴鐘鼓以聲其罪曰伐此無可疑者獨以寢鐘鼓解侵則如胡氏所謂潛師掠境與掩其不備相似恐不確蓋兵薄其城邑謂之伐侵則不必攻其城邑第入其境而係纍其民人蹂躪其禾稼以患苦之謂之侵故侵每與害連文非無鐘鼓之謂也大司馬九伐之法負固不服則侵之其即患苦之意歟但必不如春秋時為害之甚耳三年春王二月己巳日有食之不書朔史失之也三月庚戌天王崩崩者上墜之形平王崩而不書葬魯不會也夏四月辛卯尹氏卒左氏經文作君氏杜注隱公不敢從正君之禮故不敢備禮於其母正義君氏者謂君之母氏也經典通呼母為母氏公穀皆作尹氏按天王崩魯不會故不書葬而公羊曰天王崩諸侯之主也穀梁曰為魯主隱公奔喪之説不足信尹氏之卒其説顧足信乎但正義謂君之母氏其解亦未確母氏二字可去母而著氏乎竊意君氏之君乃小君之君非指隱公也不稱夫人故不稱小君而變文以稱曰君氏君而繫之以氏則不疑於邦君之君矣君氏之卒不書薨其喪禮必從殺視彼天王歸賵而六羽考宫者何如哉春秋比事屬辭聖人之情可見矣卓氏爾康曰豫初學春秋謂隱公被獲于鄭禱于鍾巫與尹氏歸故書尹氏之卒以本其事也一時快然終非確論按此解甚新然必無此理去病先生亦自知其不確矣本可存而不論因有妄男子勦襲其説衍至數百言其利口足以亂是非恐學者為其所誤故附及之秋武氏子來求賻求有索取意如求諸隂陽之求春秋謹名分若作乞字解則天王之名分安在乎不書王使者以在喪故八月庚辰宋公和卒諸侯曰薨書卒者略外以别內也卒何以名諸侯不生名使卒而不名則其名終不可得而見矣且其嗣君或有會盟征伐之事將復見於經名卒者所以别其嗣君也冬十有二月齊侯鄭伯盟于石門張氏洽曰隱公十一年間盟而不食言者惟此石門之盟二君終身未嘗相伐癸未葬宋穆公外諸侯葬魯會則書間有會葬而不書者胡氏曰有討其賊而不葬者宋殤齊昭告亂書弒矣而經不書葬是也有諱其辱而不葬者晉主夏盟在景公時告喪書日矣而經不書葬是也有治其罪而不葬者魯宋盟會未嘗不同而三世不葬是也有避其號而不葬者吳楚之君書卒者十亦有親送於西門之外者矣而經不書葬是也毛氏竒齡曰宋殤被弒可云討賊若齊昭公卒已立子舍而舍方被弒其於昭公無與也昭未見弒何云為昭討賊宋之書卒而不書葬者止桓襄二公未嘗有三世也且桓公襄公並無所獲罪於魯亦未嘗得罪天下何煩開一例必専治其罪而重為削之按毛氏駁胡傳此二條甚當但文公七年宋公王臣卒而經不書葬合桓襄二公明明三世矣何云未嘗有三世也至所謂避其號而不葬者則確不可易之論今駁之曰猶是五等邦君耳而例當書公則不問晉侯秦伯邾子許男而統以公字概之今既於赴告之時已書曰楚子某卒吳子某卒則於會葬時亦何難行我史例子也而公之而乃曰避號吾不解矣不知外諸侯葬稱公者緣彼國臣子之詞也吳楚僭王若緣其臣子之詞當書王不當書公胡氏所謂避其號者是也乃復用此為譏議乎又按宣十八年楚子旅卒襄十二年吳子乘卒十三年楚子審卒二十五年吳子遏卒二十八年楚子昭卒昭元年楚子麇卒十五年吳子夷昧卒二十六年楚子居卒定十四年吳子光卒哀六年楚子軫卒胡傳所謂吳楚之君書卒者十本未嘗有誤今亦駁之曰吳之書卒只乘與夷昧而楚則宣之旅襄之審昭之麇與居哀之軫共七卒而無十卒則更考之不詳所謂囈語夢語者恐不在彼而在此矣又按弒君不書葬以仇末復故胡傳謂討其賊而不葬者亦非辨詳襄三十年葬蔡景公下四年春王二月莒人伐杞取牟婁凡伐人之國而夷其宗社者曰滅得其城邑曰取魯滅國諱之亦曰取取而先書伐者正義所取之邑小不以名通若不加伐於上則不知為何國之邑矣其説非是春秋凡會遇盟戰之地皆不係國以職方具在書某地則知為某國何獨於取邑而慮其不知為何國之邑乎蓋征伐天子之大權諸侯無故相伐聖人之所甚惡者也故無論其取邑不取邑皆書以罪之蓋重在伐國而書取以甚其伐之之罪非重在取邑而書伐以明其屬於何國也然則昭元年取鄆四年取鄫何以不先書伐莒鄆乃魯之舊疆兵加于鄆不可言伐莒鄫則自叛而歸並未嘗以兵取之也僖二年虞師晉師滅下陽又何以不先書伐虢也滅下陽之罪大無故伐國聖人又薄其罪而以為不足書矣戊申衛州吁弒其君完傳衛莊公娶於齊曰莊薑美而無子又娶於陳曰厲媯其娣戴媯生桓公莊薑以為已子公子州吁嬖人之子也有寵而好兵公弗禁莊薑惡之石碏諫弗聽其子厚與州吁遊禁之不可桓公立乃老四年春衛州吁弒桓公而立按州吁未為大夫故不稱公子詳具翬帥師下又不稱弟者弒君之罪大稱弟不足以甚之也夏公及宋公遇于清公與宋公為會將尋宿之盟未及期衛人來告亂乃行遇禮而還按遇者不期而會之名蓋欲簡其禮也會不言及而遇言及者會有以此就彼之意故可連公為文遇則彼此皆無心不可専屬之公也故言及與盟言及同義宋公陳侯蔡人衛人伐鄭傳宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭使告於宋曰君若伐鄭以除君害敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還按興是役者首謀在衛而以宋主兵胡氏謂誅亂賊必治其黨與之法非也春秋書戰伐未有序大夫於諸侯之上者衛人大夫也自應首宋公秋翬帥師翬不稱公子先儒謂翬為隱之罪人故終隱之篇不稱公子非也未有不貶於既弒之後而貶於未弒之前者按春秋之例凡稱時君之子曰子其為先君之子必為大夫乃稱公子所以然者公子乃國人尊奉其君之子之公稱故必為國之大夫乃稱公子若未為大夫則君之私屬止宜從其君之私稱故曰某侯之兄某侯之弟如衛摯齊年鄭語之類是也兄弟不為大夫即不稱公子而第以屬稱則凡先君之子不為大夫而與時君之屬少疏者必第以名見可知矣傳曰惟卿為大夫翬在隱之世嘗求為太宰矣是猶未為卿也故不稱公子至桓之世稱公子則操刃之賊已進而為卿矣會宋公陳侯蔡人衛人伐鄭傳秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師會之公弗許固請而行按春秋之例凡接書一國兩事或一人兩事則復舉某國某人四國夏伐鄭秋復伐鄭翬帥師會伐在秋兩事也故覆舉四國定公十年叔孫州仇仲孫何忌兩次圍郈經亦覆舉二卿正與此類莊十四年單伯會伐宋則諸侯伐宋只一次故不覆舉胡氏安國乃謂言之重詞之復其中必有大美惡焉竟將經文秋字抹煞亦大粗心矣九月衛人殺州吁于濮傳州吁未能和其民厚問定君於石子石子曰王覲為可陳桓公方有寵於王厚從州吁如陳石碏告於陳使即圖之陳人執之而請蒞於衛衛人使右宰醜蒞殺州吁于濮石碏使其宰獳羊肩蒞殺石厚于陳按殺州吁稱衛人者蓋言石碏殺則疑於一人之私矣所以者國人皆曰可殺之義也齊人殺無知雍廩雖不可與石碏同日語而無知與州吁之罪則均也故殺亦以齊人書冬十有二月衛人立晉按傳衛人逆公子晉于邢十二月宣公即位以齊小白入於齊之文例之當書曰衛晉入于衛乃以衛人立晉為文者蓋以著石碏之忠於謀國也州吁弒逆之賊既能以大義殺之晉之立也又不由外諸侯之力而獨以大義立之春秋二百四十二年之中弒君者屢矣而大臣定亂之功未有出碏之右者觀宋之納突于鄭秦之納夷吾于晉皆責賂無已兵連禍結則碏之立晉其功大矣故一則書曰衛人殺州吁于濮再則書曰衛人立晉其語氣正相類先儒乃謂聖人書衛人立晉所以著其擅立之罪然則聖人書衛人殺州吁亦為著其擅殺之罪乎晉不稱公子者公子返國嗣位例不稱公子稱衛人者與殺州吁稱衛人同五年春公觀魚于棠傳非禮也且言逺地也夏四月葬衛桓公州吁已殺故書葬衛侯爵書公緣其臣子之情也秋衛師入郕傳衛之亂也郕人侵衛故衛師入郕杜注將卑師衆但稱師此史之常也九月考仲子之宫仲子以手文之異歸為魯夫人非妾也因孟子已入惠公之廟故隱公為别立宫以祀之考者成也成仲子宫安其主而祭之也不書立宫者立所當立常事故不書書考宫蓋連下初獻六羽為義初獻六羽魯廟既僭八佾仲子以别宫不敢同羣廟降用六羽故書曰初獻佾干羽之總名羽以象文德干以象武功婦人無武事獨奏文樂故謂之羽而不曰佾邾人鄭人伐宋傳宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道鄭以王師會之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者使者曰未及國公怒乃止按王師不書者鄭以王師會伐本非王意故宋但以鄭伐告亦以告王伐於辭不順故耳邾主兵故序鄭上螟記災也冬十有二月辛已公子彄卒公子益師卒以恩禮薄而史遂失其日僖伯卒葬之加一等恩禮厚故書日宋人伐鄭圍長葛兵環其城曰圍傳以報入郛之役也六年春鄭人來輸平公之未立與鄭人戰于狐壤止焉故公與鄭有舊怨至是而鄭求成于魯欲離宋之黨也按春秋稱人之例其義不一會盟侵伐稱人臣下之辭也成公以前外卿大夫皆稱人成公以後列國之卿稱名大夫則稱人而小國之大夫前後皆稱人此望溪先生所謂隨世以變著於册書而不可更易者也其餘若殺大夫稱國亦間有稱人者非羣下之作亂即其執政大臣之擅權書人以著其生殺之柄之不自其君出也又如莊五年公狩于禚所及之齊人亦皆為臣下之辭至若此年鄭人來輸平莊六年齊人來歸衛俘僖元年夫人薑氏薨於夷齊人以歸僖二十一年楚人使宜申來獻捷文九年秦人來歸僖公成風之襚文十五年齊人來歸子叔姬宣元年齊人取濟西田四年公及齊侯平莒及郯莒人不肯十年齊人歸我濟西田十五年宋人及楚人平成八年衛人來媵九年晉人來媵十年齊人來媵定十年齊人來歸鄆歡龜隂田哀八年齊人取歡及闡冬齊人歸歡及闡諸稱人者則非指其臣下而言蓋其事為其國之柄臣及其有司所奉命而行者欲目其君則其君不以身親不可以爵書也而又實出於其君之命故諸所謂人者皆渾舉之辭兼乎其君臣而言之者也觀僖公二十七年諸侯圍宋以楚子身親於前子玉獨留於後遂不稱楚子而以人渾之則諸所謂人者其為兼乎其君臣而言之也奚疑先儒多以褒貶之義求之即無一可通者矣又如執諸侯大夫與戕鄰國之君稱人亦同此例其以勢力相凌暴第直書而罪自見不必書人以貶之也弒君而稱人者事起倉卒賊由微者微者姓名不登於史册非人無以稱也討賊而稱人者如殺州吁若稱石碏則疑於一人之私矣故不得不以人書下文立晉書衛人亦此義惟莊二十三年荆人來聘則又别為一義其説詳具本文下鄭人來輸平以鄭伯使宛來歸祊及鄭伯以璧假許田之文例之當書曰鄭伯使某來輸平而書法不同者蓋祊及許田乃天子所賜魯與鄭湯沐朝宿之地而擅歸擅假是目無天王而忘其爵之所自來矣書其爵足以著其罪故稱鄭伯輸平則與歸祊及假田異故從恆辭書人不書使某者其人微也或謂輸平及歸俘歸田來媵諸稱人者皆以來者稱知不然者以楚人使宜申來獻捷之文知之也輸平左作渝公穀作輸戴氏震曰古字輸渝通爾雅渝變也廣雅輸更也字義本相因然用之或至相反變者墮而敗之故公穀以為墮敗其成詩正月箋亦訓輸為墮更者改而新之故左傳以為更成前此與鄭不和今棄舊更新按輸寫也謂輸寫其誠意以求成也凡成皆棄舊更新若但如廣雅訓更無由見鄭來求成之實矣夏五月辛酉公會齊侯盟于艾傳始平于齊也秋七月四時具而後成嵗故春秋竟時無事必書首時冬宋人取長葛胡氏安國曰宋人恃強圍邑久役大衆取非其有其罪著矣按杜注云前年冬圍長葛不克而還今冬乘其無備而取之是宋再舉而取長葛而經傳皆無明文蓋杜氏泥於取言易之例從而為之詞七年春王三月叔姬歸于紀望溪先生曰內女之歸也非失禮不書紀伯姬叔姬之歸也未嘗有失禮而書則閔其後之變也紀亡而伯姬葬於齊侯變也紀侯沒而叔姬歸於酅葬於叔變也故將有其末而録其本焉按春秋因史作經凡事之首尾不必備叔姬之所以必録其本者既閔其變又嘉其賢故其志之也特詳滕侯卒不書名史失之也卒不葬所謂怠於禮弱其君而不葬者滕侯宿男之類是也夏城中丘穀梁傳城為保民為之也民衆城小則益城益城無極凡城之志皆譏也按民衆城小安得不益城若謂保民當以德不以城則所為王公設險者何説乎蓋城築關乎國勢春秋重其事故書之詳不必皆志以示譏也惟書築臺囿則譏其不恤民力耳其他如莊之新延廄僖之新作南門文之毁泉臺成之立武宫定之立煬宫新作雉門及兩觀其隨事輒書者又各有其義先儒以重用民力概之失其旨矣齊侯使其弟年來聘傳結艾之盟也胡氏安國曰僖公私於同母寵愛異於他弟施及其子猶與嫡等遂階篡弒之禍故聖人於年來聘特變文書弟以示貶非也按諸侯之兄弟見經而以兄弟稱者十獨陳公子招執國之大政乃稱公子耳其餘如年與秦伯之弟針衛侯之兄摯公弟叔肹以及鄭語衛黑背陳黃衛鱄宋辰之屬皆以兄弟稱蓋稱公子者大夫也稱兄弟者不任職也若譏過寵則未見年以聘而階亂也以無知之篡弒而預譏年之過寵有是理乎本望溪先生説秋公伐邾傳秋宋及鄭平七月庚申盟于宿公伐邾為宋討也按八年傳稱齊侯將平宋衛于鄭則八年以前宋鄭尚未平也若七年秋宋鄭已平齊又何故欲平之乎左氏傳凡若此類皆可疑讀者不可不察也冬天王使凡伯來聘凡氏伯行次也望溪先生曰王朝之卿士與諸侯之卿士不可以無别也故以行次書按周官大行人之職中大夫二人小行人下大夫二人以天下之大侯國之衆行人大小官止四人故不得不以卿士充使不書官者義不係乎其官也戎伐凡伯于楚丘以歸傳初戎朝于周發幣于公卿凡伯弗賔冬王使凡伯來聘還戎伐之于楚丘以歸杜注戎鳴鐘鼓以伐天子之使泥於有鍾鼓曰伐之例耳胡氏曰國而曰伐此一人亦曰伐見其以徒衆也楚丘杜注衛地在濟隂城武縣西南戴氏震曰楚丘有二一在今滑縣隋初置楚丘縣後改曰衛南此衛地一在今曹縣東南五十里春秋時戎州己氏之邑漢為己氏縣隋改曰楚丘此乃戎地凡伯經其地戎遂伐之以歸此地雖近衛於曹尤近似不涉曹衛之不救公羊見衛有楚丘而目為衛伐杜亦以為衛地胥失考八年春宋公衛侯遇於垂傳齊侯將平宋衛有會期宋公以幣請于衛請先相見衛侯許之故遇于犬丘杜注平宋衛于鄭也按會既有期而宋亟請於衛先相見者蓋宋嘗從州吁之請伐鄭以圖馮矣其後州吁誅宣公立馮不可不終圖齊雖欲平之而其怨鄭之心不可得而平也故先期請與衛相見蓋有志於從齊黨而無意於釋鄭憾也觀瓦屋之盟止三國而不及鄭則此遇之為二國結黨以仇鄭審矣三月鄭伯使宛來歸祊庚寅我入祊傳鄭伯請釋泰山之祀而祀周公以泰山之祊易許田案經止書歸祊未有易許田之文蓋鄭莊必欲結歡於魯以離宋之黨故前年輸平則約之以言今復歸祊則啖之以利初未嘗有覬覦許田之心也既而桓公篡立乃假之以璧有挾而求魯桓不敢不從而無故以田與人不可以告國人也故以歸祊之事藉口以為彼此相易之事耳若果相易豈有歸祊之時絶口不言直待易世之後而始取償者哉左氏誤信其飾説觀聖人之所書可知其事之本不相蒙矣書鄭伯者以天子所賜之湯沐邑而擅以與人其意以巡狩之禮不復行而此田無所用之也其目中尚有天子乎以諸侯而目無天子故書鄭伯所以著其罪也桓元年假田書鄭伯與此同義夏六月己亥蔡侯考父卒辛亥宿男卒宿男不名史失之也秋七月庚午宋公齊侯衛侯盟于瓦屋傳齊人卒平宋衛于鄭盟于瓦屋以釋東門之役按鄭卒不與盟蓋非特宋衛不欲與鄭平而鄭亦不欲與宋衛平也觀是年八月鄭伯以齊人朝王九年遂以王命伐宋則鄭伯之情可見矣八月葬蔡宣公九月辛卯公及莒人盟于浮來公與外大夫盟嫌其體不敵例不書公此獨書公者杜注謂微者不嫌敵公故直稱公其説非也蓋隱公攝讓不敢自居於尊故宋人莒人皆不惜身與之盟雖有降等屈班之失然其意則自以為非君也即此不自尊之意而其攝讓之實愈見故春秋於宿之盟不書公以諱其失浮來之盟又書公以明其謙蓋隱桓之際聖人於此有痛心焉凡可以表隱之讓者無所不盡其辭此君氏之所以不書薨而夫人子氏之所以不書葬也豈不嫌敵公之謂乎其獨於浮來之盟書公以明其謙者以莒人乃小國之大夫較宋人尤卑故螟冬十有二月無駭卒傳無駭卒羽父請諡與族公命以字為展氏杜注諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏九年春天王使南季來聘南氏季行次也詳見七年凡伯來聘下三月癸酉大雨震電庚辰大雨雪建寅之月而大雨震電陽失節也逾八日而大雨雪隂氣縱也挾卒未賜族與無駭同夏城郎秋七月冬公會齊侯于防傳宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公會齊侯于防謀伐宋也按鄭深怨宋故不與瓦屋之盟而又懼逆齊命故去年八月以齊人朝王蓋欲借以結歡於齊也至是又以王命告魯使為此會以招齊而齊果墮其術中明年遂為中丘之會同心以伐宋矣十年春王二月公會齊侯鄭伯于中丘為師期夏翬帥師會齊人鄭人伐宋胡氏安國曰翬去公子以戒兵柄下移非也未為大夫故不稱公子義見四年會伐鄭下按傳稱羽父先會齊侯鄭伯伐宋六月公會齊侯鄭伯于老桃公會不書者蓋老桃之會公從行之師不足以制敵其所用以敗宋師者仍是翬所帥之師經只欲詳其戰事耳故書翬帥師而老桃之會不書六月壬戌公敗宋師于菅未陳曰敗義見莊十年敗齊師于長勺下辛未取郜辛巳取防鄭以齊背宋從己魯之力也故得二邑而皆歸於魯魯遂據而有之春秋書曰取若魯之自取者然譏不在鄭也秋宋人衛人入鄭鄭師還駐兵於逺郊宋衛竒兵乘虛入鄭宋人蔡人衛人伐戴鄭伯伐取之戴鄭與也故三國伐之鄭因三國不和遂與戴合師內外夾擊之胡氏所謂能以竒勝也冬十月壬午齊人鄭人入郕傳蔡人衛人郕人不會王命冬齊人鄭人入郕討違王命也胡氏安國曰入者不順之詞按左氏傳例不地曰入謂旋入旋去而不有其地也非不順之詞但以強凌弱至入人之國都其事自不順耳十有一年春滕侯薛侯來朝二君不特言者旅見也夏五月公會鄭伯于時來傳謀伐許也秋七月壬午公及齊侯鄭伯入許傳七月公會齊侯鄭伯伐許庚辰傳于許壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣寡人弗敢與聞乃與鄭人鄭人使許大夫百里奉許叔居許東偏使公子獲居許西偏胡氏安國曰書及則入許者公所欲也按伐許本鄭志則入許安得謂公所欲乎書及者蓋伐可書會入則兵薄城下適乘其可入而入之不可以預為期會也故不書會文當然耳不書伐者兵甫至而即入也許莊公奔衛不書者杜注兵亂遁逃不知所在恐不確凡國滅君奔者例不書出其説具莊十年齊師滅談下入與滅不同故不可從滅國例不書出也然方其入之時其國則既滅矣又安能逆知其後之必復而先於其奔書出乎書出不書出兩無所處故並沒其奔不書蓋辭有所窮也若以其君歸則不嫌與滅而不復者同文聖人自不得而略之矣冬十有一月壬辰公薨傳羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣羽父懼反讒公於桓公而請弒之十一月公祭鍾巫館于寪氏羽父使賊弒公于寪氏按公見弒而書薨臣子之所不忍言也不書葬者左氏以為不成喪非也隱之薨既歸獄于寪氏以欺國人矣未有不以禮葬者緣臣子之義仇未復不書葬故孔子削之公羊傳隱何以無正月隱將讓乎桓故不有其正月也按公羊所謂隱無正月者謂正月雖有事只書春而不書正月也如二年公會戎于潛五年公觀魚于棠六年鄭人來輸平八年宋公衛侯遇于垂九年天王使南季來聘十有一年滕侯薛侯來朝諸不書正月者是也然如九年公會齊侯于防亦只書冬不獨會戎于潛不書月也凡會書時不書月者甚多今只舉開首一條以駁之以多不可勝舉也餘倣此莊四年公及齊人狩于禚亦只書冬不獨隱公觀魚于棠不書月也桓三年齊侯使其弟年來聘定十有一年及鄭平俱只書冬不獨鄭人來輸平不書月也此一條獨兩引者一證來一證平也下遇於垂倣此隱四年公及宋公遇于清桓三年齊侯衛侯胥命于蒲俱只書夏不獨宋公衛侯遇于垂不書月也隱三年武氏子來求賻亦只書秋不獨天王使南季來聘不書月也桓七年榖伯綏鄧侯吾離來朝亦只書夏不獨滕侯薛侯來朝不書月也春秋書隱公時事凡書春不書月以為不有其正月矣其他書時不書月者又將何以解之乎蓋月不月於義本無所關或舊史偶失其月者聖人不得而益之也况隱公之世去聖人修春秋時尤逺歷年有久近紀載有詳略更有鄭以強同者後儒乃從而為之辭何其鑿之甚也耶或又謂事有以月成者書月否則書時其説俱支離不足信存而不論可也春秋究遺卷一
